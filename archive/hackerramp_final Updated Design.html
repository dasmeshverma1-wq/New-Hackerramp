const cv = (c) => c === 'accent' ? 'var(--accent)' : `var(--c-${c})`;
const ct = (c) => c === 'accent' ? 'var(--accent-tint)' : `var(--c-${c}-tint)`;
const cd = (c) => c === 'accent' ? 'var(--accent-deep)' : `var(--c-${c}-deep)`;
const ini = (n) => n.split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase();

function Countdown({ to, theme = 'dark' }) {
  const calc = () => {
    const d = Math.max(0, to - new Date());
    return { d: Math.floor(d/86400000), h: Math.floor((d/3600000)%24), m: Math.floor((d/60000)%60), s: Math.floor((d/1000)%60) };
  };
  const [t, setT] = useState(calc());
  useEffect(() => { const id = setInterval(() => setT(calc()), 1000); return () => clearInterval(id); }, []);
  const units = [['d','Days'], ['h','Hours'], ['m','Min'], ['s','Sec']];
  const dim = theme === 'dark' ? 'rgba(255,255,255,0.55)' : 'var(--mute-2)';
  return (
    <div className="flex items-baseline gap-6 md:gap-10 flex-wrap">
      {units.map(([k,l]) => (
        <div key={k} className="flex flex-col items-start">
          <span className="num-display text-5xl md:text-6xl tabular-nums">{String(t[k]).padStart(2,'0')}</span>
          <span className="font-mono text-[11px] mt-2 uppercase tracking-widest" style={{color:dim}}>{l}</span>
        </div>
      ))}
    </div>
  );
}

function Toast({ msg, type, onDone }) {
  useEffect(() => { const id = setTimeout(onDone, 2800); return () => clearTimeout(id); }, []);
  const ring = type === 'success' ? 'var(--c-emerald)' : type === 'error' ? '#DC2626' : 'var(--accent)';
  return (
    <div className="fixed top-6 right-6 z-[100] toast-in card px-4 py-3 flex items-center gap-3" style={{boxShadow:'0 12px 32px -8px rgba(10,10,10,0.18)'}}>
      <span className="w-2 h-2 rounded-full" style={{background:ring}}></span>
      <span className="text-sm font-medium">{msg}</span>
    </div>
  );
}

function Modal({ open, onClose, title, children, size = 'md' }) {
  useEffect(() => { document.body.style.overflow = open ? 'hidden' : ''; return () => { document.body.style.overflow = ''; }; }, [open]);
  if (!open) return null;
  const w = { sm:'max-w-md', md:'max-w-2xl', lg:'max-w-4xl' }[size];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4 modal-scrim" onClick={onClose}>
      <div className={`${w} w-full bg-white rounded-2xl max-h-[88vh] overflow-y-auto fade-up`} onClick={e=>e.stopPropagation()} style={{border:'1px solid var(--line-2)', boxShadow:'0 28px 72px -16px rgba(10,10,10,0.28)'}}>
        <div className="flex items-center justify-between px-7 py-5 border-b sticky top-0 bg-white z-10" style={{borderColor:'var(--line)'}}>
          <h2 className="font-serif text-2xl" style={{fontWeight:400}}>{title}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100" style={{color:'var(--mute-2)'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-7">{children}</div>
      </div>
    </div>
  );
}

                <div className="col-span-11 md:col-span-4 font-serif text-2xl flex items-center gap-3" style={{fontWeight:400}}>

            {['CEO Office','CTO Office','People Team','InfoSec','SRE Platform'].map(s => (

      <section className="section-pad border-t" style={{borderColor:'var(--line)', background:'var(--paper-2)'}}>
        <div className="max-w-[1280px] mx-auto px-6 lg:px-10 text-center">

            <button onClick={()=>setView('teams')} className="btn btn-ghost">Find teammates</button>
          </div>
        </div>
      </section>
    </div>
  );
}

                      <div className="w-7 h-[2px] rounded-full mb-3" style={{background: cv(r.color)}}></div>
                      <h4 className="font-serif text-xl mb-2" style={{fontWeight:400, color: sel ? cd(r.color) : 'var(--ink)'}}>{r.id}</h4>

              <div className="flex justify-between pt-4"><button onClick={()=>setStep(1)} className="btn btn-ghost">← Back</button><button onClick={()=>setStep(3)} disabled={!form.role} className="btn btn-primary">Continue →</button></div>

              <div className="grid sm:grid-cols-3 gap-3">

                  { id:'join', color:'blue', label:'Join existing', desc:'Browse open teams looking for your skillset.' },
                  { id:'solo', color:'purple', label:'Find me a team', desc:'Get matched via the Blind-Date Mixer.' },
                ].map(t => {
                  const sel = form.teamMode === t.id;
                  return (
                    <button key={t.id} onClick={()=>setForm({...form, teamMode:t.id})} className="card p-5 text-left" style={{borderColor: sel ? cv(t.color) : 'var(--line-2)', borderWidth: sel ? '1.5px' : '1px', background: sel ? ct(t.color) : 'white'}}>
                      <div className="w-7 h-[2px] rounded-full mb-3" style={{background: cv(t.color)}}></div>
                      <h4 className="font-serif text-lg mb-2" style={{fontWeight:400}}>{t.label}</h4>
                      <p className="text-xs leading-relaxed" style={{color:'var(--mute-1)'}}>{t.desc}</p>
                    </button>

                <div className="space-y-4 p-6 rounded-xl" style={{background:'var(--paper-2)'}}>
                  <div><label className="label">Team name</label><input className="input" placeholder="e.g., Neural Ninjas" value={form.teamName} onChange={e=>setForm({...form, teamName:e.target.value})} /></div>

              <div className="flex justify-between pt-4"><button onClick={()=>setStep(3)} className="btn btn-ghost">← Back</button><button onClick={submit} className="btn btn-gradient">Submit registration →</button></div>

            <div className="space-y-6">
              <h3 className="font-serif text-2xl" style={{fontWeight:400}}>A bit more about you.</h3>
              <div><label className="label">Years at Myntra</label>
                <select className="input" value={form.coordExperience} onChange={e=>setForm({...form, coordExperience:e.target.value})}>

              <div><label className="label">Why do you want to coordinate?</label><textarea className="input" rows="4" placeholder="What you'd bring to teams..." value={form.coordWhy} onChange={e=>setForm({...form, coordWhy:e.target.value})} /></div>

            </div>

                const sel = selectedTeam.id === t.id;
                return (
                  <button key={t.id} onClick={()=>setSelectedTeam(t)} className="w-full text-left p-3 rounded-lg flex items-center gap-3 transition-colors" style={{background: sel ? ct(t.color) : 'transparent'}}>

                    <div className="flex-1 min-w-0">
                      <div className="font-serif text-sm truncate" style={{fontWeight:400, color: sel ? cd(t.color) : 'var(--ink)'}}>{t.name}</div>
                      <div className="text-xs truncate" style={{color: sel ? cd(t.color) : 'var(--mute-1)'}}>{t.subTheme}</div>
                    </div>
                    {sel && <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background: cv(t.color)}}></span>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div className="lg:col-span-8">
          <div className="card p-7 relative overflow-hidden">
            <div className="absolute top-0 left-0 right-0 h-1" style={{background: cv(selectedTeam.color)}}></div>

              <div>
                <span className={`chip chip-${selectedTeam.color} mb-2`}>{selectedTeam.theme}</span>
                <h3 className="font-serif text-3xl mt-2" style={{fontWeight:400}}>{selectedTeam.name}</h3>
                <p className="text-sm mt-1" style={{color:'var(--mute-1)'}}>{selectedTeam.subTheme}</p>
              </div>
              <div className="text-right">
                <span className="eyebrow">Total</span>
                <div className="num-display text-4xl mt-1" style={{color: cv(selectedTeam.color)}}>{total}<span className="text-lg opacity-60">/{max}</span></div>

            </div>

            <div className="flex gap-1 mt-6 mb-6 pb-4 border-b" style={{borderColor:'var(--line)'}}>
              {['R1','R2','R3'].map(r => <button key={r} onClick={()=>setRound(r)} className={`nav-link ${round === r ? 'nav-link-active' : ''}`}>Round {r.replace('R','')}</button>)}
            </div>

            <div className="space-y-5">
              {activeCriteria.map((c,i) => (
                <div key={c.id} className="pb-5 border-b last:border-0" style={{borderColor:'var(--line)'}}>
                  <div className="flex items-start justify-between mb-3 gap-4">
                    <div className="flex-1">

                      <p className="text-xs mt-1" style={{color:'var(--mute-1)'}}>{c.desc}</p>

                  </div>
                  <div className="flex gap-2">
                    {[1,2,3,4,5].map(n => (
                      <button key={n} onClick={()=>setScores({...scores, [c.id]:n})} className="score-pill" style={scores[c.id] === n ? {background: cv(selectedTeam.color), borderColor: cv(selectedTeam.color), color:'white'} : {}}>{n}</button>

            </div>

            <div className="mt-6 pt-5 border-t" style={{borderColor:'var(--line)'}}>
              <label className="label">Optional comment (required for extremes)</label>
              <textarea className="input" rows="3" placeholder="Add justification for a score of 1 or 5..." />

            <div className="flex justify-between gap-2 pt-5 mt-5 border-t" style={{borderColor:'var(--line)'}}>

function App() {
  const [view, setView] = useState('home');
  const [user, setUser] = useState(null);
  const [loginOpen, setLogin] = useState(false);
  const [toastState, setToast] = useState(null);
  const toast = (msg, type = 'success') => setToast({ msg, type, k: Date.now() });

  return (
    <div className="min-h-screen">
      <Nav view={view} setView={setView} user={user} onLogin={()=>setLogin(true)} onLogout={()=>{ setUser(null); toast('Signed out.','info'); }} />
      <main>
        {view === 'home' && <HomeView setView={setView} />}
        {view === 'register' && <RegisterView toast={toast} />}
        {view === 'teams' && <TeamsView toast={toast} />}
        {view === 'ideas' && <IdeasView toast={toast} />}
        {view === 'schedule' && <ScheduleView />}
        {view === 'sessions' && <SessionsView />}
        {view === 'gallery' && <GalleryView />}
        {view === 'results' && <ResultsView />}
        {view === 'admin' && <AdminView user={user} toast={toast} />}
      </main>
      <Footer setView={setView} />
      <LoginModal open={loginOpen} onClose={()=>setLogin(false)} onLogin={u => { setUser(u); toast(`Welcome, ${u.name.split(' ')[0]}.`); }} />
      {toastState && <Toast key={toastState.k} msg={toastState.msg} type={toastState.type} onDone={()=>setToast(null)} />}
    </div>
  );
}
