        );

  );
}

/* ──────────── COUNTDOWN ──────────── */

function Countdown({ targetDate }) {
  const calc = () => {
    const d = new Date(targetDate) - new Date();
    if (d<=0) return {D:0,H:0,M:0,S:0};
    return { D:Math.floor(d/86400000), H:Math.floor(d%86400000/3600000), M:Math.floor(d%3600000/60000), S:Math.floor(d%60000/1000) };
  };
  const [t, setT] = useState(calc);
  useEffect(()=>{ const id=setInterval(()=>setT(calc()),1000); return()=>clearInterval(id); },[]);
  const units = [['D','DAYS'],['H','HRS'],['M','MIN'],['S','SEC']];
  return (
    <div className="flex items-center justify-center gap-1">
      {units.map(([k,l], i) => (
        <React.Fragment key={k}>
          <div className="flex flex-col items-center gap-2">
            <div className="w-[72px] h-[72px] bg-white border border-[color:var(--line-2)] rounded-none flex items-center justify-center shadow-sm">
              <span style={{fontFamily:'inherit', fontSize:'28px', fontWeight:700, letterSpacing:'-0.02em', color:'#18181b'}}>
                {String(t[k]).padStart(2,'0')}
              </span>
            </div>
            <span className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-[0.1em] font-semibold">{l}</span>
          </div>
          {i < units.length - 1 && (
            <div className="flex flex-col gap-[10px] mb-6 mx-1">
              <span className="w-[5px] h-[5px] rounded-full bg-[color:var(--mute-4)]" />

            </div>
          )}
        </React.Fragment>
      ))}
    </div>

}

/* ──────────── MODAL ──────────── */

function Modal({ open, onClose, title, size='md', children }) {
  useEffect(()=>{ document.body.style.overflow=open?'hidden':''; return()=>{document.body.style.overflow=''}; },[open]);
  if (!open) return null;
  const w = {sm:'max-w-sm',md:'max-w-xl',lg:'max-w-3xl'}[size]||'max-w-xl';
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-scrim px-4" onClick={onClose}>
      <div className={`w-full ${w} bg-white border border-[color:var(--line-2)] rounded-none shadow-[0_8px_40px_rgba(0,0,0,0.10)] max-h-[88vh] overflow-y-auto fade-up`} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-[color:var(--line)] sticky top-0 bg-white z-10 rounded-t-[18px]">
          <h2 className="text-[14px] font-semibold text-[color:var(--ink)]">{title}</h2>
          <button onClick={onClose} className="w-7 h-7 rounded-[3px] flex items-center justify-center text-[color:var(--mute-3)] hover:text-[color:var(--mute-1)] hover:bg-[color:var(--paper-2)] btn text-xl leading-none">&times;</button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
}

/* ──────────── TOAST ──────────── */

function Toast({ msg, type, onDone }) {
  useEffect(()=>{ const t=setTimeout(onDone,3000); return()=>clearTimeout(t); },[]);
  const s = type==='success'?'border-[#bbf7d0] text-[#15803d] bg-[#f0fdf4]':type==='error'?'border-[#fecaca] text-[#dc2626] bg-[#fef2f2]':'border-[#c4b5fd] text-[color:var(--accent)] bg-[#eeeeff]';
  return (
    <div className={`fixed top-[68px] right-4 z-[100] toast-in border ${s} px-4 py-2.5 rounded-[3px] text-[13px] font-medium shadow-[0_4px_16px_rgba(0,0,0,0.08)]`}>{msg}</div>
  );
}

function FluentEmoji({ char, className = '', style = {}, fallbackStyle = {} }) {
  if (!char) return null;
  const cleanChar = char.replace(/\uFE0F/g, '');
  const mapped = FLUENT_EMOJI_MAP[char] || FLUENT_EMOJI_MAP[cleanChar];
  if (mapped) {
    const hasCustomSize = style.width || style.height || /\b(w-|h-)/.test(className);
    const defaultSize = hasCustomSize ? {} : { width: '1.2em', height: '1.2em' };
    return (
      <img 
        src={`https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@latest/assets/${mapped}`} 
        className={className} 
        style={{ display: 'inline-block', verticalAlign: 'middle', ...defaultSize, ...style }} 
        alt={char}
      />
    );
  }
  return <span className={className} style={{ ...fallbackStyle, ...style }}>{char}</span>;
}

function AnimatedSearchInput({ value, onChange, onClear, type = 'teams' }) {
  const [phrases] = useState(type === 'teams' 
    ? ['Search "AI Agents"...', 'Search "Designer"...', 'Search "React"...', 'Search "Fintech"...']
    : ['Search "Customer Support"...', 'Search "Logistics"...', 'Search "GenAI"...']
  );
  const [phraseIdx, setPhraseIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [isDeleting, setIsDeleting] = useState(false);

  useEffect(() => {
    let timer;
    const current = phrases[phraseIdx];
    if (!isDeleting && charIdx === current.length) {
      timer = setTimeout(() => setIsDeleting(true), 2000);
    } else if (isDeleting && charIdx === 0) {
      setIsDeleting(false);
      setPhraseIdx(p => (p + 1) % phrases.length);
    } else {
      timer = setTimeout(() => {
        setCharIdx(p => p + (isDeleting ? -1 : 1));
      }, isDeleting ? 40 : 80);
    }
    return () => clearTimeout(timer);
  }, [charIdx, isDeleting, phraseIdx, phrases]);

  return (
    <div className="relative group">
      <div className="absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
        <svg className="w-[14px] h-[14px] text-[color:var(--mute-3)] transition-colors group-focus-within:text-[color:var(--ink)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

function QuizGame({ quizzes, user, onFinish }) {
  const [idx, setIdx] = useState(0);
  const [ans, setAns] = useState(null);
  const [score, setScore] = useState(0);
  const q = quizzes[idx];
  const done = idx >= quizzes.length;
  const pick = (i) => {
    if(ans!==null) return;
    setAns(i);
    const newScore = score + (i===q.correct?1:0);
    setScore(newScore);
    if (idx === quizzes.length - 1 && onFinish) {
      onFinish({ score: newScore, total: quizzes.length });
    }
  };
  const next = () => { setAns(null); setIdx(i=>i+1); };
  if(done) return (
    <div className="bg-[color:var(--paper)] rounded-none border border-[#efefef] p-6 text-center">
      <p className="text-[40px] mb-2">{score===3?'🏆':score>=2?'🎯':'😅'}</p>
      <p className="text-[18px] font-[700] text-[color:var(--ink)]">{score}/3 correct</p>
      <p className="text-[13px] text-[color:var(--mute-2)] mt-1">{score===3?'You actually read the rulebook!':score>=2?'Solid effort. Almost there.':'Maybe skim the FAQ?'}</p>
      <button onClick={()=>{setIdx(0);setAns(null);setScore(0);}}
        className="mt-4 px-5 py-2 bg-[color:var(--accent)] text-white text-[13px] font-semibold rounded-[3px] btn hover:bg-[#2222dd]">
        Try again
      </button>
    </div>
  );
  return (
    <div className="bg-[color:var(--paper)] rounded-none border border-[#efefef] p-5">
      <div className="flex items-center justify-between mb-4">
        <p className="text-[11px] text-[color:var(--mute-3)] font-semibold uppercase tracking-[0.1em]">Q {idx+1} of {quizzes.length}</p>
        <div className="flex gap-1">
          {quizzes.map((_,i)=>(
            <div key={i} className={`h-1 w-8 rounded-full ${i<idx?'bg-[color:var(--accent)]':i===idx?'bg-[#fed7aa]':'bg-[color:var(--line-2)]'}`} />
          ))}
        </div>
      </div>
      <p className="text-[14px] font-semibold text-[color:var(--ink)] leading-snug mb-4">{q.q}</p>
      <div className="space-y-2 mb-3">
        {q.opts.map((o,i)=>{
          let cls = 'border-[color:var(--line-2)] bg-white text-[color:var(--mute-1)] hover:border-[color:var(--mute-4)]';
          if(ans!==null){
            if(i===q.correct) cls = 'border-[#22c55e] bg-[#f0fdf4] text-[#15803d]';
            else if(i===ans) cls = 'border-[#ef4444] bg-[#fef2f2] text-[#dc2626]';
            else cls = 'border-[color:var(--line)] text-[#c4c4c8] bg-white';
          }
          return (
            <button key={i} onClick={()=>pick(i)}
              className={`w-full text-left px-4 py-2.5 rounded-[3px] text-[13px] border btn ${cls}`}>
              <span className="font-semibold mr-2">{String.fromCharCode(65+i)}.</span>{o}
            </button>
          );
        })}
      </div>
      {ans!==null && (
        <div className={`rounded-[3px] px-4 py-3 text-[12px] mb-3 ${ans===q.correct?'bg-[#f0fdf4] text-[#15803d]':'bg-[#eeeeff] text-[#92400e]'}`}>
          <span className="font-semibold">{ans===q.correct?'✓ Correct! ':'✗ Not quite — '}</span>
          {q.explain}
        </div>
      )}
      {ans!==null && (
        <button onClick={next}
          className="w-full py-2 bg-[color:var(--ink)] text-white text-[13px] font-semibold rounded-[3px] btn hover:bg-[color:var(--ink-3)]">
          {idx<quizzes.length-1?'Next question →':'See results'}
        </button>
      )}


          
          
    </div>
  );
}

      const current = window.scrollY;
      
      let progress = (current - start) / (end - start);
      progress = Math.max(0, Math.min(1, progress));
      setScrollProgress(progress);
    };

    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('resize', handleScroll);
    handleScroll();

    return () => {
      window.removeEventListener('scroll', handleScroll);
      window.removeEventListener('resize', handleScroll);
    };
  }, []);

  const finalRotations = [-2.5, 2, -1.5, 3.5, -0.5];

  return (
    <div ref={containerRef} className="relative w-full bg-white" style={{ height: '320vh' }}>
      <div className="sticky top-0 h-screen w-full flex items-center justify-center overflow-hidden">
        <div className="w-full max-w-[1280px] mx-auto px-6 lg:px-12">
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-center">

              <p className="text-[11px] text-[color:var(--mute-3)] tracking-[0.22em] uppercase font-[700] mb-2">
                What's different this year
              </p>
              <div className="relative inline-block mb-3">
                <h2 className="h-display text-3xl md:text-5xl text-[color:var(--ink)] leading-tight tracking-tight">
                  Five rules that change <em className="gradient-text">everything.</em>
                </h2>
                {/* Speech Bubble */}
                <div className="absolute -top-16 md:-top-[72px] right-4 lg:-right-4 bg-white border border-[color:var(--line-2)] px-3 py-2 rounded-[20px] shadow-sm flex items-center gap-2 select-none pointer-events-none">
                  <img src="https://em-content.zobj.net/source/microsoft-teams/400/robot_1f916.png" alt="🤖" className="w-11 h-11" />
                  <div className="absolute bottom-[-6px] left-[20px] w-2.5 h-2.5 bg-white border-r border-b border-[color:var(--line-2)] rotate-45"></div>
                </div>
              </div>
            </div>

            {/* Center Column: Card stack */}
            <div className="col-span-1 lg:col-span-4 relative w-full flex items-center justify-center h-[380px] sm:h-[430px] my-4 lg:my-0">
              {HIGHLIGHTS.map((h, i) => {
                let progress = 0;
                if (i > 0) {
                  const startRange = (i - 1) / 4;
                  const endRange = i / 4;
                  if (scrollProgress <= startRange) {
                    progress = 0;
                  } else if (scrollProgress >= endRange) {
                    progress = 1;
                  } else {
                    progress = (scrollProgress - startRange) / (endRange - startRange);
                  }
                } else {
                  progress = 1; // Card 1 is always stacked
                }

                // Transform animation math
                const ty = (1 - progress) * 600; // Slide from bottom
                const rot = progress * finalRotations[i] + (1 - progress) * (finalRotations[i] + 12);
                
                // Scale and depth math based on coverage
                let scale = 1.0;
                let offsetY = 0;
                for (let j = i + 1; j < 5; j++) {
                  let jProgress = 0;
                  const jStart = (j - 1) / 4;
                  const jEnd = j / 4;
                  if (scrollProgress > jStart) {
                    jProgress = Math.min(1, (scrollProgress - jStart) / (jEnd - jStart));
                  }
                  scale -= jProgress * 0.025; // Scale down by 2.5% per stacked card
                  offsetY -= jProgress * 12;   // Push up slightly to expose bottom borders
                }

                const cardStyle = {
                  transform: `translate3d(0, ${ty + offsetY}px, 0) rotate(${rot}deg) scale(${scale})`,
                  zIndex: i + 10,
                  position: 'absolute',
                  willChange: 'transform',
                  transition: progress === 0 || progress === 1 ? 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)' : 'none',
                  backgroundColor: CARD_FILLS[i]
                };

                return (
                  <div key={h.n} style={cardStyle}
                    className="w-[260px] h-[350px] sm:w-[300px] sm:h-[400px] flex-shrink-0 border-0 rounded-[24px] shadow-[0_8px_30px_rgba(0,0,0,0.04)] overflow-hidden select-none">

                          Rule {h.n}
                        </span>
                        <span className="font-mono text-[10px] opacity-40">0{i+1} / 05</span>
                      </div>

                      {/* Middle: Title */}
                      <div className="my-auto">
                        <h3 className="h-display text-[26px] sm:text-[32px] tracking-[-0.03em] leading-[1.1] text-[color:var(--ink)]">
                          {h.title}
                        </h3>
                      </div>

                      {/* Bottom: Description */}
                      <div>
                        <p className="text-[12px] sm:text-[13px] leading-relaxed text-[color:var(--mute-1)] font-medium">
                          {h.body}
                        </p>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Right Column: Description */}

              </p>

          </div>
        </div>
      </div>
    </div>
  );
}

function CountdownTimer({ targetDate }) {
  const [timeLeft, setTimeLeft] = useState({ days: '00', hours: '00', minutes: '00', seconds: '00' });

  useEffect(() => {
    const calculateTimeLeft = () => {
      const difference = +new Date(targetDate) - +new Date();
      if (difference > 0) {
        return {
          days: String(Math.floor(difference / (1000 * 60 * 60 * 24))).padStart(2, '0'),
          hours: String(Math.floor((difference / (1000 * 60 * 60)) % 24)).padStart(2, '0'),
          minutes: String(Math.floor((difference / 1000 / 60) % 60)).padStart(2, '0'),
          seconds: String(Math.floor((difference / 1000) % 60)).padStart(2, '0'),
        };
      }
      return { days: '00', hours: '00', minutes: '00', seconds: '00' };
    };

    setTimeLeft(calculateTimeLeft());
    const timer = setInterval(() => {
      setTimeLeft(calculateTimeLeft());
    }, 1000);
    return () => clearInterval(timer);
  }, [targetDate]);

  return (
    <div className="inline-block text-left border-t border-[rgba(255,255,255,0.12)] pt-4 mt-2 w-full max-w-[280px]">
      <div className="text-[9px] text-[rgba(255,255,255,0.5)] tracking-[0.22em] uppercase font-[800] mb-3">Grand Finale Begins In</div>
      <div className="flex items-center justify-between gap-4">
        {[
          { label: 'Days', value: timeLeft.days },
          { label: 'Hours', value: timeLeft.hours },
          { label: 'Min', value: timeLeft.minutes },
          { label: 'Sec', value: timeLeft.seconds }
        ].map(t => (
          <div key={t.label} className="flex flex-col gap-1 items-start">
            <span className="h-display text-2xl sm:text-3xl text-white tracking-tight leading-none" style={{fontWeight: 400}}>{t.value}</span>
            <span className="text-[8px] text-[rgba(255,255,255,0.4)] tracking-[0.12em] uppercase font-mono font-bold">{t.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const ROLES = ['Team Lead','Frontend Dev','Backend Dev','Full Stack Dev','ML Engineer','Data Analyst','Designer','Product Manager','DevOps / SRE','Other'];

const THEME_DESC = {
  'Business & Revenue':   'Pricing, fraud detection, revenue growth, supply-chain economics.',
  'Customer Care':        'Query resolution, sentiment analysis, proactive support automation.',
  'Warehouse Ops':        'Pick-path optimisation, inventory AI, fulfilment speed.',
  'Generative AI':        'Fashion recommendations, search, image generation, co-pilots.',
  'SRE & Infrastructure': 'Reliability, observability, deployment pipelines, on-call tooling.',
};

function RegSteps({ step }) {
  const labels = ['Team Details','Team Mode','Members','Review & Submit'];
  return (
    <div className="px-7 pt-7 pb-5">
      <div className="flex items-center gap-0">
        {labels.map((l, i) => {
          const done = step > i + 1;
          const active = step === i + 1;
          return (
            <React.Fragment key={i}>
              <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
                <div className={`w-7 h-7 rounded-full text-[12px] font-semibold flex items-center justify-center transition-all ${done ? 'bg-[#f0fdf4] border-2 border-[#22c55e] text-[#15803d]' : active ? 'bg-[color:var(--accent)] text-white shadow-sm' : 'bg-[color:var(--paper-2)] text-[#c4c4c8]'}`}>
                  {done ? '✓' : i + 1}
                </div>
                <span className={`text-[10px] font-medium whitespace-nowrap ${active ? 'text-[color:var(--ink)]' : done ? 'text-[#15803d]' : 'text-[#c4c4c8]'}`}>{l}</span>
              </div>
              {i < 2 && (
                <div className={`flex-1 h-px mx-2 mb-4 ${step > i + 1 ? 'bg-[#22c55e]' : 'bg-[color:var(--line)]'}`} />
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function RegisterView({ user, setTeams, toast, onLoginOpen, userTeam, pubResults }) {
  const [step, setStep]   = useState(1);
  const [done, setDone]   = useState(false);
  const [edit, setEdit]   = useState(false);
  const [agree, setAgree] = useState(false);
  const [teamId]          = useState(`HR-2026-${Math.floor(1000+Math.random()*9000)}`);
  const [err, setErr]     = useState({});

  const makeBlank = u => ({
    teamName:'', theme:'', subTheme:'', abstract:'',
    genaiModel:'', otherAccess:'', skillsNeeded:[], rolesNeeded:[], teamMode: 'create',
    members:[{ name:u?.name||'', email:u?.email||'', dept:u?.dept||'', role:'Team Lead' }]
  });
  const [form, setForm] = useState(makeBlank(user));

  useEffect(()=>{
    if (userTeam) {
      setForm({
        teamName:userTeam.name, theme:userTeam.theme, subTheme:userTeam.subTheme, abstract:userTeam.abstract,
        genaiModel:userTeam.genaiModel||'', otherAccess:userTeam.otherAccess||'', skillsNeeded:userTeam.skillsNeeded||[], rolesNeeded:userTeam.rolesNeeded||[],
        members: userTeam.leadName ? [
           { name: userTeam.leadName, email: user?.email||'', dept: userTeam.leadDept, role:'Team Lead' },
           ...((userTeam.members.length > 1 && userTeam.depts[1]) ? [{ name: 'Team Member', email:'', dept: userTeam.depts[1], role:'Member' }] : [])
        ] : makeBlank(user).members
      });
      setDone(true);
    } else if (user) {
      setForm(makeBlank(user));
      setStep(1); setDone(false); setErr({}); setAgree(false);
    }
  }, [user?.id, userTeam?.id]);

  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  const sm = (i,k,v) => setForm(f=>({...f,members:f.members.map((m,j)=>j===i?{...m,[k]:v}:m)}));
  const addMember = () => setForm(f=>({...f,members:[...f.members,{name:'',email:'',dept:'',role:'Member'}]}));
  const rmMember  = i  => setForm(f=>({...f,members:f.members.filter((_,j)=>j!==i)}));

  const v1 = () => {
    const e={};
    if (!form.teamName.trim()) e.teamName='Team name is required';
    else if (form.teamName.length < 3) e.teamName='Minimum 3 characters';
    if (!form.theme)           e.theme='Please select a theme';
    if (!form.subTheme.trim()) e.subTheme='Sub-theme / problem title is required';
    setErr(e); return !Object.keys(e).length;
  };
  const v2 = () => {
    const e = {}; const ms = form.members;
    ms.forEach((m,i) => {
      if (!m.name.trim())  e[`n${i}`] = 'Required';
      if (!m.email.trim()) e[`e${i}`] = 'Required';
      else if (!m.email.includes('@')) e[`e${i}`] = 'Invalid email';
      if (!m.dept)         e[`d${i}`] = 'Required';
    });
    setErr(e); return !Object.keys(e).length;
  };
  const submit = () => {
    if (!agree) { toast('Please agree to the participation terms.','error'); return; }
    const isOpen = form.members.length < 2;
    if (userTeam) {
      setTeams(p=>p.map(t => t.id === userTeam.id ? {
        ...t,
        name:form.teamName, theme:form.theme, subTheme:form.subTheme,
        abstract:form.abstract, genaiModel:form.genaiModel, otherAccess:form.otherAccess,
        members:form.members.map((_,i)=> t.members[i] || `M${i}`), maxSize:2,
        open:isOpen, missing:isOpen?['1 member']:[],
        depts:form.members.map(m=>m.dept),
        skillsNeeded:form.skillsNeeded, rolesNeeded:form.rolesNeeded||[],
        leadName:form.members[0]?.name, leadDept:form.members[0]?.dept,
      } : t));
      toast('Team updated successfully!','success');
    } else {
      setTeams(p=>[...p,{
        id:teamId, name:form.teamName, theme:form.theme, subTheme:form.subTheme,
        abstract:form.abstract, genaiModel:form.genaiModel, otherAccess:form.otherAccess,
        members:form.members.map((_,i)=>`M${i}`), maxSize:2,
        open:isOpen, missing:isOpen?['1 member']:[],
        depts:form.members.map(m=>m.dept),
        skillsNeeded:form.skillsNeeded, rolesNeeded:form.rolesNeeded||[],
        leadName:form.members[0]?.name, leadDept:form.members[0]?.dept,
        scores:{r1:null,r2:null,r3:null}
      }]);
      toast('Team registered successfully!','success');
    }
    setDone(true);
  };

  /* ── NOT SIGNED IN: gate ── */
  if (!user) return (
    <div className="max-w-[700px] mx-auto fade-up mt-8 shadow-[0_24px_64px_rgba(0,0,0,0.06)] overflow-hidden bg-white border border-[color:var(--line-2)] rounded-2xl flex flex-col min-h-[400px]">

        <h2 className="h-display text-5xl lg:text-6xl text-[color:var(--ink)] mb-6" style={{lineHeight: 1.1}}>
          Jump the <em className="gradient-text">ramp.</em>

        <p className="text-[15px] text-[color:var(--mute-2)] mb-10 leading-relaxed max-w-[400px]">

        </p>
        
        <button onClick={onLoginOpen}
          className="inline-flex items-center justify-center gap-3 px-10 py-4 bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white font-[600] rounded-[3px] transition-all"
          style={{fontSize:'13px', letterSpacing:'0.04em'}}>
          Sign in to register →

        <p className="text-[12px] text-[color:var(--mute-3)] mt-6">
          No account?{' '}
          <span className="text-[color:var(--accent)] font-semibold cursor-pointer hover:underline" onClick={onLoginOpen}>Create one now</span>
        </p>
      </div>
    </div>
  );

  /* ── PHASE 2: MENTOR / COORDINATOR ── */
  if (user?.role==='mentor' || user?.role==='coordinator') return (
    <div className="max-w-xl mx-auto">
      <div className="p-8 text-center">
        <div className="w-14 h-14 rounded-full bg-[#fef9c3] border-2 border-[#fde68a] flex items-center justify-center mx-auto mb-4">
          <span className="text-[26px]">{user.role==='mentor'?'🧑‍🏫':'🎯'}</span>
        </div>
        <h2 className="text-[18px] font-[700] text-[color:var(--ink)] mb-1">
          You're registered as a {user.role==='mentor'?'Mentor':'Coordinator'}!
        </h2>
        <p className="text-[13px] text-[color:var(--mute-2)] mt-2 max-w-xs mx-auto">
          {user.role==='mentor'
            ? "You'll be assigned to teams by the event coordinator. Watch for updates on the portal."
            : "You have full access to the Admin panel to manage teams, schedules, and results."}
        </p>
        <div className="inline-flex items-center gap-2 px-4 py-2 bg-[color:var(--paper)] border border-[#efefef] rounded-[3px] mt-5">
          <span className="text-[11px] text-[color:var(--mute-3)] uppercase tracking-wide font-semibold">Role</span>
          <span className="text-[13px] font-[700] text-[color:var(--c-amber)] capitalize">{user.role}</span>
        </div>
      </div>
    </div>
  );

  /* ── SUCCESS ── */
  if (done) return (
    <div className="max-w-xl mx-auto space-y-4">

      {/* Success banner */}
      <div className="p-8 text-center">
        <div className="w-14 h-14 rounded-full bg-[#f0fdf4] border-2 border-[#bbf7d0] flex items-center justify-center mx-auto mb-4">
          <span className="text-[26px]">✓</span>
        </div>
        <h2 className="text-[18px] font-[700] text-[color:var(--ink)] mb-1">You're in the arena!</h2>
        <p className="text-[13px] text-[color:var(--mute-2)] mb-5">
          Team <span className="text-[color:var(--ink)] font-semibold">{form.teamName}</span> has been registered for Tech Week 2026.
        </p>
        <div className="inline-flex items-center gap-2 px-4 py-2 bg-[color:var(--paper)] border border-[#efefef] rounded-[3px]">
          <span className="text-[11px] text-[color:var(--mute-3)] uppercase tracking-wide font-semibold">Team ID</span>
          <span className="text-[13px] font-[700] text-[color:var(--accent)] tracking-wide">{teamId}</span>
        </div>
      </div>

      {/* Summary */}
      <div className="overflow-hidden">
        <div className="px-6 py-4 border-b border-[color:var(--line)] flex items-center justify-between">
          <p className="text-[13px] font-semibold text-[color:var(--ink)]">Team Summary</p>
          <Tag label={form.theme} variant="orange" small />
        </div>
        <div className="p-6 space-y-4">
          <div className="grid grid-cols-2 gap-4">
            {[['Team Name',form.teamName],['Sub-theme',form.subTheme]].map(([k,v])=>(
              <div key={k}>
                <p className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-wide font-semibold mb-1">{k}</p>
                <p className="text-[13px] text-[color:var(--ink)] font-medium">{v}</p>
              </div>
            ))}
          </div>
          {form.abstract && (
            <div>
              <p className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-wide font-semibold mb-1">Abstract</p>

            <p className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-wide font-semibold mb-2.5">Members ({form.members.length})</p>

              {form.members.map((m,i)=>(
                <div key={i} className="flex items-center gap-3 px-3 py-2.5 bg-[color:var(--paper)] rounded-[3px] border border-[#efefef]">
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${i===0?'bg-[color:var(--accent)] text-white':'bg-[color:var(--paper-2)] text-[color:var(--mute-2)]'}`}>
                    {initials(m.name||'?')}

                  <div className="flex-1 min-w-0">

              </div>

              {/* Edit deadline notice */}
              <div className="flex items-start gap-3 bg-[#fffbeb] border border-[#fde68a] rounded-[3px] px-4 py-3.5">
                <span className="text-[14px] flex-shrink-0">💡</span>
                <p className="text-[12px] text-[#92400e] leading-relaxed">
                  You can edit your team name, sub-theme, and abstract until <strong>Jul 6, 2026</strong>. Members cannot be changed after submission.
                </p>
              </div>

              {/* Agreement */}
              <label className="flex items-start gap-3 cursor-pointer group">
                <div className={`mt-0.5 w-4 h-4 rounded-[4px] border-2 flex-shrink-0 flex items-center justify-center transition-all ${agree?'border-[color:var(--accent)] bg-[color:var(--accent)]':'border-[color:var(--mute-4)] group-hover:border-[color:var(--accent)]'}`}
                  onClick={()=>setAgree(a=>!a)}>
                  {agree && <span className="text-white text-[10px] font-bold">✓</span>}
                </div>
                <span className="text-[12px] text-[color:var(--mute-2)] leading-relaxed">
                  I confirm that all team members are Myntra employees and have agreed to participate. I have read and accept the{' '}
                  <span className="text-[color:var(--accent)] underline cursor-pointer">Tech Week participation terms</span>.
                </span>
              </label>

              <div className="flex gap-2.5">
                <button onClick={()=>setStep(2)} className="flex-1 py-2.5 border border-[color:var(--line-2)] hover:border-[color:var(--mute-4)] text-[color:var(--mute-1)] text-[14px] font-medium rounded-[3px] btn">← Back</button>
                <button onClick={submit} disabled={!agree}
                  className={`flex-1 py-2.5 text-[14px] font-semibold rounded-[3px] btn shadow-sm transition-all ${agree?'bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white':'bg-[color:var(--paper-2)] text-[#c4c4c8] cursor-not-allowed'}`}>
                  Submit Registration
                </button>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════
   MARKETPLACE
══════════════════════════════ */

function MarketplaceView({ user, teams, joinRequests, setJoinRequests, ideas, setIdeas, toast, mode, setView, onLoginOpen }) {
  const tab = mode || 'ideas';
  const [filter, setFilter]   = useState('all');
  const [joinT, setJoinT]     = useState(null);
  const [detailT, setDetailT] = useState(null);
  const [inviteMsg, setInviteMsg] = useState('');
  const [searchQ, setSearchQ]   = useState('');
  const [skillF, setSkillF]     = useState([]);
  const [roleF, setRoleF]       = useState([]);
  const [reqFilter, setReqFilter] = useState('all');
  const [mktPage, setMktPage]   = useState(1);
  const MKT_PAGE_SIZE = 12;
  const [showIdeaForm, setShowIdeaForm] = useState(false);
  const [ideaForm, setIdeaForm] = useState({ title:'', desc:'', theme:'' });

  const isOpen  = t => t.open && t.members.length < t.maxSize;
  const myTeam  = teams.find(t => t.open && t.leadName === user?.name);
  const myReqTo = t => joinRequests.find(r=>r.teamId===t.id && r.userId===user?.id);
  const shown   = teams.filter(t=> filter==='open'?isOpen(t):filter==='closed'?!isOpen(t):true);

  // Skill match score: how many of their needed skills overlap with user's dept
  const matchScore = t => {
    if (!t.skillsNeeded?.length || !user) return 0;
    const userSkillHints = [user.dept]; // dept as a proxy for offered skills
    const overlap = t.skillsNeeded.filter(s =>
      userSkillHints.some(h => h && s.toLowerCase().includes(h.toLowerCase().split(' ')[0]))
    );
    return Math.round((overlap.length / t.skillsNeeded.length) * 100);
  };

  const openTeams = teams.filter(isOpen);

  // All unique skills across open teams (for filter chips)
  const allSkills = [...new Set(openTeams.flatMap(t=>t.skillsNeeded||[]))];

  // Filtered open teams (Find a Partner)
  const filteredOpen = openTeams.filter(t=>{
    const q = searchQ.toLowerCase();
    const matchQ = !q || [t.name,t.subTheme,t.abstract,t.leadName].some(v=>v?.toLowerCase().includes(q));
    const matchSkill = skillF.length===0 || skillF.some(s=>t.skillsNeeded?.includes(s));
    return matchQ && matchSkill;
  });

  // Filtered teams (Browse)
  const filteredShown = shown.filter(t=>{
    const q = searchQ.toLowerCase();
    return !q || [t.name,t.subTheme,t.theme].some(v=>v?.toLowerCase().includes(q));
  });

  const sendJoin = () => {
    if (!user) { toast('Sign in first.','error'); return; }
    setJoinRequests(p=>[...p,{
      id:`JR${Date.now()}`, teamId:joinT.id, teamName:joinT.name,
      userId:user.id, userName:user.name, userDept:user.dept,
      message:inviteMsg, status:'pending', direction:'join'
    }]);
    toast(`Request sent to ${joinT.name}.`,'success');
    setJoinT(null); setInviteMsg('');
  };

  const handleReq = (id, act) => {
    setJoinRequests(p=>p.map(r=>r.id===id?{...r,status:act}:r));
    toast(act==='accepted'?'✓ Request accepted — partnership is now full!':'Request declined.', act==='accepted'?'success':'error');
  };

  const myOutgoing = joinRequests.filter(r=>r.userId===user?.id);
  const inbound    = joinRequests.filter(r=>r.status==='pending' && myTeam && r.teamId===myTeam.id);
  const reqCount   = myOutgoing.length + inbound.length;

  const approvedIdeas  = (ideas||[]).filter(i=>i.status==='approved');
  const myPendingIdeas = (ideas||[]).filter(i=>i.status==='pending' && i.authorId===user?.id);

  const submitIdea = () => {
    if (!ideaForm.title.trim() || !ideaForm.desc.trim() || !ideaForm.theme) {
      toast('Please fill in all fields.','error'); return;
    }
    const newIdea = {
      id:`IDK${Date.now()}`, title:ideaForm.title.trim(), desc:ideaForm.desc.trim(), theme:ideaForm.theme,
      authorId:user.id, authorName:user.name, authorDept:user.dept,
      status:'pending', submittedAt: new Date().toISOString().slice(0,10), upvotes:[],
    };
    setIdeas(p=>[...p, newIdea]);
    setIdeaForm({ title:'', desc:'', theme:'' });
    setShowIdeaForm(false);
    toast('Idea submitted! It will appear publicly once approved by an admin.','success');
  };

  const toggleUpvote = (ideaId) => {
    if (!user) { toast('Sign in to upvote.','error'); return; }
    setIdeas(p=>p.map(i=>i.id===ideaId
      ? { ...i, upvotes: i.upvotes.includes(user.id) ? i.upvotes.filter(x=>x!==user.id) : [...i.upvotes, user.id] }
      : i
    ));
  };

  const filteredAll = teams
    .filter(t => filter==='open' ? isOpen(t) : filter==='closed' ? !isOpen(t) : true)
    .filter(t => {
      const q = searchQ.toLowerCase();
      const matchQ = !q || [t.name,t.subTheme,t.abstract,t.leadName,t.theme].some(v=>v?.toLowerCase().includes(q));
      const matchSkill = skillF.length===0 || !isOpen(t) || skillF.some(s=>t.skillsNeeded?.includes(s));
      const matchRole = roleF.length===0 || !isOpen(t) || roleF.some(r=>t.rolesNeeded?.includes(r));
      return matchQ && matchSkill && matchRole;
    });

  return (
    <div className="space-y-5">
      {(tab==='partners' || tab==='ideas') && (
        <PageIntro
          className="-mx-4"
          eyebrow={tab==='partners' ? 'Team Marketplace' : 'Idea Bazaar'}
          title={tab==='partners' ? <>Find your <em className="gradient-text">squad.</em></> : <>209 problems<br/>looking for <em className="gradient-text">solvers.</em></>}
          description={tab==='partners'
            ? 'Browse registered teams, filter by skills, and send a clean join request when you find the right fit.'
            : 'Explore community-submitted ideas, upvote the strongest concepts, and submit your own for review.'}
          actions={tab==='partners'
            ? [
                <button key="create-team" onClick={()=>{ if(!user){onLoginOpen();}else{setView('register');} }}
                  className="bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white px-4 py-2 rounded-[3px] text-[12px] font-[900] btn">Create team</button>,
                <button key="rules" onClick={()=>toast('Team Rules: 2 members max, 1 Hacker/1 Hustler ideal.','info')}
                  className="bg-white border border-[color:var(--line-2)] hover:border-[color:var(--ink)] text-[color:var(--ink)] px-4 py-2 rounded-[3px] text-[12px] font-[900] btn">Team rules</button>,
              ]
            : [
                <button key="submit-idea" onClick={()=>{ if(!user){toast('Sign in to submit an idea.','error');}else{setShowIdeaForm(true);} }}
                  className="bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white px-4 py-2 rounded-[3px] text-[12px] font-[900] btn">Submit idea</button>,
              ]}
        />
      )}

      {/* ── TAB 1: FIND A PARTNER ── */}
      {/* ── TAB 1: PARTNERS (merged) ── */}
      {tab==='partners' && (
        <div className="flex flex-col md:flex-row gap-8 fade-up mt-4">
          
          {/* Left Sidebar */}
          <div className="md:w-[260px] flex-shrink-0 space-y-6">
            <div>
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Browse Controls</p>
              <p className="text-[12px] text-[color:var(--mute-2)] mt-2 leading-relaxed">Filter by status, skill need, or team keywords.</p>
            </div>

            {/* Search Bar - minimalized on the left */}
            <div className="space-y-1.5 pt-2">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Search Teams</p>
              <AnimatedSearchInput 
                value={searchQ} 
                onChange={e=>{setSearchQ(e.target.value);setMktPage(1);}} 
                onClear={()=>setSearchQ('')}
                type="teams"
              />
            </div>

            {/* Status Filter */}
            <div className="space-y-1.5 pt-2">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Status</p>
              {[['all',`All Teams (${teams.length})`],['open',`Open (${teams.filter(isOpen).length})`],['closed',`Full (${teams.filter(t=>!isOpen(t)).length})`]].map(([f,l])=>(
                <button key={f} onClick={()=>{setFilter(f);setMktPage(1);}}
                  className={`block w-full text-left px-3.5 py-2.5 text-[12px] font-semibold rounded-[3px] transition-colors ${filter===f?'bg-[color:var(--ink)] text-white':'text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)] hover:text-[color:var(--ink)]'}`}>
                  {l}
                </button>
              ))}
            </div>

            {/* Role Filter */}
            <div className="space-y-1.5 pt-2">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Seeking Persona</p>
              <div className="flex flex-wrap gap-1.5 px-2">
                {['Hacker', 'Hustler', 'Designer'].map(r=>(
                  <button key={r} onClick={()=>setRoleF(f=>f.includes(r)?f.filter(x=>x!==r):[...f,r])}
                    className={`px-2.5 py-1 rounded-[3px] text-[11px] font-[700] transition-all border ${roleF.includes(r)?'bg-[color:var(--ink)] border-[color:var(--ink)] text-white':'bg-white border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:border-[color:var(--ink)] hover:text-[color:var(--ink)]'}`}>
                    {r}
                  </button>
                ))}
              </div>
            </div>

            {/* Skill Filter */}
            {allSkills.length > 0 && (
              <div className="space-y-1.5 pt-2">
                <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Seeking Skills</p>
                <div className="flex flex-wrap gap-1.5 px-2">
                  {allSkills.map(s=>(
                    <button key={s} onClick={()=>setSkillF(f=>f.includes(s)?f.filter(x=>x!==s):[...f,s])}
                      className={`px-2.5 py-1 rounded-[3px] text-[11px] font-[700] transition-all border ${skillF.includes(s)?'bg-[color:var(--accent)] border-[color:var(--accent)] text-white':'bg-white border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:border-[color:var(--mute-3)]'}`}>
                      {s}
                    </button>
                  ))}
                  {skillF.length > 0 && <button onClick={()=>setSkillF([])} className="px-2.5 py-1 text-[11px] text-[color:var(--mute-3)] hover:text-[color:var(--ink)] font-semibold underline">Clear</button>}
                </div>
              </div>
            )}
          </div>

          {/* Right Content Grid */}
          <div className="flex-1 space-y-6">

            {/* My profile card (if applicable) */}
            {myTeam && (
              <div className="bg-[#eeeeff] border border-[#c4b5fd] rounded-[3px] p-5 fade-up flex items-center justify-between flex-wrap gap-4">
                <div>
                  <p className="text-[10px] text-[color:var(--accent)] font-[800] uppercase tracking-[0.14em] mb-1">Your Team</p>
                  <div className="flex items-center gap-3 mt-2">
                    <div className="w-10 h-10 rounded-full bg-[color:var(--accent)] flex items-center justify-center text-white font-bold text-[14px] flex-shrink-0 shadow-sm">
                      {initials(user?.name||'?')}
                    </div>
                    <div>
                      <p className="text-[15px] font-[800] text-[color:var(--ink)] leading-tight">{myTeam.name}</p>
                      <p className="text-[12px] text-[color:var(--accent)] font-semibold">{myTeam.subTheme}</p>
                    </div>
                  </div>
                </div>
                {myTeam.skillsNeeded?.length > 0 && (
                  <div className="flex flex-col items-end">
                    <p className="text-[10px] text-[color:var(--mute-2)] mb-1.5">Seeking:</p>
                    <div className="flex flex-wrap gap-1 justify-end">
                      {myTeam.skillsNeeded.map(s=>(
                        <span key={s} className="px-2.5 py-0.5 bg-white border border-[#c4b5fd] text-[color:var(--accent)] text-[11px] font-[700] rounded-[3px] shadow-sm">{s}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            <div className="flex items-center justify-between pb-2 border-b border-[color:var(--line)]">
              <p className="text-[13px] font-[800] text-[color:var(--ink)]">{filteredAll.length} Teams Found</p>
            </div>

            {/* Cards Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {filteredAll.slice((mktPage-1)*MKT_PAGE_SIZE, mktPage*MKT_PAGE_SIZE).map((team,idx)=>{
                const open=isOpen(team); const req=myReqTo(team);
                const score=matchScore(team);
                const globalIdx=(mktPage-1)*MKT_PAGE_SIZE+idx;
                const fill=CARD_FILLS[globalIdx % CARD_FILLS.length];
                return (
                  <div key={team.id} onClick={()=>setDetailT(team)}
                    className="border border-[color:var(--line-2)] bg-white cursor-pointer hover:shadow-[0_8px_24px_rgba(0,0,0,0.06)] transition-all flex flex-col overflow-hidden group rounded-[3px]">
                    <div className="p-5 flex flex-col gap-3 flex-1" style={{background:fill}}>
                      <div className="flex items-start justify-between gap-2">
                        <div className="flex-1 min-w-0">
                          <p className="text-[17px] font-[800] text-[color:var(--ink-2)] leading-snug group-hover:text-[color:var(--accent)] transition-colors">{team.name}</p>
                          <p className="text-[12px] text-[color:var(--accent)] font-semibold mt-1">{team.subTheme}</p>
                        </div>
                        <div className="flex items-center gap-1.5 flex-shrink-0 mt-0.5 bg-white/50 px-2 py-1 rounded-[3px]">
                          {open && (
                            <span className="relative flex h-1.5 w-1.5">
                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#22c55e] opacity-75"></span>
                              <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#22c55e]"></span>
                            </span>
                          )}
                          <span className={`text-[10px] font-[800] uppercase tracking-wide ${open?'text-[#15803d]':'text-[color:var(--mute-3)]'}`}>{open?'Open':'Full'}</span>
                        </div>
                      </div>
                      <p className="text-[12.5px] text-[#3d3d3d] leading-relaxed" style={{display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{team.abstract}</p>
                      <div className="flex flex-wrap gap-1.5 mt-1">
                        <span className="px-2.5 py-1 bg-white/60 border border-[color:var(--ink-2)]/15 text-[color:var(--ink-2)] text-[10px] font-[800] rounded-[3px] uppercase tracking-wide whitespace-nowrap">{team.theme}</span>
                        {open && team.rolesNeeded?.map(r=>(
                          <span key={r} className="px-2.5 py-1 bg-[color:var(--ink)] border border-[color:var(--ink)] text-white text-[10px] font-[800] rounded-[3px] shadow-sm whitespace-nowrap">{r}</span>
                        ))}
                        {open && team.skillsNeeded && (
                          <React.Fragment>
                            {team.skillsNeeded.slice(0, 2).map(s=>(
                              <span key={s} className="px-2.5 py-1 bg-white border border-[color:var(--accent)]/30 text-[color:var(--accent)] text-[10px] font-[800] rounded-[3px] shadow-sm whitespace-nowrap">{s}</span>
                            ))}
                            {team.skillsNeeded.length > 2 && (
                              <span className="px-2 py-1 bg-white border border-[color:var(--accent)]/30 text-[color:var(--accent)] text-[10px] font-[800] rounded-[3px] shadow-sm whitespace-nowrap">
                                +{team.skillsNeeded.length - 2}
                              </span>
                            )}
                          </React.Fragment>
                        )}
                      </div>
                      {team.leadName && (
                        <p className="text-[11px] text-[color:var(--mute-1)] font-medium pt-1">Led by <span className="font-[700]">{team.leadName}</span> · {team.leadDept}</p>
                      )}
                    </div>
                    <div className="bg-white px-5 py-3 flex items-center justify-between border-t border-[color:var(--line-2)]">
                      <div className="flex items-center gap-2">
                        <span className="text-[11px] font-[700] text-[color:var(--mute-3)]">{team.members.length}/2 members</span>
                        {open && score > 0 && (
                          <span className={`text-[10px] font-[800] px-2 py-0.5 rounded-[3px] ${score>=50?'bg-[#f0fdf4] text-[#15803d] border border-[#bbf7d0]':'bg-[color:var(--paper-2)] text-[color:var(--mute-2)] border border-[color:var(--line-2)]'}`}>{score}% match</span>
                        )}
                      </div>
                      <button onClick={e=>{e.stopPropagation(); if(!user&&open){toast('Sign in to request to join.','error');return;} if(open&&!req) setJoinT(team);}}
                        disabled={!open||!!req}
                        className={`text-[11px] uppercase tracking-wide font-[800] btn transition-all px-3 py-1.5 border rounded-[3px] ${
                          !open?'border-transparent text-[#c4c4c4] cursor-default'
                          :req?.status==='pending'?'border-[#fde68a] text-[#b45309] bg-[#fffbeb] cursor-default shadow-sm'
                          :req?.status==='accepted'?'border-[#bbf7d0] text-[#15803d] bg-[#f0fdf4] cursor-default shadow-sm'
                          :'border-[color:var(--ink-2)] text-[color:var(--ink-2)] hover:bg-[color:var(--ink-2)] hover:text-white shadow-sm'}`}>
                        {!open?'Partner Full':req?.status==='pending'?'Pending':req?.status==='accepted'?'Accepted':!user?'Sign in to join':'Join Team'}
                      </button>
                    </div>
                  </div>
                );
              })}
              {!filteredAll.length && <div className="col-span-full py-16 text-center text-[13px] text-[color:var(--mute-3)]">{searchQ||skillF.length?'No partners match your search.':'No partners yet.'}</div>}
            </div>

            {/* Pagination */}
            {filteredAll.length > MKT_PAGE_SIZE && (() => {
              const totalPages = Math.ceil(filteredAll.length / MKT_PAGE_SIZE);
              const page = Math.min(mktPage, totalPages);
              const start = (page-1)*MKT_PAGE_SIZE+1;
              const end = Math.min(page*MKT_PAGE_SIZE, filteredAll.length);
              return (
                <div className="flex items-center justify-between pt-4 border-t border-[color:var(--line)] flex-wrap gap-3">
                  <p className="text-[12px] font-medium text-[color:var(--mute-3)]">Showing {start}–{end} of {filteredAll.length} teams</p>
                  <div className="flex gap-1.5 items-center">
                    <button onClick={()=>setMktPage(p=>Math.max(1,p-1))} disabled={page===1}
                      className={`px-3 py-1.5 text-[12px] font-[800] btn border rounded-[3px] ${page===1?'border-[color:var(--line)] text-[color:var(--mute-4)]':'border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)]'}`}>‹ Prev</button>
                    {Array.from({length:Math.min(7,totalPages)},(_,i)=>{
                      const start2 = Math.max(1, Math.min(page-3, totalPages-6));
                      const p = start2+i;
                      return p<=totalPages && (
                        <button key={p} onClick={()=>setMktPage(p)}
                          className={`w-8 h-8 text-[12px] font-[800] btn rounded-[3px] ${p===page?'bg-[color:var(--ink)] text-white shadow-sm':'border border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)]'}`}>{p}</button>
                      );
                    })}
                    <button onClick={()=>setMktPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}
                      className={`px-3 py-1.5 text-[12px] font-[800] btn border rounded-[3px] ${page===totalPages?'border-[color:var(--line)] text-[color:var(--mute-4)]':'border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)]'}`}>Next ›</button>
                  </div>
                </div>
              );
            })()}

          </div>
        </div>
      )}

      {/* ── TAB 3: REQUESTS ── */}
      {tab==='requests' && (
        <div className="space-y-4">
          {!user && <Gate title="Sign in required" msg="Sign in to see your join requests." />}

          {/* Status filter */}
          {user && (myOutgoing.length > 0 || inbound.length > 0) && (
            <div className="flex gap-1.5">
              {[['all','All'],['pending','⏳ Pending'],['accepted','✓ Accepted'],['declined','✗ Declined']].map(([f,l])=>(
                <button key={f} onClick={()=>setReqFilter(f)}
                  className={`px-3.5 py-1.5 rounded-[3px] text-[12px] font-semibold btn transition-all ${reqFilter===f?'bg-[color:var(--ink)] text-white':'bg-white border border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:text-[color:var(--ink)]'}`}>
                  {l}
                </button>
              ))}
            </div>
          )}

          {/* Inbound — to my team */}
          {inbound.filter(r=>reqFilter==='all'||r.status===reqFilter).length > 0 && (
            <div className="p-6">
              <p className="text-[11px] text-[color:var(--mute-3)] uppercase tracking-[0.12em] font-semibold mb-4">
                Incoming requests · {myTeam?.name}
              </p>
              <div className="space-y-3">
                {inbound.filter(r=>reqFilter==='all'||r.status===reqFilter).map(r=>(

function FunZoneView({ quizzes, user, onQuizSubmit, setQuizzes }) {
  const [showAddQuiz, setShowAddQuiz] = React.useState(false);
  const [newQuiz, setNewQuiz] = React.useState({ q: '', opts: ['', '', '', ''], correct: 0, explain: '' });

  const handleAddQuiz = () => {
    if(!newQuiz.q || !newQuiz.opts.every(o=>o)) {
      alert("Please fill all fields for the new quiz.");
      return;
    }
    setQuizzes([...quizzes, newQuiz]);
    setShowAddQuiz(false);
    setNewQuiz({ q: '', opts: ['', '', '', ''], correct: 0, explain: '' });
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <h2 className="text-[14px] text-[color:var(--ink)]" style={{lineHeight:1.4}}>Fun Zone</h2>
          <span className="text-[22px]">🎉</span>
        </div>
        {user?.role === 'admin' && (
          <button onClick={()=>setShowAddQuiz(true)} className="bg-[color:var(--ink)] text-white text-[11px] font-[800] uppercase tracking-wide px-3 py-1.5 rounded-[3px] hover:bg-[color:var(--ink-3)]">+ Add Quiz</button>
        )}
      </div>
      <p className="text-[13px] text-[color:var(--mute-2)] -mt-2">Take a break — react to memes, test your Tech Week knowledge.</p>

      {showAddQuiz && (
        <div className="p-5 border border-[color:var(--line-2)] bg-white fade-up mb-4 shadow-sm rounded-[3px]">
          <p className="text-[14px] font-[800] mb-3">Add New Quiz</p>
          <div className="space-y-3">
            <input placeholder="Question" value={newQuiz.q} onChange={e=>setNewQuiz(f=>({...f,q:e.target.value}))} className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] outline-none" />
            <div className="grid grid-cols-2 gap-2">
              {newQuiz.opts.map((o,i)=>(
                <div key={i} className="flex items-center gap-2">
                  <input type="radio" name="correctOpt" checked={newQuiz.correct===i} onChange={()=>setNewQuiz(f=>({...f,correct:i}))} className="accent-[color:var(--accent)]" />
                  <input placeholder={`Option ${i+1}`} value={o} onChange={e=>{
                    const newOpts=[...newQuiz.opts]; newOpts[i]=e.target.value;
                    setNewQuiz(f=>({...f,opts:newOpts}));
                  }} className="flex-1 border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-2 py-1.5 text-[12px] outline-none" />
                </div>
              ))}
            </div>
            <input placeholder="Explanation when correct/wrong" value={newQuiz.explain} onChange={e=>setNewQuiz(f=>({...f,explain:e.target.value}))} className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] outline-none" />
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={()=>setShowAddQuiz(false)} className="px-4 py-1.5 text-[12px] font-[700] border border-[color:var(--line-2)] rounded-[3px] hover:bg-[color:var(--paper-2)]">Cancel</button>
              <button onClick={handleAddQuiz} className="px-4 py-1.5 text-[12px] font-[700] bg-[color:var(--accent)] text-white rounded-[3px] hover:bg-[#2222dd]">Save Quiz</button>
            </div>
          </div>
        </div>
      )}


      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        {/* Meme Wall */}
        <div className="p-6">
          <p className="text-[13px] font-semibold text-[color:var(--ink)] mb-1 flex items-center gap-2">
            😂 Meme Wall
            <span className="text-[11px] text-[color:var(--mute-3)] font-normal">#techweek-vibes</span>
          </p>
          <p className="text-[12px] text-[color:var(--mute-3)] mb-4">React to the most relatable hackathon moments.</p>
          <MemeWall />
        </div>

        {/* Quiz */}
        <div className="p-6">
          <p className="text-[13px] font-semibold text-[color:var(--ink)] mb-1 flex items-center gap-2">
            🧠 Tech Week Trivia
          </p>
          <p className="text-[12px] text-[color:var(--mute-3)] mb-4">How well do you know the event rules and teams?</p>
          <QuizGame quizzes={quizzes} user={user} onFinish={onQuizSubmit} />
        </div>
      </div>
    </div>
  );
}

function AddContentComposer({ quizzes, setQuizzes, memes, setMemes, toast }) {
  const blankQuiz = () => ({ q:'', opts:['','','',''], correct:0, explain:'' });
  const blankMeme = () => ({
    title:'',
    text:'',
    tag:'',
    author:'',
    image:'',
    emoji:'😂',
    bg:'linear-gradient(135deg,#111827,#3333FF)',
  });
  const [open, setOpen] = React.useState(false);
  const [kind, setKind] = React.useState('meme');
  const [quizDraft, setQuizDraft] = React.useState(blankQuiz());
  const [memeDraft, setMemeDraft] = React.useState(blankMeme());

  const updateOption = (idx, value) => {
    const opts = [...quizDraft.opts];
    opts[idx] = value;
    setQuizDraft(d => ({ ...d, opts }));
  };

  const saveQuiz = () => {
    const q = quizDraft.q.trim();
    const opts = quizDraft.opts.map(o => o.trim());
    const explain = quizDraft.explain.trim() || 'Nice one. This is part of the Tech Week playbook.';
    if (!q || opts.some(o => !o)) {
      toast?.('Fill the question and all four options.', 'error');
      return;
    }
    setQuizzes(prev => [...prev, { q, opts, correct:Number(quizDraft.correct), explain }]);
    setQuizDraft(blankQuiz());
    toast?.('Quiz question added to Fun Zone.', 'success');
  };

  const saveMeme = () => {
    const title = memeDraft.title.trim();
    const text = memeDraft.text.trim();
    if (!title || !text) {
      toast?.('Add a meme title and caption.', 'error');
      return;

function RichQuizGame({ quizzes, user, onFinish }) {
  const [idx, setIdx] = React.useState(0);
  const [ans, setAns] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [complete, setComplete] = React.useState(false);

  React.useEffect(() => {
    setIdx(0);
    setAns(null);
    setScore(0);
    setComplete(false);
  }, [quizzes.length]);

  if (!quizzes || quizzes.length === 0) {
    return (
      <div className="border border-dashed border-[color:var(--mute-4)] rounded-[3px] p-8 text-center">
        <p className="text-[13px] font-[800] text-[color:var(--ink)]">No quiz questions yet.</p>
        <p className="text-[12px] text-[color:var(--mute-3)] mt-1">Ask an admin to add the first challenge.</p>
      </div>
    );
  }

  const q = quizzes[idx];
  const reset = () => { setIdx(0); setAns(null); setScore(0); setComplete(false); };
  const pick = (i) => {
    if (ans !== null) return;
    const nextScore = score + (i === q.correct ? 1 : 0);
    setAns(i);
    setScore(nextScore);
    if (idx === quizzes.length - 1) {
      onFinish?.({ score: nextScore, total: quizzes.length });
    }
  };
  const advance = () => {
    if (idx === quizzes.length - 1) setComplete(true);
    else { setIdx(i => i + 1); setAns(null); }
  };

  if (complete) {
    const pct = Math.round((score / quizzes.length) * 100);
    return (
      <div className="border border-[color:var(--line-2)] bg-[color:var(--paper)] rounded-[3px] p-6 text-center">
        <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Quiz complete</p>
        <p className="text-[42px] font-[900] text-[color:var(--ink)] leading-none mt-3">{pct}%</p>
        <p className="text-[14px] font-[800] text-[color:var(--accent)] mt-2">{score} of {quizzes.length} correct</p>
        <p className="text-[12px] text-[color:var(--mute-2)] mt-2">{score === quizzes.length ? 'Perfect run. Bragging rights unlocked.' : 'Warm up complete. Run it back and climb the board.'}</p>
        <button onClick={reset} className="mt-5 px-5 py-2 bg-[color:var(--ink)] text-white text-[12px] font-[900] rounded-[3px] btn hover:bg-[color:var(--ink-3)]">
          Try again
        </button>
      </div>
    );
  }

  return (
    <div className="border border-[color:var(--line-2)] bg-white rounded-[3px] p-5">
      <div className="flex items-center justify-between gap-3 mb-4">
        <p className="text-[11px] text-[color:var(--mute-3)] font-[900] uppercase tracking-[0.14em]">Question {idx+1} / {quizzes.length}</p>
        <p className="text-[11px] font-[800] text-[color:var(--accent)]">{user ? user.name.split(' ')[0] : 'Guest'} run</p>
      </div>

      <div className="grid grid-cols-4 gap-1 mb-5">
        {quizzes.slice(0, 8).map((_, i)=>(
          <span key={i} className={`h-1.5 rounded-full ${i<idx?'bg-[color:var(--accent)]':i===idx?'bg-[#f97316]':'bg-[color:var(--line-2)]'}`} />
        ))}
      </div>

      <p className="text-[15px] font-[800] text-[color:var(--ink)] leading-snug mb-4">{q.q}</p>
      <div className="space-y-2">
        {q.opts.map((o, i)=>{
          let cls = 'border-[color:var(--line-2)] bg-[color:var(--paper)] text-[color:var(--mute-1)] hover:border-[color:var(--accent)] hover:bg-[#eeeeff]';
          if (ans !== null) {
            if (i === q.correct) cls = 'border-[#22c55e] bg-[#f0fdf4] text-[#15803d]';
            else if (i === ans) cls = 'border-[#ef4444] bg-[#fef2f2] text-[#dc2626]';
            else cls = 'border-[color:var(--line)] bg-white text-[#c4c4c8]';
          }
          return (
            <button key={i} onClick={()=>pick(i)} className={`w-full text-left px-4 py-3 rounded-[3px] border text-[13px] font-[700] btn ${cls}`}>
              <span className="inline-flex items-center justify-center w-6 h-6 mr-2 rounded-full bg-white border border-current text-[11px]">{String.fromCharCode(65+i)}</span>
              {o}
            </button>
          );
        })}
      </div>

      {ans !== null && (
        <div className="mt-4 space-y-3">
          <div className={`rounded-[3px] px-4 py-3 text-[12px] font-[700] ${ans===q.correct?'bg-[#f0fdf4] text-[#15803d]':'bg-[#fffbeb] text-[#b45309]'}`}>
            {ans===q.correct ? 'Correct. ' : 'Not quite. '}{q.explain}
          </div>
          <button onClick={advance} className="w-full py-2.5 bg-[color:var(--ink)] text-white text-[13px] font-[900] rounded-[3px] btn hover:bg-[color:var(--ink-3)]">
            {idx < quizzes.length - 1 ? 'Next question' : 'Finish quiz'}
          </button>
        </div>
      )}


          
          
    </div>
  );
}

                      <div className="mb-3 flex items-center justify-between">
                        <div>
                          <p className="text-[13px] font-[800] text-[color:var(--ink)]">{crit.label}</p>
                          <p className="text-[11px] text-[color:var(--mute-3)] mt-0.5">{crit.desc}</p>
                        </div>
                        <span className="text-[14px] font-[800] text-[color:var(--accent)]">{scoreForm[crit.id] || 0} / 5</span>
                      </div>
                      <div className="flex gap-2">
                        {[1, 2, 3, 4, 5].map(val => (
                          <button key={val} onClick={() => setScoreForm(s => ({...s, [crit.id]: val}))}
                            className={`flex-1 py-2 text-[13px] font-[800] border rounded-[3px] transition-all ${scoreForm[crit.id] === val ? 'bg-[color:var(--accent)] text-white border-[color:var(--accent)]' : 'bg-white text-[color:var(--mute-2)] border-[color:var(--line-2)] hover:border-[color:var(--mute-3)] hover:text-[color:var(--ink)]'}`}>
                            {val}
                          </button>

                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-[3px] p-4 mt-4">
                  <p className="text-[13px] font-[800] text-[color:var(--ink)] mb-1">Judge Comments</p>
                  <p className="text-[11px] text-[color:var(--mute-3)] mb-3">Optional comment (required for extremes like 1s or 5s)</p>
                  <textarea 
                    value={scoreForm.comment || ''}
                    onChange={(e) => setScoreForm(s => ({...s, comment: e.target.value}))}
                    placeholder="Leave your notes about the team's performance..."
                    rows={3}
                    className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] text-[color:var(--ink)] placeholder-[color:var(--mute-4)] outline-none resize-none transition-colors"
                  />
                </div>
                <div className="pt-2 flex gap-3">
                  <Btn variant="outline" className="flex-1 py-3 text-[12px] font-[800] uppercase tracking-wider"
                    onClick={() => {
                      const total = (scoreForm.prob||0) + (scoreForm.prod||0) + (scoreForm.cust||0) + (scoreForm.bus||0) + (scoreForm.strat||0) + (scoreForm.pitch||0);
                      setScoreDetails(p => ({ ...p, [scoreModal.teamId]: { ...p[scoreModal.teamId], [scoreModal.round]: { ...scoreForm, isDraft: true } } }));
                      sc(scoreModal.teamId, scoreModal.round, total);
                      setScoreModal(null);
                      toast('Draft saved.', 'success');
                    }}>
                    Save Draft
                  </Btn>
                  <Btn variant="primary" className="flex-1 py-3 text-[12px] font-[800] uppercase tracking-wider bg-[#16a34a] hover:bg-[#15803d] border-[#16a34a]"
                    onClick={() => {
                      const total = (scoreForm.prob||0) + (scoreForm.prod||0) + (scoreForm.cust||0) + (scoreForm.bus||0) + (scoreForm.strat||0) + (scoreForm.pitch||0);
                      setScoreDetails(p => ({ ...p, [scoreModal.teamId]: { ...p[scoreModal.teamId], [scoreModal.round]: { ...scoreForm, isDraft: false } } }));
                      sc(scoreModal.teamId, scoreModal.round, total);
                      setScoreModal(null);
                      toast('Score submitted successfully.', 'success');
                    }}>
                    Submit Score
                  </Btn>
                </div>
              </div>
            </Modal>
          )}
    </div>
  );
}

function EnablementView() {

      <div className="flex items-center justify-between flex-wrap gap-2">

          {[['all','All'],['live','Live & Upcoming'],['recorded','Recorded']].map(([f,l])=>(

function LoadingScreen({ onComplete }) {
  const LOADER_IMAGES = [
    "Loader images/In_this_same_Art_Style,_202605181036 1.png",
    "Loader images/In_this_same_Art_Style,_202605181038 1.png",
    "Loader images/In_this_same_Art_Style,_202605181039 1.png",
    "Loader images/In_this_same_Art_Style,_202605181040 1.png",
    "Loader images/In_this_same_Art_Style,_202605181042 1.png",
    "Loader images/In_this_same_Art_Style,_202605181043 1.png",
    "Loader images/In_this_same_Art_Style,_202605181045 1.png"
  ];

  const [currentIndex, setCurrentIndex] = React.useState(0);
  const [fadeAway, setFadeAway] = React.useState(false);

  React.useEffect(() => {
    // Lock scrolling on page load
    document.body.style.overflow = 'hidden';

    // Preload images to avoid flickering
    LOADER_IMAGES.forEach((src) => {
      const img = new Image();
      img.src = src;
    });

    const interval = setInterval(() => {
      setCurrentIndex((prev) => {
        if (prev < LOADER_IMAGES.length - 1) {
          return prev + 1;
        } else {
          clearInterval(interval);
          setFadeAway(true);
          setTimeout(() => {
            onComplete();
          }, 800); // match transition duration
          return prev;
        }
      });
    }, 500); // 0.5s intervals

    return () => {
      clearInterval(interval);
      document.body.style.overflow = '';
    };
  }, []);

  return (
    <div 
      className={`fixed inset-0 z-[9999] flex items-center justify-center bg-[#0A0A0A] transition-all duration-[800ms] ease-in-out ${
        fadeAway ? 'opacity-0 pointer-events-none scale-105' : 'opacity-100'
      }`}
    >
      <div className="flex flex-col items-center gap-6 select-none animate-fade-in">
        {/* Main Typographic Wordmark */}
        <h1 className="text-5xl sm:text-7xl md:text-8xl font-extrabold tracking-tighter text-white flex items-center justify-center gap-4 sm:gap-6 flex-wrap">
          <span className={`inline-block transition-transform duration-[800ms] ease-in-out ${
            fadeAway ? '-translate-x-12 sm:-translate-x-20 md:-translate-x-28' : 'translate-x-0'
          }`}>Tech</span>
          
          {/* Changing Image Frame */}
          <div className="relative w-16 h-16 sm:w-24 sm:h-24 md:w-28 md:h-28 flex-shrink-0">
            {LOADER_IMAGES.map((src, i) => (
              <img
                key={src}
                src={src}
                alt="TechWeek Loading"
                className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-300 ${
                  i === currentIndex ? 'opacity-100' : 'opacity-0'
                }`}
              />
            ))}
          </div>
          
          <span className={`gradient-text inline-block transition-transform duration-[800ms] ease-in-out ${
            fadeAway ? 'translate-x-12 sm:translate-x-20 md:translate-x-28' : 'translate-x-0'
          }`}>Week</span>
        </h1>
        
        {/* Animated Loading Text */}
        <p className="text-[11px] font-mono text-white/40 tracking-[0.25em] uppercase animate-pulse mt-4">
          Initializing TechWeek '26...
        </p>
      </div>
    </div>
  );
}
