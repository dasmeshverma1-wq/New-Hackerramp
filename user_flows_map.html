    @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-MediumS.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }

    :root {
      /* Brand Editorial Colors mapped from website design */
      --ink: #0A0A0A;
      --ink-2: #1A1A1A;
      --ink-3: #2A2A2A;
      
      --paper: #FAFAF7;
      --paper-2: #F2EFE7;
      --paper-3: #E8E4D6;
      --white: #FFFFFF;
      
      --mute-1: #525252;
      --mute-2: #737373;
      --mute-3: #A3A3A3;
      --mute-4: #D4D4D4;
      
      --line: rgba(10, 10, 10, 0.08);
      --line-2: rgba(10, 10, 10, 0.12);
      --line-3: rgba(10, 10, 10, 0.20);
      
      --accent: #FF3F6C;
      --accent-dim: #E0345C;
      --accent-tint: #FFE8EE;
      --accent-deep: #9F1239;
      
      --c-purple: #8B5CF6; --c-purple-tint: #EDE9FE; --c-purple-deep: #5B21B6;
      --c-blue: #3B82F6; --c-blue-tint: #DBEAFE; --c-blue-deep: #1E40AF;
      --c-cyan: #06B6D4; --c-cyan-tint: #CFFAFE; --c-cyan-deep: #0E7490;
      --c-teal: #0D9488; --c-teal-tint: #CCFBF1; --c-teal-deep: #115E59;
      --c-emerald: #10B981; --c-emerald-tint: #D1FAE5; --c-emerald-deep: #065F46;
      --c-amber: #F59E0B; --c-amber-tint: #FEF3C7; --c-amber-deep: #92400E;
      --c-orange: #FB923C; --c-orange-tint: #FFEDD5; --c-orange-deep: #9A3412;
      --c-rose: #F43F5E; --c-rose-tint: #FFE4E6; --c-rose-deep: #9F1239;
      --c-fuchsia: #D946EF; --c-fuchsia-tint: #FAE8FF; --c-fuchsia-deep: #86198F;
      --c-indigo: #6366F1; --c-indigo-tint: #E0E7FF; --c-indigo-deep: #3730A3;
      --c-coral: #FB7185; --c-coral-tint: #FFE4E6; --c-coral-deep: #9F1239;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Dark Theme Variables Override */
    body.theme-dark {
      --ink: #FAFAF7;
      --ink-2: #F2EFE7;
      --ink-3: #E8E4D6;
      
      --paper: #0A0A0A;
      --paper-2: #141414;
      --paper-3: #222222;
      --white: #181818;
      
      --mute-1: #A3A3A3;
      --mute-2: #8D8D8D;
      --mute-3: #5C5C5C;
      --mute-4: #3A3A3A;
      
      --line: rgba(255, 255, 255, 0.08);
      --line-2: rgba(255, 255, 255, 0.12);
      --line-3: rgba(255, 255, 255, 0.20);
      
      --accent-tint: rgba(255, 63, 108, 0.15);
    }
    
    /* Global classes matching index.html */
    .h-display {
      font-family: 'Parafina Trial', 'DM Sans', sans-serif !important;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 0.96;
    }
    .num-display {
      font-family: 'Parafina Trial', 'DM Sans', sans-serif !important;
      font-variant-numeric: tabular-nums;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace !important;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Premium Dotted Surface */
    .grid-bg {
      background-image: 
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    
    /* Main website buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
      border: 1px solid transparent;
      white-space: nowrap;
      font-family: 'Inter Tight', sans-serif !important;
    }
    .btn-primary { background: var(--ink); color: var(--paper); }
    .btn-primary:hover { background: var(--ink-3); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-dim); }
    .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-2); }
    .btn-ghost:hover { background: var(--paper-2); border-color: var(--line-3); }
    .btn-white { background: var(--white); color: var(--ink); border-color: var(--line-2); }
    .btn-white:hover { background: var(--paper-2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-xs { padding: 4px 8px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Main website cards */
    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    .card-hover:hover {
      border-color: var(--line-3);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px -12px rgba(10,10,10,0.10);
    }
    
    /* Main website chips */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--mute-1);
      background: var(--paper-2);
      border-radius: 4px;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .chip-ink { background: var(--ink); color: var(--white); }
    .chip-accent { background: var(--accent); color: white; }
    .chip-purple { background: var(--c-purple-tint); color: var(--c-purple-deep); }
    .chip-blue { background: var(--c-blue-tint); color: var(--c-blue-deep); }
    .chip-cyan { background: var(--c-cyan-tint); color: var(--c-cyan-deep); }
    .chip-teal { background: var(--c-teal-tint); color: var(--c-teal-deep); }
    .chip-emerald { background: var(--c-emerald-tint); color: var(--c-emerald-deep); }
    .chip-amber { background: var(--c-amber-tint); color: var(--c-amber-deep); }
    .chip-orange { background: var(--c-orange-tint); color: var(--c-orange-deep); }
    .chip-rose { background: var(--c-rose-tint); color: var(--c-rose-deep); }
    .chip-fuchsia { background: var(--c-fuchsia-tint); color: var(--c-fuchsia-deep); }
    .chip-dark { background: var(--paper-3); color: var(--ink); }

    .dept-chip {
      display: inline-flex;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 4px;
      border: 1px solid var(--line-2);
      background: var(--paper);
      color: var(--mute-1);
    }

    /* Main website input elements */
    .input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--line-2);
      background: var(--white);
      border-radius: 8px;
      font-size: 13px;
      color: var(--ink);
      transition: all 0.15s;
      letter-spacing: -0.005em;
    }
    .input:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(10,10,10,0.06);
    }
    .input::placeholder { color: var(--mute-3); }

    /* Pill-style active / inactive navigations */
    .nav-active {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent) !important;
      background: var(--accent-tint) !important;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
      transform: scale(1.02);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .nav-inactive {
      font-size: 13px;
      font-weight: 500;
      color: var(--mute-1) !important;
      background: transparent !important;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .nav-inactive:hover {
      color: var(--ink) !important;
      background: var(--paper-2) !important;
      transform: scale(1.02);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3.5px 10px;
      border: 1px solid var(--line-2);
      background: var(--white);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px;
      font-weight: 500;
    }

    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      animation: pulse-dot 1.8s infinite;
    }

    /* Desktop Zoom Scaling (Scales up layout & typography by 15% on screen widths >= 1200px) */
    @media (min-width: 1200px) {
      body {
        zoom: 1.15;
      }
    }
    
    /* High-Fidelity Glow Effects */
    .glow-participant { box-shadow: 0 12px 30px -10px rgba(255, 63, 108, 0.18); }
    .glow-coordinator { box-shadow: 0 12px 30px -10px rgba(139, 92, 246, 0.18); }
    .glow-mentor { box-shadow: 0 12px 30px -10px rgba(16, 185, 129, 0.18); }
    .glow-jury { box-shadow: 0 12px 30px -10px rgba(245, 158, 11, 0.18); }
    
    /* Flow paths stroke dash animations */
    @keyframes flowDash { to { stroke-dashoffset: -32; } }
    .flow-line-active {
      stroke-dasharray: 8, 4;
      animation: flowDash 0.8s linear infinite;
    }
    
    .card-transition {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Wave float keyframes for cards collage simulation */
    @keyframes bobWave {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-0.5deg); }
    }
    .sim-collage-card {
      animation: bobWave 8s ease-in-out infinite;
    }
  </style>
</head>

          { from: "j-pitch", to: "j-rehearsal" },
          { from: "j-rehearsal", to: "j-score" },
          { from: "j-score", to: "j-draft" },
          { from: "j-draft", to: "j-nominate" },
          { from: "j-nominate", to: "j-lock" }
        ]
      }
    };

    function App() {
      const [activeRole, setActiveRole] = useState("participant");
      const [hoverNode, setHoverNode] = useState(null);
      const [selectedNode, setSelectedNode] = useState("p-create-team");
      const [hoveredConnection, setHoveredConnection] = useState(null);
      const [nodePositions, setNodePositions] = useState({});
      const canvasRef = useRef(null);

      const activeFlow = FLOW_DATA[activeRole];

      const [theme, setTheme] = useState(() => {
        return localStorage.getItem('mtw_flows_theme') || 'light';
      });

      useEffect(() => {
        localStorage.setItem('mtw_flows_theme', theme);
        if (theme === 'dark') {
          document.body.classList.add('theme-dark');
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.body.classList.remove('theme-dark');
          document.documentElement.classList.remove('dark');
          document.documentElement.setAttribute('data-theme', 'light');
        }
      }, [theme]);

      const getChipClass = (type) => {
        switch (type) {
          case "entry": return "chip-blue";
          case "screen": return "chip-purple";
          case "action": return "chip-indigo";
          case "decision": return "chip-amber";
          case "interactive": return "chip-rose";
          case "outcome": return "chip-emerald";
          default: return "chip-dark";
        }
      };

      // Auto-focus logical default nodes when changing roles
      useEffect(() => {
        if (activeRole === "participant") setSelectedNode("p-create-team");
        else if (activeRole === "coordinator") setSelectedNode("c-hero-toggle");
        else if (activeRole === "mentor") setSelectedNode("m-tech");
        else setSelectedNode("j-dashboard");
      }, [activeRole]);

      // Re-calculate node element positions for SVG connectors
      useEffect(() => {
        const updatePositions = () => {
          const positions = {};
          activeFlow.columns.forEach(col => {
            col.nodes.forEach(node => {
              const el = document.getElementById(node.id);
              if (el && canvasRef.current) {
                const rect = el.getBoundingClientRect();
                const canvasRect = canvasRef.current.getBoundingClientRect();
                positions[node.id] = {
                  x: rect.left - canvasRect.left + rect.width / 2,
                  y: rect.top - canvasRect.top + rect.height / 2,
                  width: rect.width,
                  height: rect.height
                };
              }
            });
          });
          setNodePositions(positions);
        };

        // Delay slightly to ensure browser finished layout paint
        const timer = setTimeout(updatePositions, 150);
        window.addEventListener("resize", updatePositions);

        return () => {
          clearTimeout(timer);
          window.removeEventListener("resize", updatePositions);
        };
      }, [activeRole]);

      // Dynamic path calculation: Draws straight lines or clean Bezier curves depending on alignment
      const calculatePath = (fromId, toId) => {
        const from = nodePositions[fromId];
        const to = nodePositions[toId];
        if (!from || !to) return "";

        let startX, startY, endX, endY;
        const dx = to.x - from.x;
        const dy = to.y - from.y;

        // Same column (vertical flow)
        if (Math.abs(dx) < 20) {
          startX = from.x;
          startY = from.y + (dy > 0 ? from.height / 2 : -from.height / 2);
          endX = to.x;
          endY = to.y + (dy > 0 ? -to.height / 2 : to.height / 2);
          return `M ${startX} ${startY} L ${endX} ${endY}`;
        }

        // Forward flow (left to right)
        if (dx > 0) {
          startX = from.x + from.width / 2;
          startY = from.y;
          endX = to.x - to.width / 2;
          endY = to.y;

          // If vertically aligned, draw a direct straight line
          if (Math.abs(dy) < 15) {
            return `M ${startX} ${startY} L ${endX} ${endY}`;
          }

          // Otherwise, draw a clean horizontal S-curve
          const controlOffset = Math.min(40, dx * 0.4);
          return `M ${startX} ${startY} C ${startX + controlOffset} ${startY}, ${endX - controlOffset} ${endY}, ${endX} ${endY}`;
        }

        // Backward flow (right to left loop)
        startX = from.x - from.width / 2;
        startY = from.y;
        endX = to.x + to.width / 2;
        endY = to.y;

        const controlOffset = 50;
        return `M ${startX} ${startY} C ${startX - controlOffset} ${startY + 40}, ${endX + controlOffset} ${endY + 40}, ${endX} ${endY}`;
      };

      const getNodeIcon = (type) => {
        switch (type) {
          case "entry": return "🏁";
          case "screen": return "🖥️";
          case "action": return "⚙️";
          case "decision": return "⚖️";
          case "interactive": return "⚡";
          case "outcome": return "🏆";
          default: return "📄";
        }
      };

      return (
        <div className="flex-1 flex flex-col relative pb-20">
          {/* Header styled like main website navbar */}
          <header className="border-b border-[color:var(--line-2)] bg-[color:var(--paper-2)] sticky top-0 z-30">

                  <div className="w-[1px] h-5 bg-[color:var(--line-2)]"></div>

                <div className="pill text-[color:var(--mute-1)]">

                  <span className="text-[color:var(--mute-3)] font-mono">Active SSO:</span> 
                  <strong className="text-[color:var(--ink)] font-sans text-xs">
                    {activeRole === 'participant' ? 'Kabir Mehta (Hacker)' : activeRole === 'coordinator' ? 'Rohit Kumar (Coordinator)' : activeRole === 'mentor' ? 'Vikram Mehta (Lead Mentor)' : 'Ananya Sen (Jury Chief)'}

                <div className="flex items-center gap-1">

                      else if (role === 'coordinator') activeColorClasses = "text-[#8B5CF6] bg-[#8B5CF6]/10 border border-[#8B5CF6]/25";
                      else if (role === 'mentor') activeColorClasses = "text-[#10B981] bg-[#10B981]/10 border border-[#10B981]/25";
                      else if (role === 'jury') activeColorClasses = "text-[#D97706] bg-[#F59E0B]/10 border border-[#D97706]/25";

                        <span className="capitalize">{role}</span>

                </div>

                {/* Theme Toggler */}
                <button

                  {theme === 'dark' ? (
                    <svg className="w-5 h-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="12" cy="12" r="4"/>
                      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                  ) : (
                    <svg className="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                  )}
                </button>
              </div>
            </div>
          </header>

          {/* Main Presenter Content */}
          <main className="max-w-[1400px] w-full mx-auto p-6 flex flex-col gap-6 relative z-10">
            {/* Dynamic Intro Card */}
            <section className="bg-[color:var(--white)] border border-[color:var(--line-2)] p-6 lg:p-8 rounded-[16px] flex flex-col lg:flex-row items-start lg:items-center justify-between gap-6 relative overflow-hidden shadow-sm">
              <div className="absolute top-0 right-0 w-80 h-80 bg-gradient-to-br from-zinc-500/5 to-transparent blur-3xl rounded-full"></div>
              
              <div className="space-y-2 relative z-10">
                <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[9px] font-bold font-mono tracking-wider uppercase ${activeFlow.accentBg} ${activeFlow.textColor} border ${activeFlow.accentBorder}`}>
                  <span className="w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>
                  Active Map Console
                </span>
                <h2 className="text-3xl font-[900] tracking-tight text-[color:var(--ink)] h-display">{activeFlow.title}</h2>
                <p className="text-sm text-[color:var(--mute-1)] max-w-3xl leading-relaxed">{activeFlow.description}</p>
              </div>

              <div className="flex flex-wrap lg:flex-col gap-2 font-mono text-[10px] text-[color:var(--mute-2)] border border-[color:var(--line-2)] bg-[color:var(--paper-2)] p-4 rounded-[8px] min-w-[220px]">
                <div className="flex items-center gap-2"><span className="text-xs">🏁</span> Entry Node</div>
                <div className="flex items-center gap-2"><span className="text-xs">🖥️</span> Key Screen</div>
                <div className="flex items-center gap-2"><span className="text-xs">⚙️</span> User Action</div>
                <div className="flex items-center gap-2"><span className="text-xs">⚖️</span> Decision Gate</div>
                <div className="flex items-center gap-2 font-bold text-[color:var(--ink)] animate-pulse"><span className="text-xs">⚡</span> Live Simulator</div>
                <div className="flex items-center gap-2"><span className="text-xs">🏆</span> Finale Outcome</div>
              </div>
            </section>

            {/* Mind Map Canvas */}
            <section className="relative bg-[color:var(--white)] border border-[color:var(--line-2)] rounded-[20px] p-8 overflow-x-auto min-h-[580px] flex flex-col justify-between shadow-sm" ref={canvasRef}>
              <div className="absolute top-4 right-6 text-[9px] font-mono text-[color:var(--mute-3)] pointer-events-none select-none uppercase tracking-widest">Mindmap Canvas v3.2</div>
              
              {/* SVG connection layer */}
              <svg className="absolute inset-0 w-full h-full pointer-events-none z-0">
                <defs>
                  {/* Arrow markers matching branding */}
                  <marker id="arrow-participant" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF3F6C" />
                  </marker>
                  <marker id="arrow-coordinator" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B5CF6" />
                  </marker>
                  <marker id="arrow-mentor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981" />
                  </marker>
                  <marker id="arrow-jury" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706" />
                  </marker>
                  <marker id="arrow-default" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line-3)" />
                  </marker>
                </defs>

                {/* Render SVG Paths */}
                {activeFlow.connections.map((conn, idx) => {
                  const pathData = calculatePath(conn.from, conn.to);
                  const isHovered = hoveredConnection === `${conn.from}-${conn.to}` || hoverNode === conn.from || hoverNode === conn.to || selectedNode === conn.from || selectedNode === conn.to;
                  
                  const strokeColor = isHovered 
                    ? (activeRole === "participant" ? "#FF3F6C" : activeRole === "coordinator" ? "#8B5CF6" : activeRole === "mentor" ? "#10B981" : "#D97706")
                    : (theme === 'dark' ? 'rgba(255, 255, 255, 0.12)' : '#E2E2D8');
                    
                  const strokeWidth = isHovered ? 2.5 : 1.5;
                  const markerId = isHovered ? `arrow-${activeRole}` : "arrow-default";

                  return (
                    <g key={idx} className="transition-all duration-300">
                      {/* Interactive background fat stroke */}
                      <path
                        d={pathData}
                        fill="none"
                        stroke="transparent"
                        strokeWidth="16"
                        className="cursor-pointer"
                        onMouseEnter={() => setHoveredConnection(`${conn.from}-${conn.to}`)}
                        onMouseLeave={() => setHoveredConnection(null)}
                      />
                      {/* Visual stroke */}
                      <path
                        d={pathData}
                        fill="none"
                        stroke={strokeColor}
                        strokeWidth={strokeWidth}
                        markerEnd={`url(#${markerId})`}
                        className={isHovered ? "flow-line-active" : ""}
                      />
                      {/* Connection Label */}
                      {conn.label && nodePositions[conn.from] && nodePositions[conn.to] && (
                        <g>
                          <rect
                            x={(nodePositions[conn.from].x + nodePositions[conn.to].x) / 2 - 24}
                            y={(nodePositions[conn.from].y + nodePositions[conn.to].y) / 2 - 9}
                            width="48"
                            height="18"
                            rx="4"
                            fill="var(--white)"
                            stroke={strokeColor}
                            strokeWidth="1"
                          />
                          <text
                            x={(nodePositions[conn.from].x + nodePositions[conn.to].x) / 2}
                            y={(nodePositions[conn.from].y + nodePositions[conn.to].y) / 2 + 3}
                            fill={isHovered ? strokeColor : "#737373"}
                            fontSize="8.5"
                            fontWeight="bold"
                            textAnchor="middle"
                            fontFamily="monospace"
                          >
                            {conn.label}
                          </text>
                        </g>
                      )}
                    </g>
                  );
                })}
              </svg>

              {/* Render Columns & Nodes */}
              <div className="flex justify-between gap-12 min-w-[1020px] z-10 relative">
                {activeFlow.columns.map((col, colIdx) => (
                  <div key={colIdx} className="flex-1 flex flex-col items-center gap-8">
                    {/* Column Header */}
                    <div className="w-full text-center border-b border-[color:var(--line-2)] pb-4 mb-2">
                      <h3 className="text-[10px] font-bold uppercase tracking-widest text-[color:var(--mute-2)] font-mono">
                        {col.title}
                      </h3>
                    </div>

                    {/* Nodes list */}
                    <div className="flex flex-col gap-6 w-full items-center">
                      {col.nodes.map(node => {
                        const isFocused = hoverNode === node.id || selectedNode === node.id;
                        
                        let cardStyle = "border-[color:var(--line-2)] bg-[color:var(--white)]";
                        if (isFocused) {
                          cardStyle = activeRole === "participant" 
                            ? "border-[#FF3F6C]/80 bg-[#FF3F6C]/5 glow-participant ring-1 ring-[#FF3F6C]/30" 
                            : activeRole === "coordinator" 
                              ? "border-[#8B5CF6]/80 bg-[#8B5CF6]/5 glow-coordinator ring-1 ring-[#8B5CF6]/30" 
                              : activeRole === "mentor"
                                ? "border-[#10B981]/80 bg-[#10B981]/5 glow-mentor ring-1 ring-[#10B981]/30"
                                : "border-[#F59E0B]/80 bg-[#F59E0B]/5 glow-jury ring-1 ring-[#F59E0B]/30";
                        }

                        const isInteractive = node.type === "interactive";

                        return (
                          <div
                            key={node.id}
                            id={node.id}
                            onClick={() => setSelectedNode(node.id)}
                            onMouseEnter={() => setHoverNode(node.id)}
                            onMouseLeave={() => setHoverNode(null)}
                            className={`w-full max-w-[245px] p-5 cursor-pointer relative card-transition card-hover border ${cardStyle} rounded-[12px] ${
                              node.type === 'decision' ? 'rotate-[0.5deg]' : ''
                            } shadow-[0_4px_12px_rgba(0,0,0,0.015)]`}
                          >
                            {/* Role theme indicator line */}
                            <div className={`absolute top-0 left-0 w-1.5 h-full rounded-l-[12px] bg-gradient-to-b ${
                              node.type === 'decision' 
                                ? 'from-amber-500 to-yellow-600' 
                                : node.type === 'entry' 
                                  ? 'from-sky-400 to-blue-500' 
                                  : activeRole === 'participant' 
                                    ? 'from-[#FF3F6C] to-[#E0345C]' 
                                    : activeRole === 'coordinator' 
                                      ? 'from-[#8B5CF6] to-[#6D28D9]' 
                                      : activeRole === 'mentor'
                                        ? 'from-[#10B981] to-[#059669]'
                                        : 'from-[#F59E0B] to-[#D97706]'
                            }`} />

                            <div className="flex items-start gap-3">
                              <span className="text-xl shrink-0 mt-0.5">
                                {getNodeIcon(node.type)}
                              </span>
                              <div className="space-y-1">
                                <div className="flex items-center gap-1.5">
                                  <span className={"chip " + getChipClass(node.type) + " text-[8px] px-1.5 py-0.5"}>
                                    {node.type}
                                  </span>
                                  {isInteractive && (
                                    <span className="animate-pulse bg-amber-500/10 text-amber-700 text-[8px] font-[800] uppercase px-1.5 py-0.5 rounded-[4px] border border-amber-500/20">Live Simulator</span>
                                  )}
                                </div>
                                <h4 className="text-xs font-[800] text-[color:var(--ink)] tracking-tight leading-snug">
                                  {node.label}
                                </h4>
                                <p className="text-[11px] text-[color:var(--mute-1)] leading-relaxed">
                                  {node.desc}
                                </p>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* Live Interactive Sandbox Presentation Container */}
            <section className="bg-[color:var(--white)] border border-[color:var(--line-2)] rounded-[24px] p-6 lg:p-8 shadow-[0_8px_30px_rgba(0,0,0,0.02)] relative">
              <div className="flex items-center justify-between border-b border-[color:var(--line-2)] pb-5 mb-6">

                  <span className="text-2xl">🖥️</span>

                    <h3 className="text-xl font-[900] text-[color:var(--ink)] h-display">Live Capabilities Sandbox</h3>

    // Component containing actual high-fidelity interactive mini simulators
    function SandboxSimulator({ selectedNode, setSelectedNode }) {
      // 1. Participant CREATE-TEAM Unified 3-Step Registry state
      const [regStep, setRegStep] = useState(1);
      const [teamName, setTeamName] = useState("");
      const [theme, setTheme] = useState("Generative AI");
      const [abstract, setAbstract] = useState("");
      const [squadType, setSquadType] = useState("invite"); // 'invite' | 'marketplace'
      const [teammateEmail, setTeammateEmail] = useState("");
      const [teammateName, setTeammateName] = useState("");
      const [teammateDept, setTeammateDept] = useState("Engineering");
      const [teammateRole, setTeammateRole] = useState("Hacker");
      const [selectedSkills, setSelectedSkills] = useState([]);
      const [agreed, setAgreed] = useState(false);
      const [registered, setRegistered] = useState(false);

      // Participant Trivia Quiz state
      const [quizIndex, setQuizIndex] = useState(0);
      const [quizAnswers, setQuizAnswers] = useState([]);
      const [quizScore, setQuizScore] = useState(0);
      const [quizFinished, setQuizFinished] = useState(false);

      // 2. Coordinator HERO TOGGLE state
      const [heroVersion, setHeroVersion] = useState("B");
      const [hoveredCardIdx, setHoveredCardIdx] = useState(null);

      // 3. Coordinator WEBINAR CRUD state
      const [sessions, setSessions] = useState([
        { id: "S001", title: "Incident Management at Scale", presenter: "Neha R.", track: "SRE & Infra", duration: "45 mins" },
        { id: "S002", title: "Generative AI in E-Commerce", presenter: "Vikram M.", track: "Generative AI", duration: "60 mins" },
        { id: "S003", title: "Designing Harmonies & Gradients", presenter: "Sita Nair", track: "Design Excellence", duration: "30 mins" }
      ]);
      const [editingSession, setEditingSession] = useState(null);
      const [sessionTitle, setSessionTitle] = useState("");
      const [sessionPresenter, setSessionPresenter] = useState("");
      const [sessionTrack, setSessionTrack] = useState("Generative AI");

      // 4. Coordinator JURY SCORING state
      const [scores, setScores] = useState({
        innovation: 4.0,
        feasibility: 3.5,
        businessValue: 4.5,
        design: 4.0,
