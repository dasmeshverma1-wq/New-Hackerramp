<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myntra Tech Week 2026 — Interactive User Flows Map</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #050507;
      color: #f4f4f7;
      overflow-x: hidden;
    }
    /* Glow Effects */
    .glow-participant {
      box-shadow: 0 0 25px -5px rgba(255, 63, 108, 0.15);
    }
    .glow-coordinator {
      box-shadow: 0 0 25px -5px rgba(139, 92, 246, 0.15);
    }
    .glow-mentor {
      box-shadow: 0 0 25px -5px rgba(16, 185, 129, 0.15);
    }
    /* Animated flow line dash */
    @keyframes flowDash {
      to {
        stroke-dashoffset: -40;
      }
    }
    .flow-line-active {
      stroke-dasharray: 8, 4;
      animation: flowDash 1.2s linear infinite;
    }
    /* Grid backdrop */
    .grid-bg {
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #09090b;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Mind Map Data Structure
    const FLOW_DATA = {
      participant: {
        title: "Participant Journey Map",
        color: "from-[#FF3F6C] to-[#E0345C]",
        textColor: "text-[#FF3F6C]",
        accentBg: "bg-[#FF3F6C]/10",
        accentBorder: "border-[#FF3F6C]/30",
        description: "Focuses on building, joining teams, ideation bazaar, and fun zone engagement.",
        columns: [
          {
            title: "1. Entry & Auth",
            nodes: [
              { id: "p-start", type: "entry", label: "Visitor Entry", desc: "Arrives on portal as guest" },
              { id: "p-auth", type: "action", label: "SSO / SignUp", desc: "Selects persona (Hacker / Hustler / Designer)" }
            ]
          },
          {
            title: "2. Landing Hub Decision",
            nodes: [
              { id: "p-decision", type: "decision", label: "Has a Team?", desc: "Platform checks team membership" }
            ]
          },
          {
            title: "3. Active Workflows",
            nodes: [
              { id: "p-no-team", type: "action", label: "Explore Teams / Ideas", desc: "Browse open slots or Bazaar" },
              { id: "p-create-team", type: "action", label: "Create Team Wizard", desc: "Pitches name, theme & abstract" },
              { id: "p-my-team", type: "screen", label: "'My Team' Dashboard", desc: "Primary base for active squads" },
              { id: "p-engagement", type: "action", label: "Fun Zone & Learn", desc: "Quizzes, webinars & memes" }
            ]
          },
          {
            title: "4. Execution & Final Outcomes",
            nodes: [
              { id: "p-join-request", type: "outcome", label: "Request to Join Team", desc: "Bypasses departmental rules" },
              { id: "p-team-ready", type: "outcome", label: "Squad Formed", desc: "Requires Hacker + Hustler" },
              { id: "p-eval-track", type: "outcome", label: "Track Jury Grading", desc: "Real-time scores & progress tracker" }
            ]
          }
        ],
        connections: [
          { from: "p-start", to: "p-auth" },
          { from: "p-auth", to: "p-decision" },
          
          { from: "p-decision", to: "p-no-team", label: "No" },
          { from: "p-decision", to: "p-my-team", label: "Yes" },
          
          { from: "p-no-team", to: "p-join-request" },
          { from: "p-no-team", to: "p-create-team" },
          
          { from: "p-create-team", to: "p-team-ready" },
          { from: "p-team-ready", to: "p-my-team" },
          
          { from: "p-my-team", to: "p-eval-track" },
          { from: "p-my-team", to: "p-engagement" }
        ]
      },
      coordinator: {
        title: "Coordinator & Admin Journey Map",
        color: "from-[#8B5CF6] to-[#6D28D9]",
        textColor: "text-[#8B5CF6]",
        accentBg: "bg-[#8B5CF6]/10",
        accentBorder: "border-[#8B5CF6]/30",
        description: "Responsible for moderation, team compliance checks, session management, and evaluations.",
        columns: [
          {
            title: "1. Entry & Auth",
            nodes: [
              { id: "c-start", type: "entry", label: "Coordinator Login", desc: "Logs in with coordinator tier (e.g. Rohit Kumar)" },
              { id: "c-admin", type: "screen", label: "Admin Console", desc: "Accesses exclusive admin route" }
            ]
          },
          {
            title: "2. Operations Router",
            nodes: [
              { id: "c-bazaar", type: "action", label: "Bazaar Moderation", desc: "Review user-submitted problems" },
              { id: "c-teams", type: "action", label: "Live Teams Track", desc: "Monitor cross-department compliance" },
              { id: "c-jury", type: "action", label: "Jury Panel Assign", desc: "Manage R1/R2/R3 evaluator metrics" }
            ]
          },
          {
            title: "3. Evaluation & Decisions",
            nodes: [
              { id: "c-moder-dec", type: "decision", label: "Approve Idea?", desc: "Check alignment with 11 core themes" },
              { id: "c-score-modal", type: "action", label: "Scoring Modal Interface", desc: "Rates 5 criteria points (1 to 5)" }
            ]
          },
          {
            title: "4. Outputs & Publishing",
            nodes: [
              { id: "c-publish-idea", type: "outcome", label: "Publish to Bazaar", desc: "Available for squads to claim" },
              { id: "c-score-draft", type: "outcome", label: "Save Draft", desc: "Kept as work-in-progress (amber badge)" },
              { id: "c-score-final", type: "outcome", label: "Submit Score", desc: "Locks evaluation (green checkmark)" },
              { id: "c-publish-awards", type: "outcome", label: "Publish Standings", desc: "Reveal winners live on leaderboard" }
            ]
          }
        ],
        connections: [
          { from: "c-start", to: "c-admin" },
          
          { from: "c-admin", to: "c-bazaar" },
          { from: "c-admin", to: "c-teams" },
          { from: "c-admin", to: "c-jury" },
          
          { from: "c-bazaar", to: "c-moder-dec" },
          { from: "c-teams", to: "c-score-modal" },
          { from: "c-jury", to: "c-score-modal" },
          
          { from: "c-moder-dec", to: "c-publish-idea", label: "Yes" },
          { from: "c-score-modal", to: "c-score-draft", label: "Draft" },
          { from: "c-score-modal", to: "c-score-final", label: "Final" },
          { from: "c-score-final", to: "c-publish-awards" }
        ]
      },
      mentor: {
        title: "Mentor Journey Map",
        color: "from-[#10B981] to-[#059669]",
        textColor: "text-[#10B981]",
        accentBg: "bg-[#10B981]/10",
        accentBorder: "border-[#10B981]/30",
        description: "Assists teams with sandboxes, alignment guides, and reviews presentations.",
        columns: [
          {
            title: "1. Entry & Auth",
            nodes: [
              { id: "m-start", type: "entry", label: "Mentor Sign-in", desc: "Signs in as mentor (e.g. Vikram Mehta)" },
              { id: "m-hub", type: "screen", label: "Mentor Workspace Hub", desc: "Lists all registered projects" }
            ]
          },
          {
            title: "2. Support Domains",
            nodes: [
              { id: "m-tech", type: "action", label: "Tech Setup Guide", desc: "Allocates GPU credits & sandbox logs" },
              { id: "m-pitch", type: "action", label: "Presentation Review", desc: "Preps team for Shark Tank defense" },
              { id: "m-security", type: "action", label: "InfoSec Fast-track", desc: "Helps bypass production compliance gates" }
            ]
          },
          {
            title: "3. Active Collaboration",
            nodes: [
              { id: "m-feedback", type: "action", label: "Provide Feedback", desc: "Suggests iterations on abstracts" },
              { id: "m-sandbox", type: "action", label: "Dockins & Deploy Setup", desc: "Ensures prototype operates live" }
            ]
          },
          {
            title: "4. Goals Met",
            nodes: [
              { id: "m-ready", type: "outcome", label: "Jury-ready Pitch", desc: "Team is cleared for evaluation" },
              { id: "m-live-ship", type: "outcome", label: "Fast-track Production", desc: "Eligible for +50k production bonus" }
            ]
          }
        ],
        connections: [
          { from: "m-start", to: "m-hub" },
          
          { from: "m-hub", to: "m-tech" },
          { from: "m-hub", to: "m-pitch" },
          { from: "m-hub", to: "m-security" },
          
          { from: "m-tech", to: "m-sandbox" },
          { from: "m-pitch", to: "m-feedback" },
          { from: "m-security", to: "m-feedback" },
          
          { from: "m-feedback", to: "m-ready" },
          { from: "m-sandbox", to: "m-live-ship" }
        ]
      }
    };

    function App() {
      const [activeRole, setActiveRole] = useState("participant");
      const [hoverNode, setHoverNode] = useState(null);
      const [hoveredConnection, setHoveredConnection] = useState(null);
      const [nodePositions, setNodePositions] = useState({});
      const canvasRef = useRef(null);

      const activeFlow = FLOW_DATA[activeRole];

      // Re-calculate node element positions for SVG connectors
      useEffect(() => {
        const updatePositions = () => {
          const positions = {};
          activeFlow.columns.forEach(col => {
            col.nodes.forEach(node => {
              const el = document.getElementById(node.id);
              if (el && canvasRef.current) {
                const rect = el.getBoundingClientRect();
                const canvasRect = canvasRef.current.getBoundingClientRect();
                positions[node.id] = {
                  x: rect.left - canvasRect.left + rect.width / 2,
                  y: rect.top - canvasRect.top + rect.height / 2,
                  width: rect.width,
                  height: rect.height
                };
              }
            });
          });
          setNodePositions(positions);
        };

        // Delay slightly to ensure browser finished layout paint
        const timer = setTimeout(updatePositions, 100);
        window.addEventListener("resize", updatePositions);

        return () => {
          clearTimeout(timer);
          window.removeEventListener("resize", updatePositions);
        };
      }, [activeRole]);

      // Dynamic path calculation: Draws straight lines or clean Bezier curves depending on alignment
      const calculatePath = (fromId, toId) => {
        const from = nodePositions[fromId];
        const to = nodePositions[toId];
        if (!from || !to) return "";

        let startX, startY, endX, endY;
        const dx = to.x - from.x;
        const dy = to.y - from.y;

        // 1. Same column (vertical flow)
        if (Math.abs(dx) < 20) {
          startX = from.x;
          startY = from.y + (dy > 0 ? from.height / 2 : -from.height / 2);
          endX = to.x;
          endY = to.y + (dy > 0 ? -to.height / 2 : to.height / 2);
          return `M ${startX} ${startY} L ${endX} ${endY}`;
        }

        // 2. Forward flow (left to right)
        if (dx > 0) {
          startX = from.x + from.width / 2;
          startY = from.y;
          endX = to.x - to.width / 2;
          endY = to.y;

          // If vertically aligned, draw a direct straight line
          if (Math.abs(dy) < 15) {
            return `M ${startX} ${startY} L ${endX} ${endY}`;
          }

          // Otherwise, draw a clean horizontal S-curve with small control points to keep it mostly flat
          const controlOffset = Math.min(40, dx * 0.3);
          return `M ${startX} ${startY} C ${startX + controlOffset} ${startY}, ${endX - controlOffset} ${endY}, ${endX} ${endY}`;
        }

        // 3. Backward flow (right to left loop)
        // Connect left side of source to right side of target to avoid passing through cards
        startX = from.x - from.width / 2;
        startY = from.y;
        endX = to.x + to.width / 2;
        endY = to.y;

        const controlOffset = 50;
        return `M ${startX} ${startY} C ${startX - controlOffset} ${startY + 40}, ${endX + controlOffset} ${endY + 40}, ${endX} ${endY}`;
      };

      const getNodeIcon = (type) => {
        switch (type) {
          case "entry": return "🏁";
          case "screen": return "🖥️";
          case "action": return "⚙️";
          case "decision": return "⚖️";
          case "outcome": return "🏆";
          default: return "📄";
        }
      };

      const getNodeBorderClass = (type, role) => {
        const activeNode = hoverNode === role;
        const base = "border transition-all duration-300 ";
        if (type === "decision") return base + "border-amber-500/40 bg-amber-500/5 hover:border-amber-500 rotate-3 rounded-lg";
        if (type === "entry") return base + "border-sky-500/40 bg-sky-500/5 hover:border-sky-500 rounded-none";
        
        switch (role) {
          case "participant": return base + "border-[#FF3F6C]/25 bg-[#FF3F6C]/5 hover:border-[#FF3F6C] rounded-[4px]";
          case "coordinator": return base + "border-[#8B5CF6]/25 bg-[#8B5CF6]/5 hover:border-[#8B5CF6] rounded-[4px]";
          case "mentor": return base + "border-[#10B981]/25 bg-[#10B981]/5 hover:border-[#10B981] rounded-[4px]";
          default: return base + "border-zinc-800 bg-zinc-900/50 rounded-lg";
        }
      };

      return (
        <div className="min-h-screen grid-bg relative flex flex-col">
          {/* Header */}
          <header className="border-b border-zinc-800 bg-zinc-950/80 backdrop-filter backdrop-blur-md sticky top-0 z-30">
            <div className="max-w-[1400px] mx-auto px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-[4px] bg-gradient-to-tr from-[#FF3F6C] to-[#8B5CF6] flex items-center justify-center font-bold text-white shadow-lg shadow-pink-500/10">
                  MTW
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight">Myntra Tech Week 2026</h1>
                  <p className="text-xs text-zinc-500 font-mono">Interactive Mind Map & User Flows</p>
                </div>
              </div>

              {/* Roles Toggle */}
              <div className="flex p-1 bg-zinc-900 border border-zinc-800 rounded-[6px] gap-1">
                {Object.keys(FLOW_DATA).map(role => (
                  <button
                    key={role}
                    onClick={() => { setActiveRole(role); setHoverNode(null); }}
                    className={`px-4 py-2 text-xs font-semibold capitalize transition-all duration-200 rounded-[4px] ${
                      activeRole === role
                        ? "bg-zinc-800 text-white shadow-md border-b border-zinc-700"
                        : "text-zinc-400 hover:text-zinc-200"
                    }`}
                  >
                    {role} Flow
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* Intro Section */}
          <main className="flex-1 max-w-[1440px] w-full mx-auto p-6 flex flex-col gap-6 relative z-10">
            <section className="bg-zinc-900/40 border border-zinc-800/80 backdrop-blur-sm p-6 rounded-[8px] flex flex-col md:flex-row items-start md:items-center justify-between gap-6 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-indigo-500/5 to-transparent blur-3xl rounded-full -mr-20 -mt-20"></div>
              
              <div className="space-y-2 relative z-10">
                <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-[4px] text-xs font-bold font-mono tracking-wide uppercase ${activeFlow.accentBg} ${activeFlow.textColor} border ${activeFlow.accentBorder}`}>
                  <span className="w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>
                  Active Map
                </span>
                <h2 className="text-3xl font-bold tracking-tight text-white">{activeFlow.title}</h2>
                <p className="text-sm text-zinc-400 max-w-2xl leading-relaxed">{activeFlow.description}</p>
              </div>

              <div className="flex flex-wrap gap-3 font-mono text-xs text-zinc-400 border border-zinc-800 bg-zinc-950/60 p-4 rounded-[6px]">
                <div className="flex items-center gap-2"><span className="text-base">🏁</span> Entry Point</div>
                <div className="flex items-center gap-2"><span className="text-base">🖥️</span> Key Screen</div>
                <div className="flex items-center gap-2"><span className="text-base">⚙️</span> User Action</div>
                <div className="flex items-center gap-2"><span className="text-base">⚖️</span> Decision Logic</div>
                <div className="flex items-center gap-2"><span className="text-base">🏆</span> Goal / Outcome</div>
              </div>
            </section>

            {/* Mind Map Canvas */}
            <section className="relative bg-zinc-950/60 border border-zinc-900 rounded-[12px] p-8 overflow-x-auto min-h-[550px] flex flex-col justify-between" ref={canvasRef}>
              
              {/* SVG connection layer */}
              <svg className="absolute inset-0 w-full h-full pointer-events-none z-0">
                <defs>
                  <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stopColor="#18181b" />
                    <stop offset="50%" stopColor="#27272a" />
                    <stop offset="100%" stopColor="#3f3f46" />
                  </linearGradient>
                  
                  {/* Arrow markers */}
                  <marker id="arrow-participant" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF3F6C" />
                  </marker>
                  <marker id="arrow-coordinator" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B5CF6" />
                  </marker>
                  <marker id="arrow-mentor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981" />
                  </marker>
                  <marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#27272a" />
                  </marker>
                </defs>

                {/* Render SVG Paths */}
                {activeFlow.connections.map((conn, idx) => {
                  const pathData = calculatePath(conn.from, conn.to);
                  const isHovered = hoveredConnection === `${conn.from}-${conn.to}` || hoverNode === conn.from || hoverNode === conn.to;
                  
                  const strokeColor = isHovered 
                    ? (activeRole === "participant" ? "#FF3F6C" : activeRole === "coordinator" ? "#8B5CF6" : "#10B981")
                    : "#27272a";
                    
                  const strokeWidth = isHovered ? 2.5 : 1.5;
                  const markerId = isHovered ? `arrow-${activeRole}` : "arrow-default";

                  return (
                    <g key={idx} className="transition-all duration-300">
                      {/* Interactive background fat stroke */}
                      <path
                        d={pathData}
                        fill="none"
                        stroke="transparent"
                        strokeWidth="15"
                        className="cursor-pointer"
                        onMouseEnter={() => setHoveredConnection(`${conn.from}-${conn.to}`)}
                        onMouseLeave={() => setHoveredConnection(null)}
                      />
                      {/* Visual stroke */}
                      <path
                        d={pathData}
                        fill="none"
                        stroke={strokeColor}
                        strokeWidth={strokeWidth}
                        markerEnd={`url(#${markerId})`}
                        className={isHovered ? "flow-line-active" : ""}
                      />
                      {/* Connection Label if present */}
                      {conn.label && nodePositions[conn.from] && nodePositions[conn.to] && (
                        <g>
                          <rect
                            x={(nodePositions[conn.from].x + nodePositions[conn.to].x) / 2 - 20}
                            y={(nodePositions[conn.from].y + nodePositions[conn.to].y) / 2 - 10}
                            width="40"
                            height="20"
                            rx="4"
                            fill="#09090b"
                            stroke={strokeColor}
                            strokeWidth="1"
                          />
                          <text
                            x={(nodePositions[conn.from].x + nodePositions[conn.to].x) / 2}
                            y={(nodePositions[conn.from].y + nodePositions[conn.to].y) / 2 + 4}
                            fill={isHovered ? "#ffffff" : "#a1a1aa"}
                            fontSize="10"
                            fontWeight="bold"
                            textAnchor="middle"
                            fontFamily="monospace"
                          >
                            {conn.label}
                          </text>
                        </g>
                      )}
                    </g>
                  );
                })}
              </svg>

              {/* Render Columns & Nodes */}
              <div className="flex justify-between gap-12 min-w-[1000px] z-10 relative">
                {activeFlow.columns.map((col, cIdx) => (
                  <div key={cIdx} className="flex-1 flex flex-col items-center gap-12">
                    {/* Column Header */}
                    <div className="w-full text-center border-b border-zinc-800 pb-3 mb-2">
                      <h3 className="text-sm font-bold uppercase tracking-wider text-zinc-500 font-mono">
                        {col.title}
                      </h3>
                    </div>

                    {/* Nodes list */}
                    <div className="flex flex-col gap-10 w-full items-center">
                      {col.nodes.map(node => {
                        const isFocused = hoverNode === node.id;
                        
                        let cardStyle = "border-zinc-800 bg-zinc-900/30";
                        if (isFocused) {
                          cardStyle = activeRole === "participant" 
                            ? "border-[#FF3F6C]/80 bg-[#FF3F6C]/10 glow-participant ring-1 ring-[#FF3F6C]/40" 
                            : activeRole === "coordinator" 
                              ? "border-[#8B5CF6]/80 bg-[#8B5CF6]/10 glow-coordinator ring-1 ring-[#8B5CF6]/40" 
                              : "border-[#10B981]/80 bg-[#10B981]/10 glow-mentor ring-1 ring-[#10B981]/40";
                        }

                        return (
                          <div
                            key={node.id}
                            id={node.id}
                            onMouseEnter={() => setHoverNode(node.id)}
                            onMouseLeave={() => setHoverNode(null)}
                            className={`w-full max-w-[240px] p-5 cursor-pointer relative transition-all duration-300 border ${cardStyle} ${
                              node.type === 'decision' ? 'rotate-1' : ''
                            } hover:-translate-y-1`}
                          >
                            {/* Role theme indicator line */}
                            <div className={`absolute top-0 left-0 w-1 h-full bg-gradient-to-b ${
                              node.type === 'decision' 
                                ? 'from-amber-500 to-yellow-600' 
                                : node.type === 'entry' 
                                  ? 'from-sky-400 to-blue-500' 
                                  : activeRole === 'participant' 
                                    ? 'from-[#FF3F6C] to-[#E0345C]' 
                                    : activeRole === 'coordinator' 
                                      ? 'from-[#8B5CF6] to-[#6D28D9]' 
                                      : 'from-[#10B981] to-[#059669]'
                            }`} />

                            <div className="flex items-start gap-3">
                              <span className="text-xl shrink-0 mt-0.5">
                                {getNodeIcon(node.type)}
                              </span>
                              <div className="space-y-1">
                                <p className="text-xs font-bold font-mono tracking-widest text-zinc-500 uppercase">
                                  {node.type}
                                </p>
                                <h4 className="text-sm font-bold text-white tracking-tight">
                                  {node.label}
                                </h4>
                                <p className="text-xs text-zinc-400 leading-relaxed">
                                  {node.desc}
                                </p>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

            </section>
          </main>

          {/* Footer Info */}
          <footer className="border-t border-zinc-900 bg-zinc-950/80 backdrop-filter backdrop-blur-md py-6 mt-auto text-center text-xs text-zinc-500 font-mono">
            Myntra Tech Week © 2026. Interactive Mind Map and State Visualizer.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
