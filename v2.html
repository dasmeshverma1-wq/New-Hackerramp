<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Myntra Tech Week 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Silkscreen:wght@400;700&family=Figtree:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  // Disable automatic browser scroll restoration on refresh/load
  if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
  }
  window.scrollTo(0, 0);
  window.addEventListener('beforeunload', () => {
    window.scrollTo(0, 0);
  });

  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter Tight', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          serif: ['Parafina Trial', 'DM Sans', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        fontSize: {
          'xxs': '10px',
          'xs': '11px',
          'sm': '13px',
          'base': '15px',
          'lg': '18px',
          'xl': '21px',
          '2xl': '25px',
          '3xl': '30px',
          '4xl': '38px',
          '5xl': '46px',
          '6xl': '58px',
          '7xl': '72px',
        }
      }
    }
  }
</script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ── PARAFINA TRIAL @font-face ── */
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Thin.otf') format('opentype'); font-weight: 100; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-MediumS.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Black.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: swap; }
  :root {
    --ink: #FFFFFF; --ink-2: #F0EEFF; --ink-3: #D8D6F0;
    --paper: #080612; --paper-2: #0F0E1C; --paper-3: #171528;
    --white: #FFFFFF;
    --mute-1: #C8C6E8; --mute-2: #B0AECE; --mute-3: #9896C2; --mute-4: #6A6890;
    --line: rgba(255,255,255,0.05); --line-2: rgba(255,255,255,0.09); --line-3: rgba(255,255,255,0.15);
    --line-white: rgba(255,255,255,0.10); --line-white-2: rgba(255,255,255,0.18);
    --accent: #FF3F6C; --accent-dim: #E0345C; --accent-tint: rgba(255,63,108,0.18); --accent-deep: #9F1239;
    --c-purple: #8B5CF6; --c-purple-tint: #EDE9FE; --c-purple-deep: #5B21B6;
    --c-blue: #3B82F6; --c-blue-tint: #DBEAFE; --c-blue-deep: #1E40AF;
    --c-cyan: #06B6D4; --c-cyan-tint: #CFFAFE; --c-cyan-deep: #0E7490;
    --c-teal: #0D9488; --c-teal-tint: #CCFBF1; --c-teal-deep: #115E59;
    --c-emerald: #10B981; --c-emerald-tint: #D1FAE5; --c-emerald-deep: #065F46;
    --c-amber: #F59E0B; --c-amber-tint: #FEF3C7; --c-amber-deep: #92400E;
    --c-orange: #FB923C; --c-orange-tint: #FFEDD5; --c-orange-deep: #9A3412;
    --c-rose: #F43F5E; --c-rose-tint: #FFE4E6; --c-rose-deep: #9F1239;
    --c-fuchsia: #D946EF; --c-fuchsia-tint: #FAE8FF; --c-fuchsia-deep: #86198F;
    --c-indigo: #6366F1; --c-indigo-tint: #E0E7FF; --c-indigo-deep: #3730A3;
    --c-coral: #FB7185; --c-coral-tint: #FFE4E6; --c-coral-deep: #9F1239;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { background: var(--paper); color: var(--ink); font-size: 15px; line-height: 1.55; margin: 0; -webkit-font-smoothing: antialiased; letter-spacing: -0.005em; overflow-x: clip; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--mute-4); border-radius: 99px; }
  html, body, button, input, select, textarea, .font-sans { font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important; }
  .font-serif, .num-display { font-family: 'Parafina Trial', 'DM Sans', sans-serif !important; }
  .font-mono, .eyebrow, .pill, .chip, .dept-chip { font-family: 'JetBrains Mono', monospace !important; }
  .h-display { font-family: 'Parafina Trial', 'DM Sans', sans-serif !important; font-weight: 500; letter-spacing: -0.03em; line-height: 0.96; }
  .h-display em { font-style: italic; font-weight: 400; }
  .gradient-text { background: linear-gradient(95deg, var(--accent) 0%, var(--c-fuchsia) 50%, var(--c-amber) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--mute-1); }
  .eyebrow-white { color: rgba(255,255,255,0.7); }

  .btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease; border: 1px solid transparent; white-space: nowrap; }
  .btn:active { transform: scale(0.96) !important; opacity: 0.88; transition: transform 80ms ease, opacity 80ms ease; }
  /* Primary — white bg, dark text (hero CTA, sign-in) */
  .btn-primary { background: #ffffff; color: #0a0a0b; box-shadow: 0 4px 18px -4px rgba(255,255,255,0.3); }
  .btn-primary:hover { background: #f0f0f0; transform: translateY(-2px); box-shadow: 0 10px 28px -6px rgba(255,255,255,0.45); }
  /* Secondary / ghost — transparent border, white text */
  .btn-ghost { background: transparent; color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.18); }
  .btn-ghost:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.4); transform: translateY(-1px); }
  /* Dark ghost — for light backgrounds */
  .btn-ghost-dark { background: transparent; color: rgba(15,14,28,0.75); border-color: rgba(15,14,28,0.18); }
  .btn-ghost-dark:hover { background: rgba(15,14,28,0.06); color: #0f0e1c; border-color: rgba(15,14,28,0.4); transform: translateY(-1px); }
  .btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 14px -4px rgba(255,63,108,0.45); }
  .btn-accent:hover { background: var(--accent-dim); transform: translateY(-1px); box-shadow: 0 8px 22px -4px rgba(255,63,108,0.55); }
  .btn-gradient { background: linear-gradient(95deg, #FF3F6C, #AE33FF); color: white; box-shadow: 0 4px 14px -4px rgba(174,51,255,0.45); }
  .btn-gradient:hover { transform: translateY(-1px); box-shadow: 0 8px 22px -4px rgba(174,51,255,0.55); }
  .btn-white { background: white; color: var(--ink); }
  .btn-white:hover { background: rgba(255,255,255,0.9); transform: translateY(-1px); }
  /* Legacy alias */
  .btn-ghost-light { background: transparent; color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.22); }
  .btn-ghost-light:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.45); transform: translateY(-1px); }
  .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 10px; }
  .btn-xs { padding: 4px 10px; font-size: 12px; border-radius: 8px; }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  /* Google sign-in button — must stay white even under the global dark .bg-white override */
  .g-btn { background:#fff !important; color:#1f1f1f !important; border:1px solid rgba(0,0,0,0.12) !important; }
  .g-btn:hover { background:#f3f3f3 !important; box-shadow:0 4px 14px rgba(0,0,0,0.18); }
  .g-btn:disabled { background:rgba(255,255,255,0.06) !important; color:rgba(255,255,255,0.3) !important; border-color:rgba(255,255,255,0.10) !important; }

  .card { background: #0F0E1C; border: 1px solid var(--line); border-radius: 12px; transition: all 0.2s ease; }
  .card-hover:hover { border-color: var(--line-3); transform: translateY(-2px); box-shadow: 0 12px 32px -12px rgba(0,0,0,0.40); }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border: 1px solid var(--line-2); background: rgba(255,255,255,0.06); border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; }
  .pill-ghost-light { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); border-color: var(--line-white-2); backdrop-filter: blur(8px); }

  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; animation: pulse-dot 1.8s infinite; }

  .nav-active { font-size: 13px; font-weight: 600; color: var(--accent) !important; background: var(--accent-tint) !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; transform: scale(1.02); }
  .nav-inactive { font-size: 13px; font-weight: 500; color: var(--mute-1) !important; background: transparent !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; }
  .nav-inactive:hover { color: var(--ink) !important; background: var(--paper-2) !important; transform: scale(1.02); }
  /* Dark-theme nav variants (used when the page bg behind the nav is dark) */
  .nav-active-dark { font-size: 13px; font-weight: 700; color: #ffffff !important; background: rgba(255,255,255,0.18) !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; transform: scale(1.02); border: 1px solid rgba(255,255,255,0.25); }
  .nav-inactive-dark { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.78) !important; background: transparent !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; }
  .nav-inactive-dark:hover { color: #ffffff !important; background: rgba(255,255,255,0.10) !important; transform: scale(1.02); }

  .tab-line-active {
    color: var(--accent) !important;
    border-bottom: 2px solid var(--accent) !important;
    background: transparent !important;
    border-radius: 0 !important;
  }
  .tab-line-inactive {
    color: var(--mute-2) !important;
    border-bottom: 2px solid transparent !important;
    background: transparent !important;
    border-radius: 0 !important;
  }
  .tab-line-inactive:hover {
    color: var(--ink) !important;
    border-bottom: 2px solid var(--line-3) !important;
    background: transparent !important;
  }

  .input { width: 100%; padding: 12px 14px; border: 1px solid var(--line-2); background: #171528; border-radius: 10px; font-size: 14px; color: var(--ink); transition: all 0.15s; letter-spacing: -0.005em; }
  .input:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(10,10,10,0.06); }
  .input::placeholder { color: var(--mute-3); }
  .label { display: block; font-size: 12px; font-weight: 500; color: var(--mute-1); margin-bottom: 6px; }

  .dot-grid { background-image: radial-gradient(circle, rgba(255,255,255,0.10) 1px, transparent 1px); background-size: 28px 28px; }

  .hero-mesh, .reward-mesh { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .hero-mesh > div, .reward-mesh > div { position: absolute; border-radius: 50%; filter: blur(90px); }
  .hero-mesh .b1 { width: 600px; height: 600px; background: var(--accent); opacity: 0.45; top: -200px; right: -100px; }
  .hero-mesh .b2 { width: 700px; height: 700px; background: var(--c-purple); opacity: 0.40; bottom: -300px; left: -100px; }
  .hero-mesh .b3 { width: 500px; height: 500px; background: var(--c-amber); opacity: 0.28; top: 30%; left: 40%; }
  .reward-mesh .r1 { width: 500px; height: 500px; background: var(--accent); opacity: 0.40; top: -150px; right: 10%; }
  .reward-mesh .r2 { width: 450px; height: 450px; background: var(--c-fuchsia); opacity: 0.30; bottom: -100px; left: 30%; }
  .reward-mesh .r3 { width: 400px; height: 400px; background: var(--c-amber); opacity: 0.25; top: 30%; left: -100px; }

  @keyframes fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { opacity: 0; animation: fade-up 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes rule-desc-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .rule-desc-fade { animation: rule-desc-in 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
  .rule-card-watermark {
    font-family: 'Archivo Black', 'Parafina Trial', Impact, 'Arial Black', sans-serif !important;
    font-weight: 900;
    font-synthesis: none;
    -webkit-font-smoothing: antialiased;
    line-height: 0.78;
    letter-spacing: -0.03em;
    pointer-events: none;
    user-select: none;
  }
  .rule-card-watermark {
    position: absolute;
    left: 50%;
    top: 56%;
    transform: translate(-50%, -50%);
    z-index: 2;
    font-size: clamp(210px, 78vw, 330px);
  }

  /* How it works — sticky rules (mobile) */
  @media (max-width: 1023px) {
    .hiw-sticky-panel {
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: max(1.25rem, env(safe-area-inset-top, 0px));
      padding-bottom: 1.5rem;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .hiw-intro-col .hiw-heading-wrap {
      display: block;
      width: 100%;
    }
  }

  .section-pad { padding-top: 7rem; padding-bottom: 7rem; }
  .section-pad-sm { padding-top: 4rem; padding-bottom: 4rem; }
  @media (max-width: 768px) { .section-pad { padding-top: 4rem; padding-bottom: 4rem; } }

  /* Home page — one alignment grid for every section */
  .home-container {
    width: 100%;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
    padding-left: 1rem;
    padding-right: 1rem;
    box-sizing: border-box;
  }
  @media (min-width: 640px) {
    .home-container { padding-left: 2rem; padding-right: 2rem; }
  }
  .home-section {
    padding-top: 3.5rem;
    padding-bottom: 3.5rem;
  }
  .home-section-bleed {
    width: 100%;
    padding-top: 3.5rem;
    padding-bottom: 3.5rem;
  }

  .progress { height: 5px; background: var(--paper-2); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s; background: linear-gradient(90deg, var(--accent), var(--c-fuchsia)); }

  .modal-scrim { background: rgba(10,10,10,0.55); backdrop-filter: blur(8px); }
  .modal-panel-dark {
    background: #0F0E1C;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    color: #fff;
  }
  .modal-panel-dark .modal-panel-header {
    border-bottom: 1px solid rgba(255,255,255,0.10);
    background: #0F0E1C;
  }
  .mkt-team-modal-chip {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.78);
  }
  .mkt-team-modal-chip--accent {
    color: #fda4af;
    border-color: rgba(255,63,108,0.35);
    background: rgba(255,63,108,0.12);
  }
  .mkt-team-modal-chip--open {
    color: #93c5fd;
    border-color: rgba(96,165,250,0.35);
    background: rgba(96,165,250,0.12);
  }
  .mkt-team-modal-chip--closed {
    color: rgba(255,255,255,0.55);
    border-color: rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.04);
  }
  .mkt-team-modal-chip--full {
    color: #fcd34d;
    border-color: rgba(245,158,11,0.35);
    background: rgba(245,158,11,0.12);
  }
  .mkt-team-modal-chip--match {
    color: #6ee7b7;
    border-color: rgba(52,211,153,0.3);
    background: rgba(52,211,153,0.1);
  }
  .mkt-team-modal-stat {
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .mkt-team-modal-section {
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .mkt-team-detail-panel {
    max-height: 78vh;
    display: flex;
    flex-direction: column;
  }
  .mkt-team-detail-panel > .modal-panel-header--close-only {
    padding: 10px 12px 2px;
    border-bottom: none;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .mkt-team-detail-panel > .modal-panel-body {
    padding: 0.5rem 1.25rem 1.25rem;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  .mkt-team-detail-member {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
  }
  .mkt-team-modal-cta {
    width: 100%;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    transition: opacity 150ms ease, background 150ms ease, border-color 150ms ease;
  }
  .mkt-team-modal-cta--primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid rgba(255,63,108,0.45);
  }
  .mkt-team-modal-cta--primary:hover:not(:disabled) { opacity: 0.92; }
  .mkt-team-modal-cta--disabled {
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.10);
    cursor: default;
  }
  .mkt-team-modal-cta--pending {
    background: rgba(245,158,11,0.12);
    color: #fcd34d;
    border: 1px solid rgba(245,158,11,0.35);
    cursor: default;
  }
  .mkt-team-modal-cta--accepted {
    background: rgba(34,197,94,0.12);
    color: #6ee7b7;
    border: 1px solid rgba(34,197,94,0.3);
    cursor: default;
  }
  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes waveFromSource {
    0%   { transform: scale(1);   opacity: 0;    filter: blur(0px);   box-shadow: inset 0 0 20px rgba(174,51,255,0.8), 0 0 12px rgba(174,51,255,0.4); }
    10%  { opacity: 0.88;         filter: blur(0px);   box-shadow: inset 0 0 24px rgba(174,51,255,0.7), 0 0 14px rgba(174,51,255,0.35); }
    55%  { opacity: 0.55;         filter: blur(1px);   box-shadow: inset 0 0 18px rgba(174,51,255,0.4), 0 0 8px rgba(174,51,255,0.2); }
    80%  { opacity: 0.16;         filter: blur(4px);   box-shadow: inset 0 0 10px rgba(174,51,255,0.15), 0 0 4px rgba(174,51,255,0.08); }
    100% { transform: scale(3.2); opacity: 0;    filter: blur(9px);   box-shadow: inset 0 0 0px transparent, 0 0 0px transparent; }
  }
  @keyframes wavePulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.16); }
    100% { transform: scale(1); }
  }
  .toast-in { animation: toast-in 0.22s; }
  ::selection { background: var(--accent); color: white; }
  .num-display { font-family: 'Parafina Trial', 'DM Sans', sans-serif; font-weight: 300; letter-spacing: -0.04em; line-height: 1; }

  .chip-ink { background: var(--ink); color: white; }
  .chip-accent { background: var(--accent); color: white; }
  .chip-purple { background: var(--c-purple-tint); color: var(--c-purple-deep); }
  .chip-blue { background: var(--c-blue-tint); color: var(--c-blue-deep); }
  .chip-cyan { background: var(--c-cyan-tint); color: var(--c-cyan-deep); }
  .chip-teal { background: var(--c-teal-tint); color: var(--c-teal-deep); }
  .chip-emerald { background: var(--c-emerald-tint); color: var(--c-emerald-deep); }
  .chip-amber { background: var(--c-amber-tint); color: var(--c-amber-deep); }
  .chip-orange { background: var(--c-orange-tint); color: var(--c-orange-deep); }
  .chip-rose { background: var(--c-rose-tint); color: var(--c-rose-deep); }
  .chip-fuchsia { background: var(--c-fuchsia-tint); color: var(--c-fuchsia-deep); }
  .chip-indigo { background: var(--c-indigo-tint); color: var(--c-indigo-deep); }

  .dept-chip { display: inline-flex; padding: 2px 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; border-radius: 4px; border: 1px solid var(--line-2); background: var(--paper); color: var(--mute-1); }

  .img-place { position: relative; overflow: hidden; }
  .img-place::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.18), transparent 50%), radial-gradient(circle at 70% 70%, rgba(0,0,0,0.10), transparent 50%); }
  .img-pink { background: linear-gradient(135deg, #FFE8EE 0%, #FF3F6C 100%); }
  .img-purple { background: linear-gradient(135deg, #EDE9FE 0%, #8B5CF6 100%); }
  .img-amber { background: linear-gradient(135deg, #FEF3C7 0%, #F59E0B 100%); }
  .img-blue { background: linear-gradient(135deg, #DBEAFE 0%, #3B82F6 100%); }
  .img-emerald { background: linear-gradient(135deg, #D1FAE5 0%, #10B981 100%); }
  .img-rose { background: linear-gradient(135deg, #FFE4E6 0%, #F43F5E 100%); }
  .img-cyan { background: linear-gradient(135deg, #CFFAFE 0%, #06B6D4 100%); }
  .img-fuchsia { background: linear-gradient(135deg, #FAE8FF 0%, #D946EF 100%); }

  .scroll-x { overflow-x: auto; }
  .scroll-x::-webkit-scrollbar { height: 4px; }
  .theme-bar { height: 4px; width: 40px; border-radius: 999px; margin-bottom: 1.5rem; }
  .link-u { color: var(--ink); text-decoration: none; background-image: linear-gradient(currentColor, currentColor); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%; }
  .link-u:hover { opacity: 0.6; }
  .score-pill { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 999px; font-family: 'Parafina Trial', 'DM Sans', sans-serif; font-weight: 400; font-size: 16px; border: 1px solid var(--line-2); background: #171528; cursor: pointer; transition: all 0.15s; }

  /* ── GLOBAL DARK THEME: Hard-coded white overrides ─────────────── */
  .bg-white { background: #0F0E1C !important; }
  body input:not([type="checkbox"]):not([type="radio"]),
  body select, body textarea {
    background: #171528 !important;
    color: #FFFFFF !important;
    border-color: rgba(255,255,255,0.12) !important;
  }
  body input::placeholder, body textarea::placeholder { color: rgba(255,255,255,0.28) !important; }
  .bg-white\/70 { background: rgba(15,14,28,0.70) !important; }
  .score-pill:hover { border-color: var(--ink); }
  .sticky-shadow { box-shadow: 0 1px 0 0 var(--line); }

  /* ── INNER PAGES DARK THEME ─────────────────────────────────────── */
  /* Matches the homepage's #080612 dark sections */
  .inner-dark {
    --paper:        #080612;
    --paper-2:      #0F0E1C;
    --paper-3:      #171528;
    --ink:          #FFFFFF;
    --ink-2:        #F0EEFF;
    --ink-3:        #D8D6F0;
    /* WCAG AA: all pass 4.5:1 against darkest card surface (#0E1E2E) */
    --mute-1:       #C8C6E8;   /* ~11:1 — labels, eyebrows             */
    --mute-2:       #B0AECE;   /* ~8.5:1 — body / secondary text       */
    --mute-3:       #9896C2;   /* ~5.6:1 — tertiary labels, captions   */
    --mute-4:       #6A6890;   /* ~3.1:1 — large text / decorative only */
    --line:         rgba(255,255,255,0.05);
    --line-2:       rgba(255,255,255,0.09);
    --line-3:       rgba(255,255,255,0.15);
    --accent-tint:  rgba(255,63,108,0.18);
    background:     #080612;
    color:          #FFFFFF;
    min-height:     100vh;
  }
  /* Cards that hard-code bg-white → subtle dark surface */
  .inner-dark .bg-white {
    background: #0F0E1C !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  /* Form inputs → dark surface */
  .inner-dark input:not([type="checkbox"]):not([type="radio"]),
  .inner-dark select,
  .inner-dark textarea {
    background: #171528 !important;
    color: #FFFFFF !important;
    border-color: rgba(255,255,255,0.12) !important;
  }
  .inner-dark input::placeholder,
  .inner-dark textarea::placeholder { color: rgba(255,255,255,0.28) !important; }
  /* Sticky top bars inside dark pages */
  .inner-dark .sticky { background: #080612 !important; border-color: rgba(255,255,255,0.08) !important; }
  /* Tab bars / segment controls */
  .inner-dark .bg-\\[color\\:var\\(--paper-2\\)\\] { background: #0F0E1C !important; }
  /* PageIntro in dark context: override inline bg-white back to card dark */
  .inner-dark [class*="rounded"][class*="overflow"] > .bg-white { background: #0F0E1C !important; }

  /* ── BADGE / CHIP OVERRIDES FOR DARK CONTEXT ───────────────────── */
  /* Open badge (blue light) */
  .inner-dark .bg-\[#eff6ff\]  { background: rgba(96,165,250,0.14) !important; }
  .inner-dark .text-\[#3b82f6\]{ color: #93c5fd !important; }
  /* Full badge (gray light) */
  .inner-dark .bg-\[#f3f4f6\]  { background: rgba(255,255,255,0.08) !important; }
  .inner-dark .text-\[#6b7280\]{ color: #d1d5db !important; }
  /* Green accepted/qualified badges */
  .inner-dark .bg-\[#f0fdf4\]  { background: rgba(52,211,153,0.12) !important; }
  .inner-dark .text-\[#15803d\],.inner-dark .text-\[#16a34a\] { color: #6ee7b7 !important; }
  .inner-dark .border-\[#bbf7d0\] { border-color: rgba(52,211,153,0.25) !important; }
  /* Indigo score / step badges */
  .inner-dark .bg-indigo-50    { background: rgba(99,102,241,0.14) !important; }
  .inner-dark .text-indigo-600 { color: #a5b4fc !important; }
  .inner-dark .border-indigo-100{ border-color: rgba(99,102,241,0.22) !important; }
  /* Notification / toast purple tint */
  .inner-dark .bg-\[#eeeeff\]  { background: rgba(139,92,246,0.14) !important; }
  /* dept-chip and skill chips already use --paper / --mute-1 vars, handled by variable override */
  /* White border on step circles */
  .inner-dark .border-\[#d2d0ff\] { border-color: rgba(174,51,255,0.30) !important; }
  .inner-dark .text-indigo-400 { color: #818cf8 !important; }
  .inner-dark .text-indigo-300 { color: #a5b4fc !important; }
  /* Join-team panel (light indigo surface) */
  .inner-dark .bg-\[#fbfcff\]  { background: rgba(99,102,241,0.10) !important; }
  /* Register — marketplace callout (dark-native, no white gradient) */
  .reg-marketplace-callout {
    background: var(--paper-2);
    box-shadow: inset 3px 0 0 rgba(255, 63, 108, 0.45);
  }
  .inner-dark .reg-marketplace-callout {
    background: #0F0E1C;
    border-color: rgba(255, 255, 255, 0.09) !important;
    box-shadow: inset 3px 0 0 rgba(255, 63, 108, 0.55);
  }
  .inner-dark .reg-marketplace-step {
    background: #171528 !important;
    border-color: rgba(255, 255, 255, 0.1) !important;
    color: var(--mute-2) !important;
  }
  .reg-theme-card {
    background: var(--paper-2);
  }
  .reg-theme-card--selected {
    background: rgba(255, 63, 108, 0.1);
    box-shadow: inset 0 0 0 1px rgba(255, 63, 108, 0.22);
  }
  .inner-dark .reg-theme-card {
    background: #0F0E1C;
  }
  .inner-dark .reg-theme-card--selected {
    background: rgba(255, 63, 108, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 63, 108, 0.35);
  }
  .reg-lead-badge {
    background: var(--paper-2);
  }
  .inner-dark .reg-lead-badge {
    background: #0F0E1C;
    border-color: rgba(255, 255, 255, 0.1) !important;
  }
  .reg-review-notice {
    background: var(--paper-2);
    box-shadow: inset 3px 0 0 rgba(96, 165, 250, 0.55);
  }
  .inner-dark .reg-review-notice {
    background: #0F0E1C;
    border-color: rgba(255, 255, 255, 0.09) !important;
    box-shadow: inset 3px 0 0 rgba(96, 165, 250, 0.65);
  }
  /* Open badge border */
  .inner-dark .border-\[#dbeafe\]\/50 { border-color: rgba(96,165,250,0.25) !important; }
  /* Full badge border */
  .inner-dark .border-\[#e5e7eb\]\/50 { border-color: rgba(255,255,255,0.12) !important; }
  /* Blue role chip in admin */
  .inner-dark .bg-\[#dbeafe\]  { background: rgba(96,165,250,0.14) !important; }
  .inner-dark .text-\[#1d4ed8\]{ color: #93c5fd !important; }
  .inner-dark .border-\[#bfdbfe\] { border-color: rgba(96,165,250,0.25) !important; }
  /* Pending-review / amber badge in dark */
  .inner-dark .bg-\[#fef9c3\]  { background: rgba(255,63,108,0.12) !important; }
  .inner-dark .text-\[#a16207\] { color: #FF3F6C !important; }
  .inner-dark .border-\[#fde68a\] { border-color: rgba(255,63,108,0.25) !important; }

  /* ── BUTTON / TAG TEXT FIXES FOR DARK CONTEXT ──────────────────── */
  /* bg-[color:var(--ink)] becomes white in dark → force dark text */
  .inner-dark .bg-\[color\:var\(--ink\)\] { background: #FFFFFF !important; color: #0A0A0A !important; }
  .inner-dark .bg-\[color\:var\(--ink\)\].text-white { color: #0A0A0A !important; }
  /* Full CTA button — barely visible gray */
  .inner-dark .border-gray-200 { border-color: rgba(255,255,255,0.18) !important; }
  .inner-dark .text-gray-400   { color: #B0AECE !important; }
  .inner-dark .text-gray-500   { color: #9896C2 !important; }
  /* Pending/amber button in dark */
  .inner-dark .bg-\[#fffbeb\]  { background: rgba(251,191,36,0.12) !important; }
  .inner-dark .text-\[#b45309\]{ color: #fbbf24 !important; }
  .inner-dark .border-\[#fde68a\]\/30 { border-color: rgba(251,191,36,0.25) !important; }

  /* ── SLATE UTILITY OVERRIDES (admin panels, calendar editor) ───── */
  .inner-dark .text-slate-800 { color: #FFFFFF !important; }
  .inner-dark .text-slate-700 { color: var(--mute-1) !important; }
  .inner-dark .text-slate-600 { color: var(--mute-2) !important; }
  .inner-dark .text-slate-500 { color: var(--mute-3) !important; }
  .inner-dark .text-slate-400 { color: var(--mute-3) !important; }
  .inner-dark .bg-slate-50,
  .inner-dark .bg-slate-50\/30,
  .inner-dark .bg-slate-50\/40,
  .inner-dark .bg-slate-50\/50 { background: rgba(255,255,255,0.04) !important; }
  .inner-dark .border-slate-100,
  .inner-dark .border-slate-200,
  .inner-dark .border-slate-200\/50 { border-color: rgba(255,255,255,0.10) !important; }
  .inner-dark .border-slate-300 { border-color: rgba(255,255,255,0.14) !important; }
  .inner-dark .hover\:bg-slate-50:hover { background: rgba(255,255,255,0.06) !important; }
  .inner-dark .hover\:border-slate-400:hover { border-color: rgba(255,255,255,0.22) !important; }
  .inner-dark .hover\:text-slate-700:hover { color: var(--mute-1) !important; }

  /* Scrollbar hide utility (phase timeline strip) */
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Learn page — session card dividers */
  .learn-card-photo-panel {
    border-right: 1px dashed rgba(255,255,255,0.16);
  }
  .learn-card-footer-rule {
    border-top: 1px dashed rgba(255,255,255,0.16);
  }

  .home-wit-bleed {
    position: relative;

    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    width: 100vw;
    padding: 3.5rem 0;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 80% at 15% 20%, rgba(255,31,192,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 70% 70% at 85% 80%, rgba(174,51,255,0.18) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 50% 100%, rgba(0,229,255,0.08) 0%, transparent 60%),
      linear-gradient(180deg, #120f24 0%, #080612 45%, #0a0818 100%);

    border-bottom: 1px solid rgba(255,255,255,0.06);

      radial-gradient(ellipse 70% 100% at 100% 100%, rgba(174,51,255,0.16) 0%, transparent 50%),
      linear-gradient(135deg, rgba(22,18,42,0.95) 0%, rgba(12,10,24,0.98) 100%);

  /* Hero — centered, 1680 x 583 */
  /* Hero — V2: 14-tile continuous wave (IMAGE 7 removed), larger tiles, no TECH/WEEK, no branding. */
  .hero-b-stage-wrapper .hero {
    position: absolute; left: 50%; top: 90px;
    transform: translateX(-50%);
    width: 1680px; height: 600px;
    z-index: 2;
    animation: heroIn 800ms 120ms cubic-bezier(.2,.7,.2,1) both;
  }

  /* Decorative icons — subtle continuous float with both axes + rotation drift */
  .hero-b-stage-wrapper .deco {
    position: absolute; pointer-events: none; z-index: 9;
    transform:
      translate(
        calc(var(--push-x, 0px) + var(--float-x, 0px)),
        calc(var(--push-y, 0px) + var(--float-y, 0px))
      )
      rotate(calc(var(--rot, 0deg) + var(--float-r-extra, 0deg)));
  }
  .hero-b-stage-wrapper .deco img { width: 100%; height: 100%; object-fit: contain; display: block; }
  /* Decos in the corners — sized to clear the wave with the push system filling any near-touch. */
  .hero-b-stage-wrapper .deco-small { width: 115px; height: 115px; left: 4px;    top: 90px;  animation: floatA 7s ease-in-out infinite; animation-delay: -2s; }
  .hero-b-stage-wrapper .deco-large { width: 202px; height: 202px; left: 1478px; top: 396px; animation: floatB 9s ease-in-out infinite; animation-delay: -4s; }

  /* Tiles arc — 14 tiles 240px each, step=90px so they breathe.
     Container 1410px wide, centred within 1680px hero (left=90). */
  .hero-b-stage-wrapper .tiles {
    position: absolute; left: 90px; top: 194px;
    width: 1410px; height: 240px;
    z-index: 3;
  }
  .hero-b-stage-wrapper .tile {
    position: absolute; width: 240px; height: 240px;
    cursor: pointer; will-change: transform;
    transform:
      translateX(var(--push-x, 0px))
      translateY(calc(var(--base, 0px) + var(--wy) + var(--push-y, 0px)))
      scale(var(--scl, 1));
    animation: wave 6s ease-in-out infinite;
    transition: --scl 320ms cubic-bezier(.2,.8,.2,1), box-shadow 280ms ease;
  }
  .hero-b-stage-wrapper .tile-inner {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    z-index: 2; transition: filter 220ms ease;
  }
  .hero-b-stage-wrapper .tile-inner img {
    position: absolute; display: block; pointer-events: none; max-width: none;
    top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .hero-b-stage-wrapper .tile-inner p {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 210.24px; line-height: 0.8; text-align: center;
    font-family: var(--font-parafina); font-weight: 700; font-size: 46.08px;
  }
  .hero-b-stage-wrapper .tile::before {
    content: ""; position: absolute; inset: -60px; z-index: 1;
    background: radial-gradient(closest-side, rgba(255,29,146,0.51) 0%, rgba(255,76,36,0.33) 45%, rgba(255,29,146,0) 75%);
    opacity: 0; transition: opacity 280ms ease, transform 320ms cubic-bezier(.2,.8,.2,1);
    filter: blur(28px); pointer-events: none; transform: scale(0.9);
  }
  .hero-b-stage-wrapper .tile.is-hover { z-index: 9999 !important; --scl: 1.20; box-shadow: 0 18px 50px -8px rgba(255,29,146,0.33); }
  .hero-b-stage-wrapper .tile.is-hover::before { opacity: 1; transform: scale(1.05); }
  .hero-b-stage-wrapper .tile.is-hover .tile-inner { filter: saturate(1.1) brightness(1.04); }
  .hero-b-stage-wrapper .tile.t-bordered { border: 7px solid #e0c2ee; }

  /* Tile colours */
  .hero-b-stage-wrapper .t-blue    { background: #251eff; }
  .hero-b-stage-wrapper .t-purple  { background: #482c65; }
  .hero-b-stage-wrapper .t-orange  { background: #ff4c24; }
  .hero-b-stage-wrapper .t-pink    { background: #f0d0ff; }
  .hero-b-stage-wrapper .t-grey    { background: #f3f3f3; }
  .hero-b-stage-wrapper .t-green   { background: #ebffd0; }
  .hero-b-stage-wrapper .t-lavender{ background: #e1c3ef; }
  .hero-b-stage-wrapper .text-white-soft { color: #f0f0f0; }
  .hero-b-stage-wrapper .text-blue       { color: #251eff; }
  .hero-b-stage-wrapper .text-pink-soft  { color: #f0d0ff; }

  .hero-b-stage-wrapper .tile .big-ai {
    font-family: var(--font-silkscreen); font-size: 169.43px;
    letter-spacing: -3.39px; top: calc(50% - 83.52px); width: auto;
  }
  .hero-b-stage-wrapper .tile .big-year {
    font-family: var(--font-silkscreen); font-size: 146.61px;
    letter-spacing: -16.13px; line-height: 0.8;
    top: calc(50% - 129.6px); width: auto;
  }
  .hero-b-stage-wrapper .tile .innovate {
    font-size: 63.92px; line-height: 0.8; width: auto;
    top: calc(50% - 51.6px);
  }

  /* Wave keyframes — continuous traveling wave with full amplitude */
  @keyframes wave {
    0%, 100% { --wy: -102px; }
    50%      { --wy:  102px; }
  }

  /* 14 tiles, 240px each, step=90px (IMAGE 7 removed; tiles after t6 shift left one step).
     Animation delays cascade 300ms across 14 tiles → 13 × 300ms = 3.9s spread. */
  .hero-b-stage-wrapper .t1  { left:   0px; top:  90px; --base:-112.5px; animation-delay: -3.9s; }
  .hero-b-stage-wrapper .t2  { left:  90px; top: 130px; --base:-152.5px; animation-delay: -3.6s; }
  .hero-b-stage-wrapper .t3  { left: 180px; top:  80px; --base:-102.5px; animation-delay: -3.3s; }
  .hero-b-stage-wrapper .t4  { left: 270px; top:  30px; --base: -52.5px; animation-delay: -3.0s; }
  .hero-b-stage-wrapper .t5  { left: 360px; top: -10px; --base: -12.5px; animation-delay: -2.7s; }
  .hero-b-stage-wrapper .t6  { left: 450px; top: -60px; --base:  37.5px; animation-delay: -2.4s; }
  .hero-b-stage-wrapper .t8  { left: 540px; top: -60px; --base:  37.5px; animation-delay: -2.1s; }
  .hero-b-stage-wrapper .t9  { left: 630px; top: -10px; --base: -12.5px; animation-delay: -1.8s; }
  .hero-b-stage-wrapper .t10 { left: 720px; top:  40px; --base: -62.5px; animation-delay: -1.5s; }
  .hero-b-stage-wrapper .t11 { left: 810px; top: 100px; --base:-122.5px; animation-delay: -1.2s; }
  .hero-b-stage-wrapper .t12 { left: 900px; top:  50px; --base: -72.5px; animation-delay: -0.9s; }
  .hero-b-stage-wrapper .t13 { left: 990px; top:   0px; --base: -22.5px; animation-delay: -0.6s; }
  .hero-b-stage-wrapper .t14 { left:1080px; top: -50px; --base:  27.5px; animation-delay: -0.3s; }
  .hero-b-stage-wrapper .t15 { left:1170px; top:-110px; --base:  87.5px; animation-delay:  0s;   }

  /* t8 (centre) on top, fanning out symmetrically */
  .hero-b-stage-wrapper .t1, .hero-b-stage-wrapper .t15 { z-index: 1; }
  .hero-b-stage-wrapper .t2, .hero-b-stage-wrapper .t14 { z-index: 2; }
  .hero-b-stage-wrapper .t3, .hero-b-stage-wrapper .t13 { z-index: 3; }
  .hero-b-stage-wrapper .t4, .hero-b-stage-wrapper .t12 { z-index: 4; }
  .hero-b-stage-wrapper .t5, .hero-b-stage-wrapper .t11 { z-index: 5; }
  .hero-b-stage-wrapper .t6, .hero-b-stage-wrapper .t10 { z-index: 6; }
  .hero-b-stage-wrapper .t9                            { z-index: 7; }
  .hero-b-stage-wrapper .t8                            { z-index: 8; }

  /* Lower section — centered hero CTA band (separate from page-section grid) */
  .hero-b-stage-wrapper .lower {
    position: absolute;
    left: 120px;
    top: 685px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    justify-content: center;
    width: 1680px;
    z-index: 10;
    overflow: visible;
    animation: lowerIn 800ms 260ms cubic-bezier(.2,.7,.2,1) both;
  }
  .hero-b-stage-wrapper .counter-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .hero-b-stage-wrapper .left-col {

    flex-direction: column;
    gap: 20px;
    align-items: center;

  .hero-b-stage-wrapper .reg-pill {
    display: inline-flex;

  .hero-b-stage-wrapper .reg-pill p {

  .hero-b-stage-wrapper .reg-pill .bold {
    color: rgba(255,255,255,0.75);

  }
  .hero-b-stage-wrapper .dot-wrap {
    position: relative;
    width: 6px;
    height: 6px;

  .hero-b-stage-wrapper .dot-core {

  /* Animations */
  @keyframes heroIn { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes lowerIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes navIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  /* Two distinct float paths so the two decos drift independently. */
  @keyframes floatA {
    0%, 100% { --float-y:   0px; --float-x:  0px; --float-r-extra:  0deg; }
    25%      { --float-y:  -6px; --float-x:  4px; --float-r-extra:  2deg; }
    50%      { --float-y: -12px; --float-x:  0px; --float-r-extra:  0deg; }
    75%      { --float-y:  -6px; --float-x: -4px; --float-r-extra: -2deg; }
  }
  @keyframes floatB {
    0%, 100% { --float-y:   0px; --float-x:  0px; --float-r-extra:  0deg; }
    25%      { --float-y:   8px; --float-x: -6px; --float-r-extra: -3deg; }
    50%      { --float-y:  14px; --float-x:  0px; --float-r-extra:  0deg; }
    75%      { --float-y:   8px; --float-x:  6px; --float-r-extra:  3deg; }
  }
  /* Keep the older alias if any other element references it */
  @keyframes floaty {
    0%, 100% { --float-y: 0px;   --float-r-extra: 0deg; }
    50%      { --float-y: -10px; --float-r-extra: 2deg; }
  }
  .hero-b-stage-wrapper .tick { animation: pop 220ms ease; }
  @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.08); } 100% { transform: scale(1); } }

function validateIdeaFields({ title, problemStatement, impact, theme }, { requireAll = false } = {}) {
  const errors = [];
  const t = (title || '').trim();
  const p = (problemStatement || '').trim();
  const imp = (impact || '').trim();
  if (requireAll) {
    if (!t) errors.push('Title is required');
    if (!p) errors.push('Problem statement is required');
    if (!theme) errors.push('Theme is required');
  }
  if (t.length > CARD_LIMITS.ideaTitle) errors.push(`Title must be ${CARD_LIMITS.ideaTitle} characters or fewer`);
  if (p.length > CARD_LIMITS.ideaProblem) errors.push(`Problem statement must be ${CARD_LIMITS.ideaProblem} characters or fewer`);
  if (imp.length > CARD_LIMITS.ideaImpact) errors.push(`Impact must be ${CARD_LIMITS.ideaImpact} characters or fewer`);
  return errors;
}

/* ──────────── COUNTDOWN ──────────── */

function Countdown({ targetDate }) {
  const calc = () => {
    const d = new Date(targetDate) - new Date();
    if (d<=0) return {D:0,H:0,M:0,S:0};
    return { D:Math.floor(d/86400000), H:Math.floor(d%86400000/3600000), M:Math.floor(d%3600000/60000), S:Math.floor(d%60000/1000) };
  };
  const [t, setT] = useState(calc);
  useEffect(()=>{ const id=setInterval(()=>setT(calc()),1000); return()=>clearInterval(id); },[]);
  const units = [['D','DAYS'],['H','HRS'],['M','MIN'],['S','SEC']];
  return (
    <div className="flex items-center justify-center gap-1">
      {units.map(([k,l], i) => (
        <React.Fragment key={k}>
          <div className="flex flex-col items-center gap-2">
            <div className="w-[72px] h-[72px] bg-white border border-[color:var(--line-2)] rounded-none flex items-center justify-center shadow-sm">
              <span style={{fontFamily:'inherit', fontSize:'28px', fontWeight:700, letterSpacing:'-0.02em', color:'#18181b'}}>
                {String(t[k]).padStart(2,'0')}
              </span>
            </div>
            <span className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-[0.1em] font-semibold">{l}</span>
          </div>
          {i < units.length - 1 && (
            <div className="flex flex-col gap-[10px] mb-6 mx-1">
              <span className="w-[5px] h-[5px] rounded-full bg-[color:var(--mute-4)]" />
              <span className="w-[5px] h-[5px] rounded-full bg-[color:var(--mute-4)]" />
            </div>
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

function Modal({ open, onClose, title, size='md', dark=false, panelClass='', showClose=false, children }) {
  useEffect(()=>{ document.body.style.overflow=open?'hidden':''; return()=>{document.body.style.overflow=''}; },[open]);
  if (!open) return null;
  // 'drawer' = slides in from right (popup feel, no full-screen scrim)
  if (size==='drawer') {
    return (
      <div className="fixed inset-0 z-50 flex justify-end" style={{background:'rgba(0,0,0,0.28)'}} onClick={onClose}>
        <div className="h-full w-full max-w-[420px] bg-white shadow-[-8px_0_40px_rgba(0,0,0,0.18)] flex flex-col overflow-hidden"
          style={{animation:'slideInRight 0.28s cubic-bezier(0.16,1,0.3,1)'}}
          onClick={e=>e.stopPropagation()}>
          <div className="flex items-center justify-between px-5 py-4 border-b border-[color:var(--line)] flex-shrink-0 bg-white">
            <h2 className="text-[14px] font-semibold text-[color:var(--ink)]">{title}</h2>

          </div>
          <div className="flex-1 overflow-y-auto p-5">{children}</div>
        </div>
      </div>
    );
  }
  const w = {sm:'max-w-sm',md:'max-w-xl',lg:'max-w-3xl',xl:'max-w-4xl'}[size]||'max-w-xl';
  const panelCls = dark
    ? `modal-panel-dark rounded-[16px] fade-up ${panelClass || 'max-h-[90vh] overflow-y-auto'}`
    : `bg-white border border-[color:var(--line-2)] rounded-2xl shadow-[0_8px_40px_rgba(0,0,0,0.10)] max-h-[88vh] overflow-y-auto fade-up ${panelClass}`;
  const headerCls = dark
    ? 'modal-panel-header flex items-center justify-between px-6 py-4 sticky top-0 z-10 rounded-t-[18px]'
    : 'flex items-center justify-between px-6 py-4 border-b border-[color:var(--line)] sticky top-0 bg-white z-10 rounded-t-[18px]';
  const titleCls = dark ? 'text-[15px] font-[800] text-white' : 'text-[14px] font-semibold text-[color:var(--ink)]';
  const closeCls = dark
    ? 'w-8 h-8 rounded-[8px] flex items-center justify-center text-white/50 hover:text-white hover:bg-white/10 btn text-xl leading-none'
    : 'w-7 h-7 rounded-[3px] flex items-center justify-center text-[color:var(--mute-3)] hover:text-[color:var(--mute-1)] hover:bg-[color:var(--paper-2)] btn text-xl leading-none';
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-scrim px-4 py-6" onClick={onClose}>
      <div className={`w-full ${w} ${panelCls}`} onClick={e=>e.stopPropagation()}>
        {(title || showClose) && (
          <div className={`${headerCls}${!title && showClose ? ' modal-panel-header--close-only' : ''}`}>
            {title ? <h2 className={titleCls}>{title}</h2> : <span aria-hidden="true" />}
            <button onClick={onClose} className={closeCls} aria-label="Close">&times;</button>
          </div>
        )}
        <div className={`modal-panel-body ${panelClass ? '' : 'p-6'}`}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ msg, type, onDone }) {
  useEffect(()=>{ const t=setTimeout(onDone,3000); return()=>clearTimeout(t); },[]);
  const s = type==='success'?'border-[#bbf7d0] text-[#15803d] bg-[#f0fdf4]':type==='error'?'border-[#fecaca] text-[#dc2626] bg-[#fef2f2]':'border-[#c4b5fd] text-[color:var(--accent)] bg-[#eeeeff]';
  return (
    <div className={`fixed top-[68px] right-4 z-[100] toast-in border ${s} px-4 py-2.5 rounded-[3px] text-[13px] font-medium shadow-[0_4px_16px_rgba(0,0,0,0.08)]`}>{msg}</div>
  );
}

function FluentEmoji({ char, className = '', style = {}, fallbackStyle = {} }) {
  if (!char) return null;
  const cleanChar = char.replace(/\uFE0F/g, '');
  if (cleanChar === '🚀') {
    const hasCustomSize = style.width || style.height || /\b(w-|h-)/.test(className);
    const defaultSize = hasCustomSize ? {} : { width: '1.2em', height: '1.2em' };
    return (
      <img 
        src="https://em-content.zobj.net/source/microsoft-teams/337/rocket_1f680.png" 
        className={className} 
        style={{ display: 'inline-block', verticalAlign: 'middle', ...defaultSize, ...style }} 
        alt={char}
      />
    );
  }
  const mapped = FLUENT_EMOJI_MAP[char] || FLUENT_EMOJI_MAP[cleanChar];
  if (mapped) {
    const hasCustomSize = style.width || style.height || /\b(w-|h-)/.test(className);
    const defaultSize = hasCustomSize ? {} : { width: '1.2em', height: '1.2em' };
    return (
      <img 
        src={`https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@latest/assets/${mapped}`} 
        className={className} 
        style={{ display: 'inline-block', verticalAlign: 'middle', ...defaultSize, ...style }} 
        alt={char}
      />
    );
  }
  return <span className={className} style={{ ...fallbackStyle, ...style }}>{char}</span>;
}

function getCardDate(id, customDate) {
  if (customDate) {
    const d = new Date(customDate);
    if (!isNaN(d.getTime())) {
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }
  }
  // Generate stable mock dates for initial teams
  if (id === 'T001') return '24/09/2024';
  if (id === 'T002') return '29/08/2024';
  if (id === 'T003') return '10/04/2024';
  if (id === 'T004') return '10/08/2024';
  
  // Hash the ID to get a consistent pseudo-random date for others
  let sum = 0;
  if (id) {
    for (let i = 0; i < id.length; i++) sum += id.charCodeAt(i);
  }
  const day = (sum % 28) + 1;
  const month = (sum % 12) + 1;
  const year = 2024;
  const dd = String(day).padStart(2, '0');
  const mm = String(month).padStart(2, '0');
  return `${dd}/${mm}/${year}`;
}

function AnimatedSearchInput({ value, onChange, onClear, type = 'teams', placeholder = '' }) {
  const PHRASE_MAP = {
    teams:       ['Search "AI Agents"...', 'Search "Designer"...', 'Search "React"...', 'Search "Fintech"...'],
    sessions:    ['Search "Incident Mgmt"...', 'Search "SRE Scale"...', 'Search "Prompt Eng"...', 'Search "Deploy"...'],
    admin_teams: ['Search "Neural Ninjas"...', 'Search "Gen AI"...', 'Search "Warehouse"...', 'Search "Unassigned"...'],
    users:       ['Search "arjun.sharma"...', 'Search "Engineering"...', 'Search "Mentor"...', 'Search "Design"...'],
    progress:    ['Search "Team Alpha"...', 'Search by team name...', 'Search "Pixel Pirates"...'],
    ideas:       ['Search "Customer Support"...', 'Search "Logistics"...', 'Search "GenAI"...'],
  };
  const [phrases] = useState(PHRASE_MAP[type] || PHRASE_MAP['teams']);
  const [phraseIdx, setPhraseIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [isDeleting, setIsDeleting] = useState(false);

  useEffect(() => {
    let timer;
    const current = phrases[phraseIdx];
    if (!isDeleting && charIdx === current.length) {
      timer = setTimeout(() => setIsDeleting(true), 2000);
    } else if (isDeleting && charIdx === 0) {
      setIsDeleting(false);
      setPhraseIdx(p => (p + 1) % phrases.length);
    } else {
      timer = setTimeout(() => {
        setCharIdx(p => p + (isDeleting ? -1 : 1));
      }, isDeleting ? 40 : 80);
    }
    return () => clearTimeout(timer);
  }, [charIdx, isDeleting, phraseIdx, phrases]);

  return (
    <div className="relative group">
      <div className="absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
        <svg className="w-[14px] h-[14px] text-[color:var(--mute-3)] transition-colors group-focus-within:text-[color:var(--ink)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16" y2="16"></line>
        </svg>
      </div>
      <input 
        value={value} 
        onChange={onChange}
        placeholder={phrases[phraseIdx].substring(0, charIdx)}
        className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--ink)] rounded-[8px] pl-9 pr-8 py-2 text-[12px] text-[color:var(--ink)] placeholder-[color:var(--mute-3)] outline-none transition-all shadow-[0_1px_2px_rgba(0,0,0,0.03)] focus:shadow-[0_2px_8px_rgba(0,0,0,0.06)]" 
      />
      {value && (
        <button onClick={onClear} className="absolute right-3 top-1/2 -translate-y-1/2 text-[color:var(--mute-3)] hover:text-[color:var(--ink)] text-[16px] leading-none">
          ×
        </button>
      )}

    </div>
  );
}

function QuizGame({ quizzes, user, onFinish }) {
  const [idx, setIdx] = useState(0);
  const [ans, setAns] = useState(null);
  const [score, setScore] = useState(0);
  const q = quizzes[idx];
  const done = idx >= quizzes.length;
  const pick = (i) => {
    if(ans!==null) return;
    setAns(i);
    const newScore = score + (i===q.correct?1:0);
    setScore(newScore);
    if (idx === quizzes.length - 1 && onFinish) {
      onFinish({ score: newScore, total: quizzes.length });
    }
  };
  const next = () => { setAns(null); setIdx(i=>i+1); };
  if(done) return (
    <div className="bg-[color:var(--paper)] rounded-none border border-[#efefef] p-6 text-center">
      <p className="text-[40px] mb-2">{score===3?'🏆':score>=2?'🎯':'😅'}</p>
      <p className="text-[18px] font-[700] text-[color:var(--ink)]">{score}/3 correct</p>
      <p className="text-[13px] text-[color:var(--mute-2)] mt-1">{score===3?'You actually read the rulebook!':score>=2?'Solid effort. Almost there.':'Maybe skim the FAQ?'}</p>
      <button onClick={()=>{setIdx(0);setAns(null);setScore(0);}}
        className="mt-4 px-5 py-2 bg-[color:var(--accent)] text-white text-[13px] font-semibold rounded-[3px] btn hover:bg-[#2222dd]">
        Try again
      </button>
    </div>
  );
  return (
    <div className="bg-[color:var(--paper)] rounded-none border border-[#efefef] p-5">
      <div className="flex items-center justify-between mb-4">
        <p className="text-[11px] text-[color:var(--mute-3)] font-semibold uppercase tracking-[0.1em]">Q {idx+1} of {quizzes.length}</p>
        <div className="flex gap-1">
          {quizzes.map((_,i)=>(
            <div key={i} className={`h-1 w-8 rounded-full ${i<idx?'bg-[color:var(--accent)]':i===idx?'bg-[#fed7aa]':'bg-[color:var(--line-2)]'}`} />
          ))}
        </div>
      </div>
      <p className="text-[14px] font-semibold text-[color:var(--ink)] leading-snug mb-4">{q.q}</p>
      <div className="space-y-2 mb-3">
        {q.opts.map((o,i)=>{
          let cls = 'border-[color:var(--line-2)] bg-white text-[color:var(--mute-1)] hover:border-[color:var(--mute-4)]';
          if(ans!==null){
            if(i===q.correct) cls = 'border-[#22c55e] bg-[#f0fdf4] text-[#15803d]';
            else if(i===ans) cls = 'border-[#ef4444] bg-[#fef2f2] text-[#dc2626]';
            else cls = 'border-[color:var(--line)] text-[#c4c4c8] bg-white';
          }
          return (
            <button key={i} onClick={()=>pick(i)}
              className={`w-full text-left px-4 py-2.5 rounded-[3px] text-[13px] border btn ${cls}`}>
              <span className="font-semibold mr-2">{String.fromCharCode(65+i)}.</span>{o}
            </button>
          );
        })}
      </div>
      {ans!==null && (
        <div className={`rounded-[3px] px-4 py-3 text-[12px] mb-3 ${ans===q.correct?'bg-[#f0fdf4] text-[#15803d]':'bg-[#eeeeff] text-[#92400e]'}`}>
          <span className="font-semibold">{ans===q.correct?'✓ Correct! ':'✗ Not quite — '}</span>
          {q.explain}
        </div>
      )}
      {ans!==null && (
        <button onClick={next}
          className="w-full py-2 bg-[color:var(--ink)] text-white text-[13px] font-semibold rounded-[3px] btn hover:bg-[color:var(--ink-3)]">
          {idx<quizzes.length-1?'Next question →':'See results'}
        </button>
      )}


          
          
    </div>
  );
}

    },
  ];

  const containerRef = React.useRef(null);
  const [scrollProgress, setScrollProgress] = React.useState(0);

  React.useEffect(() => {
    const handleScroll = () => {
      if (!containerRef.current) return;
      const rect = containerRef.current.getBoundingClientRect();
      const start = rect.top + window.scrollY;
      const end = rect.bottom + window.scrollY - window.innerHeight;
      const current = window.scrollY;
      
      let progress = (current - start) / (end - start);
      progress = Math.max(0, Math.min(1, progress));
      setScrollProgress(progress);
    };

    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('resize', handleScroll);
    handleScroll();

    return () => {
      window.removeEventListener('scroll', handleScroll);
      window.removeEventListener('resize', handleScroll);
    };
  }, []);

  const finalRotations = [-2.5, 2, -1.5, 3.5, -0.5];

  const getCardProgress = (i) => {
    if (i === 0) return 1;
    const startRange = (i - 1) / 4;
    const endRange = i / 4;
    if (scrollProgress <= startRange) return 0;
    if (scrollProgress >= endRange) return 1;
    return (scrollProgress - startRange) / (endRange - startRange);
  };

  const activeIndex = (() => {
    let idx = 0;
    for (let i = 0; i < HIGHLIGHTS.length; i++) {
      if (getCardProgress(i) >= 0.5) idx = i;
    }
    return idx;
  })();

    <div ref={containerRef} className="relative w-full" style={{ height: '320vh' }}>

                src="https://em-content.zobj.net/source/microsoft-teams/400/robot_1f916.png"
                alt="🤖"
                className="hiw-robot w-16 h-16 md:w-20 md:h-20 mb-3 select-none pointer-events-none mx-auto lg:mx-0 lg:animate-bounce"
                style={{ animationDuration: '3s' }}
              />

                What's different this year
              </p>
              <div className="hiw-heading-wrap relative inline-block mb-3">
                <h2 className="h-display home-section-heading text-3xl md:text-5xl leading-tight tracking-tight">
                  Five rules that change <em className="home-heading-accent">everything.</em>
                </h2>
              </div>
            </div>

            {/* Center Column: Card stack */}
            <div className="hiw-cards-col col-span-1 lg:col-span-4 relative w-full flex items-center justify-center h-[380px] sm:h-[500px] my-2 sm:my-4 lg:my-0">
              {HIGHLIGHTS.map((h, i) => {
                const progress = getCardProgress(i);

                // Transform animation math
                const ty = (1 - progress) * 600; // Slide from bottom
                const rot = progress * finalRotations[i] + (1 - progress) * (finalRotations[i] + 12);
                
                // Scale and depth math based on coverage
                let scale = 1.0;
                let offsetY = 0;
                for (let j = i + 1; j < 5; j++) {
                  let jProgress = 0;
                  const jStart = (j - 1) / 4;
                  const jEnd = j / 4;
                  if (scrollProgress > jStart) {
                    jProgress = Math.min(1, (scrollProgress - jStart) / (jEnd - jStart));
                  }
                  scale -= jProgress * 0.025; // Scale down by 2.5% per stacked card
                  offsetY -= jProgress * 12;   // Push up slightly to expose bottom borders
                }

                const scheme = RULE_CARD_SCHEMES[i % RULE_CARD_SCHEMES.length];

                const cardStyle = {
                  transform: `translate3d(0, ${ty + offsetY}px, 0) rotate(${rot}deg) scale(${scale})`,
                  zIndex: i + 10,
                  position: 'absolute',
                  willChange: 'transform',
                  transition: (progress === 0 || progress === 1)
                    ? 'transform 0.25s cubic-bezier(0.16,1,0.3,1), background-color 500ms ease, box-shadow 500ms ease'
                    : 'background-color 500ms ease, box-shadow 500ms ease',
                  backgroundColor: scheme.bg,
                  boxShadow: '0 18px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05)',
                };

                const titleColor   = '#ffffff';
                const labelColor   = 'rgba(255,255,255,0.55)';
                const subColor     = 'rgba(255,255,255,0.35)';
                const blob1Opacity = 0.28;
                const blob2Opacity = 0.22;
                const blob3Opacity = 0.12;
                const watermarkOpacity = Math.min(0.1, (0.04 + progress * 0.04 + (i === activeIndex ? 0.03 : 0)));
                const watermarkColor = 'rgba(255,255,255,1)';

                return (
                  <div key={h.n} style={cardStyle}
                    className="w-[280px] h-[380px] sm:w-[340px] sm:h-[460px] flex-shrink-0 border-0 rounded-[24px] overflow-hidden select-none relative">

                      {i + 1}

                    {/* Blob 1 — primary brand colour */}
                    <div style={{
                      position:'absolute', width:'280px', height:'280px', borderRadius:'50%',

                    {/* Mid blend — where the two colours meet */}

function SchedulePhaseStrip({ showHeader = true }) {
  const liveIdx = SCHEDULE.findIndex(s => s.status === 'live');
  const progressPct = liveIdx >= 0
    ? Math.min(100, ((liveIdx + 0.5) / SCHEDULE.length) * 100)
    : 0;

  const phaseState = (i) => {
    if (SCHEDULE[i].status === 'live') return 'live';
    if (liveIdx >= 0 && i < liveIdx) return 'done';
    return 'upcoming';
  };

  return (
    <div className="home-schedule-shell">
      {showHeader && (
        <div className="home-schedule-shell-head">
          <p className="text-[10px] font-mono uppercase tracking-[0.16em] font-[900] text-white/45">Phase timeline</p>
          {liveIdx >= 0 && (
            <span className="inline-flex items-center gap-1.5 text-[10px] font-[800] text-[#FF8FE0] uppercase tracking-wide">
              <span className="relative flex h-1.5 w-1.5">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#FF1FC0] opacity-75" />
                <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#FF1FC0]" />
              </span>
              {SCHEDULE[liveIdx].label} · Live
            </span>
          )}
        </div>
      )}
      <div className="home-schedule-progress" aria-hidden>
        <div className="home-schedule-progress-fill" style={{ width: `${progressPct}%` }} />
      </div>
      <div className="home-schedule-track">
        {SCHEDULE.map((s, i) => {
          const state = phaseState(i);
          const isLive = state === 'live';
          const isDone = state === 'done';
          return (
            <div
              key={s.phase}
              className={`home-schedule-phase home-schedule-phase--${state}`}
            >
              <div className="flex items-start justify-between gap-2 mb-3">
                <span className={`text-[9px] font-mono font-[900] uppercase tracking-wider px-2 py-0.5 rounded-[6px] border ${
                  isLive
                    ? 'border-[#FF1FC0]/35 text-[#FF8FE0] bg-[#FF1FC0]/12'
                    : isDone
                      ? 'border-white/10 text-white/40 bg-white/[0.04]'
                      : 'border-white/12 text-white/55 bg-white/[0.05]'
                }`}>
                  {s.phase}
                </span>
                {isLive && (
                  <span className="relative flex h-2 w-2 mt-1 flex-shrink-0">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00E5FF] opacity-75" />
                    <span className="relative inline-flex rounded-full h-2 w-2 bg-[#00E5FF]" />
                  </span>
                )}
                {isDone && (
                  <span className="text-[11px] text-white/35" aria-hidden>✓</span>
                )}
              </div>
              <p className={`text-[13.5px] font-[900] leading-snug mb-1 ${isLive ? 'text-white' : isDone ? 'text-white/70' : 'text-white/88'}`}>
                {s.label}
              </p>
              <p className={`text-[11px] font-bold font-mono mt-auto ${isLive ? 'text-white/65' : 'text-white/45'}`}>
                {s.start} – {s.end}
              </p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CountdownTimer({ targetDate, label = 'Grand Finale Begins In' }) {
  const [timeLeft, setTimeLeft] = useState({ days: '00', hours: '00', minutes: '00', seconds: '00' });

  useEffect(() => {
    const calculateTimeLeft = () => {
      const difference = +new Date(targetDate) - +new Date();
      if (difference > 0) {
        return {
          days: String(Math.floor(difference / (1000 * 60 * 60 * 24))).padStart(2, '0'),
          hours: String(Math.floor((difference / (1000 * 60 * 60)) % 24)).padStart(2, '0'),
          minutes: String(Math.floor((difference / 1000 / 60) % 60)).padStart(2, '0'),
          seconds: String(Math.floor((difference / 1000) % 60)).padStart(2, '0'),
        };
      }
      return { days: '00', hours: '00', minutes: '00', seconds: '00' };
    };

    setTimeLeft(calculateTimeLeft());
    const timer = setInterval(() => {
      setTimeLeft(calculateTimeLeft());
    }, 1000);
    return () => clearInterval(timer);
  }, [targetDate]);

  return (
    <div className="inline-block text-center border-t border-[rgba(255,255,255,0.1)] pt-2.5 mt-1 w-full max-w-[175px]">
      <div className="text-[6.5px] text-[rgba(255,255,255,0.4)] tracking-[0.25em] uppercase font-[800] mb-1.5">{label}</div>
      <div className="flex items-center justify-between gap-1.5 px-0.5">
        {[
          { label: 'Days', value: timeLeft.days },
          { label: 'Hours', value: timeLeft.hours },
          { label: 'Min', value: timeLeft.minutes },
          { label: 'Sec', value: timeLeft.seconds }
        ].map(t => (
          <div key={t.label} className="flex flex-col gap-0.5 items-center justify-center min-w-[28px]">
            <span className="h-display text-[15px] sm:text-[16px] text-white tracking-tight leading-none font-normal">{t.value}</span>
            <span className="text-[5.5px] text-[rgba(255,255,255,0.3)] tracking-[0.15em] uppercase font-mono font-bold">{t.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AnimatedCounter({ value, duration = 1500 }) {
  const match = typeof value === 'string' ? value.match(/^([^\d]*?)(\d+)([^\d]*)$/) : null;
  const prefix = match ? match[1] : '';
  const target = match ? parseInt(match[2], 10) : (typeof value === 'number' ? value : 0);
  const suffix = match ? match[3] : '';

  const [count, setCount] = useState(0);
  const elementRef = useRef(null);
  const [hasStarted, setHasStarted] = useState(false);

  useEffect(() => {
    if (!match && typeof value !== 'number') {
      return;
    }

    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setHasStarted(true);
        }
      },
      { threshold: 0.1 }
    );

    if (elementRef.current) {
      observer.observe(elementRef.current);
    }

    return () => {
      if (elementRef.current) {
        observer.unobserve(elementRef.current);
      }
    };
  }, [value, match]);

  useEffect(() => {
    if (!hasStarted) return;

    let startTime = null;
    let animationFrameId = null;

    const animate = (timestamp) => {
      if (!startTime) startTime = timestamp;
      const progress = timestamp - startTime;
      const percentage = Math.min(progress / duration, 1);
      
      // easeOutCubic: 1 - Math.pow(1 - t, 3)
      const easing = 1 - Math.pow(1 - percentage, 3); 
      const currentCount = Math.floor(easing * target);

      setCount(currentCount);

      if (progress < duration) {
        animationFrameId = requestAnimationFrame(animate);
      } else {
        setCount(target);
      }
    };

    animationFrameId = requestAnimationFrame(animate);

    return () => {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }
    };
  }, [hasStarted, target, duration]);

  if (!match && typeof value !== 'number') {
    return <span>{value}</span>;
  }

  return (
    <span ref={elementRef}>
      {prefix}
      {count}
      {suffix}
    </span>
  );
}

    const prev = new WeakMap();
    const DAMP = 0.18;
    const MAX_PUSH = 70;
    const DECO_MAX_PUSH = 50;

    let animationFrameId;

    function tick() {
      const decoRects = decos.map(d => {
        const r = d.getBoundingClientRect();
        return { cx: r.left + r.width / 2, cy: r.top + r.height / 2, rx: r.width / 2, ry: r.height / 2 };

      });

      tiles.forEach((tile, i) => {
        const tc = tileRects[i];
        if (!tc) return;
        let tx = 0, ty = 0;
        for (const d of decoRects) {
          const dx = tc.cx - d.cx;
          const dy = tc.cy - d.cy;
          const dist = Math.hypot(dx, dy);
          const minDist = Math.hypot(tc.rx + d.rx, tc.ry + d.ry) * 0.6 + 20;
          if (dist < minDist && dist > 0.5) {
            const force = Math.min((minDist - dist) / minDist, 0.85);
            const f = force * MAX_PUSH;
            tx += (dx / dist) * f;
            ty += (dy / dist) * f;
          }
        }
        const p = prev.get(tile) || { x: 0, y: 0 };
        const nx = p.x + (tx - p.x) * DAMP;
        const ny = p.y + (ty - p.y) * DAMP;
        prev.set(tile, { x: nx, y: ny });
        tile.style.setProperty('--push-x', nx.toFixed(2) + 'px');

          const dx = dc.cx - tc.cx;
          const dy = dc.cy - tc.cy;
          const dist = Math.hypot(dx, dy);
          const minDist = Math.hypot(dc.rx + tc.rx, dc.ry + tc.ry) * 0.6 + 20;
          if (dist < minDist && dist > 0.5) {
            const force = Math.min((minDist - dist) / minDist, 0.85);
            const f = force * DECO_MAX_PUSH;
            tx += (dx / dist) * f;
            ty += (dy / dist) * f;
          }

        const p = prev.get(deco) || { x: 0, y: 0 };
        const nx = p.x + (tx - p.x) * DAMP;
        const ny = p.y + (ty - p.y) * DAMP;

        deco.style.setProperty('--push-x', nx.toFixed(2) + 'px');
        deco.style.setProperty('--push-y', ny.toFixed(2) + 'px');
      });

  const [scoreboardSearch, setScoreboardSearch] = useState('');

  const sortedTeams = [...teams].sort((a,b)=>{
    const sa=(a.scores?.r1||0)+(a.scores?.r2||0)+(a.scores?.r3||0);
    const sb=(b.scores?.r1||0)+(b.scores?.r2||0)+(b.scores?.r3||0);
    return sb-sa;
  });
  const filtered = sortedTeams.filter(t=>!scoreboardSearch||t.name.toLowerCase().includes(scoreboardSearch.toLowerCase())||t.subTheme?.toLowerCase().includes(scoreboardSearch.toLowerCase()));
  const scoreTotalPages = Math.max(1, Math.ceil(filtered.length / SCOREBOARD_PAGE_SIZE));
  const scorePage = Math.min(scoreboardPage, scoreTotalPages);
  const scoreSlice = filtered.slice((scorePage - 1) * SCOREBOARD_PAGE_SIZE, scorePage * SCOREBOARD_PAGE_SIZE);

          />
        </div>
      </div>

      {/* Heading */}
      <div style={{marginBottom:'28px'}}>
        <p style={{fontSize:'11px',fontWeight:600,color:'rgba(255,255,255,0.35)',fontFamily:'monospace',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:'6px'}}>Myntra Tech Week 2026</p>
        <h1 style={{fontSize:'clamp(28px,5vw,42px)',fontWeight:900,color:'#fff',letterSpacing:'-0.03em',lineHeight:1.05,margin:0}}>

        <p style={{fontSize:'13px',color:'rgba(255,255,255,0.38)',marginTop:'6px',fontFamily:'monospace'}}>{sortedTeams.length} teams ranked · R2 &amp; R3 scores pending</p>
      </div>

      {/* Table */}
      <div style={{border:'1px solid rgba(255,255,255,0.07)',borderRadius:'12px',overflow:'hidden',marginBottom:'24px'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:'560px'}}>

                        {s[r]!=null?<span style={{fontSize:'13px',fontWeight:700,color:'rgba(255,255,255,0.85)'}}>{s[r]}</span>:<span style={{fontSize:'12px',color:'rgba(255,255,255,0.2)'}}>—</span>}

                    <td style={{padding:'12px 16px',textAlign:'center'}}><span style={{fontSize:'14px',fontWeight:900,color:isFirst?'#FF3F6C':isSecond?'#AE33FF':isThird?'#F59E0B':'rgba(255,255,255,0.85)'}}>{total||'—'}</span></td>

              )}

          </table>
        </div>
      </div>

      <AdminPager page={scorePage} setPage={setScoreboardPage} total={filtered.length} pageSize={SCOREBOARD_PAGE_SIZE} label="teams" />

      {/* Bottom: caption + back button bottom-right */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px',marginTop:'16px'}}>
        <p style={{fontSize:'11px',color:'rgba(255,255,255,0.3)',fontFamily:'monospace'}}>R2 and R3 scores pending · Live updates during evaluation rounds.</p>
        {backBtn('bottom')}
      </div>
    </div>
  );
}

function RegisterView({ user, setTeams, teams=[], ideas=[], setIdeas=()=>{}, toast, onLoginOpen, userTeam, pubResults, editTeamMode, setEditTeamMode, setView }) {
  const [step, setStep]   = useState(1);
  const [done, setDone]   = useState(false);
  const [edit, setEdit]   = useState(false);
  const [agree, setAgree] = useState(false);
  const [teamId]          = useState(`HR-2026-${Math.floor(1000+Math.random()*9000)}`);
  const [err, setErr]     = useState({});

  const makeBlank = u => ({
    teamName:'', theme:'', subTheme:'', abstract:'', pickedIdeaId:'',
    genaiModel:'', otherAccess:'', skillsNeeded:[], rolesNeeded:[], teamMode: 'create',
    isOpen: true,
    members:[{ name:u?.name||'', email:u?.email||'', dept:u?.dept||'', role:'Team Lead' }]
  });
  const [form, setForm] = useState(makeBlank(user));

  useEffect(()=>{
    if (userTeam) {
      setForm({
        teamName:userTeam.name, theme:userTeam.theme, subTheme:userTeam.subTheme, abstract:userTeam.abstract, pickedIdeaId:userTeam.pickedIdeaId||'',
        genaiModel:userTeam.otherAccess ? '__other__' : (userTeam.genaiModel||''), otherAccess:userTeam.otherAccess||'', skillsNeeded:userTeam.skillsNeeded||[], rolesNeeded:userTeam.rolesNeeded||[],
        isOpen: userTeam.open !== false,
        members: userTeam.leadName
          ? [{ name: userTeam.leadName, email: user?.email||'', dept: userTeam.leadDept, role:'Team Lead' }]
          : makeBlank(user).members
      });

      if (editTeamMode) {
        setDone(false);
        setStep(1);
        setAgree(true);
      } else {
        setDone(true);
      }
    } else if (user) {
      setForm(makeBlank(user));
      setStep(1); setDone(false); setErr({}); setAgree(false);
    }
  }, [user?.id, userTeam?.id, editTeamMode]);

  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  // Free the previously-picked idea and mark the newly-picked one as taken by this team
  const syncPickedIdea = (teamRef, prevId, nextId) => {
    if (prevId === nextId) return;
    setIdeas(p=>p.map(i=>{
      if (prevId && i.id===prevId) return { ...i, pickedBy:null };
      if (nextId && i.id===nextId) return { ...i, pickedBy:teamRef };
      return i;
    }));
  };
  const sm = (i,k,v) => setForm(f=>({...f,members:f.members.map((m,j)=>j===i?{...m,[k]:v}:m)}));
  const addMember = () => setForm(f=>({...f,members:[...f.members,{name:'',email:'',dept:'',role:'Member'}]}));
  const rmMember  = i  => setForm(f=>({...f,members:f.members.filter((_,j)=>j!==i)}));

  const v1 = () => {
    const e={};
    if (!form.teamName.trim()) e.teamName='Team name is required';
    else if (form.teamName.length < 3) e.teamName='Minimum 3 characters';
    else if (form.teamName.length > CARD_LIMITS.teamName) e.teamName=`Maximum ${CARD_LIMITS.teamName} characters`;
    if (!form.theme)           e.theme='Please select a theme';
    if (!form.subTheme.trim()) e.subTheme='Sub-theme / problem title is required';
    else if (form.subTheme.length > CARD_LIMITS.teamSubTheme) e.subTheme=`Maximum ${CARD_LIMITS.teamSubTheme} characters`;
    if (form.abstract.length > CARD_LIMITS.teamAbstract) e.abstract=`Maximum ${CARD_LIMITS.teamAbstract} characters`;
    setErr(e); return !Object.keys(e).length;
  };
  const v2 = () => {
    const e = {};
    if (form.skillsNeeded.length === 0) {
      e.skills = 'Select at least one skillset you are seeking';
    }
    setErr(e); return !Object.keys(e).length;
  };
  const submit = () => {
    if (!agree) { toast('Please agree to the participation terms.','error'); return; }
    const isOpen = true;
    if (userTeam) {
      setTeams(p=>p.map(t => t.id === userTeam.id ? {
        ...t,
        name:form.teamName, theme:form.theme, subTheme:form.subTheme,
        abstract:form.abstract, genaiModel:form.genaiModel === '__other__' ? '' : form.genaiModel, otherAccess:form.otherAccess,
        pickedIdeaId:form.pickedIdeaId||null,
        maxSize: t.maxSize || TEAM_MAX_SIZE,
        open:isOpen, missing:isOpen?['recruiting']:[],
        skillsNeeded:form.skillsNeeded, rolesNeeded:form.rolesNeeded||[],
        leadName:form.members[0]?.name, leadDept:form.members[0]?.dept,
      } : t));
      syncPickedIdea(userTeam.id, userTeam.pickedIdeaId, form.pickedIdeaId);
      toast('Team updated successfully!','success');
    } else {
      setTeams(p=>[...p,{
        id:teamId, name:form.teamName, theme:form.theme, subTheme:form.subTheme,
        abstract:form.abstract, genaiModel:form.genaiModel === '__other__' ? '' : form.genaiModel, otherAccess:form.otherAccess,
        pickedIdeaId:form.pickedIdeaId||null,
        members:[user.id], maxSize:TEAM_MAX_SIZE,
        open:isOpen, missing:isOpen?['recruiting']:[],
        depts:[form.members[0]?.dept],
        skillsNeeded:form.skillsNeeded, rolesNeeded:form.rolesNeeded||[],
        leadName:form.members[0]?.name, leadDept:form.members[0]?.dept,
        scores:{r1:null,r2:null,r3:null}
      }]);
      syncPickedIdea(teamId, null, form.pickedIdeaId);
      toast('Team registered successfully!','success');
    }
    
    if (editTeamMode && setEditTeamMode && setView) {
      setEditTeamMode(false);
      setView('teams');
    } else {
      setDone(true);
    }
  };

  /* ── NOT SIGNED IN: gate ── */
  if (!user) return (
    <div className="register-gate max-w-[700px] mx-auto fade-up mt-4 md:mt-8 flex flex-col md:min-h-[400px] relative md:justify-center items-center">
      {/* Subtle Mesh Background & Dot Grid */}
      <div className="absolute inset-0 dot-grid pointer-events-none opacity-40"></div>
      <div className="absolute top-[-100px] right-[-100px] w-80 h-80 rounded-full bg-[color:var(--accent-tint)] opacity-40 filter blur-[80px] pointer-events-none"></div>
      <div className="absolute bottom-[-120px] left-[-120px] w-96 h-96 rounded-full bg-[color:var(--c-purple-tint)] opacity-30 filter blur-[90px] pointer-events-none"></div>
      
      <div className="register-gate-content relative z-10 w-full p-6 lg:p-10 flex flex-col justify-center items-center text-center md:my-auto">
        <span className="eyebrow text-[10px] text-[color:var(--mute-2)] mb-6 block">Tech Week 2026</span>
        <h2 className="h-display text-5xl lg:text-6xl text-[color:var(--ink)] mb-6" style={{lineHeight: 1.05}}>
          Jump the <em className="gradient-text">ramp.</em>
        </h2>
        <p className="text-[14px] text-[color:var(--mute-2)] mb-10 leading-relaxed max-w-[420px] font-medium">
          Sign in with your <strong className="text-[color:var(--ink)]">@myntra.com</strong> Google account. Your department is auto-mapped — no form filling required.
        </p>

        <button onClick={onLoginOpen}
          className="g-btn inline-flex items-center justify-center gap-2.5 px-10 py-4 font-bold rounded-[8px] transition-all duration-300 group"
          style={{fontSize:'13px', letterSpacing:'0.01em'}}>
