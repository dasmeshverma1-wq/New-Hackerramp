function CalendarView() {
  const TIMELINE = HACKATHON_CALENDAR;

  const typeStyles = {
    'Milestone':    { gradient:'linear-gradient(135deg,#1e0a5e 0%,#4f1fb5 60%,#7c3aed 100%)', cls:'text-white shadow-[0_8px_30px_rgba(79,31,181,0.30)]',                              badge:'bg-white/10 text-white border-white/15',           time:'bg-white/10 text-white border-white/15' },
    'Session':      { gradient:'linear-gradient(135deg,#002040 0%,#0069a8 60%,#00b4d8 100%)', cls:'text-white shadow-[0_8px_30px_rgba(0,105,168,0.30)]',                              badge:'bg-white/10 text-white border-white/15',           time:'bg-white/10 text-white border-white/15' },
    'Deadline':     { gradient:'linear-gradient(135deg,#3d0018 0%,#9b0040 60%,#ff1f6c 100%)', cls:'text-white shadow-[0_8px_30px_rgba(155,0,64,0.30)]',                               badge:'bg-white/10 text-white border-white/15',           time:'bg-white/10 text-white border-white/15' },
    'Round':        { gradient:'linear-gradient(135deg,#002020 0%,#005050 60%,#00a0a0 100%)', cls:'text-white shadow-[0_8px_30px_rgba(0,80,80,0.30)]',                                badge:'bg-white/10 text-white border-white/15',           time:'bg-white/10 text-white border-white/15' },
    'Announcement': { gradient:'linear-gradient(135deg,#230055 0%,#6d10cc 60%,#ae33ff 100%)', cls:'text-white shadow-[0_8px_30px_rgba(109,16,204,0.30)]',                            badge:'bg-white/10 text-white border-white/15',           time:'bg-white/10 text-white border-white/15' },
    'Pause':        { gradient:'linear-gradient(135deg,#1a1830 0%,#2d2845 100%)',              cls:'text-white shadow-[0_8px_30px_rgba(0,0,0,0.25)]',                                  badge:'bg-white/10 text-white/70 border-white/10',        time:'bg-white/10 text-white/70 border-white/10' },
    'Finale':       { gradient:'linear-gradient(135deg,#1a0840 0%,#4f1fb5 50%,#ae33ff 100%)', cls:'text-white shadow-[0_16px_36px_rgba(174,51,255,0.35)] relative overflow-hidden',  badge:'bg-[#e2f73c] text-[#0f0f10] border-[#e2f73c]/20', time:'bg-white/10 text-white border-white/10' },
  };

  const meetLinkClass = (type) => {
    if (type === 'Finale') return 'bg-[#e2f73c] text-[#0f0f10] hover:bg-[#d0e530] shadow-[0_4px_14px_rgba(226,247,60,0.25)]';
    if (type === 'Session' || type === 'Round' || type === 'Announcement') return 'bg-black/45 text-white border border-white/20 hover:bg-black/60 backdrop-blur-sm';
    return 'bg-white/15 text-white border border-white/25 hover:bg-white/25 backdrop-blur-sm';
  };

  const livePhase = SCHEDULE.find(s => s.status === 'live');

  return (
    <div className="mkt-page space-y-3 md:space-y-8 fade-up">
      <PageIntro
        className="w-full"
        compactOnMobile
        eyebrow="Agenda"
        title={<>31 Days of <em className="gradient-text font-serif italic normal-case tracking-normal">hustle.</em></>}
        description="From registration through HackerRamp finale to Women in Tech — every key session, deadline, and milestone on one timeline."
      />

      <div className="max-w-[900px] mx-auto space-y-6 md:space-y-10 min-w-0">
        <div className="border border-white/10 rounded-[16px] md:rounded-[20px] overflow-hidden shadow-[0_4px_30px_rgba(0,0,0,0.25)]" style={{background:'#14122E'}}>
          <div className="agenda-page-phase__header px-6 py-4 border-b border-white/10 flex items-center justify-between" style={{background:'rgba(255,255,255,0.04)'}}>
            <p className="text-[10px] font-mono text-white/40 uppercase tracking-[0.16em] font-[900]">Phase Timeline</p>
            {livePhase && (
              <span className="inline-flex items-center gap-1.5 text-[10px] font-[800] text-[#6ee7b7] uppercase tracking-wide">
                <span className="relative flex h-1.5 w-1.5">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#22c55e] opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#22c55e]"></span>
                </span>
                {livePhase.label} Live
              </span>
            )}
          </div>
          <div className="agenda-page-phase__strip flex overflow-x-auto hide-scrollbar rounded-b-[16px] md:rounded-b-[20px] -mx-px">
            {SCHEDULE.map((s) => {
              const isLive = s.status === 'live';
              return (
                <div key={s.phase} className="flex items-stretch flex-shrink-0" style={{minWidth:'175px', flex:'1'}}>
                  <div
                    style={isLive ? {background:'linear-gradient(135deg,#1e0a5e,#4f1fb5,#7c3aed)'} : {}}
                    className={`flex-1 flex flex-col px-6 py-5 border-r border-white/10 last:border-r-0 transition-all duration-300 ${isLive ? 'text-white shadow-inner' : 'bg-white/[0.03] text-white hover:bg-white/[0.06]'}`}
                  >
                    <div className="flex items-start justify-between mb-4">
                      <span className={`text-[9px] font-mono font-[900] uppercase tracking-wider px-2 py-0.5 rounded-[6px] border ${isLive ? 'border-white/20 text-white bg-white/10' : 'border-white/15 text-white/60 bg-white/[0.06]'}`}>
                        {s.phase}
                      </span>
                      {isLive && (
                        <span className="relative flex h-2 w-2 mt-1.5 flex-shrink-0">
                          <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#e2f73c] opacity-75"></span>
                          <span className="relative inline-flex rounded-full h-2 w-2 bg-[#e2f73c]"></span>
                        </span>
                      )}
                    </div>
                    <p className="text-[13.5px] font-[900] leading-snug mb-1.5 text-white">{s.label}</p>
                    <p className={`text-[11px] font-bold mt-auto ${isLive ? 'text-white/70' : 'text-white/50'}`}>{s.start} – {s.end}</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="agenda-page-timeline agenda-timeline ml-4 md:ml-[140px] space-y-6 md:space-y-8">
          {TIMELINE.map((item, i) => {
            const style = typeStyles[item.type] || typeStyles['Session'];

            return (
              <div key={i} className="agenda-timeline-item relative pl-8 md:pl-12 group">
                <div className="absolute left-[-9px] top-1.5 z-[1]">
                  {item.isLive ? (
                    <span className="relative flex h-[18px] w-[18px]">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00E5FF] opacity-75"></span>
                      <span className="agenda-timeline-dot agenda-timeline-dot--live relative inline-flex rounded-full" />
                    </span>
                  ) : (
                    <div className="agenda-timeline-dot" />
                  )}
                </div>

                <div className="hidden md:block absolute left-[-140px] top-0 w-[120px] text-right pr-6">
                  <p className={`text-[18px] font-sans font-[950] tracking-tight leading-none ${item.isLive ? 'text-[color:var(--accent)]' : 'text-white'}`}>{item.date}</p>
                  <p className="text-[10px] font-[800] text-white/40 uppercase tracking-[0.18em] mt-1.5">{item.day}</p>
                </div>

                <div className="md:hidden mb-2.5">
                  <span className={`text-[11px] font-bold font-mono tracking-wide px-2.5 py-1 rounded-[6px] border ${item.isLive ? 'bg-[color:var(--accent)]/15 text-[color:var(--accent)] border-[color:var(--accent)]/30' : 'bg-white/[0.08] text-white/60 border-white/10'}`}>
                    {item.date} · {item.day}

                </div>

                <div style={{ background: style.gradient }} className={`p-6 rounded-[20px] hover:-translate-y-1.5 transition-all duration-300 flex flex-col sm:flex-row sm:items-start justify-between gap-5 ${style.cls}`}>
                  <div className="flex-1">
                    <div className="flex items-center gap-2.5 mb-2.5 flex-wrap">
                      <p className="text-[18px] sm:text-[20px] font-[950] tracking-tight leading-tight">{item.title}</p>
                      {item.isLive && (
                        <span className="px-2 py-0.5 bg-red-500 text-white text-[8px] font-sans font-[900] uppercase tracking-[0.16em] rounded-[6px] inline-flex items-center gap-1.5">
                          <span className="w-1.5 h-1.5 bg-white rounded-full live-dot animate-pulse"></span>
                          Live Now
                        </span>
                      )}
                    </div>
                    {item.desc && <p className="text-[13.5px] leading-relaxed font-semibold text-white/85">{item.desc}</p>}
                    {item.meetLink && (
                      <a
                        href={item.meetLink}
                        target="_blank"
                        rel="noopener noreferrer"
                        className={`mt-3.5 inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-[11.5px] font-[900] tracking-wide transition-all shadow-sm ${meetLinkClass(item.type)}`}
                      >
                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" />
                        </svg>
                        Join Live Meet
                      </a>
                    )}

function TeamAddPicker({ teams, excludeIds = [], q, setQ, page, setPage, pageSize = 50, onAdd, placeholder = 'Select a team to add...', optionLabel }) {

  );
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));

function AdminPager({ page, setPage, total, pageSize, label = 'items' }) {
  const totalPages = Math.max(1, Math.ceil(Math.max(total, 0) / pageSize) || 1);
  const safePage = Math.min(Math.max(1, page), totalPages);
  const start = total === 0 ? 0 : (safePage - 1) * pageSize + 1;
  const end = total === 0 ? 0 : Math.min(safePage * pageSize, total);
  const pageNums = (() => {
    if (totalPages <= 5) return Array.from({ length: totalPages }, (_, i) => i + 1);
    const startP = Math.max(1, Math.min(safePage - 2, totalPages - 4));
    return Array.from({ length: 5 }, (_, i) => startP + i).filter(p => p <= totalPages);
  })();
  return (
    <div className="admin-pager">
      <p className="admin-pager-meta">
        {total === 0 ? `0 ${label}` : `Showing ${start}–${end} of ${total} ${label}`}
        {' · '}Page {safePage} of {totalPages}
      </p>
      <div className="admin-pager-btns">
        <button type="button" className="admin-pager-btn btn" onClick={() => setPage(1)} disabled={safePage === 1 || total === 0}>«</button>
        <button type="button" className="admin-pager-btn btn" onClick={() => setPage(p => Math.max(1, p - 1))} disabled={safePage === 1 || total === 0}>‹</button>
        {pageNums.map(p => (
          <button key={p} type="button" className={`admin-pager-btn btn ${p === safePage ? 'admin-pager-btn--active' : ''}`} onClick={() => setPage(p)} disabled={total === 0}>{p}</button>
        ))}
        <button type="button" className="admin-pager-btn btn" onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={safePage === totalPages || total === 0}>›</button>
        <button type="button" className="admin-pager-btn btn" onClick={() => setPage(totalPages)} disabled={safePage === totalPages || total === 0}>»</button>
      </div>
    </div>
  );
}

    setEditTeamId(null);
    toast('Team updated.', 'success');
  };

  const addMemberToTeam = (teamId, userId) => {
    if (!userId) { toast('Select a participant first.', 'error'); return; }
    const team = teams.find(t => t.id === teamId);
    const nu = (allUsers||[]).find(u => u.id === userId);
    if (!team || !nu) return;
    if (team.members.includes(userId)) { toast('Already on this team.', 'info'); return; }
    if (team.members.length >= teamCap(team)) {
      toast(`Team is at capacity (${teamCap(team)} members).`, 'error');
      return;
    }
    const existingTeam = teams.find(t => t.id !== teamId && (t.members||[]).includes(userId));
    if (existingTeam) {
      askConfirm({
        title: 'Move member to this team?',
        message: `${nu.name} is currently on "${existingTeam.name}". They will be removed from that team and added to "${team.name}".`,
        confirmLabel: 'Move member',
        variant: 'accent',
        onConfirm: () => {
      setTeams(p => p.map(t => {
        if (t.id === existingTeam.id) {
          const idx = t.members.indexOf(userId);
          const nextMembers = t.members.filter(m => m !== userId);
          const nextDepts = (t.depts||[]).filter((_, di) => di !== idx);
          return { ...t, members: nextMembers, depts: nextDepts, open: true };
        }
        if (t.id === teamId) {
          return { ...t, members: [...t.members, userId], depts: [...(t.depts||[]), nu.dept] };
        }
        return t;
      }));
      setJoinRequests(p => p.map(r =>
        r.userId === userId && r.status === 'pending'
          ? { ...r, status: 'accepted', resolvedAt: new Date().toISOString() }
          : r
      ));
      setAddMemberTeamId(null);
      setAddMemberUserId('');
      toast(`${nu.name.split(' ')[0]} added to ${team.name}.`, 'success');
        },
      });
      return;
    }
    setTeams(p => p.map(t => t.id === teamId
      ? { ...t, members: [...t.members, userId], depts: [...(t.depts||[]), nu.dept] }
      : t));
    setJoinRequests(p => p.map(r =>
      r.userId === userId && r.status === 'pending'
        ? { ...r, status: 'accepted', resolvedAt: new Date().toISOString() }
        : r
    ));
    setAddMemberTeamId(null);
    setAddMemberUserId('');
    toast(`${nu.name.split(' ')[0]} added to ${team.name}.`, 'success');
  };

  const removeTeamMember = (team, memberId, memberName, memberIndex) => {
    askConfirm({
      title: 'Remove team member?',
      message: `Remove ${memberName} from "${team.name}"? They can request to join another team.`,
      confirmLabel: 'Remove',
      variant: 'danger',
      onConfirm: () => {
        setTeams(p => p.map(x => x.id === team.id ? {
          ...x,
          members: x.members.filter(m => m !== memberId),
          depts: (x.depts || []).filter((_, di) => di !== memberIndex),
          open: true,
        } : x));
        toast('Member removed.', 'info');
      },
    });
  };

  const deleteTeam = (team) => {
    askConfirm({
      title: 'Delete team?',
      message: `Permanently delete "${team.name}"? All members will be unassigned and this cannot be undone.`,
      confirmLabel: 'Delete team',
      variant: 'danger',
      onConfirm: () => {
        setTeams(p => p.filter(x => x.id !== team.id));
        toast('Team deleted.', 'error');
      },
    });
  };

  const assignUserTeam = (userId, teamId) => {
    const nu = (allUsers||[]).find(u => u.id === userId);
    if (!nu) return;
    const prevTeam = teams.find(t => (t.members||[]).includes(userId));
    if (!teamId) {
      if (!prevTeam) return;
      setTeams(p => p.map(t => {
        if (t.id !== prevTeam.id) return t;
        const idx = t.members.indexOf(userId);
        return {
          ...t,
          members: t.members.filter(m => m !== userId),
          depts: (t.depts||[]).filter((_, di) => di !== idx),
          open: true,
        };
      }));
      toast(`${nu.name} removed from team.`, 'info');
      return;
    }
    const team = teams.find(t => t.id === teamId);
    if (!team) return;
    if (team.members.includes(userId)) return;
    if (team.members.length >= teamCap(team)) {
      toast(`"${team.name}" is at capacity.`, 'error');
      return;
    }
    setTeams(p => p.map(t => {
      if (prevTeam && t.id === prevTeam.id) {
        const idx = t.members.indexOf(userId);
        return {
          ...t,
          members: t.members.filter(m => m !== userId),
          depts: (t.depts||[]).filter((_, di) => di !== idx),
          open: true,
        };
      }
      if (t.id === teamId) {
        return { ...t, members: [...t.members, userId], depts: [...(t.depts||[]), nu.dept] };
      }
      return t;
    }));
    toast(`${nu.name} assigned to ${team.name}.`, 'success');
  };

  const updateUserRole = (u, newRole, judgeType) => {
    setAllUsers(p => p.map(x => {
      if (x.id !== u.id) return x;
      const next = { ...x, role: newRole };
      if (newRole === 'jury') next.judgeType = judgeType || x.judgeType || 'business';
      else delete next.judgeType;
      return next;
    }));
    toast(`${u.name}'s role updated to ${newRole}${newRole === 'jury' ? ` (${judgeType || 'business'})` : ''}.`, 'success');
  };

  const handleAdminJoinReq = (id, act) => {
    const reqObj = joinRequests.find(r => r.id === id);
    if (!reqObj) return;
    if (act === 'accepted') {
      const team = teams.find(t => t.id === reqObj.teamId);
      if (!team) { toast('Team not found.', 'error'); return; }
      if (team.members.length >= teamCap(team)) {
        toast(`Team is at full capacity (${teamCap(team)} members).`, 'error');
        return;
      }
      const existingTeam = teams.find(t => t.id !== team.id && (t.members||[]).includes(reqObj.userId));
      if (existingTeam) {
        toast(`${reqObj.userName} is already on "${existingTeam.name}".`, 'error');
        return;
      }
      setTeams(p => p.map(t => t.id === reqObj.teamId ? {
        ...t,
        members: t.members.includes(reqObj.userId) ? t.members : [...t.members, reqObj.userId],
        depts: [...(t.depts||[]), reqObj.userDept],
      } : t));
      setJoinRequests(p => p.map(r => {
        if (r.id === id) return { ...r, status: 'accepted', resolvedAt: new Date().toISOString() };
        if (r.userId === reqObj.userId && r.status === 'pending') return { ...r, status: 'declined', resolvedAt: new Date().toISOString() };
        return r;
      }));
      toast(`✓ ${reqObj.userName} added to ${reqObj.teamName}.`, 'success');
    } else {
      setJoinRequests(p => p.map(r => r.id === id ? { ...r, status: act, resolvedAt: new Date().toISOString() } : r));
      toast('Request declined.', 'info');
    }
  };

  const switchSection = id => {
    setSection(id);
    if (id==='judging')    setJTab(isJury ? 'scoring' : 'panels');
    if (id==='content')    setCTab('hero');
    if (id==='management') setMTab('teams');
  };

  return (
    <div className="space-y-5 admin-workspace">
      {/* Sleek single-row dashboard header */}
      <div className="flex items-center justify-between border-b border-[color:var(--line-2)] pb-4 mb-4 flex-wrap gap-4">
        <div>
          <span className="text-[10px] font-sans font-[900] uppercase tracking-[0.2em] text-[#FF3F6C]">
            {isJury ? 'Jury Workspace' : 'Systems Control'}
          </span>
          <h2 className="text-[20px] font-[900] text-[color:var(--ink)] tracking-tight">
            Hello, <span className="font-serif italic text-[#FF3F6C]">{user.name.split(' ')[0]}</span>
          </h2>
        </div>

        {/* Dynamic mini indicators */}
        <div className="flex items-center gap-6">
          {!isJury ? (
            <>
              <div>
                <p className="text-[10px] font-mono uppercase tracking-widest text-[color:var(--mute-3)]">Teams</p>
                <p className="text-[16px] font-[900] text-[color:var(--ink)] text-right">{teams.length}</p>
              </div>
              <div className="w-px h-6 bg-[color:var(--line-2)]" />
              <div>
                <p className="text-[10px] font-mono uppercase tracking-widest text-[color:var(--mute-3)]">Pending Ideas</p>
                <p className="text-[16px] font-[900] text-[#f59e0b] text-right">{pendingIdeasCount}</p>
              </div>
              <div className="w-px h-6 bg-[color:var(--line-2)]" />
              <div>
                <p className="text-[10px] font-mono uppercase tracking-widest text-[color:var(--mute-3)]">Join Requests</p>
                <p className="text-[16px] font-[900] text-[#FF3F6C] text-right">{pendingJoinCount}</p>
              </div>
            </>
          ) : (
            <>
              <div>
                <p className="text-[10px] font-mono uppercase tracking-widest text-[color:var(--mute-3)]">Teams to Judge</p>
                <p className="text-[16px] font-[900] text-[color:var(--ink)] text-right">{juryTeamIds.length}</p>
              </div>
              <div className="w-px h-6 bg-[color:var(--line-2)]" />
              <div>
                <p className="text-[10px] font-mono uppercase tracking-widest text-[color:var(--mute-3)]">Submitted</p>
                <p className="text-[16px] font-[900] text-[#22c55e] text-right">{jurySubmittedCount}/{juryTeamIds.length}</p>
              </div>
              <div className="w-px h-6 bg-[color:var(--line-2)]" />
              <div>
                <p className="text-[10px] font-mono uppercase tracking-widest text-[color:var(--mute-3)]">Panels</p>
                <p className="text-[16px] font-[900] text-[color:var(--ink)] text-right">{myAllPanels.length}</p>
              </div>
            </>
          )}
        </div>
      </div>

      {/* Section switcher — premium editorial tabs (jury sees only Overview and Judging) */}
      <div className="flex border-b border-[color:var(--line-2)] gap-6 mb-4">
        {(isJury
          ? [['overview','Overview'],['judging','Judging']]
          : [['overview','Overview'],['judging','Judging'],['content','Content'],['management','Management']]
        ).map(([id,label])=>(
          <button key={id} onClick={()=>switchSection(id)}
            className={`pb-3 text-[13px] font-[800] uppercase tracking-[0.1em] btn transition-all duration-200 border-b-2 ${section===id
              ? 'border-[#FF3F6C] text-[#FF3F6C]'
              : 'border-transparent text-[color:var(--mute-2)] hover:text-[color:var(--ink)]'}`}>
            <span>{label}</span>
          </button>
        ))}
      </div>

      {/* ══════════ SECTION: OVERVIEW ══════════ */}
      {section === 'overview' && (
        <div className="space-y-6 fade-up">

          {/* Stat cards row */}
          <div className={`grid grid-cols-2 sm:grid-cols-3 ${isJury ? 'lg:grid-cols-4' : 'lg:grid-cols-6'} gap-4`}>
            {(isJury ? [
              { label:'Assigned Panels', val: myAllPanels.length, suffix: null, accent:'#AE33FF' },
              { label:`Teams · ${activeRound}`, val: juryTeamIds.length, suffix: null, accent:'#00E5FF' },
              { label:'Scores Submitted', val: jurySubmittedCount, suffix: `/${juryTeamIds.length}`, accent:'#22c55e' },
              { label:'Active Round', val: activeRound, suffix: null, accent:'#FF3F6C' },
            ] : [
              { label:'Open Teams', val: teams.filter(t=>t.open).length, suffix: `/${teams.length}`, accent:'#3b82f6' },
              { label:'Ideas Total', val: (ideas||[]).length, suffix: null, accent:'#f59e0b' },
              { label:'Pending Ideas', val: pendingIdeasCount, suffix: null, accent:'#f97316' },
              { label:'Join Requests', val: pendingJoinCount, suffix: null, accent:'#FF3F6C' },
              { label:'Panels Incomplete', val: incompletePanelCount, suffix: `/${panels.length}`, accent:'#8b5cf6' },
              { label:'Scored R1', val: r1ScoredCount, suffix: `/${teams.length}`, accent:'#ec4899' },
            ]).map(s => (
              <div key={s.label} className="admin-stat-card">
                <p className="text-[10px] font-[800] uppercase tracking-[0.1em] text-[color:var(--mute-3)]">{s.label}</p>
                <p className="admin-stat-value mt-2" style={{ color: s.accent }}>{s.val}{s.suffix && <span className="text-[13px] font-[500] text-[color:var(--mute-3)]">{s.suffix}</span>}</p>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {isJury ? (
              <div className="lg:col-span-3 admin-panel-card p-6">
                <p className="text-[10px] font-sans font-[900] uppercase tracking-[0.2em] text-[color:var(--mute-3)] mb-4">Your panel assignments</p>
                {myAllPanels.length === 0 ? (
                  <p className="text-[12px] text-[color:var(--mute-4)] py-6 text-center">No panels assigned yet. Contact a coordinator.</p>
                ) : (
                  <div className="space-y-3">
                    {['R1','R2','R3'].map(round => {
                      const roundPanels = myAllPanels.filter(p => p.round === round);
                      if (!roundPanels.length) return null;
                      const state = juryRoundState(round, activeRound);
                      return (
                        <div key={round} className="p-4 rounded-[10px] border border-[color:var(--line-2)] bg-[color:var(--paper)]">
                          <div className="flex items-center justify-between gap-3 mb-3 flex-wrap">
                            <div className="flex items-center gap-2">
                              <span className="text-[12px] font-[900] text-[color:var(--ink)]">{ROUND_LABELS[round]}</span>
                              <span className={`text-[9px] font-[800] uppercase px-2 py-0.5 rounded-full ${state==='active'?'bg-[#FF3F6C]/15 text-[#FF3F6C]':state==='complete'?'bg-emerald-500/15 text-emerald-400':'bg-white/8 text-[color:var(--mute-3)]'}`}>
                                {state === 'active' ? 'Scoring open' : state === 'complete' ? 'Complete' : 'Locked'}
                              </span>
                            </div>
                            {state === 'active' && (
                              <button onClick={()=>{ setJuryViewRound(round); switchSection('judging'); }} className="text-[10px] font-[800] text-[#FF3F6C] btn hover:underline uppercase tracking-wider">Open scoring desk →</button>
                            )}
                          </div>
                          <div className="grid sm:grid-cols-2 gap-3">
                            {roundPanels.map(panel => {
                              const panelTeams = teams.filter(t => panel.teamIds.includes(t.id));
                              const submitted = panel.teamIds.filter(tid => judgeScores.some(s => s.panelId === panel.id && s.teamId === tid && s.judgeId === user?.id && !s.isDraft)).length;
                              return (
                                <div key={panel.id} className="p-3 rounded-[8px] border border-[color:var(--line)]">
                                  <p className="text-[13px] font-[800] text-[color:var(--ink)]">{panel.name}</p>
                                  <p className="text-[11px] text-[color:var(--mute-3)] mt-1">{panelTeams.map(t => t.name).join(' · ') || 'No teams'}</p>
                                  <p className="text-[10px] font-mono text-[color:var(--mute-4)] mt-2">{submitted}/{panel.teamIds.length} submitted</p>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ) : (
              <>
                <div className="lg:col-span-2 admin-panel-card p-6">
                  <div className="admin-panel-head">
                    <p className="admin-panel-title">Event lifecycle</p>
                    <button type="button" onClick={() => switchSection('content')} className="admin-panel-link btn">Edit schedule →</button>
                  </div>
                  <div className="admin-lifecycle">
                    {lifecyclePhases.map((s) => (
                      <div key={s.phase} className="admin-lifecycle-item">
                        <span className={`admin-lifecycle-dot ${s.status==='active'?'admin-lifecycle-dot--active':s.status==='completed'?'admin-lifecycle-dot--done':'admin-lifecycle-dot--upcoming'}`} />
                        <div className={`admin-lifecycle-card ${s.status==='active'?'admin-lifecycle-card--active':s.status==='completed'?'admin-lifecycle-card--done':''}`}>
                          <div className="flex items-center gap-2 flex-wrap">
                            <p className={`text-[13px] font-[800] ${s.status==='active'?'text-[#fda4af]':s.status==='completed'?'text-emerald-300':'text-[color:var(--ink)]'}`}>{s.phase}</p>
                            {s.status==='active' && <span className="admin-lifecycle-badge admin-lifecycle-badge--live">Live</span>}
                            {s.status==='completed' && <span className="admin-lifecycle-badge admin-lifecycle-badge--done">Done</span>}
                          </div>
                          <p className="text-[10px] font-mono text-[color:var(--mute-3)] mt-1">{s.date}</p>
                          <p className="text-[11.5px] text-[color:var(--mute-2)] mt-2 leading-relaxed">{s.desc}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="space-y-4">
                  <div className="admin-panel-card p-6">
                    <div className="admin-panel-head !mb-4">
                      <p className="admin-panel-title">Standings</p>
                      <button type="button" onClick={()=>switchSection('judging')} className="admin-panel-link btn">Judging →</button>
                    </div>
                    {ranked.filter(t => teamScoreTotal(t) > 0).length === 0 ? (
                      <p className="text-[12px] text-[color:var(--mute-4)] py-10 text-center border border-dashed border-white/10 rounded-[8px]">No published scores yet.</p>
                    ) : (
                      <div className="space-y-2">
                        {ranked.filter(t => teamScoreTotal(t) > 0).slice(0, 4).map((t, i) => (
                          <div key={t.id} className="admin-standing-row">
                            <span className={`admin-standing-rank ${i===0?'admin-standing-rank--1':''}`}>{i + 1}</span>
                            <div className="flex-1 min-w-0">
                              <p className="text-[13px] font-[800] text-[color:var(--ink)] truncate">{t.name}</p>
                              <p className="text-[10px] text-[color:var(--mute-3)] truncate">{t.theme}</p>
                            </div>
                            <span className="text-[15px] font-[900] text-[#FF3F6C] tabular-nums">{teamScoreAvg(t)}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="admin-panel-card p-6">
                    <div className="admin-panel-head !mb-4">
                      <p className="admin-panel-title">Needs attention</p>
                    </div>
                    <div className="space-y-2">
                      {pendingIdeasCount > 0 && (
                        <button type="button" onClick={()=>{switchSection('management');setMTab('approvals');}} className="admin-attention-item btn">
                          <span className="admin-attention-dot" style={{background:'#f97316'}} />
                          <p className="text-[11.5px] text-[color:var(--mute-1)]"><span className="font-[800] text-[color:var(--ink)]">{pendingIdeasCount} idea{pendingIdeasCount>1?'s':''}</span> awaiting approval</p>
                        </button>
                      )}
                      {pendingJoinCount > 0 && (
                        <button type="button" onClick={()=>{switchSection('management');setMTab('requests');}} className="admin-attention-item btn">
                          <span className="admin-attention-dot" style={{background:'#FF3F6C'}} />
                          <p className="text-[11.5px] text-[color:var(--mute-1)]"><span className="font-[800] text-[color:var(--ink)]">{pendingJoinCount} join request{pendingJoinCount>1?'s':''}</span> pending review</p>
                        </button>
                      )}
                      {incompletePanelCount > 0 && (
                        <button type="button" onClick={()=>switchSection('judging')} className="admin-attention-item btn">
                          <span className="admin-attention-dot" style={{background:'#8b5cf6'}} />
                          <p className="text-[11.5px] text-[color:var(--mute-1)]"><span className="font-[800] text-[color:var(--ink)]">{incompletePanelCount} panel{incompletePanelCount>1?'s':''}</span> with incomplete scoring</p>
                        </button>
                      )}
                      {pendingIdeasCount === 0 && pendingJoinCount === 0 && incompletePanelCount === 0 && (
                        <p className="text-[11px] text-[color:var(--mute-4)] py-6 text-center border border-dashed border-white/10 rounded-[8px]">All clear — no urgent items.</p>
                      )}
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>

          {!isJury && (
            <div className="admin-panel-card p-6">
              <div className="admin-panel-head">
                <p className="admin-panel-title">Quick shortcuts</p>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {[
                  { label:'Review Pending Ideas', sub:`${pendingIdeasCount} in queue`, onClick:()=>{switchSection('management');setMTab('approvals');} },
                  { label:'Join Requests', sub:`${pendingJoinCount} pending`, onClick:()=>{switchSection('management');setMTab('requests');} },
                  { label:'Jury Scoring Desk', sub:`Active round: ${activeRound}`, onClick:()=>switchSection('judging') },
                  { label:'Manage Teams', sub:`${teams.length} registered`, onClick:()=>{switchSection('management');setMTab('teams');} },
                  { label:'Team Progress', sub:'Setup & event status', onClick:()=>{switchSection('management');setMTab('progress');} },
                  { label:'Download Scores CSV', sub:'Export team standings', onClick: dl },
                ].map(a=>(
                  <button key={a.label} type="button" onClick={a.onClick} className="admin-shortcut-card btn group">
                    <div className="flex-1 min-w-0 pr-2">
                      <p className="text-[13px] font-[800] text-[color:var(--ink)] group-hover:text-[#fda4af] transition-colors">{a.label}</p>
                      <p className="text-[11px] text-[color:var(--mute-3)] mt-1">{a.sub}</p>
                    </div>
                    <svg className="w-4 h-4 text-[color:var(--mute-4)] group-hover:text-[#FF3F6C] flex-shrink-0 mt-0.5 transition-colors" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                  </button>
                ))}
              </div>
            </div>
          )}

        </div>
      )}

      {/* ══════════ SECTION: JUDGING ══════════ */}
      {section === 'judging' && (
        <div className="space-y-4 fade-up">

          {/* Top bar: Active Round setter (coordinator) + Quick Card toggle */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            {!isJury && (
              <div className="flex items-center gap-2">
                <span className="text-[10px] font-[700] uppercase tracking-[0.1em] text-[color:var(--mute-3)]">Active Round:</span>
                {['R1','R2','R3'].map(r=>(
                  <button key={r} onClick={()=>setActiveRound(r)}
                    className={`admin-round-pill ${activeRound===r?'admin-round-pill--active':''}`}>{r}</button>
                ))}
              </div>
            )}
            {isJury && (
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-[10px] font-[700] uppercase tracking-[0.1em] text-[color:var(--mute-3)]">View round:</span>
                {['R1','R2','R3'].map(r => {
                  const state = juryRoundState(r, activeRound);
                  const hasAssignment = myAllPanels.some(p => p.round === r);
                  return (
                    <button key={r} onClick={() => setJuryViewRound(r)}
                      className={`admin-round-pill ${juryViewRound===r?'admin-round-pill--active':''} ${state==='locked'?'admin-round-pill--locked':''}`}
                      title={!hasAssignment ? 'No panel assigned' : state === 'locked' ? 'Locked until coordinator activates' : state === 'active' ? 'Scoring open' : 'Round complete'}>
                      {r}{state==='active'?' · Live':state==='locked'?' · Locked':''}
                    </button>
                  );
                })}

                        const ts = tag ? TAG_STYLE[tag] : null;
                        const hue = (u.name.charCodeAt(0)*47 + (u.name.charCodeAt(1)||0)*23) % 360;

                                    if (newRole === 'jury') updateUserRole(u, newRole, u.judgeType || 'business');
                                    else updateUserRole(u, newRole);

                                  className="admin-filter-select w-full">
                                  <option value="participant">Participant</option>
                                  <option value="mentor">Mentor</option>
                                  <option value="jury">Jury</option>
                                  <option value="coordinator">Coordinator</option>
                                </select>
                                {u.role === 'jury' && (
                                  <select value={u.judgeType || 'business'} onChange={e => updateUserRole(u, 'jury', e.target.value)}

                                    <option value="technical">Technical judge</option>
                                  </select>
                                )}
                              </div>
                              <div className="space-y-1.5">
                                <p className="text-[9px] font-[800] uppercase tracking-wider text-[color:var(--mute-3)]">Team</p>
                                {u.role === 'participant' ? (

                                  <p className="text-[12px] text-[color:var(--ink)] font-[600]">{userTeam.name}</p>

                              <div className="text-right text-[10px] text-[color:var(--mute-4)] font-mono self-center">{u.id}</div>
                            </div>
                          </div>
                        );

                      <AdminPager page={page} setPage={setUserPage} total={filtered.length} pageSize={ADMIN_USER_PAGE_SIZE} label="users" />
                    </>

                })()}
              </div>
            </div>

                </div>
                <select value={reqStatusFilter} onChange={e=>{setReqStatusFilter(e.target.value);setReqPage(1);}} className="admin-filter-select">

                  <option value="resolved">Resolved</option>
                  <option value="all">All</option>
                </select>

                <p className="text-[12px] text-[color:var(--mute-2)]">Review participant join requests across all teams. Accepting adds the member and declines their other pending requests.</p>
                {(() => {
                  const q = reqSearchQ.toLowerCase();
                  const filtered = (joinRequests||[])
                    .filter(r => reqStatusFilter==='all' ? true : reqStatusFilter==='pending' ? r.status==='pending' : r.status!=='pending')
                    .filter(r => !q || [r.userName, r.userDept, r.teamName, r.message].some(v => v?.toLowerCase().includes(q)))
                    .sort((a,b) => {
                      if (a.status==='pending' && b.status!=='pending') return -1;
                      if (a.status!=='pending' && b.status==='pending') return 1;
                      const aTs = a.status==='pending' ? (a.createdAt||'') : (a.resolvedAt||'');
                      const bTs = b.status==='pending' ? (b.createdAt||'') : (b.resolvedAt||'');
                      return bTs.localeCompare(aTs);

                          <div key={req.id} className="flex items-center justify-between gap-3 px-4 py-3 border border-[color:var(--line)] rounded-[6px] text-[12px] bg-white/[0.02]">

                          </div>
                        );
                      })}
                      </div>
                      <AdminPager page={page} setPage={setReqPage} total={filtered.length} pageSize={ADMIN_MGMT_PAGE_SIZE} label="requests" />
                    </>

                })()}
              </div>
            </div>

                  <div className="p-4 space-y-3">

                    <div className="flex justify-end">
                      <Btn variant="primary" className="text-[12px] py-1.5" onClick={()=>{setQualInstructions(qualDraft); setEditQual(false); toast('Instructions updated.','success');}}>Save</Btn>
                    </div>

                  <p className="px-4 py-3 text-[12px] text-[color:var(--mute-1)] leading-relaxed">{qualInstructions || <span className="text-[color:var(--mute-3)] italic">No instructions set.</span>}</p>
                )}
              </div>

                <div className="p-4 space-y-3">

                    {themes.map(t=>(
                      <span key={t} className="inline-flex items-center gap-1.5 text-[12px] font-[600] px-3 py-1.5 rounded-[20px] border border-[color:var(--line-2)] bg-[color:var(--paper-2)] text-[color:var(--ink)]">
                        {t}
                        <button onClick={()=>{ if(themes.length<=1){toast('Need at least one theme.','error');return;} setThemes(p=>p.filter(x=>x!==t)); toast(`Theme "${t}" removed.`,'info');}}

                      </span>

                        </div>

                    <AdminPager page={page} setPage={setIdeaAdminPage} total={filtered.length} pageSize={ADMIN_MGMT_PAGE_SIZE} label="ideas" />

                      <Inp value={np.title} onChange={e=>setNp(p=>({...p,title:e.target.value}))} placeholder="Title *" />
                      <Sel value={np.category} onChange={e=>setNp(p=>({...p,category:e.target.value}))}>
                        <option value="">Category *</option>
                        {cats.map(c=><option key={c} value={c}>{c}</option>)}
                      </Sel>
                      <Sel value={np.difficulty} onChange={e=>setNp(p=>({...p,difficulty:e.target.value}))}>
                        {['Easy','Medium','Hard'].map(d=><option key={d} value={d}>{d}</option>)}
                      </Sel>
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" checked={np.published} onChange={e=>setNp(p=>({...p,published:e.target.checked}))} className="w-3.5 h-3.5" />
                        <span className="text-[13px] text-[color:var(--mute-2)]">Publish immediately</span>
                      </label>
                    </div>
                    <Txt value={np.desc} onChange={e=>setNp(p=>({...p,desc:e.target.value}))} rows={2} placeholder="Description..." />
                    <div className="flex gap-2">
                      <Btn variant="ghost" className="text-[12px] py-2" onClick={()=>setAdd(false)}>Cancel</Btn>
                      <Btn variant="primary" className="text-[12px] py-2" onClick={()=>{
                        if(!np.title||!np.category){toast('Title and category required.','error');return;}
                        setProblems(p=>[...p,{...np,id:`P${Date.now()}`}]);
                        setNp({title:'',category:'',difficulty:'Medium',desc:'',published:false});
                        setAdd(false); toast('Problem added.','success');
                      }}>Add</Btn>
                    </div>
                  </div>
                )}
                {(() => {
                  const q = problemSearchQ.toLowerCase();
                  const filtered = (problems||[]).filter(p =>
                    (!q || [p.title, p.category, p.desc, p.difficulty].some(v => v?.toLowerCase().includes(q))) &&
                    (problemCatFilter==='All' || p.category===problemCatFilter) &&
                    (problemPubFilter==='All' || (problemPubFilter==='live' ? p.published : !p.published))
                  );
                  const totalPages = Math.max(1, Math.ceil(filtered.length / ADMIN_MGMT_PAGE_SIZE));
                  const page = Math.min(problemPage, totalPages);
                  const slice = filtered.slice((page - 1) * ADMIN_MGMT_PAGE_SIZE, page * ADMIN_MGMT_PAGE_SIZE);
                  return (
                    <>
                      <div className="admin-mgmt-list-body space-y-3">
                      {!filtered.length && (
                        <div className="py-12 text-center text-[13px] text-[color:var(--mute-3)] border border-dashed border-[color:var(--line-2)] rounded-[8px]">No problems match your filters.</div>

                      {slice.map(p=>(

                          <div className="flex-1 min-w-0">

                              <span className="text-sm font-medium text-[color:var(--ink)]">{p.title}</span>

                      <AdminPager page={page} setPage={setProblemPage} total={filtered.length} pageSize={ADMIN_MGMT_PAGE_SIZE} label="problems" />

              </div>
            </div>

                    const pct = Math.round(checks.filter(Boolean).length / 4 * 100);
                    if (progFilter==='100') return pct===100;
                    if (progFilter==='incomplete') return pct<100;
                    if (progFilter==='git') return !t.git;
                    if (progFilter==='sandbox') return !t.sandbox;
                    if (progFilter==='api') return !t.api;
                    if (progFilter==='infosec') return !t.infosec;

                                    </div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                      </div>
                      <AdminPager page={page} setPage={setProgPage} total={filtered.length} pageSize={JUDGE_PAGE_SIZE} label="teams" />
                    </>

                })()}

                      <td className="py-3.5 px-4"><p className="text-[12px] text-[color:var(--mute-1)]">{r.dept}</p></td>
                      <td className="py-3.5 px-4"><p className="text-[14px] font-[800] text-[color:var(--ink)]">{r.score}/{r.total}</p></td>
                      <td className="py-3.5 px-4"><p className="text-[11px] text-[color:var(--mute-3)]">{r.time}</p></td>
                    </tr>
                  ))}
                  {(!quizResults || quizResults.length === 0) && (
                    <tr>
                      <td colSpan={4} className="py-8 text-center text-[12px] text-[color:var(--mute-3)]">No quiz results yet.</td>
                    </tr>

                </tbody>
              </table>
            </div>
          )}
          </div>
        </div>
      )}

          {/* Detailed Scoring Modal */}
          {scoreModal && (
            <Modal open={true} onClose={() => setScoreModal(null)} title={`Score ${scoreModal.teamName} — ${scoreModal.round}`} size="md">
              <div className="space-y-6 fade-up max-h-[70vh] overflow-y-auto pr-2">
                <p className="text-[13px] text-[color:var(--mute-2)] leading-relaxed">
                  Evaluate this team across the 6 core criteria. Each criterion is scored out of 5 points.
                </p>
                <div className="space-y-4">
                  {[
                    { id: 'prob', label: 'Problem & Idea', desc: 'Is the problem real and the idea innovative?' },
                    { id: 'prod', label: 'Production Path', desc: 'Feasibility to scale and deploy.' },
                    { id: 'cust', label: 'Customer Impact', desc: 'Value delivered to end users.' },
                    { id: 'bus', label: 'Business Impact / P&L', desc: 'Economic viability and return.' },
                    { id: 'strat', label: 'Strategy, Bet & Moat', desc: 'Long term strategic advantage.' },
                    { id: 'pitch', label: 'Pitch & Defense', desc: 'Team presentation and Q&A.' }
                  ].map(crit => (
                    <div key={crit.id} className="bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-[3px] p-4">
                      <div className="mb-3 flex items-center justify-between">
                        <div>
                          <p className="text-[13px] font-[800] text-[color:var(--ink)]">{crit.label}</p>
                          <p className="text-[11px] text-[color:var(--mute-3)] mt-0.5">{crit.desc}</p>
                        </div>
                        <span className="text-[14px] font-[800] text-[color:var(--accent)]">{scoreForm[crit.id] || 0} / 5</span>
                      </div>
                      <div className="flex gap-2">
                        {[1, 2, 3, 4, 5].map(val => (
                          <button key={val} onClick={() => setScoreForm(s => ({...s, [crit.id]: val}))}
                            className={`flex-1 py-2 text-[13px] font-[800] border rounded-[3px] transition-all ${scoreForm[crit.id] === val ? 'bg-[color:var(--accent)] text-white border-[color:var(--accent)]' : 'bg-white text-[color:var(--mute-2)] border-[color:var(--line-2)] hover:border-[color:var(--mute-3)] hover:text-[color:var(--ink)]'}`}>
                            {val}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-[3px] p-4 mt-4">
                  <p className="text-[13px] font-[800] text-[color:var(--ink)] mb-1">Judge Comments</p>
                  <p className="text-[11px] text-[color:var(--mute-3)] mb-3">Optional comment (required for extremes like 1s or 5s)</p>
                  <textarea 
                    value={scoreForm.comment || ''}
                    onChange={(e) => setScoreForm(s => ({...s, comment: e.target.value}))}
                    placeholder="Leave your notes about the team's performance..."
                    rows={3}
                    className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] text-[color:var(--ink)] placeholder-[color:var(--mute-4)] outline-none resize-none transition-colors"
                  />
                </div>
                <div className="pt-2 flex gap-3">
                  <Btn variant="outline" className="flex-1 py-3 text-[12px] font-[800] uppercase tracking-wider"
                    onClick={() => {
                      const { comment:_, isDraft:__, ...criteria } = scoreForm;
                      if (scoreModal?.panelId) {
                        saveJudgeScore(scoreModal.panelId, scoreModal.teamId, user.id, scoreModal.round, criteria, true);
                      } else {
                        const total = ['prob','prod','cust','bus','strat','pitch'].reduce((a,k)=>a+(scoreForm[k]||0),0);
                        setScoreDetails(p=>({...p,[scoreModal.teamId]:{...p[scoreModal.teamId],[scoreModal.round]:{...scoreForm,isDraft:true}}}));
                        sc(scoreModal.teamId, scoreModal.round, total);
                      }
                      setScoreModal(null);
                      toast('Draft saved.', 'success');
                    }}>
                    Save Draft
                  </Btn>
                  <Btn variant="primary" className="flex-1 py-3 text-[12px] font-[800] uppercase tracking-wider bg-[#16a34a] hover:bg-[#15803d] border-[#16a34a]"
                    onClick={() => {
                      const { comment:_, isDraft:__, ...criteria } = scoreForm;
                      if (scoreModal?.panelId) {
                        saveJudgeScore(scoreModal.panelId, scoreModal.teamId, user.id, scoreModal.round, criteria, false);
                      } else {
                        const total = ['prob','prod','cust','bus','strat','pitch'].reduce((a,k)=>a+(scoreForm[k]||0),0);
                        setScoreDetails(p=>({...p,[scoreModal.teamId]:{...p[scoreModal.teamId],[scoreModal.round]:{...scoreForm,isDraft:false}}}));
                        sc(scoreModal.teamId, scoreModal.round, total);
                      }
                      setScoreModal(null);
                      toast('Score submitted successfully.', 'success');
                    }}>
                    Submit Score
                  </Btn>
                </div>
              </div>
            </Modal>
          )}

      <AdminConfirmModal
        open={!!confirmDlg}
        title={confirmDlg?.title || ''}
        message={confirmDlg?.message || ''}
        confirmLabel={confirmDlg?.confirmLabel}
        variant={confirmDlg?.variant}
        onConfirm={confirmDlg?.onConfirm}
        onClose={() => setConfirmDlg(null)}
      />
    </div>
  );
}

function EnablementView({ sessions = [], speakers = DEFAULT_SPEAKERS }) {
  const [type,  setType]  = useState('all');
  const [track, setTrack] = useState('all');
  const [searchQ, setSearchQ] = useState('');

  const shown = (sessions||[]).filter(s=>{
    const t=type==='all'||(type==='live'&&(s.status==='live'||s.status==='upcoming'))||(type==='recorded'&&s.status==='recorded');
    const k=track==='all'||s.track===track;
    const q=searchQ.toLowerCase();
    const matchQ = !q || [s.title, s.speaker, s.id, TRACKS[s.track]||''].some(v=>v?.toLowerCase().includes(q));
    return t&&k&&matchQ;
  });

  const statusInfo = s => ({
    live:     { label:'Live',     cls:'bg-[#fef2f2] text-[#dc2626]',        btn:'Join now'      },
    upcoming: { label:'Upcoming', cls:'bg-[#eeeeff] text-[color:var(--accent)]',         btn:'Set reminder'  },
    recorded: { label:'Recorded', cls:'bg-[color:var(--paper-2)] text-[color:var(--mute-2)]',         btn:'Watch'         },
  })[s]||{};

  const getSessionColors = (t) => {
    const mapping = {
      'Gen AI':  { gradient: 'linear-gradient(100deg,#1e0a5e 0%,#4f1fb5 55%,#7c3aed 100%)', text: '#ddd4ff' },
      'InfoSec': { gradient: 'linear-gradient(100deg,#002040 0%,#0069a8 55%,#00b4d8 100%)', text: '#c0eeff' },
      'SRE':     { gradient: 'linear-gradient(100deg,#3d0018 0%,#9b0040 55%,#ff1f6c 100%)', text: '#ffd4e4' },
      'Dockins': { gradient: 'linear-gradient(100deg,#230055 0%,#6d10cc 55%,#ae33ff 100%)', text: '#e8cfff' },
    };
    return mapping[t] || { gradient: 'linear-gradient(100deg,#1a1030 0%,#2d1a50 100%)', text: '#c8c0f0' };
  };

  return (
    <div className="space-y-3 md:space-y-6 fade-up">

        compactOnMobile

              <p className={`enable-track-count text-[11.5px] font-[700] uppercase tracking-wider ${active?'text-white/60':'text-[color:var(--mute-3)]'}`}>{cnt} session{cnt!==1?'s':''}</p>

      {/* ── SEARCH & FILTERS ROW (BORDERLESS) ── */}
      <div className="flex items-center justify-between flex-wrap gap-4 pt-2">

            <button key={f} onClick={()=>setType(f)}

          <div className="flex-1">
            <AnimatedSearchInput 
              value={searchQ} 
              onChange={e=>setSearchQ(e.target.value)} 
              onClear={()=>setSearchQ('')}
              type="sessions"
            />
          </div>
        </div>
      </div>

      {/* ── SESSIONS GRID ── */}

              {info.label}

          );

          const sessionFooter = (
            <div className="learn-card-footer-rule pt-4 mt-auto flex items-center justify-between gap-4">
              <div className="flex flex-col min-w-0">
                <span className="text-[11px] text-[color:var(--mute-3)] font-semibold uppercase tracking-wider">Session Time</span>

              {s.meetLink ? (
                <a
                  href={s.meetLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  className={`px-5 py-2.5 rounded-full text-[12px] font-[900] transition-all duration-200 shadow-sm inline-flex items-center gap-1.5 flex-shrink-0 ${
                    s.status === 'live'
                      ? 'bg-[#FF3F6C] hover:bg-[#e0355f] text-white'
                      : s.status === 'upcoming'
                        ? 'bg-[#171528] hover:bg-[#1f1d35] text-white border border-white/10'
                        : 'bg-white/10 hover:bg-white/16 text-[color:var(--ink)] border border-[color:var(--line-2)]'
                  }`}
                >
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                    {s.status === 'recorded' ? (
                      <path strokeLinecap="round" strokeLinejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z M15.91 11.672a.375.375 0 010 .656l-5.603 3.113a.375.375 0 01-.557-.328V8.887c0-.286.307-.466.557-.327l5.603 3.112z" />
                    ) : (
                      <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" />
                    )}

                <button className="px-5 py-2.5 bg-[color:var(--paper-3)] text-[color:var(--mute-4)] rounded-full text-[12px] font-[900] transition-all duration-200 shadow-sm cursor-not-allowed flex-shrink-0" title="No link provided yet">
                  {info.btn}
                </button>
              )}

          return (

              key={s.id}
              className={`rounded-[16px] border hover:-translate-y-1.5 transition-all duration-300 flex flex-col overflow-hidden min-h-[300px] ${gc(shown.indexOf(s))} ${

            >

              >
                <span>{s.id}</span>

              </div>

              <div className="flex flex-1 min-h-[248px]">
                <div className="learn-card-photo-panel w-[160px] sm:w-[190px] md:w-[210px] flex-shrink-0 relative overflow-hidden bg-[#0E0C1A]">
                  {isSpeaker && speakerPhoto ? (
                    <img src={speakerPhoto} alt={s.speaker} className="absolute inset-0 w-full h-full object-cover object-top" />

                    <img
                      src={LEARN_CARD_FALLBACK_IMAGE}

      <div className="bg-white rounded-[16px] shadow-sm p-6 border border-[color:var(--line-2)] flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">

  const ANCHOR = TILES[6];
  const [isMobileLoad] = React.useState(() => window.matchMedia('(max-width: 1023px)').matches);

  // phases: matchcut → slide → logo-in → logo-out
  const [phase, setPhase]               = React.useState('matchcut');
  const [currentIndex, setCurrentIndex] = React.useState(0);
  const [slid, setSlid]                 = React.useState(false);
  // tilesFading: triggers the whole-tile-group opacity 1→0 over 480ms (from 10ms → 490ms of unfurl)
  const [tilesFading, setTilesFading]   = React.useState(false);
  const [logoVisible, setLogoVisible]   = React.useState(false);

  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    IMAGES.forEach(src => { const img = new Image(); img.src = src; });

    let idx = 0;
    const mc = setInterval(() => {
      idx++;
      if (idx < IMAGES.length) {
        setCurrentIndex(idx);
      } else {
        clearInterval(mc);
        setCurrentIndex(6);
        setPhase('slide');
        // Trigger slide + tile fade at the same frame
        requestAnimationFrame(() => requestAnimationFrame(() => {
          setSlid(true);
          setTilesFading(true); // fades tiles over 480ms starting 10ms in — synced with unfurl
        }));

        // Logo fades in — starts at 700ms (while cards finish fading).
        setTimeout(() => {
          setPhase('logo-in');
          requestAnimationFrame(() => requestAnimationFrame(() => setLogoVisible(true)));
        }, 700);

        // Logo fully visible at 1100ms. Hold 200ms → fade everything out at 1300ms.
        setTimeout(() => {
          setPhase('logo-out');
        }, 700 + 400 + 200); // = 1300ms

        // Whole splash fades over 500ms → done at 1800ms
        setTimeout(() => {
          onComplete();
          document.body.style.overflow = '';
        }, 700 + 400 + 200 + 500); // = 1800ms
      }
    }, 100);

    return () => { clearInterval(mc); document.body.style.overflow = ''; };
  }, []);

  const SZ = isMobileLoad ? 'min(58vw, 248px)' : '12.5vw';

  // ── MATCHCUT ─────────────────────────────────────────────────────────────────
  if (phase === 'matchcut') {
    return (
      <div style={{position:'fixed',inset:0,zIndex:9999,background:'#000',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{
          position:'relative', width:SZ, height:SZ, borderRadius: isMobileLoad ? '18px' : '12px',
          overflow:'hidden', flexShrink:0,
          boxShadow: isMobileLoad ? '0 20px 50px rgba(0,0,0,0.55)' : undefined,
        }}>
          {IMAGES.map((src,i) => (
            <img key={src} src={src} alt="" style={{
              position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover',
              opacity: i===currentIndex ? 1 : 0,
              transition: isMobileLoad ? 'opacity 80ms ease' : 'none',
            }} />
          ))}
        </div>
      </div>
    );
  }

  // ── SLIDE / LOGO-IN / LOGO-OUT ────────────────────────────────────────────
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:9999, background:'#000',
      pointerEvents: phase==='logo-out' ? 'none' : 'auto',
      // When logo-out: whole splash (including logo) fades to 0
      opacity: phase==='logo-out' ? 0 : 1,
      transition: phase==='logo-out' ? 'opacity 500ms ease-out' : 'none',
    }}>
      {/* Tile group — fades from 100%→0% over the unfurl duration */}
      <div style={{
        position:'absolute', inset:0,
        display:'flex', alignItems:'center', justifyContent:'center',
        opacity: tilesFading ? 0 : 1,
        // 700ms fade starting 150ms in — cards stay fully visible through most of the unfurl
        transition: tilesFading ? 'opacity 700ms cubic-bezier(0.4,0,0.2,1) 150ms' : 'none',
      }}>
        <div style={{
          position:'relative',
          width: SZ,
          height: isMobileLoad ? '72vh' : SZ,
          flexShrink: 0,
        }}>
          {IMAGES.map((src, i) => {
            const dx    = ((TILES[i].left - ANCHOR.left) / 1920 * 100).toFixed(4) + 'vw';
            const dyVh  = (i - 6) * 5.2;
            const dist  = Math.abs(i - 6);
            const delay = dist === 0 ? 0 : dist * dist * (isMobileLoad ? 8 : 10);
            const cardStyle = isMobileLoad ? {
              position:'absolute',
              left:'50%', top:'50%',
              width:SZ, height:SZ,
              borderRadius:'18px', overflow:'hidden', zIndex:Z[i],
              boxShadow:'0 12px 32px rgba(0,0,0,0.4)',
              transform: slid
                ? `translate(-50%, calc(-50% + ${dyVh}vh))`
                : 'translate(-50%, -50%)',
              transition: slid ? `transform 500ms cubic-bezier(0.16,1,0.3,1) ${delay}ms` : 'none',
            } : {
              position:'absolute', inset:0, width:SZ, height:SZ,
              borderRadius:'12px', overflow:'hidden', zIndex:Z[i],
              transform: slid ? `translateX(${dx})` : 'translateX(0)',
              transition: slid ? `transform 450ms cubic-bezier(0.16,1,0.3,1) ${delay}ms` : 'none',
            };
            return (
              <div key={src} style={cardStyle}>
                <img src={src} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} />
              </div>
            );
          })}
        </div>
      </div>

      {/* Logo — fades in centred, then fades away with the whole splash */}
      {(phase === 'logo-in' || phase === 'logo-out') && (
        <img
          src="images/Frame 632872.svg"
          alt="mynnovAIte"
          style={{
            position: 'absolute',
            top: '50%',
            left: '50%',
            transform: 'translate(-50%,-50%)',
            height: isMobileLoad ? '50px' : '81px',
            width: 'auto',
            maxWidth: isMobileLoad ? 'calc(100vw - 56px)' : 'none',
            objectFit: 'contain',
            opacity: logoVisible ? 1 : 0,
            transition: 'opacity 400ms cubic-bezier(0.4,0,0.2,1)',
            pointerEvents: 'none',
            zIndex: 10,
          }}
        />
      )}
    </div>
  );
}

function timeAgo(ts) {
  const then = new Date(ts).getTime();
  if (isNaN(then)) return '';
  const diff = Math.max(0, Date.now() - then);
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d ago`;
  return new Date(ts).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}

function NotificationsView({ user, notifications, setNotifications, setView, toast, onLoginOpen }) {
  const [tab, setTab] = useState('all');

  if (!user) {
    return (
      <div className="max-w-[640px] mx-auto text-center py-24">
        <h2 className="text-2xl font-bold mb-2">Notifications</h2>
        <p className="text-[color:var(--mute-2)] mb-6">Sign in to see your invitations, team updates and reminders.</p>
        <button onClick={onLoginOpen} className="btn btn-primary">Sign in to view notifications</button>
      </div>
    );
  }

  const audience = user.role==='coordinator' ? 'coordinator' : user.role==='jury' ? 'jury' : 'participant';
  const mine = notifications
    .filter(n => n.audience===audience || n.audience==='all')
    .sort((a,b) => new Date(b.ts) - new Date(a.ts));
  const visible = tab==='unread' ? mine.filter(n => !n.read) : mine;
  const unreadCount = mine.filter(n => !n.read).length;

  const markRead = id => setNotifications(prev => prev.map(n => n.id===id ? {...n, read:true} : n));
  const markAllRead = () => setNotifications(prev => prev.map(n => (n.audience===audience||n.audience==='all') ? {...n, read:true} : n));
  const dismiss = (id, label) => { setNotifications(prev => prev.map(n => n.id===id ? {...n, read:true, actionable:false, body:label} : n)); };

  const openNotif = n => {
    if (!n.read) markRead(n.id);
    if (n.action) setView(n.action);
  };

  return (
    <div className="max-w-[760px] mx-auto">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h2 className="text-2xl font-bold">Notifications</h2>
          <p className="text-[13px] text-[color:var(--mute-2)] mt-0.5">{unreadCount > 0 ? `${unreadCount} unread` : 'You\u2019re all caught up'}</p>
        </div>
        {unreadCount > 0 && (
          <button onClick={markAllRead} className="btn text-[13px] text-[color:var(--accent)] font-semibold hover:underline">Mark all as read</button>
        )}
      </div>

      <div className="flex items-center gap-2 mb-5">
        {[['all','All'],['unread','Unread']].map(([k,lbl]) => (
          <button key={k} onClick={()=>setTab(k)}
            className={`btn text-[13px] font-semibold px-3.5 py-1.5 rounded-full transition-colors ${tab===k ? 'bg-[color:var(--accent)] text-white' : 'bg-white/5 text-[color:var(--mute-2)] hover:bg-white/10'}`}>
            {lbl}{k==='unread' && unreadCount>0 ? ` (${unreadCount})` : ''}
          </button>
        ))}
      </div>

      {visible.length === 0 ? (
        <div className="text-center py-20 text-[color:var(--mute-2)]">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto mb-3 opacity-50"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <p>{tab==='unread' ? 'No unread notifications.' : 'No notifications yet.'}</p>
        </div>
      ) : (
        <div className="flex flex-col gap-2">
          {visible.map(n => {
            const meta = NOTIF_META[n.kind] || NOTIF_META.idea;
            return (
              <div key={n.id}
                onClick={()=>openNotif(n)}
                className={`relative flex items-center gap-3 pl-3.5 pr-4 py-3 rounded-xl border cursor-pointer transition-colors ${n.read ? 'bg-white/[0.02] border-white/5 hover:bg-white/[0.04]' : 'bg-white/[0.05] border-white/10 hover:bg-white/[0.07]'}`}>
                {!n.read && <span className="absolute left-1.5 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-[color:var(--accent)]" />}
                <span className="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style={{background:`${meta.color}22`}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={meta.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={meta.icon} />
                  </svg>
                </span>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-2">
                    <span className="text-[13.5px] font-semibold truncate">{n.title}</span>
                    <span className="text-[9.5px] font-bold uppercase tracking-wide flex-shrink-0" style={{color:meta.color}}>{meta.label}</span>
                    <span className="text-[11px] text-[color:var(--mute-3)] flex-shrink-0 ml-auto pl-2">{timeAgo(n.ts)}</span>
                  </div>
                  <p className="text-[12.5px] text-[color:var(--mute-2)] leading-snug truncate">{n.body}</p>
                </div>
                {n.actionable && (
                  <div className="flex items-center gap-1.5 flex-shrink-0" onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>{dismiss(n.id,'You accepted this request.'); toast('Accepted','success');}}
                      className="btn btn-primary btn-sm text-[12px] px-3 py-1">Accept</button>
                    <button onClick={()=>{dismiss(n.id,'You declined this request.'); toast('Declined','info');}}
                      className="btn btn-sm text-[12px] px-3 py-1 bg-white/8 text-[color:var(--mute-1)] hover:bg-white/12 rounded-full">Decline</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FaqView({ setView }) {
  const [open, setOpen] = useState('Registration-0');
  const [query, setQuery] = useState('');
  const [activeCat, setActiveCat] = useState('All');
  const categories = ['All', ...FAQ_DATA.map(g => g.cat)];

  const filteredGroups = FAQ_DATA.map(group => ({
    ...group,
    qs: group.qs.filter(item => {
      if (activeCat !== 'All' && group.cat !== activeCat) return false;
      const q = query.trim().toLowerCase();
      if (!q) return true;
      return item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q);
    }),
  })).filter(group => group.qs.length > 0);

  const totalMatches = filteredGroups.reduce((n, g) => n + g.qs.length, 0);

  const pickCategory = (cat) => {
    setActiveCat(cat);
    if (cat === 'All') {
      setOpen('Registration-0');
      return;
    }
    const idx = FAQ_DATA.findIndex(g => g.cat === cat);
    if (idx >= 0) setOpen(`${cat}-0`);
  };

  return (
    <div className="space-y-8 fade-up max-w-[980px] mx-auto">
      <PageIntro
        eyebrow="Help Center"
        title={<>Frequently asked <em className="gradient-text font-serif italic normal-case tracking-normal">questions.</em></>}
        description="Registration, teams, Idea Bazaar, agenda, and judging — quick answers before you build."
        actions={[
          <button
            key="contact"
            type="button"
            onClick={() => { setView('contact'); window.scrollTo(0, 0); }}
            className="home-section-cta"
          >
            Contact us
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>,
        ]}
      />

      <div className="space-y-4">
        <div className="faq-search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
          <input
            className="faq-search-input"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search questions — registration, teams, judging…"
          />
        </div>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {categories.map(cat => (
            <button
              key={cat}
              type="button"
              className={`faq-cat-pill ${activeCat === cat ? 'faq-cat-pill--active' : ''}`}
              onClick={() => pickCategory(cat)}

              {cat}
            </button>
          ))}
        </div>
        <p className="text-[11px] font-mono uppercase tracking-[0.14em] text-[color:var(--mute-3)]">

          <button type="button" className="home-section-cta" onClick={() => { setQuery(''); setActiveCat('All'); }}>
