          <p className="text-[13px] text-[color:var(--mute-2)] mt-2 leading-relaxed">Bookable 1:1 slots with mentors run alongside booth demos. Full session lineup lives on Learn &amp; Speakers.</p>
        </div>
        <button onClick={()=>setView('sessions')} className="btn btn-primary flex-shrink-0 relative">View sessions</button>
      </div>
    </div>
  );
}

function ContactView({ toast }) {
  const [form, setForm] = useState({ name:'', email:'', type:'General question', message:'' });
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const submit = e => {
    e.preventDefault();
    if (!form.name.trim() || !form.email.trim() || !form.message.trim()) { toast('Please fill in your name, email and message.','error'); return; }
    toast('Request sent! The organizing team will get back to you by email.','success');
    setForm({ name:'', email:'', type:'General question', message:'' });
  };
  const REQUEST_TYPES = ['General question','Request API keys','Request GenAI credits','Request other access / tooling','Report a bug','Partnership / sponsorship'];
  const inputCls = 'w-full bg-white/[0.04] border border-white/12 focus:border-[color:var(--accent)] rounded-[10px] px-3.5 py-2.5 text-[14px] text-[color:var(--ink)] outline-none transition-colors placeholder-[color:var(--mute-3)]';
  return (
    <div className="max-w-[920px] mx-auto">
      <div className="mb-8">
        <p className="text-[11px] font-bold uppercase tracking-[0.15em] text-[color:var(--accent)] mb-2">Get in touch</p>
        <h2 className="text-3xl font-bold">Contact &amp; support</h2>
        <p className="text-[14px] text-[color:var(--mute-2)] mt-2">Questions, access requests or issues — reach the Tech Week organizing team.</p>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
        {/* Left: contact channels */}
        <div className="lg:col-span-2 space-y-4">
          <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
            <p className="text-[10px] font-bold uppercase tracking-[0.12em] text-[color:var(--mute-3)] mb-1">Email us</p>
            <a href="mailto:techweek@myntra.com" className="text-[15px] font-semibold text-[color:var(--accent)] hover:underline btn">techweek@myntra.com</a>
            <p className="text-[12.5px] text-[color:var(--mute-2)] mt-2 leading-relaxed">For general questions, registration help, or anything event-related.</p>
          </div>
          <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
            <p className="text-[10px] font-bold uppercase tracking-[0.12em] text-[color:var(--mute-3)] mb-1">Access &amp; API keys</p>
            <a href="mailto:techweek-access@myntra.com" className="text-[15px] font-semibold text-[color:var(--accent)] hover:underline btn">techweek-access@myntra.com</a>
            <p className="text-[12.5px] text-[color:var(--mute-2)] mt-2 leading-relaxed">Request API keys, GenAI model credits, or other tooling using the form. Include your use case so we can fast-track it.</p>
          </div>
          <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
            <p className="text-[10px] font-bold uppercase tracking-[0.12em] text-[color:var(--mute-3)] mb-1">Live support</p>
            <p className="text-[15px] font-semibold">Google Chat · #techweek-2026</p>
            <p className="text-[12.5px] text-[color:var(--mute-2)] mt-2 leading-relaxed">Join the group for quick answers from coordinators during the event.</p>
          </div>
        </div>
        {/* Right: request form */}
        <form onSubmit={submit} className="lg:col-span-3 rounded-2xl border border-white/10 bg-white/[0.03] p-6 space-y-4">
          <p className="text-[15px] font-bold">Send a request</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-[11px] font-semibold text-[color:var(--mute-2)] mb-1.5">Name</label>
              <input className={inputCls} value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Your name" />
            </div>
            <div>
              <label className="block text-[11px] font-semibold text-[color:var(--mute-2)] mb-1.5">Work email</label>
              <input type="email" className={inputCls} value={form.email} onChange={e=>set('email',e.target.value)} placeholder="you@myntra.com" />
            </div>
          </div>
          <div>
            <label className="block text-[11px] font-semibold text-[color:var(--mute-2)] mb-1.5">Request type</label>
            <div className="relative">
              <select className={inputCls+' appearance-none pr-9'} value={form.type} onChange={e=>set('type',e.target.value)}>
                {REQUEST_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <div className="absolute inset-y-0 right-3.5 flex items-center pointer-events-none text-[color:var(--mute-3)] text-[10px]">▼</div>
            </div>
          </div>
          <div>
            <label className="block text-[11px] font-semibold text-[color:var(--mute-2)] mb-1.5">Message</label>
            <textarea rows={5} className={inputCls+' resize-none'} value={form.message} onChange={e=>set('message',e.target.value)} placeholder="Describe your question or what access you need and why…" />
          </div>
          <button type="submit" className="btn btn-primary w-full">Send request</button>
          <p className="text-[11.5px] text-[color:var(--mute-3)] text-center">We typically respond within one working day.</p>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading]   = useState(true);
  const [view, setView]         = useState('home');
  const [user, setUser]         = useState(null);
  const [loginOpen, setLogin]   = useState(false);
  const [teams, setTeams]       = useState(INIT_TEAMS);
  const [joinReqs, setJoinReqs] = useState(INIT_JOIN_REQUESTS);
  const [notifications, setNotifications] = useState(INIT_NOTIFICATIONS);
  const [problems, setProblems] = useState(INIT_PROBLEMS);
  const [ideas, setIdeas]       = useState(INIT_IDEAS);
  const [themes, setThemes]     = useState(THEMES);
  const [qualInstructions, setQualInstructions] = useState(DEFAULT_QUAL_INSTRUCTIONS);
  const [pubResults, setPubResults] = useState({
    R1:{ published:false, message:'', teams:[] },
    R2:{ published:false, message:'', teams:[] },
    R3:{ published:false, message:'', teams:[] },
  });
  const [winners, setWinners]       = useState(CURRENT_WINNERS);
  const [homeStatsStrip, setHomeStatsStrip] = useState(DEFAULT_HOME_STATS_STRIP);
  const [speakers, setSpeakers]     = useState(DEFAULT_SPEAKERS);
  const [hallOfFame, setHallOfFame] = useState(DEFAULT_HALL_OF_FAME);
  const [allUsers, setAllUsers]     = useState(USERS);
  const [panels, setPanels]         = useState(INIT_PANELS);
  const [judgeScores, setJudgeScores] = useState([]);
  const [activeRound, setActiveRound] = useState('R1');
  const [quizzes, setQuizzes]       = useState(QUIZZES);
  const [memes, setMemes]           = useState(MEMES);
  const [quizResults, setQuizResults] = useState([{name: 'Arjun Sharma', dept: 'Engineering', score: 3, total: 3}, {name: 'Sneha Reddy', dept: 'SRE', score: 2, total: 3}]);
  const [toastState, setToast]      = useState(null);
  const [sessions, setSessions]     = useState(SESSIONS);
  const [editTeamMode, setEditTeamMode] = useState(false);
  const [heroVersion, setHeroVersion] = useState(() => localStorage.getItem('myntra_hero_version') || 'B');
  const [homeVisibility, setHomeVisibility] = useState(() => {
    try {
      const saved = localStorage.getItem('myntra_home_visibility');
      return saved ? { ...DEFAULT_HOME_VISIBILITY, ...JSON.parse(saved) } : { ...DEFAULT_HOME_VISIBILITY };
    } catch { return { ...DEFAULT_HOME_VISIBILITY }; }
  });
  const [theme, setTheme] = useState(() => {
    return localStorage.getItem('theme') || 'dark';
  });

  useEffect(() => {
    localStorage.setItem('myntra_hero_version', heroVersion);
  }, [heroVersion]);

  useEffect(() => {
    localStorage.setItem('myntra_home_visibility', JSON.stringify(homeVisibility));
  }, [homeVisibility]);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  }, [theme]);

  useEffect(() => {
    if (view !== 'register') {
      setEditTeamMode(false);
    }
  }, [view]);

  // Sync body background with inner pages (dark or light)
  useEffect(() => {
    const isInner = view !== 'home';
    const isDark  = theme === 'dark';
    document.body.style.background = isInner ? (isDark ? '#080612' : '#FAFAF7') : '';
    document.body.style.color      = isInner ? (isDark ? '#FFFFFF' : '#0A0A0A') : '';
    return () => {
      document.body.style.background = '';
      document.body.style.color      = '';
    };
  }, [view, theme]);

  const toast = (msg, type='success') => setToast({ msg, type, k:Date.now() });

  const userTeam = user ? teams.find(t => t.members.some(m => m === user.id) || t.leadName === user.name) : null;
  const navigateToSignIn = () => goToSignInPage(setView);
  const openLoginModal = () => setLogin(true);

  return (
    <div className="min-h-screen" style={{background: view === 'home' ? '' : (theme === 'dark' ? '#080612' : '#FAFAF7')}}>
      {loading && <LoadingScreen onComplete={() => { setLoading(false); window.scrollTo(0, 0); }} />}

      <Nav view={view} setView={setView} user={user}
        onLogin={navigateToSignIn}
        onLogout={()=>{setUser(null); toast('Signed out.','info');}}
        userTeam={userTeam}
        theme={theme}
        setTheme={setTheme}
        notifications={notifications}
      />

      <main className={`${view === 'home' ? 'pb-16' : (theme === 'dark' ? 'inner-dark' : 'inner-light')}${view === 'register' && !user ? ' inner-main-compact' : ''}`}>
        {view==='home' && <HomeView teams={teams} winners={winners} homeStatsStrip={homeStatsStrip} speakers={speakers} hallOfFame={hallOfFame} setView={setView} heroVersion={heroVersion} theme={theme} setTheme={setTheme} ideas={ideas} setIdeas={setIdeas} user={user} onLogin={navigateToSignIn} problemCount={(problems||[]).filter(p=>p.published).length} homeVisibility={homeVisibility} />}
        {view !== 'home' && (
          <div className={`inner-page-shell pt-[88px] ${view === 'register' && !user ? 'inner-page-shell--compact pb-6' : 'pb-16'}`}>
            {view==='register'    && <RegisterView    user={user} setTeams={setTeams} teams={teams} ideas={ideas} setIdeas={setIdeas} toast={toast} onLoginOpen={openLoginModal} userTeam={userTeam} pubResults={pubResults} editTeamMode={editTeamMode} setEditTeamMode={setEditTeamMode} setView={setView} />}
            {view==='teams'       && <MarketplaceView user={user} teams={teams} setTeams={setTeams} joinRequests={joinReqs} setJoinRequests={setJoinReqs} ideas={ideas} setIdeas={setIdeas} toast={toast} mode="partners" setView={setView} onLoginOpen={navigateToSignIn} userTeam={userTeam} setEditTeamMode={setEditTeamMode} pubResults={pubResults} themes={themes} qualInstructions={qualInstructions} problems={problems} />}
            {view==='ideabazaar'  && <MarketplaceView user={user} teams={teams} setTeams={setTeams} joinRequests={joinReqs} setJoinRequests={setJoinReqs} ideas={ideas} setIdeas={setIdeas} toast={toast} mode="ideas" setView={setView} onLoginOpen={navigateToSignIn} userTeam={userTeam} setEditTeamMode={setEditTeamMode} pubResults={pubResults} themes={themes} qualInstructions={qualInstructions} problems={problems} />}
            {view==='notifications' && <NotificationsView user={user} notifications={notifications} setNotifications={setNotifications} setView={setView} toast={toast} onLoginOpen={navigateToSignIn} />}
            {view==='demobooth'   && <DemoBoothView setView={setView} />}
            {view==='calendar'    && <CalendarView />}
            {view==='admin'       && <AdminView user={user} teams={teams} setTeams={setTeams} allUsers={allUsers} setAllUsers={setAllUsers} problems={problems} setProblems={setProblems} pubResults={pubResults} setPubResults={setPubResults} ideas={ideas} setIdeas={setIdeas} winners={winners} setWinners={setWinners} homeStatsStrip={homeStatsStrip} setHomeStatsStrip={setHomeStatsStrip} speakers={speakers} setSpeakers={setSpeakers} hallOfFame={hallOfFame} setHallOfFame={setHallOfFame} sessions={sessions} setSessions={setSessions} toast={toast} quizzes={quizzes} setQuizzes={setQuizzes} quizResults={quizResults} heroVersion={heroVersion} setHeroVersion={setHeroVersion} themes={themes} setThemes={setThemes} qualInstructions={qualInstructions} setQualInstructions={setQualInstructions} panels={panels} setPanels={setPanels} judgeScores={judgeScores} setJudgeScores={setJudgeScores} activeRound={activeRound} setActiveRound={setActiveRound} joinRequests={joinReqs} setJoinRequests={setJoinReqs} homeVisibility={homeVisibility} setHomeVisibility={setHomeVisibility} onRequireSignIn={navigateToSignIn} />}
            {view==='sessions'    && <EnablementView sessions={sessions} speakers={speakers} />}
            {view==='scoreboard'  && <ScoreboardView teams={teams} setView={setView} />}
            {view==='faq'         && <FaqView setView={setView} />}
            {view==='contact'     && <ContactView toast={toast} />}
          </div>
        )}
      </main>

      {/* ── FOOTER ── (dark, brand gradient glow + mynnovAIte mark) */}
      <footer className="text-white relative overflow-hidden" style={{background:'#080612', marginTop: view==='home' ? '1rem' : 0}}>
        {/* Brand-gradient glow at the bottom — mirrors the hero aesthetic */}
        <div style={{
          position:'absolute', bottom:'-220px', left:'-120px',
          width:'700px', height:'500px', borderRadius:'50%',
          background:'#FF1FC0', opacity:0.22, filter:'blur(110px)', pointerEvents:'none'
        }} />
        <div style={{
          position:'absolute', bottom:'-260px', left:'30%',
          width:'700px', height:'500px', borderRadius:'50%',
          background:'#AE33FF', opacity:0.22, filter:'blur(110px)', pointerEvents:'none'
        }} />
        <div style={{
          position:'absolute', bottom:'-240px', right:'-120px',
          width:'700px', height:'500px', borderRadius:'50%',
          background:'#00E5FF', opacity:0.16, filter:'blur(110px)', pointerEvents:'none'
        }} />
        {/* Subtle vignette so the gradient softly fades into the dark base */}
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none',
          background:'linear-gradient(to bottom, rgba(8,6,18,0.85) 0%, rgba(8,6,18,0.55) 30%, rgba(8,6,18,0.3) 60%, rgba(8,6,18,0) 100%)'
        }} />

        <div className="max-w-[1400px] mx-auto px-4 sm:px-8 py-10 relative" style={{zIndex:1}}>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-10">

            {/* Brand */}
            <div className="md:col-span-1">
              <div className="flex items-center mb-4">
                <img src="images/Frame 632872.svg" alt="mynnovAIte" className="h-[42px] w-auto object-contain" />
              </div>
              <p className="text-[12px] leading-relaxed" style={{color:'rgba(255,255,255,0.55)'}}>Myntra's internal engineering hackathon. Build, innovate, and compete across departments.</p>
            </div>

            {/* Platform */}
            <div>
              <p className="text-[11px] font-semibold uppercase tracking-[0.1em] mb-3" style={{color:'rgba(255,255,255,0.75)'}}>Platform</p>
              <ul className="space-y-2">
                {[['Home','home'],['Register','register'],['Team Marketplace','teams'],['Idea Bazaar','ideabazaar']].map(([l,v])=>(
                  <li key={l}><button onClick={()=>{setView(v); window.scrollTo(0,0);}} className="text-[13px] transition-colors btn text-left" style={{color:'rgba(255,255,255,0.55)'}} onMouseEnter={e=>e.currentTarget.style.color='#ffffff'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.55)'}>{l}</button></li>
                ))}
              </ul>
            </div>

            {/* Explore */}
            <div>
              <p className="text-[11px] font-semibold uppercase tracking-[0.1em] mb-3" style={{color:'rgba(255,255,255,0.75)'}}>Explore</p>
              <ul className="space-y-2">
                {[['Agenda','calendar'],['Learn & Speakers','sessions'],['Demo Booth','demobooth'],['Scoreboard','scoreboard']].map(([l,v])=>(
                  <li key={l}><button onClick={()=>{setView(v); window.scrollTo(0,0);}} className="text-[13px] transition-colors btn text-left" style={{color:'rgba(255,255,255,0.55)'}} onMouseEnter={e=>e.currentTarget.style.color='#ffffff'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.55)'}>{l}</button></li>
                ))}
              </ul>
            </div>

            {/* Support */}
            <div>
              <p className="text-[11px] font-semibold uppercase tracking-[0.1em] mb-3" style={{color:'rgba(255,255,255,0.75)'}}>Support</p>
              <ul className="space-y-2">
                {[['FAQ','faq'],['Contact Us','contact']].map(([l,v])=>(
                  <li key={l}><button onClick={()=>{setView(v); window.scrollTo(0,0);}} className="text-[13px] transition-colors btn text-left" style={{color:'rgba(255,255,255,0.55)'}} onMouseEnter={e=>e.currentTarget.style.color='#ffffff'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.55)'}>{l}</button></li>
                ))}
                <li><a href="mailto:techweek@myntra.com" className="text-[13px] transition-colors btn" style={{color:'rgba(255,255,255,0.55)'}} onMouseEnter={e=>e.currentTarget.style.color='#ffffff'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.55)'}>techweek@myntra.com</a></li>
                <li><a href="mailto:techweek-access@myntra.com" className="text-[13px] transition-colors btn" style={{color:'rgba(255,255,255,0.55)'}} onMouseEnter={e=>e.currentTarget.style.color='#ffffff'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.55)'}>techweek-access@myntra.com</a></li>
              </ul>
              <div className="mt-5">
                <p className="text-[11px] font-semibold uppercase tracking-[0.1em] mb-2" style={{color:'rgba(255,255,255,0.75)'}}>Schedule</p>
                <div className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full" style={{background:'linear-gradient(95deg, #FF1FC0, #AE33FF)', boxShadow:'0 4px 14px rgba(255,31,192,0.35)'}}>
                  <span className="w-1.5 h-1.5 rounded-full bg-white live-dot flex-shrink-0" />
                  <span className="text-[11px] text-white font-semibold">Registration Live</span>
                </div>
              </div>
            </div>
          </div>

          {/* Bottom bar */}
          <div className="flex flex-col sm:flex-row items-center justify-between gap-3 pt-6" style={{borderTop:'1px solid rgba(255,255,255,0.08)'}}>
            <p className="text-[12px]" style={{color:'rgba(255,255,255,0.4)'}}>© 2026 Myntra Designs Pvt. Ltd. · Tech Week V1</p>
            <p className="text-[12px]" style={{color:'rgba(255,255,255,0.4)'}}>Built by the Tech Week organizing team</p>
          </div>
        </div>
      </footer>

      <LoginModal open={loginOpen} onClose={()=>setLogin(false)}
        onLogin={u=>{ setUser(u); if(!allUsers.find(x=>x.id===u.id)) setAllUsers(p=>[...p,u]); }} toast={toast} />

      {toastState && <Toast key={toastState.k} msg={toastState.msg} type={toastState.type} onDone={()=>setToast(null)} />}
    

</div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
