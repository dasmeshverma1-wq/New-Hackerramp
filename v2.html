                  className="flex-1 py-3.5 border border-[color:var(--line-2)] hover:border-[color:var(--mute-4)] text-[color:var(--mute-1)] text-[13.5px] font-bold rounded-[12px] transition-all duration-200"
                >
                  ← Back
                </button>
                <button
                  type="button"
                  onClick={() => v2() && setStep(3)}
                  className="flex-1 py-3.5 bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white text-[13.5px] font-bold rounded-[12px] shadow-md hover:shadow-lg transition-all duration-200"
                >
                  Continue to Review →
                </button>
              </div>
            </div>
          )}

          {/* STEP 3 — REVIEW & REGISTER */}
          {step===3 && (
            <div className="space-y-6 fade-up">
              <div>
                <h3 className="text-[16px] font-bold text-[color:var(--ink)] mb-1">Review & Register</h3>
                <p className="text-[12px] text-[color:var(--mute-2)]">Verify all your project details and squad details before finalizing your submission.</p>
              </div>

              {/* Team details summary */}
              <div className="bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-[16px] p-6 space-y-4">
                <div className="flex items-center justify-between pb-3.5 border-b border-[color:var(--line-2)]">
                  <p className="text-[15px] font-bold text-[color:var(--ink)]">{form.teamName}</p>
                  <Tag label={form.theme} variant="orange" small />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {[
                    ['Problem Title', form.subTheme],
                    ['Abstract', form.abstract||'Not provided'],
                    ['Gen AI Model', (form.genaiModel && form.genaiModel !== '__other__') ? form.genaiModel : 'No preference'],
                    ['Other Tooling', form.otherAccess||'None requested'],
                    ...(form.skillsNeeded.length ? [['Skills Seeking', form.skillsNeeded.join(', ')]] : []),
                  ].map(([k,v])=>(
                    <div key={k} className="space-y-1">
                      <span className="text-[10px] font-bold uppercase tracking-wider text-[color:var(--mute-3)]">{k}</span>
                      <p className="text-[13px] text-[color:var(--mute-1)] leading-relaxed font-medium">{v}</p>
                    </div>
                  ))}
                </div>
              </div>

              {/* Members summary */}
              <div>
                <p className="text-[11px] font-bold uppercase tracking-wider text-[color:var(--mute-3)] mb-3">Squad Members ({form.members.length})</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                  {form.members.map((m,i)=>(
                    <div key={i} className="flex items-center gap-3.5 px-4 py-3.5 bg-white border border-[color:var(--line-2)] rounded-[12px] shadow-sm">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center text-[12px] font-bold flex-shrink-0 ${i===0?'bg-[color:var(--accent)] text-white':'bg-[color:var(--paper-2)] text-[color:var(--mute-2)]'}`}>
                        {initials(m.name||'?')}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-[13.5px] text-[color:var(--ink)] font-bold truncate">{m.name}</p>
                        <p className="text-[11.5px] text-[color:var(--mute-2)] mt-0.5">{m.dept} · {m.role}</p>
                      </div>
                      <span className="text-[11px] text-[color:var(--mute-3)] select-all">{m.email}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Edit deadline notice */}
              <div className="reg-review-notice rounded-[12px] border border-[color:var(--line-2)] p-4 flex gap-3.5">
                <div className="w-9 h-9 rounded-[10px] bg-[color:var(--paper-3)] border border-[color:var(--line-2)] flex items-center justify-center text-[15px] shrink-0">📅</div>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-[color:var(--ink)] leading-snug">Editable until Jul 6, 2026</p>
                  <p className="mt-1.5 text-[12px] text-[color:var(--mute-2)] leading-relaxed">
                    You can update your team name, sub-theme, and abstract before that date.
                    <span className="text-[color:var(--mute-1)]"> Squad members are locked once you submit.</span>
                  </p>
                </div>
              </div>

              {/* Agreement */}
              <label className="flex items-start gap-3.5 cursor-pointer group">
                <div className={`mt-0.5 w-5 h-5 rounded-[6px] border-2 flex-shrink-0 flex items-center justify-center transition-all ${agree?'border-[color:var(--accent)] bg-[color:var(--accent)]':'border-[color:var(--line-3)] group-hover:border-[color:var(--accent)] bg-white'}`}
                  onClick={()=>setAgree(a=>!a)}>
                  {agree && <span className="text-white text-[10px] font-bold">✓</span>}
                </div>
                <span className="text-[13px] text-[color:var(--mute-2)] leading-relaxed font-medium">
                  I confirm that all team members are Myntra employees and have agreed to participate. I have read and accept the{' '}
                  <span className="text-[color:var(--accent)] font-semibold underline cursor-pointer">Tech Week participation terms</span>.
                </span>
              </label>

              {/* Action buttons */}
              <div className="flex gap-4 pt-4 border-t border-[color:var(--line-2)] mt-6">
                <button
                  type="button"
                  onClick={() => setStep(2)}
                  className="flex-1 py-3.5 border border-[color:var(--line-2)] hover:border-[color:var(--mute-4)] text-[color:var(--mute-1)] text-[13.5px] font-bold rounded-[12px] transition-all duration-200"
                >
                  ← Back
                </button>
                <button
                  type="button"
                  onClick={submit}
                  disabled={!agree}
                  className={`flex-1 py-3.5 text-[13.5px] font-bold rounded-[12px] shadow-md hover:shadow-lg transition-all duration-200 ${agree?'bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white cursor-pointer':'bg-[color:var(--paper-2)] text-[color:var(--mute-3)] cursor-not-allowed border border-[color:var(--line-2)]'}`}
                >
                  Submit Registration
                </button>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════
   MARKETPLACE
══════════════════════════════ */

function MarketplaceView({ user, teams, setTeams, joinRequests, setJoinRequests, ideas, setIdeas, toast, mode, setView, onLoginOpen, userTeam, setEditTeamMode, pubResults, themes=THEMES, qualInstructions='', problems=[] }) {
  const publishedProblems = (problems||[]).filter(p=>p.published);
  const tab = mode || 'ideas';
  const [filter, setFilter]   = useState('all');
  const [joinT, setJoinT]     = useState(null);
  const [detailT, setDetailT] = useState(null);
  const [inviteMsg, setInviteMsg] = useState('');
  const [searchQ, setSearchQ]   = useState('');
  const [skillF, setSkillF]     = useState([]);
  const [roleF, setRoleF]       = useState([]);
  const [reqFilter, setReqFilter] = useState('all');
  const [mktPage, setMktPage]   = useState(1);
  const MKT_PAGE_SIZE = 24;
  const [ideaPage, setIdeaPage] = useState(1);
  const IDEA_PAGE_SIZE = 12;
  const [showIdeaForm, setShowIdeaForm] = useState(false);
  const [ideaForm, setIdeaForm] = useState({ title:'', theme:'', problemStatement:'', impact:'' });
  const [editIdeaCardId, setEditIdeaCardId] = useState(null);
  const [editIdeaCardDraft, setEditIdeaCardDraft] = useState({});
  const [showRules, setShowRules] = useState(false);
  const [teamsPanel, setTeamsPanel] = useState('browse');
  const [ideasPanel, setIdeasPanel] = useState('browse');
  const [teamsFiltersOpen, setTeamsFiltersOpen] = useState(false);
  const [ideasFiltersOpen, setIdeasFiltersOpen] = useState(false);

  useEffect(() => {
    if (tab === 'partners') setTeamsPanel('browse');
    if (tab === 'ideas') setIdeasPanel('browse');
  }, [tab]);

  const capOf   = t => t.maxSize || TEAM_MAX_SIZE;
  const isFull  = t => t.members.length >= capOf(t);
  const isRecruitingOpen = t => t.open !== false;
  const isRecruitingClosed = t => t.open === false;
  const isJoinable = t => isRecruitingOpen(t) && !isFull(t);
  const joinBlockReason = t => isRecruitingClosed(t) ? 'closed' : isFull(t) ? 'full' : null;
  // The team the current user leads (used to manage inbound join requests).
  const isTeamLead = t => !!t && !!user && (t.leadName === user.name || t.members?.[0] === user.id);
  const myTeam  = (userTeam && isTeamLead(userTeam)) ? userTeam : null;
  const myReqTo = t => joinRequests.find(r=>r.teamId===t.id && r.userId===user?.id);
  const shown   = teams.filter(t=> filter==='open'?isJoinable(t):filter==='closed'?isRecruitingClosed(t):filter==='full'?isFull(t):true);

  // Skill match score: how many of their needed skills overlap with user's dept
  const matchScore = t => {
    if (!t.skillsNeeded?.length || !user) return 0;
    const userSkillHints = [user.dept]; // dept as a proxy for offered skills
    const overlap = t.skillsNeeded.filter(s =>
      userSkillHints.some(h => h && s.toLowerCase().includes(h.toLowerCase().split(' ')[0]))
    );
    return Math.round((overlap.length / t.skillsNeeded.length) * 100);
  };

  const openTeams = teams.filter(isRecruitingOpen);

  // All unique skills across open teams (for filter chips)
  const allSkills = [...new Set(openTeams.flatMap(t=>t.skillsNeeded||[]))];

  // Filtered open teams (Find a Partner)
  const filteredOpen = openTeams.filter(t=>{
    const q = searchQ.toLowerCase();
    const matchQ = !q || [t.name,t.subTheme,t.abstract,t.leadName].some(v=>v?.toLowerCase().includes(q));
    const matchSkill = skillF.length===0 || skillF.some(s=>t.skillsNeeded?.includes(s));
    return matchQ && matchSkill;
  });

  // Filtered teams (Browse)
  const filteredShown = shown.filter(t=>{
    const q = searchQ.toLowerCase();
    return !q || [t.name,t.subTheme,t.theme].some(v=>v?.toLowerCase().includes(q));
  });

  const sendJoin = () => {
    if (!user) { onLoginOpen(); return; }
    if (userTeam) return;
    setJoinRequests(p=>[...p,{
      id:`JR${Date.now()}`, teamId:joinT.id, teamName:joinT.name,
      userId:user.id, userName:user.name, userDept:user.dept,
      message:inviteMsg, status:'pending', direction:'join',
      createdAt: new Date().toISOString(),
    }]);
    toast(`Request sent to ${joinT.name}.`,'success');
    setJoinT(null); setInviteMsg('');
  };

  const handleReq = (id, act) => {
    const reqObj = joinRequests.find(r=>r.id===id);
    if (act==='accepted' && reqObj) {
      const team = teams.find(t=>t.id===reqObj.teamId);
      if (team && team.members.length >= capOf(team)) {
        toast(`Team is already at full capacity (${capOf(team)} members).`,'error');
        return;
      }
      if (setTeams) {
        setTeams(p=>p.map(t=> t.id===reqObj.teamId ? {
          ...t,
          members: t.members.includes(reqObj.userId) ? t.members : [...t.members, reqObj.userId],
          depts: [...(t.depts||[]), reqObj.userDept],
        } : t));
      }
      // Auto-decline this user's other pending requests now that they've joined a team.
      setJoinRequests(p=>p.map(r=>{
        if (r.id===id) return {...r, status:'accepted', resolvedAt: new Date().toISOString()};
        if (r.userId===reqObj.userId && r.status==='pending') return {...r, status:'declined', resolvedAt: new Date().toISOString()};
        return r;
      }));
      toast('✓ Member added to your team!','success');
    } else {
      setJoinRequests(p=>p.map(r=>r.id===id?{...r, status:act, resolvedAt: new Date().toISOString()}:r));
      toast('Request declined.','error');
    }
  };

  // Lead removes a member; admin/coordinator can too. Frees that user to join another team.
  const removeMember = (team, memberId, memberName) => {
    if (!setTeams) return;
    const label = memberName || 'this member';
    if (!window.confirm(`Remove ${label} from "${team.name}"? They can request to join another team.`)) return;
    setTeams(p=>p.map(t=> t.id===team.id ? {
      ...t,
      members: t.members.filter(m=>m!==memberId),
      open: true, missing:['recruiting'],
    } : t));
    // Reset any accepted request so the freed user can request elsewhere.
    setJoinRequests(p=>p.map(r=> (r.teamId===team.id && r.userId===memberId && r.status==='accepted') ? {...r, status:'removed'} : r));
    toast('Member removed. Their slot is now open.','info');
  };

  // Lead dissolves the team entirely; frees every member to join another team.
  const dissolveTeam = (team) => {
    if (!setTeams) return;
    if (!window.confirm(`Dissolve team "${team.name}"? This frees all members and cannot be undone.`)) return;
    setTeams(p=>p.filter(t=>t.id!==team.id));
    setJoinRequests(p=>p.filter(r=>r.teamId!==team.id));
    toast('Team dissolved. All members are free to join another team.','error');
  };

  const toggleTeamOpen = (team) => {
    if (!setTeams) return;
    const willOpen = !team.open;
    if (willOpen && team.members.length >= capOf(team)) {
      toast(`Team is at full capacity (${capOf(team)} members) — free up a slot before opening.`,'error');
      return;
    }
    setTeams(p=>p.map(t=> t.id===team.id ? { ...t, open: willOpen, missing: willOpen?['recruiting']:[] } : t));
    toast(willOpen ? 'Team is now open to join requests.' : 'Team is now closed to new requests.','success');
  };

  const myOutgoing = joinRequests.filter(r=>r.userId===user?.id);
  const inbound    = joinRequests.filter(r=>r.status==='pending' && myTeam && r.teamId===myTeam.id);
  const reqCount   = myOutgoing.length + inbound.length;

  const approvedIdeas = (ideas||[]).filter(i=>i.status==='approved');
  const myIdeas       = (ideas||[]).filter(i=>i.authorId===user?.id);
  const myPendingIdeas = myIdeas.filter(i=>i.status==='pending');
  const teamLeadPending = userTeam && isTeamLead(userTeam)
    ? joinRequests.filter(r => r.teamId === userTeam.id && r.status === 'pending').length : 0;
  const isPickedByTeam = idea => teams.some(t=>t.pickedIdeaId===idea.id) || !!idea.pickedBy;

  const submitIdea = () => {
    const ideaErrors = validateIdeaFields(ideaForm, { requireAll: true });
    if (ideaErrors.length) { toast(ideaErrors[0], 'error'); return; }
    const newIdea = {
      id:`IDK${Date.now()}`, title:ideaForm.title.trim(),
      problemStatement:ideaForm.problemStatement.trim(), impact:ideaForm.impact.trim(),
      desc:ideaForm.problemStatement.trim(),
      theme:ideaForm.theme,
      authorId:user.id, authorName:user.name, authorDept:user.dept,
      status:'pending', submittedAt: new Date().toISOString().slice(0,10), upvotes:[], rejectionComment:'', pickedBy:null,
    };
    setIdeas(p=>[...p, newIdea]);
    setIdeaForm({ title:'', theme:'', problemStatement:'', impact:'' });
    setShowIdeaForm(false);
    toast('Idea submitted! Pending admin approval.','success');
  };

  const toggleUpvote = (ideaId) => {
    if (!user) { onLoginOpen(); return; }
    setIdeas(p=>p.map(i=>i.id===ideaId
      ? { ...i, upvotes: i.upvotes.includes(user.id) ? i.upvotes.filter(x=>x!==user.id) : [...i.upvotes, user.id] }
      : i
    ));
  };

  const filteredAll = teams
    .filter(t => filter==='open' ? isJoinable(t) : filter==='closed' ? isRecruitingClosed(t) : filter==='full' ? isFull(t) : true)
    .filter(t => {
      const q = searchQ.toLowerCase();
      const matchQ = !q || [t.name,t.subTheme,t.abstract,t.leadName,t.theme].some(v=>v?.toLowerCase().includes(q));
      const matchSkill = skillF.length===0 || !isJoinable(t) || skillF.some(s=>t.skillsNeeded?.includes(s));
      const matchRole = roleF.length===0 || !isJoinable(t) || roleF.some(r=>t.rolesNeeded?.includes(r));
      return matchQ && matchSkill && matchRole;
    });

  const teamsActiveFilters = (filter !== 'all' ? 1 : 0) + skillF.length + roleF.length;
  const ideasActiveFilters = filter !== 'all' ? 1 : 0;

  return (
    <div className="mkt-page space-y-3 md:space-y-5">
      {(tab==='partners' || tab==='ideas') && (
        <PageIntro
          className="w-full"
          compactOnMobile
          eyebrow={tab==='partners' ? 'Team Marketplace' : 'Idea Bazaar'}
          title={tab==='partners' ? <>Find your <em className="gradient-text">squad.</em></> : <>{publishedProblems.length} problem{publishedProblems.length!==1?'s':''} looking for <em className="gradient-text">solvers.</em></>}
          description={tab==='partners'
            ? 'Browse registered teams, filter by skills, and send a clean join request when you find the right fit.'
            : 'Explore community-submitted ideas, upvote the strongest concepts, and submit your own for review.'}
          actions={tab==='partners'
            ? [
                ...(!userTeam ? [
                  <button key="create-team" onClick={()=>{ if(!user){onLoginOpen();}else{setView('register');} }}
                    className="bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white px-4 py-2 rounded-[8px] text-[12px] font-[900] btn">{!user ? 'Sign in to create team' : 'Create team'}</button>,
                ] : []),
                <button key="rules" onClick={()=>setShowRules(true)}
                  className="bg-white border border-[color:var(--line-2)] hover:border-[color:var(--ink)] text-[color:var(--ink)] px-4 py-2 rounded-[8px] text-[12px] font-[900] btn">Team RULE</button>,
              ]
            : [
                <button key="submit-idea" onClick={()=>{ if(!user){onLoginOpen();}else{setIdeasPanel('mine');setShowIdeaForm(true);} }}
                  className="bg-[color:var(--ink)] hover:bg-[color:var(--ink-3)] text-white px-4 py-2 rounded-[8px] text-[12px] font-[900] btn">{!user ? 'Sign in to submit' : 'Submit idea'}</button>,
              ]}
        />
      )}

      {/* ── TEAM RULES OVERLAY ── */}
      <Modal open={tab==='partners' && showRules} onClose={()=>setShowRules(false)} title="Team RULE" size="md">
        <p className="text-[12px] text-[color:var(--mute-2)] -mt-2 mb-5">Read before you register or join.</p>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
          {[
            ['M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75', `Team size`, `1 to ${TEAM_MAX_SIZE} members. You start solo as the Team Lead.`],
            ['M7 11V7a5 5 0 0 1 9.9-1 M5 11h14a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2z', `Open vs Closed`, `Open teams appear on the marketplace and accept join requests. Closed teams are locked.`],
            ['M5 11h14a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2z M7 11V7a5 5 0 0 1 10 0v4', `Closing a team`, `You need at least ${TEAM_MIN_TO_CLOSE} members before a team can be Closed.`],
            ['M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8 M19 8v6 M22 11h-6', `Joining`, `No invitations — members join by sending a request that the Team Lead approves.`],
            ['M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8 M22 9l-4 4 M18 9l4 4', `Removals`, `The Team Lead (and admins) can remove members at any time.`],
            ['M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9', `Leaving / dissolving`, `Removed members and dissolved teams free everyone to join another team.`],
          ].map(([icon,title,desc])=>(
            <div key={title} className="flex items-start gap-3">
              <span className="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style={{background:'rgba(255,63,108,0.12)'}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={icon} /></svg>
              </span>
              <div>
                <p className="text-[12.5px] font-[800] text-[color:var(--ink)]">{title}</p>
                <p className="text-[11.5px] text-[color:var(--mute-2)] leading-snug mt-0.5">{desc}</p>
              </div>
            </div>
          ))}
        </div>
      </Modal>

      {/* ── TAB 1: FIND A PARTNER ── */}
      {/* ── TAB 1: PARTNERS (merged) ── */}
      {tab==='partners' && (
        <div className="mkt-page-layout fade-up mt-2 md:mt-4">

          {teamsPanel === 'browse' && (
            <div className="mkt-mobile-search-row lg:hidden">
              <div className="mkt-mobile-search-row__input">
                <AnimatedSearchInput
                  value={searchQ}
                  onChange={e=>{setSearchQ(e.target.value);setMktPage(1);}}
                  onClear={()=>setSearchQ('')}
                  type="teams"
                />
              </div>
              <button
                type="button"
                className={`mkt-filters-btn-secondary btn ${teamsFiltersOpen ? 'mkt-filters-btn-secondary--active' : ''}`}
                onClick={() => setTeamsFiltersOpen(o => !o)}
                aria-expanded={teamsFiltersOpen}
                aria-controls="teams-filters-panel"
              >
                Filters
                {teamsActiveFilters > 0 && <span className="mkt-filters-toggle__badge">{teamsActiveFilters}</span>}
              </button>
            </div>
          )}

          {/* Left Sidebar — browse filters only */}
          {teamsPanel === 'browse' && <aside className="mkt-page-sidebar">
            <div id="teams-filters-panel" className={`mkt-filters-panel space-y-6 ${teamsFiltersOpen ? 'block' : 'hidden'} lg:block`}>
            <div className="hidden lg:block">
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Browse Controls</p>
              <p className="text-[12px] text-[color:var(--mute-2)] mt-2 leading-relaxed">Filter by status, skill need, or team keywords.</p>
            </div>

            {/* Search — desktop sidebar only; mobile uses top search row */}
            <div className="mkt-sidebar-search space-y-1.5 pt-2">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Search Teams</p>
              <AnimatedSearchInput 
                value={searchQ} 
                onChange={e=>{setSearchQ(e.target.value);setMktPage(1);}} 
                onClear={()=>setSearchQ('')}
                type="teams"
              />
            </div>

            {/* Status Filter */}
            <div className="space-y-1.5 pt-2">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Status</p>
              {[['all',`All Teams (${teams.length})`],['open',`Open (${teams.filter(isJoinable).length})`],['closed',`Closed (${teams.filter(isRecruitingClosed).length})`],['full',`Full (${teams.filter(isFull).length})`]].map(([f,l])=>(
                <button key={f} onClick={()=>{setFilter(f);setMktPage(1);}}

                  const dot = idea.status==='approved' ? 'M20 6 9 17l-5-5' : idea.status==='rejected' ? 'M18 6 6 18 M6 6l12 12' : 'M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z M9 22h6';

                <div className="flex items-center justify-between">
                  <p className="text-[14px] font-[800] text-[color:var(--ink)]">Edit Idea</p>
                  <button onClick={()=>setEditIdeaCardId(null)} className="text-[color:var(--mute-3)] hover:text-[color:var(--ink)] font-bold text-[20px] leading-none">×</button>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div>
                    <label className="block text-[11px] font-[700] text-[color:var(--mute-2)] mb-1.5 uppercase tracking-wider">Title</label>
                    <div className="relative">
                      <input value={editIdeaCardDraft.title||''} maxLength={CARD_LIMITS.ideaTitle} onChange={e=>setEditIdeaCardDraft(d=>({...d,title:e.target.value}))}
                        className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[8px] px-3 py-2.5 pr-14 text-[13px] outline-none bg-transparent text-[color:var(--ink)]" />
                      <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-[color:var(--mute-3)] font-mono">{(editIdeaCardDraft.title||'').length}/{CARD_LIMITS.ideaTitle}</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-[11px] font-[700] text-[color:var(--mute-2)] mb-1.5 uppercase tracking-wider">Theme</label>
                    <select value={editIdeaCardDraft.theme||''} onChange={e=>setEditIdeaCardDraft(d=>({...d,theme:e.target.value}))}
                      className="w-full border border-[color:var(--line-2)] rounded-[8px] px-3 py-2.5 text-[13px] outline-none bg-transparent text-[color:var(--ink)] appearance-none">
                      {themes.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                </div>
                <div>
                  <label className="block text-[11px] font-[700] text-[color:var(--mute-2)] mb-1.5 uppercase tracking-wider">Problem Statement</label>
                  <textarea rows={4} maxLength={CARD_LIMITS.ideaProblem} value={editIdeaCardDraft.problemStatement||''} onChange={e=>setEditIdeaCardDraft(d=>({...d,problemStatement:e.target.value}))}
                    className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[8px] px-3 py-2.5 text-[13px] outline-none resize-none bg-transparent text-[color:var(--ink)]" />
                  <p className="text-[10px] text-[color:var(--mute-3)] text-right mt-1 font-mono">{(editIdeaCardDraft.problemStatement||'').length}/{CARD_LIMITS.ideaProblem}</p>
                </div>
                <div>
                  <label className="block text-[11px] font-[700] text-[color:var(--mute-2)] mb-1.5 uppercase tracking-wider">Expected Impact <span className="font-normal italic text-[color:var(--mute-3)]">(quantification not required)</span></label>
                  <textarea rows={2} maxLength={CARD_LIMITS.ideaImpact} value={editIdeaCardDraft.impact||''} onChange={e=>setEditIdeaCardDraft(d=>({...d,impact:e.target.value}))}
                    className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[8px] px-3 py-2.5 text-[13px] outline-none resize-none bg-transparent text-[color:var(--ink)]" />
                  <p className="text-[10px] text-[color:var(--mute-3)] text-right mt-1 font-mono">{(editIdeaCardDraft.impact||'').length}/{CARD_LIMITS.ideaImpact}</p>
                </div>
                <div className="flex gap-2 justify-end">
                  <Btn variant="ghost" className="text-[12px] py-2" onClick={()=>setEditIdeaCardId(null)}>Cancel</Btn>
                  <Btn variant="primary" className="text-[12px] py-2 px-5" onClick={()=>{
                    const ideaErrors = validateIdeaFields(editIdeaCardDraft, { requireAll: true });
                    if (ideaErrors.length) { toast(ideaErrors[0], 'error'); return; }
                    setIdeas(p=>p.map(x=>x.id===editIdeaCardId?{...x,...editIdeaCardDraft,desc:editIdeaCardDraft.problemStatement}:x));
                    setEditIdeaCardId(null); toast('Idea updated.','success');
                  }}>Save Changes</Btn>
                </div>
              </div>
            )}
            </>}

            {ideasPanel === 'browse' && <>
            {/* Approved Ideas Grid */}
            <div className="mkt-ideas-grid">
              {approvedIdeas.filter(i=> filter==='all' || i.theme===filter).slice((ideaPage-1)*IDEA_PAGE_SIZE, ideaPage*IDEA_PAGE_SIZE).map((idea, idx) => {
                const hasUpvoted = idea.upvotes.includes(user?.id||'');
                const headerColors = getHeaderColors(idea.theme);
                const cardDate = getCardDate(idea.id, idea.submittedAt);
                const picked = isPickedByTeam(idea);
                const pickedTeam = teams.find(t=>t.pickedIdeaId===idea.id) || teams.find(t=>t.id===idea.pickedBy);
                const isAuthor = user?.id === idea.authorId;
                return (
                  <div key={idea.id} className={`mkt-idea-card rounded-[16px] flex flex-col overflow-hidden transition-all duration-300 hover:-translate-y-1 ${gc(idx)} hover:shadow-[0_16px_32px_rgba(0,0,0,0.28)] border min-w-0`}>

                    {/* Header bar */}
                    <div
                      style={{ background: headerColors.gradient, color: headerColors.text }}
                      className="px-5 py-3 flex justify-between items-center font-mono font-bold text-[11px] uppercase tracking-wider rounded-t-[16px]"
                    >
                      <span>{idea.theme}</span>
                      <div className="flex items-center gap-2">
                        {picked && (
                          <span className="text-[9px] font-[900] uppercase tracking-widest px-2 py-0.5 rounded-full inline-flex items-center gap-1" style={{background:'rgba(168,85,247,0.25)', color:'#d8b4fe', border:'1px solid rgba(168,85,247,0.4)'}} title={pickedTeam ? `Picked by ${pickedTeam.name}` : 'Picked by a team'}>
                            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                            Picked
                          </span>
                        )}
                        <span>{cardDate}</span>
                      </div>
                    </div>

                    <div className="mkt-idea-card-body rounded-b-[16px]">
                      <h3 className="text-[17px] font-[900] text-[color:var(--ink)] leading-[1.2] tracking-tight line-clamp-2">
                        {idea.title}
                      </h3>

                      <p className="text-[12.5px] text-[color:var(--mute-1)] leading-[1.55] line-clamp-3">
                        {idea.desc || idea.problemStatement}
                      </p>

                      <p className="text-[11px] text-[color:var(--mute-3)] font-medium">
                        {idea.authorName} · {idea.authorDept}
                      </p>

                      <div className="border-t border-white/10 pt-3 mt-auto flex-shrink-0 flex items-center justify-between gap-3">
                        <span className="text-[17px] font-[900] text-[color:var(--ink)] leading-none">
                          ▲ {idea.upvotes.length}
                        </span>
                        <div className="flex items-center gap-2">
                          {isAuthor && (
                            <button onClick={()=>{setIdeasPanel('mine'); setEditIdeaCardId(idea.id); setEditIdeaCardDraft({title:idea.title,theme:idea.theme,problemStatement:idea.problemStatement||idea.desc||'',impact:idea.impact||''}); setShowIdeaForm(false);}}
                              className="text-[11px] font-[700] px-3 py-1.5 rounded-full btn" style={{color:'var(--accent)', border:'1px solid rgba(255,255,255,0.12)', background:'rgba(255,255,255,0.04)'}}>
                              Edit
                            </button>
                          )}
                          <button
                            onClick={() => toggleUpvote(idea.id)}
                            className={`rounded-full px-4 py-2 text-[12px] font-[800] transition-all ${
                              hasUpvoted
                                ? 'bg-[color:var(--accent)] text-white hover:opacity-90'
                                : 'bg-[color:var(--ink)] text-white hover:bg-[color:var(--ink-3)]'
                            }`}
                          >
                            {hasUpvoted ? 'Upvoted ✓' : (user ? 'Upvote' : 'Sign in to upvote')}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
              {approvedIdeas.filter(i=> filter==='all' || i.theme===filter).length === 0 && (
                <div className="col-span-full py-16 text-center">
                  <p className="text-[32px] mb-2">🌱</p>
                  <p className="text-[13px] text-[color:var(--mute-3)]">No ideas found for this theme. Be the first to submit one!</p>
                </div>
              )}
            </div>

            <div className="mkt-pager">
              {(() => {
                const filtered = approvedIdeas.filter(i=> filter==='all' || i.theme===filter);
                const totalPages = Math.max(1, Math.ceil(filtered.length / IDEA_PAGE_SIZE) || 1);
                const page = Math.min(ideaPage, totalPages);
                return <AdminPager page={page} setPage={setIdeaPage} total={filtered.length} pageSize={IDEA_PAGE_SIZE} label="ideas" />;
              })()}
            </div>
            </>}

          </div>
        </div>
      )}

      <Modal open={!!detailT} onClose={()=>setDetailT(null)} title="" size="md" dark showClose panelClass="mkt-team-detail-panel">
        {detailT && (() => {
          const full = isFull(detailT);
          const closed = isRecruitingClosed(detailT);
          const joinable = isJoinable(detailT);
          const req = myReqTo(detailT);
          const score = matchScore(detailT);
          const cap = capOf(detailT);
          const slotsLeft = Math.max(0, cap - detailT.members.length);
          const headerColors = getHeaderColors(detailT.theme);
          const pickedIdea = (ideas||[]).find(i => i.id === detailT.pickedIdeaId);
          const seekingChips = [
            ...(detailT.rolesNeeded||[]).map(r => `Seeking ${r}`),
            ...(detailT.skillsNeeded||[]),
            ...(detailT.missing||[]),
          ];
          const openJoinFlow = () => {
            if (!user) { onLoginOpen?.(); return; }
            if (userTeam) return;
            setDetailT(null);
            setJoinT(detailT);
          };
          return (
            <div className="space-y-3.5">
              <div className="rounded-[12px] overflow-hidden border border-white/10">
                <div
                  style={{ background: headerColors.gradient, color: headerColors.text }}
                  className="px-4 py-2.5 flex justify-between items-center font-mono font-bold text-[10px] uppercase tracking-wider"
                >
                  <span>{detailT.theme}</span>
                  <span>{detailT.id}</span>
                </div>
                <div className="px-4 py-3.5 bg-[rgba(255,255,255,0.02)]">
                  <h2 className="text-[18px] font-[900] text-white leading-snug tracking-tight">{detailT.name}</h2>
                  {detailT.subTheme && <p className="text-[12px] text-[color:var(--accent)] font-semibold mt-1">{detailT.subTheme}</p>}
                  {detailT.leadName && (
                    <p className="text-[11px] text-white/50 mt-1.5">
                      Led by <span className="text-white/80 font-[700]">{detailT.leadName}</span>
                      {detailT.leadDept ? ` · ${detailT.leadDept}` : ''}
                    </p>
                  )}
                </div>
              </div>

              <div className="flex flex-wrap gap-1.5">
                <span className={`mkt-team-modal-chip mkt-team-modal-chip--${closed ? 'closed' : 'open'}`}>{closed ? 'Closed' : 'Open'}</span>
                {full && <span className="mkt-team-modal-chip mkt-team-modal-chip--full">Full</span>}
                <span className="mkt-team-modal-chip">{detailT.members.length}/{cap} members</span>
                {!full && slotsLeft > 0 && <span className="mkt-team-modal-chip">{slotsLeft} slot{slotsLeft!==1?'s':''} open</span>}
                {joinable && score > 0 && <span className="mkt-team-modal-chip mkt-team-modal-chip--match">{score}% match</span>}
              </div>

              {detailT.abstract && (
                <p className="text-[12.5px] text-white/70 leading-relaxed line-clamp-4">{detailT.abstract}</p>
              )}

              {pickedIdea && (
                <p className="text-[11px] text-white/55">
                  <span className="text-white/40 uppercase tracking-wider font-[800] text-[10px]">Idea · </span>
                  <span className="text-white/80 font-[700]">{pickedIdea.title}</span>
                </p>
              )}

              {(detailT.depts?.length > 0 || seekingChips.length > 0) && (
                <div className="mkt-team-modal-section">
                  {detailT.depts?.length > 0 && (
                    <div className="flex flex-wrap gap-1.5 mb-2">
                      {detailT.depts.map(d => <span key={d} className="mkt-team-modal-chip">{d}</span>)}
                    </div>
                  )}
                  {seekingChips.length > 0 && (
                    <div className="flex flex-wrap gap-1.5">
                      {seekingChips.map(s => <span key={s} className="mkt-team-modal-chip mkt-team-modal-chip--accent">{s}</span>)}
                    </div>
                  )}
                </div>
              )}

              <div>
                <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-white/40 mb-2">Members</p>
                <div className="space-y-1.5 max-h-[140px] overflow-y-auto pr-0.5">
                  {detailT.members.map((mId, i) => {
                    const m = USERS.find(u => u.id === mId) || { name: 'User ' + mId, dept: 'Unknown', role: '-' };
                    return (
                      <div key={mId} className="mkt-team-detail-member">
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-[800] flex-shrink-0 ${i === 0 ? 'bg-[color:var(--accent)] text-white' : 'bg-white/10 text-white/70'}`}>
                          {initials(m.name || '?')}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-[12px] text-white font-[800] truncate">
                            {m.name}{i === 0 && <span className="ml-1 text-[9px] font-[800] text-[color:var(--accent)]">Lead</span>}
                          </p>
                          <p className="text-[10px] text-white/45 capitalize truncate">{m.dept}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="pt-0.5">
                {userTeam ? (
                  userTeam.id === detailT.id
                    ? <p className="text-[11px] font-[700] text-emerald-300/90 text-center py-2">This is your team.</p>
                    : null
                ) : !joinable ? (
                  <button type="button" disabled className="mkt-team-modal-cta mkt-team-modal-cta--disabled btn">
                    {joinBlockReason(detailT) === 'full' ? 'Team is full' : 'Team is closed to requests'}
                  </button>
                ) : req?.status === 'pending' ? (
                  <button type="button" disabled className="mkt-team-modal-cta mkt-team-modal-cta--pending btn">Request pending</button>
                ) : req?.status === 'accepted' ? (
                  <button type="button" disabled className="mkt-team-modal-cta mkt-team-modal-cta--accepted btn">You are on this team</button>
                ) : (
                  <button type="button" className="mkt-team-modal-cta mkt-team-modal-cta--primary btn" onClick={openJoinFlow}>
                    {!user ? 'Sign in to request' : 'Request to join'}
                  </button>
                )}
              </div>
            </div>
          );
        })()}
      </Modal>

      <Modal open={!!joinT} onClose={()=>{setJoinT(null);setInviteMsg('');}} title="Request to join" size="md" dark>
        {joinT && (
          <div className="space-y-4 -mt-1">
            <div className="mkt-team-modal-section">
              <p className="text-[15px] font-[800] text-white">{joinT.name}</p>
              <p className="text-[12px] text-[color:var(--accent)] font-semibold mt-1">{joinT.subTheme}</p>
              {joinT.leadName && <p className="text-[11px] text-white/50 mt-2">Led by {joinT.leadName}{joinT.leadDept ? ` · ${joinT.leadDept}` : ''}</p>}
              {joinT.abstract && <p className="text-[12px] text-white/65 leading-relaxed mt-3 line-clamp-4">{joinT.abstract}</p>}
              {joinT.skillsNeeded?.length > 0 && (
                <div className="flex flex-wrap gap-1.5 mt-3">
                  {joinT.skillsNeeded.map(s => <span key={s} className="mkt-team-modal-chip mkt-team-modal-chip--accent">{s}</span>)}
                </div>
              )}
            </div>

            {user && (
              <div className="mkt-team-modal-section" style={{ borderColor: 'rgba(255,63,108,0.25)', background: 'rgba(255,63,108,0.06)' }}>
                <p className="text-[10px] text-[color:var(--accent)] uppercase tracking-[0.12em] font-[800] mb-2">Your profile</p>
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full bg-[color:var(--accent)] flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">
                    {initials(user.name)}
                  </div>
                  <div>
                    <p className="text-[13px] font-[800] text-white">{user.name}</p>
                    <p className="text-[11px] text-white/50">{user.dept} · {user.email}</p>
                  </div>
                </div>
              </div>
            )}

            <div>
              <label className="block text-[12px] font-[700] text-white/70 mb-1.5">
                Introduce yourself <span className="text-white/40 font-normal">(optional but recommended)</span>
              </label>
              <textarea
                value={inviteMsg}
                onChange={e=>setInviteMsg(e.target.value)}
                rows={4}
                placeholder="Tell them what you bring to the table — skills, past projects, what excites you about their idea..."
                className="w-full bg-white/[0.04] border border-white/12 focus:border-[color:var(--accent)] rounded-[10px] px-3.5 py-2.5 text-[13px] text-white placeholder-white/30 outline-none resize-none transition-colors"
              />
            </div>

            <div className="flex gap-2 pt-1">
              <button type="button" className="flex-1 py-2.5 rounded-[10px] text-[13px] font-[700] btn border border-white/12 bg-white/[0.04] text-white/70 hover:bg-white/[0.08] hover:text-white" onClick={()=>{setJoinT(null);setInviteMsg('');}}>Cancel</button>
              <button type="button" className="flex-1 py-2.5 rounded-[10px] text-[13px] font-[800] btn mkt-team-modal-cta--primary" onClick={sendJoin}>Send request →</button>
            </div>
          </div>
        )}
      </Modal>

    </div>
  );
}

function FunZoneView({ quizzes, user, onQuizSubmit, setQuizzes }) {
  const [showAddQuiz, setShowAddQuiz] = React.useState(false);
  const [newQuiz, setNewQuiz] = React.useState({ q: '', opts: ['', '', '', ''], correct: 0, explain: '' });

  const handleAddQuiz = () => {
    if(!newQuiz.q || !newQuiz.opts.every(o=>o)) {
      alert("Please fill all fields for the new quiz.");
      return;
    }
    setQuizzes([...quizzes, newQuiz]);
    setShowAddQuiz(false);
    setNewQuiz({ q: '', opts: ['', '', '', ''], correct: 0, explain: '' });
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <h2 className="text-[14px] text-[color:var(--ink)]" style={{lineHeight:1.4}}>Fun Zone</h2>
          <span className="text-[22px]">🎉</span>
        </div>
        {user?.role === 'admin' && (
          <button onClick={()=>setShowAddQuiz(true)} className="bg-[color:var(--ink)] text-white text-[11px] font-[800] uppercase tracking-wide px-3 py-1.5 rounded-[3px] hover:bg-[color:var(--ink-3)]">+ Add Quiz</button>
        )}
      </div>
      <p className="text-[13px] text-[color:var(--mute-2)] -mt-2">Take a break — react to memes, test your Tech Week knowledge.</p>

      {showAddQuiz && (
        <div className="p-5 border border-[color:var(--line-2)] bg-white fade-up mb-4 shadow-sm rounded-[3px]">
          <p className="text-[14px] font-[800] mb-3">Add New Quiz</p>
          <div className="space-y-3">
            <input placeholder="Question" value={newQuiz.q} onChange={e=>setNewQuiz(f=>({...f,q:e.target.value}))} className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] outline-none" />
            <div className="grid grid-cols-2 gap-2">
              {newQuiz.opts.map((o,i)=>(
                <div key={i} className="flex items-center gap-2">
                  <input type="radio" name="correctOpt" checked={newQuiz.correct===i} onChange={()=>setNewQuiz(f=>({...f,correct:i}))} className="accent-[color:var(--accent)]" />
                  <input placeholder={`Option ${i+1}`} value={o} onChange={e=>{
                    const newOpts=[...newQuiz.opts]; newOpts[i]=e.target.value;
                    setNewQuiz(f=>({...f,opts:newOpts}));
                  }} className="flex-1 border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-2 py-1.5 text-[12px] outline-none" />
                </div>
              ))}
            </div>
            <input placeholder="Explanation when correct/wrong" value={newQuiz.explain} onChange={e=>setNewQuiz(f=>({...f,explain:e.target.value}))} className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] outline-none" />
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={()=>setShowAddQuiz(false)} className="px-4 py-1.5 text-[12px] font-[700] border border-[color:var(--line-2)] rounded-[3px] hover:bg-[color:var(--paper-2)]">Cancel</button>
              <button onClick={handleAddQuiz} className="px-4 py-1.5 text-[12px] font-[700] bg-[color:var(--accent)] text-white rounded-[3px] hover:bg-[#2222dd]">Save Quiz</button>
            </div>
          </div>
        </div>
      )}


      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        {/* Meme Wall */}
        <div className="p-6">
          <p className="text-[13px] font-semibold text-[color:var(--ink)] mb-1 flex items-center gap-2">
            😂 Meme Wall
            <span className="text-[11px] text-[color:var(--mute-3)] font-normal">#techweek-vibes</span>
          </p>
          <p className="text-[12px] text-[color:var(--mute-3)] mb-4">React to the most relatable hackathon moments.</p>
          <MemeWall />
        </div>

        {/* Quiz */}
        <div className="p-6">
          <p className="text-[13px] font-semibold text-[color:var(--ink)] mb-1 flex items-center gap-2">
            🧠 Tech Week Trivia
          </p>
          <p className="text-[12px] text-[color:var(--mute-3)] mb-4">How well do you know the event rules and teams?</p>
          <QuizGame quizzes={quizzes} user={user} onFinish={onQuizSubmit} />
        </div>
      </div>
    </div>
  );
}

function AddContentComposer({ quizzes, setQuizzes, memes, setMemes, toast }) {
  const blankQuiz = () => ({ q:'', opts:['','','',''], correct:0, explain:'' });
  const blankMeme = () => ({
    title:'',
    text:'',
    tag:'',
    author:'',
    image:'',
    emoji:'😂',
    bg:'linear-gradient(135deg,#111827,#3333FF)',
  });
  const [open, setOpen] = React.useState(false);
  const [kind, setKind] = React.useState('meme');

  const [memeDraft, setMemeDraft] = React.useState(blankMeme());
  const [quizTargetIdx, setQuizTargetIdx] = React.useState(0);

    opts[idx] = value;
    setQuizDraft(d => ({ ...d, opts }));

    const opts = quizDraft.opts.map(o => o.trim());

        return {
          ...quiz,
          questions: [...(quiz.questions || []), { q, opts, correct:Number(quizDraft.correct), explain }]
        };
      }
      return quiz;
    }));
    setQuizDraft(blankQuiz());
    toast?.('Quiz question added to Fun Zone.', 'success');
  };

  const saveMeme = () => {
    const title = memeDraft.title.trim();
    const text = memeDraft.text.trim();
    if (!title || !text) {
      toast?.('Add a meme title and caption.', 'error');
      return;

    const id = Date.now();
    setMemes(prev => [{
      id,
      emoji: memeDraft.emoji.trim() || '😂',
      image: memeDraft.image.trim() || `https://picsum.photos/seed/techweek-user-${id}/900/675`,
      bg: memeDraft.bg,
      tag: memeDraft.tag.trim() || 'Team Moment',
      title,
      text,
      author: memeDraft.author.trim() || '@techweek.team',
      reactions:{fire:0,cry:0,skull:0,clap:0},

  return (
    <div className="border border-[color:var(--line-2)] bg-white rounded-[16px] overflow-hidden shadow-sm">
      <button onClick={()=>setOpen(o=>!o)} className="w-full px-5 py-4 flex items-center justify-between text-left btn hover:bg-[color:var(--paper)]">
        <div>
          <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--accent)]">Admin Tools</p>
          <p className="text-[13px] font-[800] text-[color:var(--ink)] mt-1">Add content to Fun Zone</p>
        </div>
        <span className="px-3 py-1.5 bg-[color:var(--ink)] text-white rounded-[8px] text-[11px] font-[900]">{open ? 'Close' : 'Add content'}</span>
      </button>

      {open && (
        <div className="px-5 pb-5 space-y-4 fade-up">
          <div className="inline-flex p-1 bg-[color:var(--paper-2)] border border-[color:var(--line-2)] rounded-[8px]">
            {[['meme','Meme Wall'],['quiz','Quiz Question']].map(([id,label])=>(
              <button key={id} onClick={()=>setKind(id)}
                className={`px-3 py-1.5 text-[12px] font-[900] rounded-[8px] btn ${kind===id?'bg-white text-[color:var(--ink)] shadow-sm':'text-[color:var(--mute-2)] hover:text-[color:var(--ink)]'}`}>
                {label}
              </button>
            ))}
          </div>

          {kind === 'meme' && (
            <div className="grid grid-cols-1 lg:grid-cols-[1fr_0.85fr] gap-4">
              <div className="space-y-3">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  <input value={memeDraft.title} onChange={e=>setMemeDraft(d=>({...d,title:e.target.value}))}
                    placeholder="Card title"
                    className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]" />
                  <input value={memeDraft.tag} onChange={e=>setMemeDraft(d=>({...d,tag:e.target.value}))}
                    placeholder="Label, e.g. War Room"
                    className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]" />
                </div>
                <textarea rows={3} value={memeDraft.text} onChange={e=>setMemeDraft(d=>({...d,text:e.target.value}))}
                  placeholder="Caption"
                  className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] resize-none focus:outline-none focus:border-[color:var(--accent)]" />
                <div className="grid grid-cols-1 sm:grid-cols-[90px_1fr] gap-2">
                  <input value={memeDraft.emoji} onChange={e=>setMemeDraft(d=>({...d,emoji:e.target.value}))}
                    placeholder="Emoji"
                    className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]" />
                  <input value={memeDraft.author} onChange={e=>setMemeDraft(d=>({...d,author:e.target.value}))}
                    placeholder="Author handle"
                    className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]" />
                </div>
                <input value={memeDraft.image} onChange={e=>setMemeDraft(d=>({...d,image:e.target.value}))}
                  placeholder="Image URL, optional"
                  className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]" />
                <button onClick={saveMeme} className="px-4 py-2 bg-[color:var(--accent)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all">
                  Add meme
                </button>
              </div>
              <div className="border border-[color:var(--line-2)] rounded-[16px] overflow-hidden bg-white shadow-sm">
                <div className="relative aspect-[4/3] overflow-hidden" style={{background:memeDraft.bg}}>
                  {memeDraft.image && <img src={memeDraft.image} alt="" onError={e=>{e.currentTarget.style.display='none';}} className="w-full h-full object-cover" />}
                  <div className="absolute inset-0 bg-gradient-to-t from-black/75 via-black/20 to-transparent" />
                  <div className="absolute bottom-0 inset-x-0 p-4">
                    <span className="inline-flex items-center gap-1.5 bg-white text-[color:var(--ink)] px-2.5 py-1 rounded-full text-[10px] font-[900] uppercase tracking-[0.15em] shadow-sm">
                      <FluentEmoji char={memeDraft.emoji || '😂'} className="w-3 h-3 flex-shrink-0" fallbackStyle={{ fontSize: '10px' }} />
                      <span>{memeDraft.tag || 'Team Moment'}</span>
                    </span>
                    <p className="text-white text-[17px] font-[900] tracking-tight leading-tight mt-3">{memeDraft.title || 'Preview title'}</p>
                  </div>
                </div>
                <p className="p-4 text-[13px] text-[color:var(--mute-1)]">{memeDraft.text || 'Preview caption will appear here.'}</p>
              </div>
            </div>
          )}

          {kind === 'quiz' && (
            <div className="space-y-3">
              <div className="flex flex-col gap-1">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Target Quiz Topic</label>
                <select value={quizTargetIdx} onChange={e=>setQuizTargetIdx(Number(e.target.value))} className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]">
                  {quizzes.map((quiz, i) => (
                    <option key={quiz.id || i} value={i}>{quiz.title}</option>
                  ))}
                </select>
              </div>

              <textarea rows={2} value={quizDraft.q} onChange={e=>setQuizDraft(d=>({...d,q:e.target.value}))}
                placeholder="Question"
                className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] resize-none focus:outline-none focus:border-[color:var(--accent)]" />

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {quizDraft.opts.map((opt, i)=>(
                  <label key={i} className={`flex items-center gap-2 bg-white border rounded-[8px] px-3 py-2 ${quizDraft.correct===i?'border-[color:var(--accent)]':'border-[color:var(--line-2)]'}`}>
                    <input type="radio" name="funzone-correct" checked={quizDraft.correct===i}
                      onChange={()=>setQuizDraft(d=>({...d,correct:i}))} className="accent-[color:var(--accent)]" />
                    <input value={opt} onChange={e=>updateOption(i, e.target.value)}
                      placeholder={`Option ${String.fromCharCode(65+i)}`}
                      className="min-w-0 flex-1 border-0 bg-transparent px-0 py-0 text-[12px] focus:outline-none focus:shadow-none" />
                  </label>
                ))}
              </div>

              <input value={quizDraft.explain} onChange={e=>setQuizDraft(d=>({...d,explain:e.target.value}))}
                placeholder="Explanation shown after answering"
                className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]" />

              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pt-1">
                <p className="text-[11px] text-[color:var(--mute-2)] font-[700]">{quizzes.reduce((sum, q) => sum + (q.questions?.length || 0), 0)} questions currently active</p>
                <button onClick={saveQuiz} className="px-4 py-2 bg-[color:var(--accent)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all">
                  Add question
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function RichQuizGame({ quizzes, user, onFinish }) {
  const [activeQuizIdx, setActiveQuizIdx] = React.useState(0);
  const [unlockedQuizzes, setUnlockedQuizzes] = React.useState(() => {
    try {
      const saved = localStorage.getItem('unlockedQuizzes');
      return saved ? JSON.parse(saved) : [0];
    } catch (e) {
      return [0];
    }
  });

  const [idx, setIdx] = React.useState(0);
  const [ans, setAns] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [complete, setComplete] = React.useState(false);

  React.useEffect(() => {
    setIdx(0);
    setAns(null);
    setScore(0);
    setComplete(false);
  }, [quizzes.length, activeQuizIdx]);

  if (!quizzes || quizzes.length === 0) {
    return (
      <div className="border border-dashed border-[color:var(--mute-4)] rounded-[8px] p-8 text-center">
        <p className="text-[13px] font-[800] text-[color:var(--ink)]">No quiz questions yet.</p>
        <p className="text-[12px] text-[color:var(--mute-3)] mt-1">Ask an admin to add the first challenge.</p>
      </div>
    );
  }

  const currentQuiz = quizzes[activeQuizIdx];
  const currentQuestions = currentQuiz?.questions || [];
  const q = currentQuestions[idx];

  const reset = () => {
    setIdx(0);
    setAns(null);
    setScore(0);
    setComplete(false);
  };

  const pick = (i) => {
    if (ans !== null) return;
    const nextScore = score + (i === q.correct ? 1 : 0);
    setAns(i);
    setScore(nextScore);
    if (idx === currentQuestions.length - 1) {
      onFinish?.({ score: nextScore, total: currentQuestions.length });
    }
  };

  const advance = () => {
    if (idx === currentQuestions.length - 1) {
      setComplete(true);
    } else {
      setIdx(i => i + 1);
      setAns(null);
    }
  };

  const unlockNext = () => {
    const nextIdx = activeQuizIdx + 1;
    if (nextIdx < quizzes.length) {
      const newUnlocked = [...unlockedQuizzes];
      if (!newUnlocked.includes(nextIdx)) {
        newUnlocked.push(nextIdx);
        setUnlockedQuizzes(newUnlocked);
        localStorage.setItem('unlockedQuizzes', JSON.stringify(newUnlocked));
      }
      setActiveQuizIdx(nextIdx);
      setIdx(0);
      setAns(null);
      setScore(0);
      setComplete(false);
    }
  };

  if (complete) {
    const pct = Math.round((score / currentQuestions.length) * 100);
    return (
      <div className="border border-[color:var(--line-2)] bg-[color:var(--paper)] rounded-[16px] p-6 text-center">
        <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Quiz complete</p>
        <p className="text-[42px] font-[900] text-[color:var(--ink)] leading-none mt-3">{pct}%</p>
        <p className="text-[14px] font-[800] text-[color:var(--accent)] mt-2">{score} of {currentQuestions.length} correct</p>
        <p className="text-[12px] text-[color:var(--mute-2)] mt-2">
          {score === currentQuestions.length ? 'Perfect run. Bragging rights unlocked.' : 'Warm up complete. Run it back and climb the board.'}
        </p>
        <div className="mt-5 flex flex-wrap justify-center gap-3">
          <button onClick={reset} className="px-5 py-2 bg-[color:var(--ink)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[color:var(--ink-3)] transition-all">
            Retry Quiz
          </button>
          {activeQuizIdx < quizzes.length - 1 && (
            <button onClick={unlockNext} className="px-5 py-2 bg-[color:var(--accent)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all">
              Unlock: {quizzes[activeQuizIdx + 1].title}
            </button>
          )}
        </div>
      </div>
    );
  }

  const getTransitionLabel = () => {
    if (idx === currentQuestions.length - 1) {
      return "Finish Quiz & See Score";
    }
    if (idx === 0) {
      return "OK now, second question is this:";
    }
    if (idx === 1) {
      return "OK now, third question is this:";
    }
    return `OK now, question ${idx + 2} is this:`;
  };

  return (
    <div className="border border-[color:var(--line-2)] bg-white rounded-[16px] p-5 space-y-4">
      {/* Quiz selector tabs */}
      <div className="flex flex-wrap gap-2 pb-3 border-b border-[color:var(--line-2)]">
        {quizzes.map((quiz, i) => {
          const isUnlocked = unlockedQuizzes.includes(i);
          const isActive = activeQuizIdx === i;
          return (
            <button
              key={quiz.id || i}
              disabled={!isUnlocked}
              onClick={() => {
                setActiveQuizIdx(i);
              }}
              className={`px-3 py-1.5 text-[11px] font-[800] rounded-[8px] border transition-all duration-200 flex items-center gap-1.5 ${
                isActive
                  ? 'bg-[color:var(--accent)] text-white border-[color:var(--accent)] shadow-sm'
                  : isUnlocked
                  ? 'bg-white text-[color:var(--ink)] border-[color:var(--line-2)] hover:bg-[color:var(--paper)]'
                  : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed opacity-60'
              }`}
            >
              {!isUnlocked && <span className="text-[10px]">🔒</span>}
              <span>{quiz.title}</span>
            </button>
          );
        })}
      </div>

      {!q ? (
        <div className="text-center py-6 text-[13px] text-[color:var(--mute-2)]">
          No questions in this quiz topic.
        </div>
      ) : (
        <>
          <div className="flex items-center justify-between gap-3 mb-1">
            <p className="text-[11px] text-[color:var(--mute-3)] font-[900] uppercase tracking-[0.14em]">Question {idx+1} / {currentQuestions.length}</p>
            <p className="text-[11px] font-[800] text-[color:var(--accent)]">{user ? user.name.split(' ')[0] : 'Guest'} run</p>
          </div>

          <div className="grid gap-1 mb-2" style={{ gridTemplateColumns: `repeat(${currentQuestions.length}, minmax(0, 1fr))` }}>
            {currentQuestions.map((_, i)=>(
              <span key={i} className={`h-1.5 rounded-full ${i<idx?'bg-[color:var(--accent)]':i===idx?'bg-[#f97316]':'bg-[color:var(--line-2)]'}`} />
            ))}
          </div>

          <p className="text-[15px] font-[800] text-[color:var(--ink)] leading-snug">{q.q}</p>
          <div className="space-y-2">
            {q.opts.map((o, i)=>{
              let cls = 'border-[color:var(--line-2)] bg-[color:var(--paper)] text-[color:var(--mute-1)] hover:border-[color:var(--accent)] hover:bg-[#eeeeff]';
              if (ans !== null) {
                if (i === q.correct) cls = 'border-[#22c55e] bg-[#f0fdf4] text-[#15803d]';
                else if (i === ans) cls = 'border-[#ef4444] bg-[#fef2f2] text-[#dc2626]';
                else cls = 'border-[color:var(--line)] bg-white text-[#c4c4c8]';
              }
              return (
                <button key={i} onClick={()=>pick(i)} className={`w-full text-left px-4 py-3 rounded-[8px] border text-[13px] font-[700] btn ${cls}`}>
                  <span className="inline-flex items-center justify-center w-6 h-6 mr-2 rounded-full bg-white border border-current text-[11px]">{String.fromCharCode(65+i)}</span>
                  {o}
                </button>
              );
            })}
          </div>

          {ans !== null && (
            <div className="mt-4 space-y-3">
              <div className={`rounded-[8px] px-4 py-3 text-[12px] font-[700] ${ans===q.correct?'bg-[#f0fdf4] text-[#15803d]':'bg-[#fffbeb] text-[#b45309]'}`}>
                {ans===q.correct ? 'Correct. ' : 'Not quite. '}{q.explain}
              </div>
              <button onClick={advance} className="w-full py-2.5 bg-[color:var(--ink)] text-white text-[13px] font-[900] rounded-[8px] btn hover:bg-[color:var(--ink-3)] transition-all">
                {getTransitionLabel()}
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function RichFunZoneView({ quizzes, user, onQuizSubmit, setQuizzes, quizResults=[], memes=MEMES, setMemes, toast }) {
  const isAdmin = user && ['admin','coordinator'].includes(user.role);
  const topResults = [...(quizResults || [])].sort((a,b)=>(b.score/b.total)-(a.score/a.total)).slice(0, 5);
  const totalReactions = memes.reduce((sum, m)=>sum + Object.values(m.reactions).reduce((a,b)=>a+b,0), 0);
  const bestScore = topResults[0] ? `${topResults[0].score}/${topResults[0].total}` : '-';
  const dailySparks = [
    { title:'Bug bounty sprint', desc:'Spot a broken edge case in any demo and post the cleanest repro.' },
    { title:'Pitch in 30 seconds', desc:'Explain your project to a non-tech teammate without using jargon.' },
    { title:'Best team chant', desc:'Drop a two-line team chant. Bonus points if leadership can repeat it.' },

  const [memeTitle, setMemeTitle] = React.useState('');
  const [memeCaption, setMemeCaption] = React.useState('');

  const [customTag, setCustomTag] = React.useState('');
  const [selectedEmoji, setSelectedEmoji] = React.useState('😂');
  const [selectedTemplateIdx, setSelectedTemplateIdx] = React.useState(0);
  const [customImage, setCustomImage] = React.useState('');
  const [authorHandle, setAuthorHandle] = React.useState('');

  const MEME_TEMPLATES = [
    { image: 'Frame 8.png', bg: 'linear-gradient(135deg,#1f2937,#3333FF)', label: 'Template 1' },
    { image: 'Frame 10.png', bg: 'linear-gradient(135deg,#111827,#f97316)', label: 'Template 2' },
    { image: 'Frame 17.png', bg: 'linear-gradient(135deg,#78350f,#facc15)', label: 'Template 3' },
    { image: 'Frame 18.png', bg: 'linear-gradient(135deg,#312e81,#ec4899)', label: 'Template 4' },
    { image: 'Frame 19.png', bg: 'linear-gradient(135deg,#064e3b,#22c55e)', label: 'Template 5' }
  ];

  React.useEffect(() => {
    if (memeModalOpen) {
      if (user && user.name) {
        const cleanName = user.name.toLowerCase().replace(/\s+/g, '');
        setAuthorHandle('@' + cleanName);
      } else {
        setAuthorHandle('@anonymous');
      }
    }

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      setCustomImage(reader.result);
    };
    reader.readAsDataURL(file);
  };

  const handleSubmitMeme = () => {
    const finalTitle = memeTitle.trim();
    const finalCaption = memeCaption.trim();
    const finalTag = selectedTag === 'Other' ? customTag.trim() : selectedTag.trim();
    const finalHandle = authorHandle.trim() || '@anonymous';

    if (!finalTitle) {
      toast?.('Please add a meme title.', 'error');
      return;

    if (!finalCaption) {
      toast?.('Please add a meme caption.', 'error');
      return;

      toast?.('Please specify a custom tag name.', 'error');
      return;

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Caption / Description</label>

                />

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Tag topic</label>
                <select
                  value={selectedTag}
                  onChange={e => setSelectedTag(e.target.value)}

                >
                  <option value="Model Checkpoint">Model Checkpoint</option>
                  <option value="Deploy Drama">Deploy Drama</option>
                  <option value="War Room">War Room</option>
                  <option value="Jury Pitch">Jury Pitch</option>
                  <option value="Other">Other (Custom)</option>
                </select>
                {selectedTag === 'Other' && (
                  <input
                    value={customTag}
                    onChange={e => setCustomTag(e.target.value)}
                    placeholder="Enter custom tag..."
                    className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]"
                  />

              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Select Emoji</label>
                <div className="grid grid-cols-5 gap-2">
                  {['😂', '😭', '💀', '☕', '🔥', '🚀', '💻', '🧠', '⚡', '🤯'].map(emoji => (
                    <button
                      key={emoji}
                      type="button"
                      onClick={() => setSelectedEmoji(emoji)}
                      className={`py-2 text-[18px] border rounded-[8px] transition-all flex items-center justify-center ${
                        selectedEmoji === emoji ? 'bg-[color:var(--accent-tint)] border-[color:var(--accent)] shadow-sm font-bold' : 'bg-white border-[color:var(--line-2)] hover:border-[color:var(--mute-3)]'
                      }`}
                    >
                      {emoji}
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Choose Template Frame</label>
                <div className="grid grid-cols-5 gap-2">
                  {MEME_TEMPLATES.map((tpl, i) => (
                    <button
                      key={i}
                      type="button"
                      onClick={() => {
                        setSelectedTemplateIdx(i);
                        setCustomImage('');
                      }}
                      className={`relative aspect-square border rounded-[8px] overflow-hidden transition-all ${
                        selectedTemplateIdx === i && !customImage
                          ? 'ring-2 ring-[color:var(--accent)] ring-offset-1 scale-[0.95]'
                          : 'hover:scale-[1.02] border-[color:var(--line-2)]'
                      }`}
                    >
                      <img src={tpl.image} alt={tpl.label} className="w-full h-full object-cover" />
                      <div className="absolute inset-0 bg-black/10 hover:bg-transparent transition-colors" />
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Or Upload Custom Image</label>
                <div className="flex items-center gap-3">
                  <label className="flex-1 flex flex-col items-center justify-center border border-dashed border-[color:var(--line-3)] hover:border-[color:var(--accent)] rounded-[8px] p-4 cursor-pointer bg-[color:var(--paper)] transition-all">
                    <span className="text-[20px]">📷</span>
                    <span className="text-[12px] font-semibold mt-1">Select image file</span>
                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                  </label>
                  {customImage && (
                    <button
                      type="button"
                      onClick={() => setCustomImage('')}
                      className="px-3 py-2 border border-red-200 text-red-600 bg-red-50 text-[11px] font-[800] rounded-[8px] hover:bg-red-100 transition-colors"
                    >
                      Clear
                    </button>
                  )}
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Author Handle</label>
                <input
                  value={authorHandle}
                  onChange={e => setAuthorHandle(e.target.value)}
                  placeholder="@handle"
                  className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]"
                />
              </div>

              <button
                type="button"
                onClick={handleSubmitMeme}
                className="w-full py-2.5 bg-[color:var(--accent)] text-white text-[13px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all"
              >
                Share Meme
              </button>
            </div>

            {/* Right: Live Preview */}
            <div className="flex flex-col items-center justify-center bg-[color:var(--paper)] p-4 border border-[color:var(--line-2)] rounded-[12px]">
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-4">Live Preview</p>
              
              <div className="bg-white rounded-[16px] border border-[color:var(--line-2)] overflow-hidden shadow-lg flex flex-col w-full max-w-[320px]">
                {/* Header */}
                <div
                  style={{ background: MEME_TEMPLATES[selectedTemplateIdx].bg }}
                  className="px-5 py-3 flex justify-between items-center text-white text-[12px] font-bold rounded-t-[16px]"
                >
                  <span className="inline-flex items-center gap-1.5 bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm border border-white/10">
                    <span className="w-3.5 h-3.5 flex items-center justify-center">{selectedEmoji}</span>
                    <span>{selectedTag === 'Other' ? customTag || 'Custom' : selectedTag}</span>
                  </span>
                  <span className="font-mono text-[11px] uppercase tracking-wider text-white/90">{authorHandle || '@anonymous'}</span>
                </div>

                {/* Aspect-ratio Image */}
                <div
                  className="relative aspect-[16/10] bg-[color:var(--paper-2)] overflow-hidden"
                  style={{ background: MEME_TEMPLATES[selectedTemplateIdx].bg }}
                >
                  {customImage ? (
                    <img src={customImage} alt="" className="w-full h-full object-cover" />
                  ) : (
                    <img src={MEME_TEMPLATES[selectedTemplateIdx].image} alt="" className="w-full h-full object-cover" />
                  )}
                  <div className="absolute inset-0 bg-[radial-gradient(circle_at_25%_20%,rgba(255,255,255,0.15),transparent_35%),linear-gradient(to bottom,rgba(0,0,0,0),rgba(0,0,0,0.25))]" />
                </div>

                {/* Card Body */}
                <div className="p-5 flex-1 flex flex-col gap-2">
                  <h4 className="text-[16px] font-[900] text-[color:var(--ink)] leading-snug">{memeTitle || 'Title Placeholder'}</h4>
                  <p className="text-[13px] text-[color:var(--mute-1)] leading-relaxed">{memeCaption || 'Caption placeholder...'}</p>
                </div>

                {/* Footer Reactions */}
                <div className="flex flex-wrap gap-2 px-5 pb-5 pt-1">
                  {['🔥', '😭', '💀', '👏'].map((e, idx) => (
                    <div key={idx} className="flex items-center gap-1.5 px-3 py-1.5 bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-full text-[12px]">
                      <span className="w-4 h-4 flex items-center justify-center">{e}</span>
                      <span className="text-[color:var(--mute-2)] font-[800]">0</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
