<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Myntra Tech Week 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Silkscreen:wght@400;700&family=Figtree:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Disable automatic browser scroll restoration on refresh/load
  if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
  }
  window.scrollTo(0, 0);
  window.addEventListener('beforeunload', () => {
    window.scrollTo(0, 0);
  });

  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter Tight', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          serif: ['Parafina Trial', 'DM Sans', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        fontSize: {
          'xxs': '10px',
          'xs': '11px',
          'sm': '13px',
          'base': '15px',
          'lg': '18px',
          'xl': '21px',
          '2xl': '25px',
          '3xl': '30px',
          '4xl': '38px',
          '5xl': '46px',
          '6xl': '58px',
          '7xl': '72px',
        }
      }
    }
  }
</script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ── PARAFINA TRIAL @font-face ── */
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Thin.otf') format('opentype'); font-weight: 100; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-MediumS.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Parafina Trial'; src: url('fonts/ParafinaTrial-Black.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: swap; }
  :root {
    --ink: #0A0A0A; --ink-2: #1A1A1A; --ink-3: #2A2A2A;
    --paper: #FAFAF7; --paper-2: #F2EFE7; --paper-3: #E8E4D6;
    --white: #FFFFFF;
    --mute-1: #525252; --mute-2: #737373; --mute-3: #A3A3A3; --mute-4: #D4D4D4;
    --line: rgba(10,10,10,0.08); --line-2: rgba(10,10,10,0.12); --line-3: rgba(10,10,10,0.20);
    --line-white: rgba(255,255,255,0.10); --line-white-2: rgba(255,255,255,0.18);
    --accent: #FF3F6C; --accent-dim: #E0345C; --accent-tint: #FFE8EE; --accent-deep: #9F1239;
    --c-purple: #8B5CF6; --c-purple-tint: #EDE9FE; --c-purple-deep: #5B21B6;
    --c-blue: #3B82F6; --c-blue-tint: #DBEAFE; --c-blue-deep: #1E40AF;
    --c-cyan: #06B6D4; --c-cyan-tint: #CFFAFE; --c-cyan-deep: #0E7490;
    --c-teal: #0D9488; --c-teal-tint: #CCFBF1; --c-teal-deep: #115E59;
    --c-emerald: #10B981; --c-emerald-tint: #D1FAE5; --c-emerald-deep: #065F46;
    --c-amber: #F59E0B; --c-amber-tint: #FEF3C7; --c-amber-deep: #92400E;
    --c-orange: #FB923C; --c-orange-tint: #FFEDD5; --c-orange-deep: #9A3412;
    --c-rose: #F43F5E; --c-rose-tint: #FFE4E6; --c-rose-deep: #9F1239;
    --c-fuchsia: #D946EF; --c-fuchsia-tint: #FAE8FF; --c-fuchsia-deep: #86198F;
    --c-indigo: #6366F1; --c-indigo-tint: #E0E7FF; --c-indigo-deep: #3730A3;
    --c-coral: #FB7185; --c-coral-tint: #FFE4E6; --c-coral-deep: #9F1239;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { background: var(--paper); color: var(--ink); font-size: 15px; line-height: 1.55; margin: 0; -webkit-font-smoothing: antialiased; letter-spacing: -0.005em; overflow-x: clip; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--mute-4); border-radius: 99px; }
  html, body, button, input, select, textarea, .font-sans { font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important; }
  .font-serif, .num-display { font-family: 'Parafina Trial', 'DM Sans', sans-serif !important; }
  .font-mono, .eyebrow, .pill, .chip, .dept-chip { font-family: 'JetBrains Mono', monospace !important; }
  .h-display { font-family: 'Parafina Trial', 'DM Sans', sans-serif !important; font-weight: 500; letter-spacing: -0.03em; line-height: 0.96; }
  .h-display em { font-style: italic; font-weight: 400; }
  .gradient-text { background: linear-gradient(95deg, var(--accent) 0%, var(--c-fuchsia) 50%, var(--c-amber) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--mute-1); }
  .eyebrow-white { color: rgba(255,255,255,0.7); }

  .btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 4px; cursor: pointer; transition: all 0.15s ease-in-out; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: var(--ink-3); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent-dim); }
  .btn-gradient { background: var(--accent); color: white; }
  .btn-gradient:hover { background: var(--accent-dim); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-2); }
  .btn-ghost:hover { background: var(--paper); border-color: var(--line-3); }
  .btn-ghost-light { background: transparent; color: white; border-color: rgba(255,255,255,0.25); }
  .btn-ghost-light:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }
  .btn-white { background: white; color: var(--ink); }
  .btn-white:hover { background: rgba(255,255,255,0.9); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-xs { padding: 4px 8px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .card { background: white; border: 1px solid var(--line); border-radius: 12px; transition: all 0.2s ease; }
  .card-hover:hover { border-color: var(--line-3); transform: translateY(-2px); box-shadow: 0 12px 32px -12px rgba(10,10,10,0.10); }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border: 1px solid var(--line-2); background: white; border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; }
  .pill-ghost-light { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); border-color: var(--line-white-2); backdrop-filter: blur(8px); }

  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; animation: pulse-dot 1.8s infinite; }

  .nav-active { font-size: 13px; font-weight: 600; color: var(--accent) !important; background: var(--accent-tint) !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; transform: scale(1.02); }
  .nav-inactive { font-size: 13px; font-weight: 500; color: var(--mute-1) !important; background: transparent !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; }
  .nav-inactive:hover { color: var(--ink) !important; background: var(--paper-2) !important; transform: scale(1.02); }
  /* Dark-theme nav variants (used when the page bg behind the nav is dark) */
  .nav-active-dark { font-size: 13px; font-weight: 700; color: #ffffff !important; background: rgba(255,255,255,0.18) !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; transform: scale(1.02); border: 1px solid rgba(255,255,255,0.25); }
  .nav-inactive-dark { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.78) !important; background: transparent !important; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; }
  .nav-inactive-dark:hover { color: #ffffff !important; background: rgba(255,255,255,0.10) !important; transform: scale(1.02); }

  .tab-line-active {
    color: var(--accent) !important;
    border-bottom: 2px solid var(--accent) !important;
    background: transparent !important;
    border-radius: 0 !important;
  }
  .tab-line-inactive {
    color: var(--mute-2) !important;
    border-bottom: 2px solid transparent !important;
    background: transparent !important;
    border-radius: 0 !important;
  }
  .tab-line-inactive:hover {
    color: var(--ink) !important;
    border-bottom: 2px solid var(--line-3) !important;
    background: transparent !important;
  }

  .input { width: 100%; padding: 12px 14px; border: 1px solid var(--line-2); background: white; border-radius: 10px; font-size: 14px; color: var(--ink); transition: all 0.15s; letter-spacing: -0.005em; }
  .input:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(10,10,10,0.06); }
  .input::placeholder { color: var(--mute-3); }
  .label { display: block; font-size: 12px; font-weight: 500; color: var(--mute-1); margin-bottom: 6px; }

  .dot-grid { background-image: radial-gradient(circle, rgba(255,255,255,0.10) 1px, transparent 1px); background-size: 28px 28px; }

  .hero-mesh, .reward-mesh { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .hero-mesh > div, .reward-mesh > div { position: absolute; border-radius: 50%; filter: blur(90px); }
  .hero-mesh .b1 { width: 600px; height: 600px; background: var(--accent); opacity: 0.45; top: -200px; right: -100px; }
  .hero-mesh .b2 { width: 700px; height: 700px; background: var(--c-purple); opacity: 0.40; bottom: -300px; left: -100px; }
  .hero-mesh .b3 { width: 500px; height: 500px; background: var(--c-amber); opacity: 0.28; top: 30%; left: 40%; }
  .reward-mesh .r1 { width: 500px; height: 500px; background: var(--accent); opacity: 0.40; top: -150px; right: 10%; }
  .reward-mesh .r2 { width: 450px; height: 450px; background: var(--c-fuchsia); opacity: 0.30; bottom: -100px; left: 30%; }
  .reward-mesh .r3 { width: 400px; height: 400px; background: var(--c-amber); opacity: 0.25; top: 30%; left: -100px; }

  @keyframes fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { opacity: 0; animation: fade-up 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }

  .section-pad { padding-top: 7rem; padding-bottom: 7rem; }
  .section-pad-sm { padding-top: 4rem; padding-bottom: 4rem; }
  @media (max-width: 768px) { .section-pad { padding-top: 4rem; padding-bottom: 4rem; } }

  .progress { height: 5px; background: var(--paper-2); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s; background: linear-gradient(90deg, var(--accent), var(--c-fuchsia)); }

  .modal-scrim { background: rgba(10,10,10,0.55); backdrop-filter: blur(8px); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .toast-in { animation: toast-in 0.22s; }
  ::selection { background: var(--accent); color: white; }
  .num-display { font-family: 'Parafina Trial', 'DM Sans', sans-serif; font-weight: 300; letter-spacing: -0.04em; line-height: 1; }

  .chip { display: inline-flex; align-items: center; padding: 3px 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--mute-1); background: var(--paper-2); border-radius: 4px; white-space: nowrap; }
  .chip-ink { background: var(--ink); color: white; }
  .chip-accent { background: var(--accent); color: white; }
  .chip-purple { background: var(--c-purple-tint); color: var(--c-purple-deep); }
  .chip-blue { background: var(--c-blue-tint); color: var(--c-blue-deep); }
  .chip-cyan { background: var(--c-cyan-tint); color: var(--c-cyan-deep); }
  .chip-teal { background: var(--c-teal-tint); color: var(--c-teal-deep); }
  .chip-emerald { background: var(--c-emerald-tint); color: var(--c-emerald-deep); }
  .chip-amber { background: var(--c-amber-tint); color: var(--c-amber-deep); }
  .chip-orange { background: var(--c-orange-tint); color: var(--c-orange-deep); }
  .chip-rose { background: var(--c-rose-tint); color: var(--c-rose-deep); }
  .chip-fuchsia { background: var(--c-fuchsia-tint); color: var(--c-fuchsia-deep); }
  .chip-indigo { background: var(--c-indigo-tint); color: var(--c-indigo-deep); }
  .chip-coral { background: var(--c-coral-tint); color: var(--c-coral-deep); }
  .chip-dark { background: var(--paper-3); color: var(--ink); }

  .dept-chip { display: inline-flex; padding: 2px 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; border-radius: 4px; border: 1px solid var(--line-2); background: var(--paper); color: var(--mute-1); }

  .img-place { position: relative; overflow: hidden; }
  .img-place::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.18), transparent 50%), radial-gradient(circle at 70% 70%, rgba(0,0,0,0.10), transparent 50%); }
  .img-pink { background: linear-gradient(135deg, #FFE8EE 0%, #FF3F6C 100%); }
  .img-purple { background: linear-gradient(135deg, #EDE9FE 0%, #8B5CF6 100%); }
  .img-amber { background: linear-gradient(135deg, #FEF3C7 0%, #F59E0B 100%); }
  .img-blue { background: linear-gradient(135deg, #DBEAFE 0%, #3B82F6 100%); }
  .img-emerald { background: linear-gradient(135deg, #D1FAE5 0%, #10B981 100%); }
  .img-rose { background: linear-gradient(135deg, #FFE4E6 0%, #F43F5E 100%); }
  .img-cyan { background: linear-gradient(135deg, #CFFAFE 0%, #06B6D4 100%); }
  .img-fuchsia { background: linear-gradient(135deg, #FAE8FF 0%, #D946EF 100%); }

  .scroll-x { overflow-x: auto; }
  .scroll-x::-webkit-scrollbar { height: 4px; }
  .theme-bar { height: 4px; width: 40px; border-radius: 999px; margin-bottom: 1.5rem; }
  .link-u { color: var(--ink); text-decoration: none; background-image: linear-gradient(currentColor, currentColor); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%; }
  .link-u:hover { opacity: 0.6; }
  .score-pill { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 999px; font-family: 'Parafina Trial', 'DM Sans', sans-serif; font-weight: 400; font-size: 16px; border: 1px solid var(--line-2); background: white; cursor: pointer; transition: all 0.15s; }
  .score-pill:hover { border-color: var(--ink); }
  .sticky-shadow { box-shadow: 0 1px 0 0 var(--line); }

  /* Desktop Zoom Scaling (Scales up layout & typography by 15% on screen widths >= 1200px) */
  @media (min-width: 1200px) {
    body {
      zoom: 1.15;
    }
    .hero-b-stage-wrapper {
      zoom: 0.869565; /* Reverts zoom for the aspect-ratio based collage canvas (1 / 1.15) */
    }
  }

  /* ── HERO VERSION B STYLES ── */
  @property --wy           { syntax: '<length>'; initial-value: 0px;  inherits: false; }
  @property --scl          { syntax: '<number>'; initial-value: 1;    inherits: false; }
  @property --float-y      { syntax: '<length>'; initial-value: 0px;  inherits: false; }
  @property --float-x      { syntax: '<length>'; initial-value: 0px;  inherits: false; }
  @property --float-r-extra{ syntax: '<angle>';  initial-value: 0deg; inherits: false; }

  .hero-b-stage-wrapper {
    --font-figtree: 'Figtree', system-ui, sans-serif;
    --font-silkscreen: 'Silkscreen', 'Courier New', monospace;
    --font-parafina: 'Parafina Trial', 'DM Sans', 'Figtree', sans-serif;
    box-sizing: border-box;
    width: 100%;
    height: auto;
    position: relative;
    overflow: visible;
  }
  @media (min-width: 1024px) {
    .hero-b-stage-wrapper {
      width: 100vw;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: hidden;
    }
  }
  .hero-b-stage-wrapper * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  html[data-theme="dark"] {
    --bg: #0a0608;
    --fg: #ffffff;
    --fg-muted: #b6b6b6;
    --fg-dim: #8d8d8d;
    --surface: #1a1a1a;
    --surface-2: #2d2d2d;
    --border: #3a3a3a;
    --border-2: #5d5d5d;
    --divider: linear-gradient(to bottom, transparent, #3a3a3a 30%, #3a3a3a 70%, transparent);
    --desc-grad: linear-gradient(to right, #bbb, #fff);
    --blob-1: radial-gradient(circle, rgba(0,0,0,0.95) 0%, rgba(20,2,15,0.88) 24%, rgba(140,17,105,0.82) 54%, rgba(255,31,192,1) 72%, rgba(255,31,192,0.22) 87%, transparent 100%);
    --blob-2: radial-gradient(circle, rgba(0,0,0,0.95) 0%, rgba(14,4,20,0.88) 24%, rgba(96,28,140,0.82) 54%, rgba(174,51,255,1) 72%, rgba(174,51,255,0.22) 87%, transparent 100%);
    --logo-invert: 0;
    --techweek-invert: 1;
  }
  
  html[data-theme="light"] {
    --bg: #fff5f3;
    --fg: #0a0608;
    --fg-muted: #5a5a5a;
    --fg-dim: #7a7a7a;
    --surface: #ffffff;
    --surface-2: #f3f3f3;
    --border: #e0d6d2;
    --border-2: #d0c2bc;
    --divider: linear-gradient(to bottom, transparent, #d0c2bc 30%, #d0c2bc 70%, transparent);
    --desc-grad: linear-gradient(to right, #5a5a5a, #0a0608);
    --blob-1: radial-gradient(circle, rgba(255,255,255,0) 0%, rgba(255,182,221,0.15) 35%, rgba(255,100,180,0.55) 68%, rgba(255,31,192,0.35) 82%, transparent 100%);
    --blob-2: radial-gradient(circle, rgba(255,255,255,0) 0%, rgba(200,188,255,0.15) 35%, rgba(140,80,220,0.55) 68%, rgba(174,51,255,0.35) 82%, transparent 100%);
    --logo-invert: 0;
    --techweek-invert: 0;
  }

  .hero-b-stage-wrapper .stage {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: background 400ms ease;
  }
  .hero-b-stage-wrapper .page {
    position: relative;
    width: 1920px;
    height: 1080px;
    background: var(--bg);
    flex: none;
    transform-origin: center center;
    transition: background 400ms ease;
    overflow: visible;
  }

  /* Background blobs — removed from hero, kept as CSS for legacy */
  .hero-b-stage-wrapper .blob { display: none; }

  /* Nav */
  .hero-b-stage-wrapper .nav {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 1776px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    animation: navIn 700ms cubic-bezier(.2,.7,.2,1) both;
  }
  .hero-b-stage-wrapper .nav-left {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .hero-b-stage-wrapper .logo-wrap {
    position: relative;
    width: 60px;
    height: 41px;
  }
  .hero-b-stage-wrapper .logo-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .hero-b-stage-wrapper .techweek-img {
    width: 71px;
    height: 33px;
    filter: invert(var(--techweek-invert));
    transition: filter 300ms ease;
  }
  .hero-b-stage-wrapper .nav-right {
    display: flex;
    align-items: center;
    gap: 64px;
  }
  .hero-b-stage-wrapper .nav-right p {
    font-size: 15px;
    color: var(--fg);
    text-transform: capitalize;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: opacity 180ms ease, color 300ms ease;
  }
  .hero-b-stage-wrapper .nav-right p:hover {
    opacity: 0.7;
  }
  .hero-b-stage-wrapper .nav-right .home {
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 4px;
  }
  .hero-b-stage-wrapper .nav-events {

  /* Hero — centered, 1680 x 583 */
  /* Hero — V2: original 15-tile continuous wave, larger tiles, no TECH/WEEK, no branding.
     Just the image carousel as the main hero element. */
  .hero-b-stage-wrapper .hero {
    position: absolute; left: 50%; top: 90px;
    transform: translateX(-50%);
    width: 1680px; height: 600px;
    z-index: 2;
    animation: heroIn 800ms 120ms cubic-bezier(.2,.7,.2,1) both;
  }

  /* Decorative icons — subtle continuous float with both axes + rotation drift */
  .hero-b-stage-wrapper .deco {
    position: absolute; pointer-events: none; z-index: 9;
    transform:
      translate(
        calc(var(--push-x, 0px) + var(--float-x, 0px)),
        calc(var(--push-y, 0px) + var(--float-y, 0px))
      )
      rotate(calc(var(--rot, 0deg) + var(--float-r-extra, 0deg)));
  }
  .hero-b-stage-wrapper .deco img { width: 100%; height: 100%; object-fit: contain; display: block; }
  /* Decos in the corners — sized to clear the wave with the push system filling any near-touch. */
  .hero-b-stage-wrapper .deco-small { width: 115px; height: 115px; left: 4px;    top: 90px;  animation: floatA 7s ease-in-out infinite; animation-delay: -2s; }
  .hero-b-stage-wrapper .deco-large { width: 202px; height: 202px; left: 1478px; top: 396px; animation: floatB 9s ease-in-out infinite; animation-delay: -4s; }

  /* Tiles arc — 15 tiles 240px each, step=90px so they breathe.
     Container 1500px wide, centred within 1680px hero (left=90). */
  .hero-b-stage-wrapper .tiles {
    position: absolute; left: 90px; top: 194px;
    width: 1500px; height: 240px;
    z-index: 3;
  }
  .hero-b-stage-wrapper .tile {
    position: absolute; width: 240px; height: 240px;
    cursor: pointer; will-change: transform;
    transform:
      translateX(var(--push-x, 0px))
      translateY(calc(var(--base, 0px) + var(--wy) + var(--push-y, 0px)))
      scale(var(--scl, 1));
    animation: wave 6s ease-in-out infinite;
    transition: --scl 320ms cubic-bezier(.2,.8,.2,1), box-shadow 280ms ease;
  }
  .hero-b-stage-wrapper .tile-inner {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    z-index: 2; transition: filter 220ms ease;
  }
  .hero-b-stage-wrapper .tile-inner img {
    position: absolute; display: block; pointer-events: none; max-width: none;
    top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .hero-b-stage-wrapper .tile-inner p {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 210.24px; line-height: 0.8; text-align: center;
    font-family: var(--font-parafina); font-weight: 700; font-size: 46.08px;
  }
  .hero-b-stage-wrapper .tile::before {
    content: ""; position: absolute; inset: -60px; z-index: 1;
    background: radial-gradient(closest-side, rgba(255,29,146,0.51) 0%, rgba(255,76,36,0.33) 45%, rgba(255,29,146,0) 75%);
    opacity: 0; transition: opacity 280ms ease, transform 320ms cubic-bezier(.2,.8,.2,1);
    filter: blur(28px); pointer-events: none; transform: scale(0.9);
  }
  .hero-b-stage-wrapper .tile.is-hover { z-index: 9999 !important; --scl: 1.20; box-shadow: 0 18px 50px -8px rgba(255,29,146,0.33); }
  .hero-b-stage-wrapper .tile.is-hover::before { opacity: 1; transform: scale(1.05); }
  .hero-b-stage-wrapper .tile.is-hover .tile-inner { filter: saturate(1.1) brightness(1.04); }
  .hero-b-stage-wrapper .tile.t-bordered { border: 7px solid #e0c2ee; }

  /* Tile colours */
  .hero-b-stage-wrapper .t-blue    { background: #251eff; }

  .hero-b-stage-wrapper .t-grey    { background: #f3f3f3; }

  .hero-b-stage-wrapper .t-lavender{ background: #e1c3ef; }
  .hero-b-stage-wrapper .text-white-soft { color: #f0f0f0; }
  .hero-b-stage-wrapper .text-blue       { color: #251eff; }
  .hero-b-stage-wrapper .text-pink-soft  { color: #f0d0ff; }

  .hero-b-stage-wrapper .tile .big-ai {
    font-family: var(--font-silkscreen); font-size: 169.43px;
    letter-spacing: -3.39px; top: calc(50% - 83.52px); width: auto;
  }
  .hero-b-stage-wrapper .tile .big-year {

  /* Wave keyframes — continuous traveling wave with full amplitude */
  @keyframes wave {
    0%, 100% { --wy: -102px; }
    50%      { --wy:  102px; }

  /* 15 tiles, 240px each, step=90px (less overlap, more breathing room).
     --base = -22.5 - tile.top centres each tile's wave midpoint on hero centre.
     Animation delays cascade 300ms across 15 tiles → 14 × 300ms = 4.2s spread. */
  .hero-b-stage-wrapper .t1  { left:   0px; top:  90px; --base:-112.5px; animation-delay: -4.2s; }
  .hero-b-stage-wrapper .t2  { left:  90px; top: 130px; --base:-152.5px; animation-delay: -3.9s; }
  .hero-b-stage-wrapper .t3  { left: 180px; top:  80px; --base:-102.5px; animation-delay: -3.6s; }
  .hero-b-stage-wrapper .t4  { left: 270px; top:  30px; --base: -52.5px; animation-delay: -3.3s; }
  .hero-b-stage-wrapper .t5  { left: 360px; top: -10px; --base: -12.5px; animation-delay: -3.0s; }
  .hero-b-stage-wrapper .t6  { left: 450px; top: -60px; --base:  37.5px; animation-delay: -2.7s; }
  .hero-b-stage-wrapper .t7  { left: 540px; top:-110px; --base:  87.5px; animation-delay: -2.4s; }
  .hero-b-stage-wrapper .t8  { left: 630px; top: -60px; --base:  37.5px; animation-delay: -2.1s; }
  .hero-b-stage-wrapper .t9  { left: 720px; top: -10px; --base: -12.5px; animation-delay: -1.8s; }
  .hero-b-stage-wrapper .t10 { left: 810px; top:  40px; --base: -62.5px; animation-delay: -1.5s; }
  .hero-b-stage-wrapper .t11 { left: 900px; top: 100px; --base:-122.5px; animation-delay: -1.2s; }
  .hero-b-stage-wrapper .t12 { left: 990px; top:  50px; --base: -72.5px; animation-delay: -0.9s; }
  .hero-b-stage-wrapper .t13 { left:1080px; top:   0px; --base: -22.5px; animation-delay: -0.6s; }
  .hero-b-stage-wrapper .t14 { left:1170px; top: -50px; --base:  27.5px; animation-delay: -0.3s; }
  .hero-b-stage-wrapper .t15 { left:1260px; top:-110px; --base:  87.5px; animation-delay:  0s;   }

  /* t8 (centre) on top, fanning out symmetrically */
  .hero-b-stage-wrapper .t1, .hero-b-stage-wrapper .t15 { z-index: 1; }
  .hero-b-stage-wrapper .t2, .hero-b-stage-wrapper .t14 { z-index: 2; }
  .hero-b-stage-wrapper .t3, .hero-b-stage-wrapper .t13 { z-index: 3; }
  .hero-b-stage-wrapper .t4, .hero-b-stage-wrapper .t12 { z-index: 4; }
  .hero-b-stage-wrapper .t5, .hero-b-stage-wrapper .t11 { z-index: 5; }
  .hero-b-stage-wrapper .t6, .hero-b-stage-wrapper .t10 { z-index: 6; }
  .hero-b-stage-wrapper .t7, .hero-b-stage-wrapper .t9  { z-index: 7; }
  .hero-b-stage-wrapper .t8                            { z-index: 8; }

  @keyframes heroIn { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes lowerIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes navIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  /* Two distinct float paths so the two decos drift independently. */
  @keyframes floatA {
    0%, 100% { --float-y:   0px; --float-x:  0px; --float-r-extra:  0deg; }
    25%      { --float-y:  -6px; --float-x:  4px; --float-r-extra:  2deg; }
    50%      { --float-y: -12px; --float-x:  0px; --float-r-extra:  0deg; }
    75%      { --float-y:  -6px; --float-x: -4px; --float-r-extra: -2deg; }

  @keyframes floatB {
    0%, 100% { --float-y:   0px; --float-x:  0px; --float-r-extra:  0deg; }

    50%      { --float-y:  14px; --float-x:  0px; --float-r-extra:  0deg; }
    75%      { --float-y:   8px; --float-x:  6px; --float-r-extra:  3deg; }
  }
  /* Keep the older alias if any other element references it */
  @keyframes floaty {
    0%, 100% { --float-y: 0px;   --float-r-extra: 0deg; }

/* ──────────── COUNTDOWN ──────────── */

function Countdown({ targetDate }) {
  const calc = () => {
    const d = new Date(targetDate) - new Date();
    if (d<=0) return {D:0,H:0,M:0,S:0};
    return { D:Math.floor(d/86400000), H:Math.floor(d%86400000/3600000), M:Math.floor(d%3600000/60000), S:Math.floor(d%60000/1000) };
  };
  const [t, setT] = useState(calc);
  useEffect(()=>{ const id=setInterval(()=>setT(calc()),1000); return()=>clearInterval(id); },[]);
  const units = [['D','DAYS'],['H','HRS'],['M','MIN'],['S','SEC']];
  return (
    <div className="flex items-center justify-center gap-1">
      {units.map(([k,l], i) => (
        <React.Fragment key={k}>
          <div className="flex flex-col items-center gap-2">
            <div className="w-[72px] h-[72px] bg-white border border-[color:var(--line-2)] rounded-none flex items-center justify-center shadow-sm">
              <span style={{fontFamily:'inherit', fontSize:'28px', fontWeight:700, letterSpacing:'-0.02em', color:'#18181b'}}>
                {String(t[k]).padStart(2,'0')}
              </span>
            </div>
            <span className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-[0.1em] font-semibold">{l}</span>
          </div>
          {i < units.length - 1 && (
            <div className="flex flex-col gap-[10px] mb-6 mx-1">
              <span className="w-[5px] h-[5px] rounded-full bg-[color:var(--mute-4)]" />
              <span className="w-[5px] h-[5px] rounded-full bg-[color:var(--mute-4)]" />
            </div>
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

function Modal({ open, onClose, title, size='md', children }) {
  useEffect(()=>{ document.body.style.overflow=open?'hidden':''; return()=>{document.body.style.overflow=''}; },[open]);
  if (!open) return null;
  const w = {sm:'max-w-sm',md:'max-w-xl',lg:'max-w-3xl'}[size]||'max-w-xl';
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-scrim px-4" onClick={onClose}>
      <div className={`w-full ${w} bg-white border border-[color:var(--line-2)] rounded-2xl shadow-[0_8px_40px_rgba(0,0,0,0.10)] max-h-[88vh] overflow-y-auto fade-up`} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-[color:var(--line)] sticky top-0 bg-white z-10 rounded-t-[18px]">
          <h2 className="text-[14px] font-semibold text-[color:var(--ink)]">{title}</h2>
          <button onClick={onClose} className="w-7 h-7 rounded-[3px] flex items-center justify-center text-[color:var(--mute-3)] hover:text-[color:var(--mute-1)] hover:bg-[color:var(--paper-2)] btn text-xl leading-none">&times;</button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
}

}

                          ? 'font-serif italic font-[950] bg-clip-text text-transparent bg-gradient-to-r from-[#ff7b5c] to-[#f085d5] tracking-normal uppercase' 
                          : view===item.id ? 'text-[color:var(--accent)] font-[800]' : 'text-[color:var(--ink)] font-[800]'
                      }`}>
                      {item.label}
                    </button>
                  );
                })}
          </div>
          <div className="p-6 border-t border-[color:var(--line-2)] bg-[color:var(--paper)]">
             {user ? (
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-[color:var(--accent)] flex items-center justify-center shadow-sm">
                      <span className="text-[14px] font-bold text-white">{initials(user.name)}</span>
                    </div>
                    <div>
                      <p className="text-[14px] font-bold text-[color:var(--ink)]">{user.name.split(' ')[0]}</p>
                      <p className="text-[12px] text-[color:var(--mute-2)]">{user.dept}</p>
                    </div>
                  </div>
                  <button onClick={()=>{onLogout(); setMobileOpen(false);}} className="text-[12px] font-bold text-[color:var(--mute-3)] hover:text-[color:var(--mute-1)] uppercase tracking-wide">Sign out</button>
                </div>
             ) : (
                <button onClick={()=>{onLogin(); setMobileOpen(false);}} className="w-full py-4 bg-[#0F0F10] hover:bg-[#5c7aff] text-white text-[14px] font-bold rounded-[8px] btn transition-colors">
                  Sign in
                </button>
             )}
          </div>
        </div>
      )}
    </>
  );
}

function LoginModal({ open, onClose, onLogin, toast, quizzes, setQuizzes, quizResults }) {
  const [tab, setTab]   = useState('signin');
  const [signupStep, setSignupStep] = useState(1);
  const [sel, setSel]   = useState('');

  const [sigErr, setSigErr] = useState({});
  const ssoUser = USERS.find(u => u.id === sel);

  const handleClose = () => {
    onClose();
    setSel('');
    setTab('signin');
    setSignupStep(1);
    setSig({ roleGroup:'', name:'', email:'', dept:'', password:'', hhd:'', tasks:[], yoe:'', why:'' });
    setSigErr({});
  };

  const submitSignup = () => {
    const e = {};
    if (!sig.name.trim())  e.name = 'Full name is required';
    if (!sig.email.trim()) e.email = 'Work email is required';
    else if (!sig.email.includes('@myntra.com')) e.email = 'Must be a @myntra.com email';
    if (!sig.dept)         e.dept = 'Department is required';
    if (!sig.password || sig.password.length < 6) e.password = 'Min. 6 characters';
    
    // Additional validations based on roleGroup
    if (sig.roleGroup === 'participant' && !sig.hhd) e.hhd = 'Please select a persona';
    
    setSigErr(e);
    if (Object.keys(e).length) return;
    
    const tag = sig.roleGroup === 'participant' ? sig.hhd : 'Coordinator';
    const role = sig.roleGroup === 'participant' ? 'participant' : 'coordinator';
    
    const newUser = { id:`U${Date.now()}`, name:sig.name, email:sig.email, dept:sig.dept, role:role, tag:tag };
    onLogin(newUser);
    toast(`Welcome, ${sig.name.split(' ')[0]}! Account created.`, 'success');
    handleClose();

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[10px] eyebrow text-[color:var(--mute-1)] mb-1.5">Years of experience</label>
                            <input value={sig.yoe} onChange={e=>setSig(s=>({...s,yoe:e.target.value}))} placeholder="e.g. 3 years"
                              className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3.5 py-2.5 text-[13px] text-[color:var(--ink)] placeholder-[color:var(--mute-4)] outline-none focus:border-[color:var(--c-amber)] focus:shadow-[0_0_0_3px_rgba(245,158,11,0.06)] transition-all" />
                          </div>
                          <div>
                            <label className="block text-[10px] eyebrow text-[color:var(--mute-1)] mb-1.5">Motivation</label>
                            <input value={sig.why} onChange={e=>setSig(s=>({...s,why:e.target.value}))} placeholder="Short reason..."
                              className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3.5 py-2.5 text-[13px] text-[color:var(--ink)] placeholder-[color:var(--mute-4)] outline-none focus:border-[color:var(--c-amber)] focus:shadow-[0_0_0_3px_rgba(245,158,11,0.06)] transition-all" />
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="pt-3">
                      <button onClick={submitSignup}
                        className={`w-full py-3.5 text-white text-[13px] font-bold uppercase tracking-wider rounded-[8px] transition-all duration-200 hover:-translate-y-0.5 ${sig.roleGroup==='participant'?'bg-[color:var(--accent)] hover:bg-[color:var(--accent-dim)] hover:shadow-[0_8px_20px_rgba(255,63,108,0.25)]':'bg-[color:var(--c-amber)] hover:bg-[color:var(--c-amber-deep)] hover:shadow-[0_8px_20px_rgba(245,158,11,0.25)]'}`}>
                        {sig.roleGroup === 'participant' ? 'Enter the Arena' : 'Join as Coordinator'}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </Modal>
  );
}

function FluentEmoji({ char, className = '', style = {}, fallbackStyle = {} }) {
  if (!char) return null;
  const cleanChar = char.replace(/\uFE0F/g, '');
  if (cleanChar === '🚀') {
    const hasCustomSize = style.width || style.height || /\b(w-|h-)/.test(className);
    const defaultSize = hasCustomSize ? {} : { width: '1.2em', height: '1.2em' };
    return (
      <img 
        src="https://em-content.zobj.net/source/microsoft-teams/337/rocket_1f680.png" 
        className={className} 
        style={{ display: 'inline-block', verticalAlign: 'middle', ...defaultSize, ...style }} 
        alt={char}
      />
    );
  }
  const mapped = FLUENT_EMOJI_MAP[char] || FLUENT_EMOJI_MAP[cleanChar];
  if (mapped) {
    const hasCustomSize = style.width || style.height || /\b(w-|h-)/.test(className);
    const defaultSize = hasCustomSize ? {} : { width: '1.2em', height: '1.2em' };
    return (
      <img 
        src={`https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@latest/assets/${mapped}`} 
        className={className} 
        style={{ display: 'inline-block', verticalAlign: 'middle', ...defaultSize, ...style }} 
        alt={char}
      />
    );
  }
  return <span className={className} style={{ ...fallbackStyle, ...style }}>{char}</span>;
}

function getCardDate(id, customDate) {
  if (customDate) {
    const d = new Date(customDate);
    if (!isNaN(d.getTime())) {
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }
  }
  // Generate stable mock dates for initial teams
  if (id === 'T001') return '24/09/2024';
  if (id === 'T002') return '29/08/2024';
  if (id === 'T003') return '10/04/2024';
  if (id === 'T004') return '10/08/2024';
  
  // Hash the ID to get a consistent pseudo-random date for others
  let sum = 0;
  if (id) {
    for (let i = 0; i < id.length; i++) sum += id.charCodeAt(i);
  }
  const day = (sum % 28) + 1;
  const month = (sum % 12) + 1;
  const year = 2024;
  const dd = String(day).padStart(2, '0');
  const mm = String(month).padStart(2, '0');
  return `${dd}/${mm}/${year}`;
}

// Soft glow — bright centre → transparent. Good for card orbs on dark bg (no blend mode needed).
function glowOrb(hexColor, a=0.75) {
  const r=parseInt(hexColor.slice(1,3),16), g=parseInt(hexColor.slice(3,5),16), b=parseInt(hexColor.slice(5,7),16);
  return `radial-gradient(circle, rgba(${r},${g},${b},${a}) 0%, rgba(${r},${g},${b},${+(a*0.4).toFixed(2)}) 45%, rgba(${r},${g},${b},0.06) 75%, transparent 100%)`;
}
// Sphere with dark core — MUST use mix-blend-mode:screen on dark bg so black centre vanishes.
function sphereScreen(hexColor) {
  const r=parseInt(hexColor.slice(1,3),16), g=parseInt(hexColor.slice(3,5),16), b=parseInt(hexColor.slice(5,7),16);
  const dr=Math.round(r*0.06), dg=Math.round(g*0.06), db=Math.round(b*0.06);
  const mr=Math.round(r*0.52), mg=Math.round(g*0.52), mb=Math.round(b*0.52);
  return `radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(${dr},${dg},${db},0.95) 22%, rgba(${mr},${mg},${mb},0.9) 52%, rgba(${r},${g},${b},1) 70%, rgba(${r},${g},${b},0.3) 85%, transparent 100%)`;
}
// Light pastel glow for white-bg sections.
function glowOrbLight(hexColor, a=0.45) {
  const r=parseInt(hexColor.slice(1,3),16), g=parseInt(hexColor.slice(3,5),16), b=parseInt(hexColor.slice(5,7),16);
  return `radial-gradient(circle, rgba(${r},${g},${b},${a}) 0%, rgba(${r},${g},${b},${+(a*0.38).toFixed(2)}) 50%, transparent 85%)`;
}

const mkSphereLight = glowOrbLight;

    sessions:    ['Search "Incident Mgmt"...', 'Search "SRE Scale"...', 'Search "Prompt Eng"...', 'Search "Deploy"...'],

    progress:    ['Search "Team Alpha"...', 'Search by team name...', 'Search "Pixel Pirates"...'],
    ideas:       ['Search "Customer Support"...', 'Search "Logistics"...', 'Search "GenAI"...'],
  };
  const [phrases] = useState(PHRASE_MAP[type] || PHRASE_MAP['teams']);
  const [phraseIdx, setPhraseIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [isDeleting, setIsDeleting] = useState(false);

  useEffect(() => {
    let timer;
    const current = phrases[phraseIdx];
    if (!isDeleting && charIdx === current.length) {
      timer = setTimeout(() => setIsDeleting(true), 2000);
    } else if (isDeleting && charIdx === 0) {
      setIsDeleting(false);
      setPhraseIdx(p => (p + 1) % phrases.length);
    } else {
      timer = setTimeout(() => {
        setCharIdx(p => p + (isDeleting ? -1 : 1));
      }, isDeleting ? 40 : 80);
    }
    return () => clearTimeout(timer);
  }, [charIdx, isDeleting, phraseIdx, phrases]);

  return (
    <div className="relative group">
      <div className="absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
        <svg className="w-[14px] h-[14px] text-[color:var(--mute-3)] transition-colors group-focus-within:text-[color:var(--ink)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

          <line x1="21" y1="21" x2="16" y2="16"></line>
        </svg>
      </div>
      <input 
        value={value} 
        onChange={onChange}
        placeholder={phrases[phraseIdx].substring(0, charIdx)}
        className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--ink)] rounded-[8px] pl-9 pr-8 py-2 text-[12px] text-[color:var(--ink)] placeholder-[color:var(--mute-3)] outline-none transition-all shadow-[0_1px_2px_rgba(0,0,0,0.03)] focus:shadow-[0_2px_8px_rgba(0,0,0,0.06)]" 
      />

  );

function QuizGame({ quizzes, user, onFinish }) {
  const [idx, setIdx] = useState(0);
  const [ans, setAns] = useState(null);
  const [score, setScore] = useState(0);
  const q = quizzes[idx];
  const done = idx >= quizzes.length;
  const pick = (i) => {
    if(ans!==null) return;
    setAns(i);
    const newScore = score + (i===q.correct?1:0);
    setScore(newScore);
    if (idx === quizzes.length - 1 && onFinish) {
      onFinish({ score: newScore, total: quizzes.length });
    }
  };
  const next = () => { setAns(null); setIdx(i=>i+1); };
  if(done) return (
    <div className="bg-[color:var(--paper)] rounded-none border border-[#efefef] p-6 text-center">
      <p className="text-[40px] mb-2">{score===3?'🏆':score>=2?'🎯':'😅'}</p>
      <p className="text-[18px] font-[700] text-[color:var(--ink)]">{score}/3 correct</p>
      <p className="text-[13px] text-[color:var(--mute-2)] mt-1">{score===3?'You actually read the rulebook!':score>=2?'Solid effort. Almost there.':'Maybe skim the FAQ?'}</p>
      <button onClick={()=>{setIdx(0);setAns(null);setScore(0);}}
        className="mt-4 px-5 py-2 bg-[color:var(--accent)] text-white text-[13px] font-semibold rounded-[3px] btn hover:bg-[#2222dd]">
        Try again
      </button>
    </div>
  );
  return (
    <div className="bg-[color:var(--paper)] rounded-none border border-[#efefef] p-5">
      <div className="flex items-center justify-between mb-4">
        <p className="text-[11px] text-[color:var(--mute-3)] font-semibold uppercase tracking-[0.1em]">Q {idx+1} of {quizzes.length}</p>
        <div className="flex gap-1">
          {quizzes.map((_,i)=>(
            <div key={i} className={`h-1 w-8 rounded-full ${i<idx?'bg-[color:var(--accent)]':i===idx?'bg-[#fed7aa]':'bg-[color:var(--line-2)]'}`} />
          ))}
        </div>
      </div>
      <p className="text-[14px] font-semibold text-[color:var(--ink)] leading-snug mb-4">{q.q}</p>
      <div className="space-y-2 mb-3">
        {q.opts.map((o,i)=>{
          let cls = 'border-[color:var(--line-2)] bg-white text-[color:var(--mute-1)] hover:border-[color:var(--mute-4)]';
          if(ans!==null){
            if(i===q.correct) cls = 'border-[#22c55e] bg-[#f0fdf4] text-[#15803d]';
            else if(i===ans) cls = 'border-[#ef4444] bg-[#fef2f2] text-[#dc2626]';
            else cls = 'border-[color:var(--line)] text-[#c4c4c8] bg-white';
          }
          return (
            <button key={i} onClick={()=>pick(i)}
              className={`w-full text-left px-4 py-2.5 rounded-[3px] text-[13px] border btn ${cls}`}>
              <span className="font-semibold mr-2">{String.fromCharCode(65+i)}.</span>{o}
            </button>
          );
        })}
      </div>
      {ans!==null && (
        <div className={`rounded-[3px] px-4 py-3 text-[12px] mb-3 ${ans===q.correct?'bg-[#f0fdf4] text-[#15803d]':'bg-[#eeeeff] text-[#92400e]'}`}>
          <span className="font-semibold">{ans===q.correct?'✓ Correct! ':'✗ Not quite — '}</span>
          {q.explain}
        </div>
      )}
      {ans!==null && (
        <button onClick={next}
          className="w-full py-2 bg-[color:var(--ink)] text-white text-[13px] font-semibold rounded-[3px] btn hover:bg-[color:var(--ink-3)]">
          {idx<quizzes.length-1?'Next question →':'See results'}
        </button>
      )}


          
          
    </div>
  );
}

function CountdownTimer({ targetDate }) {
  const [timeLeft, setTimeLeft] = useState({ days: '00', hours: '00', minutes: '00', seconds: '00' });

  useEffect(() => {
    const calculateTimeLeft = () => {
      const difference = +new Date(targetDate) - +new Date();
      if (difference > 0) {
        return {
          days: String(Math.floor(difference / (1000 * 60 * 60 * 24))).padStart(2, '0'),
          hours: String(Math.floor((difference / (1000 * 60 * 60)) % 24)).padStart(2, '0'),
          minutes: String(Math.floor((difference / 1000 / 60) % 60)).padStart(2, '0'),
          seconds: String(Math.floor((difference / 1000) % 60)).padStart(2, '0'),
        };
      }
      return { days: '00', hours: '00', minutes: '00', seconds: '00' };
    };

    setTimeLeft(calculateTimeLeft());
    const timer = setInterval(() => {
      setTimeLeft(calculateTimeLeft());
    }, 1000);
    return () => clearInterval(timer);
  }, [targetDate]);

  return (
    <div className="inline-block text-center border-t border-[rgba(255,255,255,0.1)] pt-2.5 mt-1 w-full max-w-[175px]">
      <div className="text-[6.5px] text-[rgba(255,255,255,0.4)] tracking-[0.25em] uppercase font-[800] mb-1.5">Grand Finale Begins In</div>
      <div className="flex items-center justify-between gap-1.5 px-0.5">
        {[
          { label: 'Days', value: timeLeft.days },
          { label: 'Hours', value: timeLeft.hours },
          { label: 'Min', value: timeLeft.minutes },
          { label: 'Sec', value: timeLeft.seconds }
        ].map(t => (
          <div key={t.label} className="flex flex-col gap-0.5 items-center justify-center min-w-[28px]">
            <span className="h-display text-[15px] sm:text-[16px] text-white tracking-tight leading-none font-normal">{t.value}</span>
            <span className="text-[5.5px] text-[rgba(255,255,255,0.3)] tracking-[0.15em] uppercase font-mono font-bold">{t.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AnimatedCounter({ value, duration = 1500 }) {
  const match = typeof value === 'string' ? value.match(/^([^\d]*?)(\d+)([^\d]*)$/) : null;
  const prefix = match ? match[1] : '';
  const target = match ? parseInt(match[2], 10) : (typeof value === 'number' ? value : 0);
  const suffix = match ? match[3] : '';

  const [count, setCount] = useState(0);
  const elementRef = useRef(null);
  const [hasStarted, setHasStarted] = useState(false);

  useEffect(() => {
    if (!match && typeof value !== 'number') {
      return;
    }

    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setHasStarted(true);
        }
      },
      { threshold: 0.1 }
    );

    if (elementRef.current) {
      observer.observe(elementRef.current);
    }

    return () => {
      if (elementRef.current) {
        observer.unobserve(elementRef.current);
      }
    };
  }, [value, match]);

  useEffect(() => {
    if (!hasStarted) return;

    let startTime = null;
    let animationFrameId = null;

    const animate = (timestamp) => {
      if (!startTime) startTime = timestamp;
      const progress = timestamp - startTime;
      const percentage = Math.min(progress / duration, 1);
      
      // easeOutCubic: 1 - Math.pow(1 - t, 3)
      const easing = 1 - Math.pow(1 - percentage, 3); 
      const currentCount = Math.floor(easing * target);

      setCount(currentCount);

      if (progress < duration) {
        animationFrameId = requestAnimationFrame(animate);
      } else {
        setCount(target);
      }
    };

    animationFrameId = requestAnimationFrame(animate);

    return () => {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }
    };
  }, [hasStarted, target, duration]);

  if (!match && typeof value !== 'number') {
    return <span>{value}</span>;
  }

  return (
    <span ref={elementRef}>
      {prefix}
      {count}
      {suffix}
    </span>
  );
}

                <div key={i} className="flex flex-col justify-between p-6 rounded-[12px] shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1 group relative overflow-hidden"
                  style={{background:'rgba(255,255,255,0.7)', border:'1px solid rgba(0,0,0,0.05)', backdropFilter:'blur(8px)'}}>
                  {/* Inner pastel shapes — pill top-right, oval bottom-left */}
                  <div style={{position:'absolute', top:'-40px', right:'-40px', width:'260px', height:'110px', borderRadius:'999px', transform:'rotate(15deg)', background:glowOrbLight(w.c1, 0.38), filter:'blur(38px)', pointerEvents:'none'}} />
                  <div style={{position:'absolute', bottom:'-50px', left:'-30px', width:'120px', height:'220px', borderRadius:'50%', background:glowOrbLight(w.c2, 0.3), filter:'blur(40px)', pointerEvents:'none'}} />

                  <div className="relative z-10">
                    <div className="flex items-center justify-between mb-4">
                      <span className="text-[10px] font-[800] text-[color:var(--mute-3)] uppercase tracking-[0.12em]">{w.award}</span>
                      <span className="text-2xl filter drop-shadow-sm select-none">{w.badge}</span>
                    </div>
                    <p className="text-[16px] font-[800] text-[color:var(--ink)] tracking-tight group-hover:text-[color:var(--accent)] transition-colors">{w.team}</p>
                    <p className="text-[13px] text-[color:var(--ink-2)] font-medium mt-1 leading-snug">{w.project}</p>
                  </div>
                  <div className="mt-6 pt-4 border-t flex items-start gap-2 text-[11px] text-[color:var(--mute-2)] relative z-10" style={{borderColor:'rgba(0,0,0,0.08)'}}>
                    <span className="flex-shrink-0 mt-0.5 opacity-70">👥</span>
                    <span className="leading-relaxed">{w.members}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

        </div>
      </div>

        {/* End Centered content block and Scrollable Content Wrapper */}
        </div>
      </div>
    </div>
  );
}

const ROLES = ['Team Lead','Frontend Dev','Backend Dev','Full Stack Dev','ML Engineer','Data Analyst','Designer','Product Manager','DevOps / SRE','Other'];

const THEME_DESC = {
  'Business & Revenue':   'Pricing, fraud detection, revenue growth, supply-chain economics.',
  'Customer Care':        'Query resolution, sentiment analysis, proactive support automation.',
  'Warehouse Ops':        'Pick-path optimisation, inventory AI, fulfilment speed.',
  'Generative AI':        'Fashion recommendations, search, image generation, co-pilots.',
  'SRE & Infrastructure': 'Reliability, observability, deployment pipelines, on-call tooling.',
};

function RegSteps({ step }) {
  const labels = ['Project Details', 'Squad Configuration', 'Review & Register'];
  return (
    <div className="px-7 pt-7 pb-5">
      <div className="flex items-center justify-between max-w-md mx-auto relative">
        {labels.map((l, i) => {
          const done = step > i + 1;
          const active = step === i + 1;
          return (
            <React.Fragment key={i}>
              <div className="flex flex-col items-center gap-1.5 flex-1 relative z-10">
                <div className={`w-8 h-8 rounded-full text-[13px] font-bold flex items-center justify-center transition-all duration-300 ${done ? 'bg-[color:var(--c-emerald)] text-white shadow-sm' : active ? 'bg-[color:var(--accent)] text-white shadow-md scale-110' : 'bg-[color:var(--paper-2)] text-[color:var(--mute-3)]'}`}>
                  {done ? '✓' : i + 1}
                </div>
                <span className={`text-[10px] font-semibold tracking-tight whitespace-nowrap mt-1 ${active ? 'text-[color:var(--ink)] font-bold' : done ? 'text-[color:var(--c-emerald-deep)]' : 'text-[color:var(--mute-3)]'}`}>{l}</span>
              </div>
              {i < 2 && (
                <div className={`absolute top-4 left-[calc(${i === 0 ? '16.6%' : '50%'} + 16px)] right-[calc(${i === 0 ? '50%' : '16.6%'} + 16px)] h-0.5 -translate-y-1/2 transition-colors duration-300 ${step > i + 1 ? 'bg-[color:var(--c-emerald)]' : 'bg-[color:var(--line)]'}`} />
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function RegisterView({ user, setTeams, toast, onLoginOpen, userTeam, pubResults, editTeamMode, setEditTeamMode, setView }) {
  const [step, setStep]   = useState(1);
  const [done, setDone]   = useState(false);
  const [edit, setEdit]   = useState(false);
  const [agree, setAgree] = useState(false);
  const [teamId]          = useState(`HR-2026-${Math.floor(1000+Math.random()*9000)}`);
  const [err, setErr]     = useState({});
  const [recruitmentType, setRecruitmentType] = useState('marketplace');

  const makeBlank = u => ({
    teamName:'', theme:'', subTheme:'', abstract:'',
    genaiModel:'', otherAccess:'', skillsNeeded:[], rolesNeeded:[], teamMode: 'create',
    members:[{ name:u?.name||'', email:u?.email||'', dept:u?.dept||'', role:'Team Lead' }]
  });
  const [form, setForm] = useState(makeBlank(user));

  const handleRecruitmentTypeChange = (type) => {
    setRecruitmentType(type);
    if (type === 'marketplace') {
      setForm(f => ({ ...f, members: [f.members[0]] }));
    } else {
      setForm(f => {
        if (f.members.length < 2) {
          return {
            ...f,
            members: [...f.members, { name: '', email: '', dept: '', role: 'Member' }]
          };
        }
        return f;
      });
    }
    setErr({});
  };

  useEffect(()=>{
    if (userTeam) {
      setForm({
        teamName:userTeam.name, theme:userTeam.theme, subTheme:userTeam.subTheme, abstract:userTeam.abstract,
        genaiModel:userTeam.genaiModel||'', otherAccess:userTeam.otherAccess||'', skillsNeeded:userTeam.skillsNeeded||[], rolesNeeded:userTeam.rolesNeeded||[],
        members: userTeam.leadName ? [
           { name: userTeam.leadName, email: user?.email||'', dept: userTeam.leadDept, role:'Team Lead' },
           ...((userTeam.members.length > 1 && userTeam.depts[1]) ? [{ name: 'Team Member', email:'', dept: userTeam.depts[1], role:'Member' }] : [])
        ] : makeBlank(user).members
      });
      
      if (userTeam.members.length > 1) {
        setRecruitmentType('invite');
      } else {
        setRecruitmentType('marketplace');
      }
      
      if (editTeamMode) {
        setDone(false);
        setStep(1);
        setAgree(true);
      } else {
        setDone(true);
      }
    } else if (user) {
      setForm(makeBlank(user));
      setStep(1); setDone(false); setErr({}); setAgree(false);
      setRecruitmentType('marketplace');
    }
  }, [user?.id, userTeam?.id, editTeamMode]);

  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  const sm = (i,k,v) => setForm(f=>({...f,members:f.members.map((m,j)=>j===i?{...m,[k]:v}:m)}));
  const addMember = () => setForm(f=>({...f,members:[...f.members,{name:'',email:'',dept:'',role:'Member'}]}));
  const rmMember  = i  => setForm(f=>({...f,members:f.members.filter((_,j)=>j!==i)}));

  const v1 = () => {
    const e={};
    if (!form.teamName.trim()) e.teamName='Team name is required';
    else if (form.teamName.length < 3) e.teamName='Minimum 3 characters';
    if (!form.theme)           e.theme='Please select a theme';
    if (!form.subTheme.trim()) e.subTheme='Sub-theme / problem title is required';
    setErr(e); return !Object.keys(e).length;
  };
  const v2 = () => {
    const e = {}; const ms = form.members;
    ms.forEach((m,i) => {
      if (!m.name.trim())  e[`n${i}`] = 'Required';
      if (!m.email.trim()) e[`e${i}`] = 'Required';
      else if (!m.email.includes('@')) e[`e${i}`] = 'Invalid email';
      if (!m.dept)         e[`d${i}`] = 'Required';
    });
    if (ms.length < 2 && form.skillsNeeded.length === 0) {
      e.skills = 'Please select at least one skillset you are seeking';
    }
    setErr(e); return !Object.keys(e).length;
  };
  const submit = () => {
    if (!agree) { toast('Please agree to the participation terms.','error'); return; }
    const isOpen = form.members.length < 2;
    if (userTeam) {
      setTeams(p=>p.map(t => t.id === userTeam.id ? {
        ...t,
        name:form.teamName, theme:form.theme, subTheme:form.subTheme,
        abstract:form.abstract, genaiModel:form.genaiModel, otherAccess:form.otherAccess,
        members:form.members.map((_,i)=> t.members[i] || `M${i}`), maxSize:2,
        open:isOpen, missing:isOpen?['1 member']:[],
        depts:form.members.map(m=>m.dept),
        skillsNeeded:form.skillsNeeded, rolesNeeded:form.rolesNeeded||[],
        leadName:form.members[0]?.name, leadDept:form.members[0]?.dept,
      } : t));
      toast('Team updated successfully!','success');
    } else {
      setTeams(p=>[...p,{
        id:teamId, name:form.teamName, theme:form.theme, subTheme:form.subTheme,
        abstract:form.abstract, genaiModel:form.genaiModel, otherAccess:form.otherAccess,
        members:form.members.map((_,i)=>`M${i}`), maxSize:2,
        open:isOpen, missing:isOpen?['1 member']:[],
        depts:form.members.map(m=>m.dept),
        skillsNeeded:form.skillsNeeded, rolesNeeded:form.rolesNeeded||[],
        leadName:form.members[0]?.name, leadDept:form.members[0]?.dept,
        scores:{r1:null,r2:null,r3:null}
      }]);
      toast('Team registered successfully!','success');
    }
    
    if (editTeamMode && setEditTeamMode && setView) {
      setEditTeamMode(false);
      setView('teams');
    } else {
      setDone(true);
    }
  };

  /* ── NOT SIGNED IN: gate ── */
  if (!user) return (
    <div className="max-w-[700px] mx-auto fade-up mt-8 flex flex-col min-h-[400px] relative justify-center items-center">
      {/* Subtle Mesh Background & Dot Grid */}
      <div className="absolute inset-0 dot-grid pointer-events-none opacity-40"></div>
      <div className="absolute top-[-100px] right-[-100px] w-80 h-80 rounded-full bg-[color:var(--accent-tint)] opacity-40 filter blur-[80px] pointer-events-none"></div>
      <div className="absolute bottom-[-120px] left-[-120px] w-96 h-96 rounded-full bg-[color:var(--c-purple-tint)] opacity-30 filter blur-[90px] pointer-events-none"></div>
      
      <div className="relative z-10 w-full p-6 lg:p-10 flex flex-col justify-center items-center text-center my-auto">
        <span className="eyebrow text-[10px] text-[color:var(--mute-2)] mb-6 block">Tech Week 2026</span>
        <h2 className="h-display text-5xl lg:text-6xl text-[color:var(--ink)] mb-6" style={{lineHeight: 1.05}}>
          Jump the <em className="gradient-text">ramp.</em>
        </h2>
        <p className="text-[14px] text-[color:var(--mute-2)] mb-10 leading-relaxed max-w-[420px] font-medium">
          Use Myntra SSO or create a new account to register your team, submit ideas, and start competing. Takes just 30 seconds.
        </p>
        
        <button onClick={onLoginOpen}
          className="inline-flex items-center justify-center gap-2.5 px-10 py-4 bg-[color:var(--ink)] hover:bg-[color:var(--accent)] hover:shadow-[0_8px_24px_rgba(255,63,108,0.25)] text-white font-bold rounded-[8px] transition-all duration-300 group"
          style={{fontSize:'13px', letterSpacing:'0.04em'}}>
          <span>Sign in to register</span>
          <span className="transform group-hover:translate-x-1 transition-transform">→</span>
        </button>
        <p className="text-[12px] text-[color:var(--mute-3)] mt-6">
          No account?{' '}
          <span className="text-[color:var(--accent)] font-semibold cursor-pointer hover:underline" onClick={onLoginOpen}>Create one now</span>
        </p>
      </div>
    </div>
  );

  /* ── PHASE 2: MENTOR / COORDINATOR ── */
  if (user?.role==='mentor' || user?.role==='coordinator') return (
    <div className="max-w-xl mx-auto">
      <div className="p-8 text-center">
        <div className="w-14 h-14 rounded-full bg-[#fef9c3] border-2 border-[#fde68a] flex items-center justify-center mx-auto mb-4">
          <span className="text-[26px]">{user.role==='mentor'?'🧑‍🏫':'🎯'}</span>
        </div>
        <h2 className="text-[18px] font-[700] text-[color:var(--ink)] mb-1">
          You're registered as a {user.role==='mentor'?'Mentor':'Coordinator'}!
        </h2>
        <p className="text-[13px] text-[color:var(--mute-2)] mt-2 max-w-xs mx-auto">
          {user.role==='mentor'
            ? "You'll be assigned to teams by the event coordinator. Watch for updates on the portal."
            : "You have full access to the Admin panel to manage teams, schedules, and results."}
        </p>
        <div className="inline-flex items-center gap-2 px-4 py-2 bg-[color:var(--paper-2)] rounded-[8px] mt-5">
          <span className="text-[11px] text-[color:var(--mute-3)] uppercase tracking-wide font-semibold">Role</span>
          <span className="text-[13px] font-[700] text-[color:var(--c-amber)] capitalize">{user.role}</span>
        </div>
      </div>
    </div>
  );

  /* ── SUCCESS ── */
  if (done) return (
    <div className="max-w-xl mx-auto space-y-4">
      <div className="p-8 text-center bg-white border border-[color:var(--line-2)] rounded-[16px]">
        <div className="w-14 h-14 rounded-full bg-[#f0fdf4] border-2 border-[#bbf7d0] flex items-center justify-center mx-auto mb-4">
          <span className="text-[26px]">🎉</span>
        </div>
        <h2 className="text-[18px] font-[700] text-[color:var(--ink)] mb-1">Team Registered!</h2>
        <p className="text-[13px] text-[color:var(--mute-2)] mt-2 max-w-xs mx-auto">
          Your team <strong className="text-[color:var(--ink)]">{form.teamName}</strong> is registered under the <strong className="text-[color:var(--accent)]">{form.theme}</strong> theme.
        </p>
      </div>
    </div>
  );

  /* ── PHASE 2: TEAM BUILDING FORM ── */
  const THEME_ICONS = {
    'Generative AI': '🤖',
    'Customer Care': '🎧',
    'Business & Revenue': '📈',
    'Warehouse Ops': '📦',
    'SRE & Infrastructure': '⚙️'
  };

  return (
    <div className="max-w-[900px] mx-auto space-y-6 pb-12 fade-up">
      {/* High-Fidelity Premium Page Intro */}
      <PageIntro
        className="-mx-4"
        eyebrow="Myntra Tech Week 2026"
        title={userTeam ? <>Update your <em className="gradient-text">squad.</em></> : <>Register your <em className="gradient-text">squad.</em></>}
        description={userTeam ? "Revise your project pitch, adjust GenAI tool requests, or update your squad's recruitment needs." : "Pitch your hackathon project, add teammates, or dynamically recruit talent from the live Partner Marketplace."}
        actions={
          <div className="flex items-center gap-2 text-[11px] bg-[color:var(--paper-2)] border border-[color:var(--line-2)] rounded-full px-4.5 py-2 text-[color:var(--mute-1)] font-semibold shadow-sm" style={{ transform: 'translate3d(0, 0, 0)', backfaceVisibility: 'hidden' }}>
            <span className="w-2.5 h-2.5 rounded-full bg-[color:var(--accent)] animate-pulse"></span>
            <span>Lead: <strong>{user.name}</strong> ({user.dept})</span>
          </div>
        }
      />

      <div className="card border-[color:var(--line-2)] bg-white/70 backdrop-blur-md overflow-hidden rounded-[16px] shadow-sm">
        <RegSteps step={step} />

        <div className="px-8 pb-8 pt-4">

          {/* STEP 1 — TEAM DETAILS */}
          {step===1 && (
            <div className="space-y-6 fade-up">

              <div className="space-y-1.5">
                <label className="block text-[12px] font-bold uppercase tracking-wider text-[color:var(--mute-1)]">Team Name <span className="text-[color:var(--accent)]">*</span></label>
                <p className="text-[11px] text-[color:var(--mute-3)]">Make it memorable! There are unique awards for the most creative team name. (Can be modified later)</p>
                <div className="relative">
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[15px] pointer-events-none opacity-60">👥</span>
                  <input
                    value={form.teamName}
                    onChange={e=>sf('teamName',e.target.value)}
                    onClick={() => { if (!form.teamName.trim()) sf('teamName', 'Neural Ninjas'); }}
                    placeholder="e.g. Neural Ninjas"
                    maxLength={40}
                    className={`w-full bg-white border rounded-[12px] pl-11 pr-16 py-3.5 text-[14px] text-[color:var(--ink)] placeholder-[color:var(--mute-3)] outline-none transition-all duration-200 ${err.teamName?'border-red-300 focus:border-red-400 focus:ring-4 focus:ring-red-100':'border-[color:var(--line-2)] focus:border-[color:var(--accent)] focus:ring-4 focus:ring-[color:var(--accent-tint)]'}`}
                  />
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-[color:var(--mute-3)] font-mono">{form.teamName.length}/40</span>
                </div>
                {err.teamName && <p className="text-[11px] text-red-500 mt-1">{err.teamName}</p>}
              </div>

              <div className="space-y-2">
                <label className="block text-[12px] font-bold uppercase tracking-wider text-[color:var(--mute-1)]">Problem Theme <span className="text-[color:var(--accent)]">*</span></label>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                  {THEMES.map(t => {
                    const selected = form.theme === t;
                    return (
                      <div key={t} onClick={() => sf('theme', t)}
                        className={`cursor-pointer rounded-[12px] p-4 border transition-all duration-300 relative group overflow-hidden ${selected ? 'border-[color:var(--accent)] bg-[color:var(--accent-tint)] shadow-[0_8px_20px_rgba(255,63,108,0.06)]' : 'border-[color:var(--line-2)] hover:border-[color:var(--mute-3)] bg-white hover:shadow-[0_4px_12px_rgba(10,10,10,0.02)]'}`}>
                        <div>
                          <p className={`text-[13.5px] font-bold ${selected ? 'text-[color:var(--accent-deep)]' : 'text-[color:var(--ink)]'}`}>{t}</p>
                          <p className={`text-[11px] leading-relaxed mt-0.5 ${selected ? 'text-[color:var(--accent-deep)] opacity-85' : 'text-[color:var(--mute-2)]'}`}>{THEME_DESC[t]}</p>
                        </div>
                        {selected && <div className="absolute top-0 right-0 w-2 h-full bg-[color:var(--accent)]" />}
                      </div>
                    );
                  })}
                </div>
                {err.theme && <p className="text-[11px] text-red-500 mt-1">{err.theme}</p>}
              </div>

              <div className="space-y-1.5">
                <label className="block text-[12px] font-bold uppercase tracking-wider text-[color:var(--mute-1)]">Problem Title / Sub-theme <span className="text-[color:var(--accent)]">*</span></label>
                <div className="relative">
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[15px] pointer-events-none opacity-60">🎯</span>
                  <input
                    value={form.subTheme}
                    onChange={e=>sf('subTheme',e.target.value)}
                    onClick={() => { if (!form.subTheme.trim()) sf('subTheme', 'Style DNA Engine'); }}
                    placeholder="e.g. AI-powered size recommendation engine"
                    maxLength={80}
                    className={`w-full bg-white border rounded-[12px] pl-11 pr-4 py-3.5 text-[14px] text-[color:var(--ink)] placeholder-[color:var(--mute-3)] outline-none transition-all duration-200 ${err.subTheme?'border-red-300 focus:border-red-400 focus:ring-4 focus:ring-red-100':'border-[color:var(--line-2)] focus:border-[color:var(--accent)] focus:ring-4 focus:ring-[color:var(--accent-tint)]'}`}
                  />
                </div>
                {err.subTheme && <p className="text-[11px] text-red-500 mt-1">{err.subTheme}</p>}
              </div>

              <div className="space-y-1.5">
                <label className="block text-[12px] font-bold uppercase tracking-wider text-[color:var(--mute-1)]">Abstract <span className="text-[color:var(--mute-3)] font-normal normal-case">(optional, max 300 chars)</span></label>
                <div className="relative">
                  <textarea
                    value={form.abstract}
                    onChange={e=>e.target.value.length<=300&&sf('abstract',e.target.value)}
                    onClick={() => { if (!form.abstract.trim()) sf('abstract', "We're training a personalised style model on each user's order history, wishlist behaviour, and return patterns. Instead of generic recommendations, it builds a fashion fingerprint."); }}
                    rows={4}
                    placeholder="Briefly describe your solution approach, key technologies, and expected impact..."
                    className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--accent)] focus:ring-4 focus:ring-[color:var(--accent-tint)] rounded-[12px] px-4 py-3.5 text-[14px] text-[color:var(--ink)] placeholder-[color:var(--mute-3)] outline-none resize-none transition-all duration-200"
                  />
                  <p className="text-[10px] text-[color:var(--mute-3)] text-right mt-1 font-mono">{form.abstract.length}/300</p>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="space-y-1.5">
                  <label className="block text-[12px] font-bold uppercase tracking-wider text-[color:var(--mute-1)]">GenAI Model Access Preferred <span className="text-[color:var(--mute-3)] font-normal normal-case">(optional)</span></label>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[15px] pointer-events-none opacity-60">🤖</span>
                    <select value={form.genaiModel} onChange={e=>sf('genaiModel',e.target.value)}
                      className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--accent)] focus:ring-4 focus:ring-[color:var(--accent-tint)] rounded-[12px] pl-11 pr-10 py-3.5 text-[14px] text-[color:var(--ink)] outline-none appearance-none transition-all duration-200">
                      <option value="">Select a preferred GenAI model...</option>
                      {['GPT-4o (OpenAI)','Claude 3.5 Sonnet (Anthropic)','Gemini 1.5 Pro (Google)','Llama 3 (Meta)','Mistral Large','Stable Diffusion (Image)','DALL·E 3 (Image)','Whisper (Speech-to-Text)','No preference'].map(m=>(
                        <option key={m} value={m}>{m}</option>
                      ))}
                    </select>
                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[color:var(--mute-2)] text-[12px]">▼</div>
                  </div>
                </div>

                <div className="space-y-1.5">
                  <label className="block text-[12px] font-bold uppercase tracking-wider text-[color:var(--mute-1)]">Other Tooling Required <span className="text-[color:var(--mute-3)] font-normal normal-case">(optional)</span></label>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[15px] pointer-events-none opacity-60">🛠️</span>
                    <input
                      value={form.otherAccess}

function MarketplaceView({ user, teams, joinRequests, setJoinRequests, ideas, setIdeas, toast, mode, setView, onLoginOpen, userTeam, setEditTeamMode, pubResults }) {
  const tab = mode || 'ideas';
  const [filter, setFilter]   = useState('all');
  const [joinT, setJoinT]     = useState(null);
  const [detailT, setDetailT] = useState(null);
  const [inviteMsg, setInviteMsg] = useState('');
  const [searchQ, setSearchQ]   = useState('');
  const [skillF, setSkillF]     = useState([]);
  const [roleF, setRoleF]       = useState([]);
  const [reqFilter, setReqFilter] = useState('all');
  const [mktPage, setMktPage]   = useState(1);
  const MKT_PAGE_SIZE = 12;
  const [showIdeaForm, setShowIdeaForm] = useState(false);
  const [ideaForm, setIdeaForm] = useState({ title:'', desc:'', theme:'' });

  const isOpen  = t => t.open && t.members.length < t.maxSize;
  const myTeam  = teams.find(t => t.open && t.leadName === user?.name);
  const myReqTo = t => joinRequests.find(r=>r.teamId===t.id && r.userId===user?.id);
  const shown   = teams.filter(t=> filter==='open'?isOpen(t):filter==='closed'?!isOpen(t):true);

  // Skill match score: how many of their needed skills overlap with user's dept
  const matchScore = t => {
    if (!t.skillsNeeded?.length || !user) return 0;
    const userSkillHints = [user.dept]; // dept as a proxy for offered skills
    const overlap = t.skillsNeeded.filter(s =>
      userSkillHints.some(h => h && s.toLowerCase().includes(h.toLowerCase().split(' ')[0]))
    );
    return Math.round((overlap.length / t.skillsNeeded.length) * 100);
  };

  const openTeams = teams.filter(isOpen);

  // All unique skills across open teams (for filter chips)
  const allSkills = [...new Set(openTeams.flatMap(t=>t.skillsNeeded||[]))];

  // Filtered open teams (Find a Partner)
  const filteredOpen = openTeams.filter(t=>{
    const q = searchQ.toLowerCase();
    const matchQ = !q || [t.name,t.subTheme,t.abstract,t.leadName].some(v=>v?.toLowerCase().includes(q));
    const matchSkill = skillF.length===0 || skillF.some(s=>t.skillsNeeded?.includes(s));
    return matchQ && matchSkill;
  });

  // Filtered teams (Browse)
  const filteredShown = shown.filter(t=>{
    const q = searchQ.toLowerCase();
    return !q || [t.name,t.subTheme,t.theme].some(v=>v?.toLowerCase().includes(q));
  });

  const sendJoin = () => {
    if (!user) { toast('Sign in first.','error'); return; }
    setJoinRequests(p=>[...p,{
      id:`JR${Date.now()}`, teamId:joinT.id, teamName:joinT.name,
      userId:user.id, userName:user.name, userDept:user.dept,
      message:inviteMsg, status:'pending', direction:'join'
    }]);
    toast(`Request sent to ${joinT.name}.`,'success');
    setJoinT(null); setInviteMsg('');
  };

  const handleReq = (id, act) => {
    setJoinRequests(p=>p.map(r=>r.id===id?{...r,status:act}:r));
    toast(act==='accepted'?'✓ Request accepted — partnership is now full!':'Request declined.', act==='accepted'?'success':'error');
  };

  const myOutgoing = joinRequests.filter(r=>r.userId===user?.id);
  const inbound    = joinRequests.filter(r=>r.status==='pending' && myTeam && r.teamId===myTeam.id);
  const reqCount   = myOutgoing.length + inbound.length;

  const approvedIdeas  = (ideas||[]).filter(i=>i.status==='approved');
  const myPendingIdeas = (ideas||[]).filter(i=>i.status==='pending' && i.authorId===user?.id);

  const submitIdea = () => {
    if (!ideaForm.title.trim() || !ideaForm.desc.trim() || !ideaForm.theme) {
      toast('Please fill in all fields.','error'); return;
    }
    const newIdea = {
      id:`IDK${Date.now()}`, title:ideaForm.title.trim(), desc:ideaForm.desc.trim(), theme:ideaForm.theme,
      authorId:user.id, authorName:user.name, authorDept:user.dept,
      status:'pending', submittedAt: new Date().toISOString().slice(0,10), upvotes:[],
    };
    setIdeas(p=>[...p, newIdea]);
    setIdeaForm({ title:'', desc:'', theme:'' });
    setShowIdeaForm(false);
    toast('Idea submitted! It will appear publicly once approved by an admin.','success');
  };

  const toggleUpvote = (ideaId) => {
    if (!user) { toast('Sign in to upvote.','error'); return; }
    setIdeas(p=>p.map(i=>i.id===ideaId
      ? { ...i, upvotes: i.upvotes.includes(user.id) ? i.upvotes.filter(x=>x!==user.id) : [...i.upvotes, user.id] }
      : i
    ));
  };

  const filteredAll = teams

          <div className="flex-1 space-y-6">

                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#16a34a] opacity-75"></span>
                              <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#16a34a]"></span>
                            </span>
                            Seeking Partner
                          </span>

                      <p className="text-[13px] text-[color:var(--accent)] font-semibold">{userTeam.subTheme}</p>

                          <span className="text-[10px] text-[color:var(--mute-2)] font-mono font-bold uppercase tracking-wider mr-1">Looking For:</span>

                            </span>

                          {userTeam.skillsNeeded?.map(s => (
                            <span key={s} className="px-2 py-0.5 bg-white border border-[color:var(--accent)]/30 text-[color:var(--accent)] text-[10px] font-bold rounded-[3px] shadow-sm">

                          ))}

                      </div>
                    )}

                    <div className="space-y-2.5">
                      <p className="text-[10px] text-[color:var(--mute-3)] uppercase tracking-[0.12em] font-[800]">Team Members ({userTeam.members.length}/2)</p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {(() => {
                          const displayMembers = [];
                          userTeam.members.forEach((mId, i) => {
                            const u = USERS.find(x => x.id === mId);
                            if (u) {
                              displayMembers.push({ name: u.name, dept: u.dept, role: i === 0 ? 'Team Lead' : 'Member' });
                            }
                          });
                          if (displayMembers.length === 0) {
                            if (userTeam.leadName) {
                              displayMembers.push({ name: userTeam.leadName, dept: userTeam.leadDept || '', role: 'Team Lead' });
                            }
                            if (userTeam.members.length > 1 && userTeam.depts[1]) {
                              displayMembers.push({ name: 'Team Member', dept: userTeam.depts[1], role: 'Member' });
                            }

                            <div key={idx} className="flex items-center gap-3 px-3 py-2.5 bg-white border border-gray-100 rounded-lg shadow-sm">

                                {initials(m.name || '?')}
