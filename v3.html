function EnablementView({ sessions = [], setSessions, user, toast }) {
  const [type,  setType]  = useState('all');
  const [track, setTrack] = useState('all');
  const [searchQ, setSearchQ] = useState('');

  // Admin states
  const isAdmin = user?.role === 'coordinator';
  const [adminOpen, setAdminOpen] = useState(false);
  const [editingId, setEditingId] = useState(null);

  // Form Fields
  const [sessionTitle, setSessionTitle]   = useState('');
  const [sessionSpeaker, setSessionSpeaker] = useState('');
  const [sessionTrack, setSessionTrack]     = useState('Gen AI');
  const [sessionStatus, setSessionStatus]   = useState('upcoming');
  const [sessionDate, setSessionDate]       = useState('');
  const [sessionTime, setSessionTime]       = useState('');
  const [sessionMeetLink, setSessionMeetLink] = useState('');

  const clearForm = () => {
    setSessionTitle('');
    setSessionSpeaker('');
    setSessionTrack('Gen AI');
    setSessionStatus('upcoming');
    setSessionDate('');
    setSessionTime('');
    setSessionMeetLink('');
    setEditingId(null);
  };

  const handleSaveSession = (e) => {
    e.preventDefault();
    if (!sessionTitle.trim() || !sessionSpeaker.trim() || !sessionDate.trim()) {
      toast('Please fill in all required fields (Title, Presenter, Date).', 'error');
      return;
    }

    const nextTime = sessionStatus === 'recorded' ? null : (sessionTime.trim() || 'TBD');

    if (editingId) {
      setSessions(prev => prev.map(s => s.id === editingId ? {
        ...s,
        title: sessionTitle.trim(),
        speaker: sessionSpeaker.trim(),
        track: sessionTrack,
        status: sessionStatus,
        date: sessionDate.trim(),
        time: nextTime,
        meetLink: sessionMeetLink.trim()
      } : s));
      toast('Session updated successfully.', 'success');
    } else {
      const numericIds = (sessions||[]).map(s => parseInt(s.id.replace('S', ''), 10) || 0);
      const nextNum = Math.max(0, ...numericIds) + 1;
      const nextId = 'S' + String(nextNum).padStart(3, '0');

      const newSession = {
        id: nextId,
        title: sessionTitle.trim(),
        speaker: sessionSpeaker.trim(),
        track: sessionTrack,
        status: sessionStatus,
        date: sessionDate.trim(),
        time: nextTime,
        meetLink: sessionMeetLink.trim()
      };

      setSessions(prev => [...prev, newSession]);
      toast('New session added successfully.', 'success');
    }

    clearForm();
    setAdminOpen(false);
  };

  const handleStartEdit = (s) => {
    setEditingId(s.id);
    setSessionTitle(s.title);
    setSessionSpeaker(s.speaker);
    setSessionTrack(s.track);
    setSessionStatus(s.status);
    setSessionDate(s.date);
    setSessionTime(s.time || '');
    setSessionMeetLink(s.meetLink || '');
    setAdminOpen(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleDelete = (id) => {
    if (window.confirm('Are you sure you want to delete this session?')) {
      setSessions(prev => prev.filter(s => s.id !== id));
      toast('Session deleted.', 'success');
    }
  };

  const shown = (sessions||[]).filter(s=>{
    const t=type==='all'||(type==='live'&&(s.status==='live'||s.status==='upcoming'))||(type==='recorded'&&s.status==='recorded');
    const k=track==='all'||s.track===track;
    const q=searchQ.toLowerCase();
    const matchQ = !q || [s.title, s.speaker, s.id, TRACKS[s.track]||''].some(v=>v?.toLowerCase().includes(q));
    return t&&k&&matchQ;
  });

  const statusInfo = s => ({
    live:     { label:'Live',     cls:'bg-[#fef2f2] text-[#dc2626]',        btn:'Join now'      },
    upcoming: { label:'Upcoming', cls:'bg-[#eeeeff] text-[color:var(--accent)]',         btn:'Set reminder'  },
    recorded: { label:'Recorded', cls:'bg-[color:var(--paper-2)] text-[color:var(--mute-2)]',         btn:'Watch'         },
  })[s]||{};

  const getSessionColors = (t) => {
    const mapping = {
      'Gen AI':   { bg: '#5c7aff', text: '#ffffff' }, // Generative AI: Blue
      'InfoSec':  { bg: '#4df3a9', text: '#0f172a' }, // InfoSec / Security: Mint Green
      'SRE':      { bg: '#ff7b5c', text: '#ffffff' }, // SRE & Infrastructure: Coral
      'Dockins':  { bg: '#f085d5', text: '#0f172a' }, // Dockins / Deploy: Rose Pink
    };
    return mapping[t] || { bg: '#94a3b8', text: '#ffffff' };
  };

  return (
    <div className="space-y-6 fade-up">
      {/* Page Intro matching standard premium style */}
      <PageIntro
        eyebrow="Learn & Grow"
        title={<>Master the tech.<br/>Accelerate your <em className="gradient-text">build.</em></>}
        description="Level up your build. Access live sessions, workshop deep-dives, starter kits, and recorded resources curated for Tech Week 2026."
        actions={isAdmin ? [
          <Btn key="admin-toggle" onClick={() => { setAdminOpen(o => !o); if (adminOpen) clearForm(); }} variant={adminOpen ? 'ghost' : 'primary'} className="flex items-center gap-1.5 shadow-sm">
            {adminOpen ? '✕ Close Console' : '🛠️ Admin Tools'}
          </Btn>
        ] : null}
      />

      {/* 🛠️ Enablement Admin Console */}
      {isAdmin && adminOpen && (
        <div className="bg-slate-900 border border-slate-800 text-white rounded-[16px] p-6 shadow-xl animate-fade-in space-y-5">
          <div className="flex items-center justify-between border-b border-slate-800 pb-3">
            <div>
              <p className="text-[10px] font-mono uppercase tracking-[0.2em] text-[#ff7b5c]">Enablement Control Console</p>
              <h3 className="text-[17px] font-[800] mt-0.5">{editingId ? `✏️ Edit Session (${editingId})` : '➕ Add New Session'}</h3>
            </div>
            <button onClick={() => { setAdminOpen(false); clearForm(); }} className="text-slate-400 hover:text-white transition-colors text-[14px]">
              ✕ Close
            </button>
          </div>

          <form onSubmit={handleSaveSession} className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {/* Title */}
            <div className="md:col-span-2 space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Session Title *</label>
              <input 
                type="text" 
                value={sessionTitle}
                onChange={e => setSessionTitle(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3.5 py-2.5 text-[13px] text-white placeholder-slate-550 outline-none transition-all"
                placeholder="e.g., Advanced React Patterns at Scale"
                required
              />
            </div>

            {/* Presenter */}
            <div className="space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Presenter / Speaker *</label>
              <input 
                type="text" 
                value={sessionSpeaker}
                onChange={e => setSessionSpeaker(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3.5 py-2.5 text-[13px] text-white placeholder-slate-550 outline-none transition-all"
                placeholder="e.g., Dan Abramov"
                required
              />
            </div>

            {/* Track */}
            <div className="space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Track *</label>
              <select 
                value={sessionTrack}
                onChange={e => setSessionTrack(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3 py-2.5 text-[13px] text-white outline-none transition-all cursor-pointer"
              >
                {Object.entries(TRACKS).map(([k,v]) => (
                  <option key={k} value={k} className="bg-slate-900 text-white">{v}</option>
                ))}
              </select>
            </div>

            {/* Status */}
            <div className="space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Status *</label>
              <select 
                value={sessionStatus}
                onChange={e => setSessionStatus(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3 py-2.5 text-[13px] text-white outline-none transition-all cursor-pointer"
              >
                <option value="upcoming" className="bg-slate-900 text-white">Upcoming</option>
                <option value="live" className="bg-slate-900 text-white">Live</option>
                <option value="recorded" className="bg-slate-900 text-white">Recorded</option>
              </select>
            </div>

            {/* Date */}
            <div className="space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Session Date *</label>
              <input 
                type="text" 
                value={sessionDate}
                onChange={e => setSessionDate(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3.5 py-2.5 text-[13px] text-white placeholder-slate-550 outline-none transition-all"
                placeholder="e.g., Jun 16"
                required
              />
            </div>

            {/* Time */}
            <div className="space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Session Time {sessionStatus !== 'recorded' && '*'}</label>
              <input 
                type="text" 
                value={sessionTime}
                onChange={e => setSessionTime(e.target.value)}
                disabled={sessionStatus === 'recorded'}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3.5 py-2.5 text-[13px] text-white placeholder-slate-550 outline-none transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                placeholder={sessionStatus === 'recorded' ? 'Recorded (No time needed)' : 'e.g., 2:00 PM'}
                required={sessionStatus !== 'recorded'}
              />
            </div>

            {/* Google Meet Link */}
            <div className="md:col-span-3 space-y-1">
              <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Google Meet / Resource Link (Optional)</label>
              <input 
                type="url" 
                value={sessionMeetLink}
                onChange={e => setSessionMeetLink(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 focus:border-slate-500 rounded-[8px] px-3.5 py-2.5 text-[13px] text-white placeholder-slate-555 outline-none transition-all"
                placeholder="e.g., https://meet.google.com/abc-defg-hij"
              />
            </div>

            {/* Actions */}
            <div className="md:col-span-3 flex justify-end gap-2.5 pt-2 border-t border-slate-800 mt-2">
              <Btn 
                type="button" 
                variant="subtle" 
                onClick={() => { setAdminOpen(false); clearForm(); }}
                className="hover:bg-slate-800 hover:text-white transition-colors"
              >

function LoadingScreen({ onComplete }) {
  const LOADER_IMAGES = [
    "Loader images/In_this_same_Art_Style,_202605181036 1.png",
    "Loader images/In_this_same_Art_Style,_202605181038 1.png",
    "Loader images/In_this_same_Art_Style,_202605181039 1.png",
    "Loader images/In_this_same_Art_Style,_202605181040 1.png",
    "Loader images/In_this_same_Art_Style,_202605181042 1.png",
    "Loader images/In_this_same_Art_Style,_202605181043 1.png",
    "Loader images/In_this_same_Art_Style,_202605181045 1.png"
  ];

  const [currentIndex, setCurrentIndex] = React.useState(0);
  const [fadeAway, setFadeAway] = React.useState(false);

  React.useEffect(() => {
    // Lock scrolling on page load
    document.body.style.overflow = 'hidden';

    // Preload images to avoid flickering
    LOADER_IMAGES.forEach((src) => {
      const img = new Image();
      img.src = src;
    });

    const interval = setInterval(() => {
      setCurrentIndex((prev) => {
        if (prev < LOADER_IMAGES.length - 1) {
          return prev + 1;
        } else {
          clearInterval(interval);
          setFadeAway(true);
          setTimeout(() => {
            onComplete();
          }, 240); // match transition duration (reduced by 40%)
          return prev;
        }
      });
    }, 150); // 0.15s intervals (reduced by 40%)

    return () => {
      clearInterval(interval);
      document.body.style.overflow = '';
    };
  }, []);

  return (
    <div 
      className={`fixed inset-0 z-[9999] flex items-center justify-center bg-[#0A0A0A] transition-all duration-[480ms] ease-in-out ${
        fadeAway ? 'opacity-0 pointer-events-none scale-105' : 'opacity-100'
      }`}
    >
      <div className="flex flex-col items-center gap-6 select-none animate-fade-in">
        {/* Main Typographic Wordmark */}
        <h1 className="text-5xl sm:text-7xl md:text-8xl font-extrabold tracking-tighter text-white flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6">
          <span className={`inline-block transition-transform duration-[480ms] ease-in-out ${
            fadeAway ? '-translate-y-8 sm:translate-y-0 sm:-translate-x-20 md:-translate-x-28' : 'translate-y-0 sm:translate-x-0'
          }`}>Tech</span>
          
          {/* Changing Image Frame */}
          <div className="relative w-16 h-16 sm:w-24 sm:h-24 md:w-28 md:h-28 flex-shrink-0">
            {LOADER_IMAGES.map((src, i) => (
              <img
                key={src}
                src={src}
                alt="TechWeek Loading"
                className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-[180ms] ${
                  i === currentIndex ? 'opacity-100' : 'opacity-0'
                }`}
              />
            ))}
          </div>
          
          <span className={`gradient-text inline-block transition-transform duration-[480ms] ease-in-out ${
            fadeAway ? 'translate-y-8 sm:translate-y-0 sm:translate-x-20 md:translate-x-28' : 'translate-y-0 sm:translate-x-0'
          }`}>Week</span>
        </h1>
        
        {/* Animated Loading Text */}
        <p className="text-[11px] font-mono text-white/40 tracking-[0.25em] uppercase animate-pulse mt-4">
          Initializing TechWeek '26...
        </p>
      </div>
    </div>
  );
}

                </div>
              </div>
            </div>
          </div>

          {/* Bottom bar */}
          <div className="flex flex-col sm:flex-row items-center justify-between gap-3 pt-6" style={{borderTop:'1px solid rgba(255,255,255,0.08)'}}>
            <p className="text-[12px]" style={{color:'rgba(255,255,255,0.4)'}}>© 2026 Myntra Designs Pvt. Ltd. · Tech Week V1</p>
            <div className="flex items-center gap-4">
              {['Privacy','Terms','Cookie Policy'].map(l=>(
                <a key={l} href="#" className="text-[12px] transition-colors btn" style={{color:'rgba(255,255,255,0.4)'}} onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.85)'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.4)'}>{l}</a>
              ))}
            </div>
          </div>
        </div>
      </footer>

      <LoginModal open={loginOpen} onClose={()=>setLogin(false)}
        onLogin={u=>{ setUser(u); if(!allUsers.find(x=>x.id===u.id)) setAllUsers(p=>[...p,u]); }} toast={toast} />

      {toastState && <Toast key={toastState.k} msg={toastState.msg} type={toastState.type} onDone={()=>setToast(null)} />}
    

</div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
