                              <div className="flex-1 min-w-0">
                                <p className="text-[13px] text-[color:var(--ink)] font-[800] truncate">{m.name}</p>
                                <p className="text-[11px] text-[color:var(--mute-3)] truncate">{m.dept} · {m.role}</p>
                              </div>
                              {idx === 0 && <span className="text-[9px] text-amber-600 bg-amber-50 border border-amber-100 px-1.5 py-0.5 rounded-[3px] font-[800] uppercase tracking-wider">Lead</span>}
                            </div>
                          ));

                              <p className="text-[10px] text-gray-400/80 mt-0.5">Accept a partner request below</p>
                            </div>
                          </div>

                    </div>

                        <div>
                          <p className="text-[12px] font-[800] text-[color:var(--ink)]">Registration Confirmed</p>

                      </div>

                      <div className="flex gap-3">
                        <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shadow-sm flex-shrink-0 mt-0.5 ${pubResults?.R1?.published ? 'bg-indigo-600 text-white' : 'bg-white border border-[#d2d0ff] text-indigo-400'}`}>
                          {pubResults?.R1?.published ? '✓' : '1'}
                        </div>
                        <div>
                          <p className={`text-[12px] font-[800] ${pubResults?.R1?.published ? 'text-[color:var(--ink)]' : 'text-[color:var(--mute-2)]'}`}>Round 1 Jury Evaluation</p>
                          <p className="text-[10.5px] text-[color:var(--mute-2)] font-medium">
                            {pubResults?.R1?.published 
                              ? (pubResults.R1.teams.includes(userTeam.id) ? 'Qualified for Round 2' : 'Not selected for Round 2')
                              : 'Awaiting jury evaluation scores'}

                          {pubResults?.R1?.published && userTeam.scores?.r1 && (
                            <span className="inline-block mt-1 px-2 py-0.5 bg-indigo-50 border border-indigo-100 text-indigo-600 font-mono text-[9px] font-bold rounded">
                              {userTeam.scores.r1} pts
                            </span>
                          )}
                        </div>
                      </div>

                      {/* Step 3: R2 Deep Dive */}
                      <div className="flex gap-3">
                        <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shadow-sm flex-shrink-0 mt-0.5 ${pubResults?.R2?.published ? 'bg-indigo-600 text-white' : 'bg-white border border-[#d2d0ff] text-indigo-300'}`}>
                          {pubResults?.R2?.published ? '✓' : '2'}
                        </div>
                        <div>
                          <p className={`text-[12px] font-[800] ${pubResults?.R2?.published ? 'text-[color:var(--ink)]' : 'text-[color:var(--mute-3)]'}`}>Round 2 Technical Deep Dive</p>
                          <p className="text-[10.5px] text-[color:var(--mute-3)] font-medium">
                            {pubResults?.R2?.published 
                              ? (pubResults.R2.teams.includes(userTeam.id) ? 'Qualified for Grand Finale' : 'Not selected')
                              : 'Locked until R1 completion'}
                          </p>
                          {pubResults?.R2?.published && userTeam.scores?.r2 && (
                            <span className="inline-block mt-1 px-2 py-0.5 bg-indigo-50 border border-indigo-100 text-indigo-600 font-mono text-[9px] font-bold rounded">
                              {userTeam.scores.r2} pts
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            <div className="flex items-center justify-between pb-2 border-b border-[color:var(--line)]">
              <p className="text-[13px] font-[800] text-[color:var(--ink)]">{filteredAll.length} Teams Found</p>
            </div>

            {/* Cards Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {filteredAll.slice((mktPage-1)*MKT_PAGE_SIZE, mktPage*MKT_PAGE_SIZE).map((team,idx)=>{
                const open=isOpen(team); const req=myReqTo(team);
                const score=matchScore(team);
                const headerColors = getHeaderColors(team.theme);
                const cardDate = getCardDate(team.id);
                return (
                  <div key={team.id} onClick={()=>setDetailT(team)}
                    className="rounded-[16px] flex flex-col overflow-hidden transition-all duration-300 hover:-translate-y-1.5 bg-[color:var(--paper-2)] hover:shadow-[0_12px_28px_rgba(0,0,0,0.08)] border border-[color:var(--line-2)] cursor-pointer group">
                    
                    {/* Header bar from mockup */}
                    <div 
                      style={{ backgroundColor: headerColors.bg, color: headerColors.text }} 
                      className="px-5 py-3.5 flex justify-between items-center font-mono font-bold text-[12px] uppercase tracking-wider rounded-t-[16px]"
                    >
                      <span>{team.id}</span>
                      <span>{cardDate}</span>
                    </div>

                    {/* Body from mockup */}
                    <div className="p-6 flex flex-col gap-4 flex-1 rounded-b-[16px]">

                      <div>
                        <p className="text-[11px] text-[color:var(--mute-3)] font-semibold uppercase tracking-wider mb-1">

                        {/* Title & Tag row */}
                        <div className="flex items-start justify-between gap-2.5">
                          <h3 className="text-[17px] font-[800] text-[color:var(--ink)] leading-snug flex-1 group-hover:text-[color:var(--accent)] transition-colors">
                            {team.name}
                          </h3>
                          {open ? (
                            <span className="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-[#eff6ff] text-[#3b82f6] border border-[#dbeafe]/50 flex-shrink-0">
                              Open
                            </span>
                          ) : (
                            <span className="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-[#f3f4f6] text-[#6b7280] border border-[#e5e7eb]/50 flex-shrink-0">
                              Full
                            </span>
                          )}
                        </div>
                      </div>

                      {/* Subtheme */}
                      {team.subTheme && (
                        <p className="text-[12px] text-[color:var(--accent)] font-semibold -mt-2">
                          {team.subTheme}
                        </p>

                      <p className="text-[12.5px] text-[color:var(--mute-1)] leading-relaxed flex-1"

                        {team.abstract}

                      {open && (
                        <div className="flex flex-wrap gap-1.5 mt-1">
                          {team.rolesNeeded?.map(r=>(
                            <span key={r} className="px-2.5 py-1 bg-[color:var(--ink)] text-white text-[9px] font-[800] rounded-[4px] shadow-sm uppercase tracking-wide whitespace-nowrap">
                              Seeking {r}
                            </span>
                          ))}
                          {team.skillsNeeded?.slice(0, 2).map(s=>(
                            <span key={s} className="px-2.5 py-1 bg-white border border-[color:var(--accent)]/30 text-[color:var(--accent)] text-[9px] font-[800] rounded-[4px] shadow-sm uppercase tracking-wide whitespace-nowrap">
                              {s}
                            </span>

                            <span className="px-2 py-1 bg-white border border-[color:var(--accent)]/30 text-[color:var(--accent)] text-[9px] font-[800] rounded-[4px] shadow-sm whitespace-nowrap">

                                : 'bg-[color:var(--paper-2)] text-[color:var(--mute-2)] border-[color:var(--line-2)]'

                              {score}% Match

                          className={`rounded-full px-5 py-2 text-[11px] uppercase tracking-wide font-[800] transition-all shadow-sm ${
                            !open 
                              ? 'bg-transparent border border-gray-200 text-gray-400 cursor-default'

                                ? 'bg-[#fffbeb] border border-[#fde68a] text-[#b45309] cursor-default'
                                : req?.status === 'accepted'

                          }`}

                          {!open ? 'Full' : req?.status === 'pending' ? 'Pending' : req?.status === 'accepted' ? 'Accepted' : 'Join Team'}

                  </div>

              const totalPages = Math.ceil(filteredAll.length / MKT_PAGE_SIZE);

              const start = (page-1)*MKT_PAGE_SIZE+1;
              const end = Math.min(page*MKT_PAGE_SIZE, filteredAll.length);
              return (
                <div className="flex items-center justify-between pt-4 border-t border-[color:var(--line)] flex-wrap gap-3">
                  <p className="text-[12px] font-medium text-[color:var(--mute-3)]">Showing {start}–{end} of {filteredAll.length} teams</p>
                  <div className="flex gap-1.5 items-center">
                    <button onClick={()=>setMktPage(p=>Math.max(1,p-1))} disabled={page===1}
                      className={`px-3 py-1.5 text-[12px] font-[800] btn border rounded-[8px] ${page===1?'border-[color:var(--line)] text-[color:var(--mute-4)]':'border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)]'}`}>‹ Prev</button>
                    {Array.from({length:Math.min(7,totalPages)},(_,i)=>{
                      const start2 = Math.max(1, Math.min(page-3, totalPages-6));
                      const p = start2+i;
                      return p<=totalPages && (
                        <button key={p} onClick={()=>setMktPage(p)}
                          className={`w-8 h-8 text-[12px] font-[800] btn rounded-[8px] ${p===page?'bg-[color:var(--ink)] text-white shadow-sm':'border border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)]'}`}>{p}</button>
                      );
                    })}
                    <button onClick={()=>setMktPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}
                      className={`px-3 py-1.5 text-[12px] font-[800] btn border rounded-[8px] ${page===totalPages?'border-[color:var(--line)] text-[color:var(--mute-4)]':'border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)]'}`}>Next ›</button>
                  </div>
                </div>
              );
            })()}

          </div>
        </div>
      )}

      {/* ── TAB 3: REQUESTS ── */}
      {tab==='requests' && (
        <div className="space-y-4">
          {!user && <Gate title="Sign in required" msg="Sign in to see your join requests." />}

          {/* Status filter */}
          {user && (myOutgoing.length > 0 || inbound.length > 0) && (
            <div className="flex gap-1.5">
              {[['all','All'],['pending','⏳ Pending'],['accepted','✓ Accepted'],['declined','✗ Declined']].map(([f,l])=>(
                <button key={f} onClick={()=>setReqFilter(f)}
                  className={`px-3.5 py-1.5 rounded-[3px] text-[12px] font-semibold btn transition-all ${reqFilter===f?'bg-[color:var(--ink)] text-white':'bg-white border border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:text-[color:var(--ink)]'}`}>
                  {l}
                </button>
              ))}
            </div>
          )}

          {/* Inbound — to my team */}
          {inbound.filter(r=>reqFilter==='all'||r.status===reqFilter).length > 0 && (
            <div className="p-6">
              <p className="text-[11px] text-[color:var(--mute-3)] uppercase tracking-[0.12em] font-semibold mb-4">
                Incoming requests · {myTeam?.name}
              </p>
              <div className="space-y-3">
                {inbound.filter(r=>reqFilter==='all'||r.status===reqFilter).map(r=>(
                  <div key={r.id} className="flex items-center justify-between gap-4 p-4 bg-[color:var(--paper)] border border-[#efefef] rounded-none">
                    <div className="flex items-center gap-3 min-w-0">
                      <div className="w-9 h-9 rounded-full bg-[color:var(--paper-2)] flex items-center justify-center text-[11px] font-bold text-[color:var(--mute-2)] flex-shrink-0">
                        {initials(r.userName)}
                      </div>
                      <div className="min-w-0">
                        <p className="text-[13px] font-semibold text-[color:var(--ink)]">{r.userName}</p>
                        <p className="text-[11px] text-[color:var(--mute-3)]">{r.userDept}</p>
                        {r.message && <p className="text-[12px] text-[color:var(--mute-2)] mt-1 italic">"{r.message}"</p>}
                      </div>
                    </div>
                    <div className="flex gap-2 flex-shrink-0">
                      <Btn variant="success" className="py-1.5 text-[12px] px-4" onClick={()=>handleReq(r.id,'accepted')}>Accept</Btn>
                      <Btn variant="danger"  className="py-1.5 text-[12px] px-4" onClick={()=>handleReq(r.id,'declined')}>Decline</Btn>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Outgoing — requests I've sent */}
          {myOutgoing.filter(r=>reqFilter==='all'||r.status===reqFilter).length > 0 && (
            <div className="p-6">
              <p className="text-[11px] text-[color:var(--mute-3)] uppercase tracking-[0.12em] font-semibold mb-4">My outgoing requests</p>
              <div className="space-y-3">
                {myOutgoing.filter(r=>reqFilter==='all'||r.status===reqFilter).map(r=>(
                  <div key={r.id} className="flex items-center justify-between gap-4 p-4 bg-[color:var(--paper)] border border-[#efefef] rounded-none">
                    <div>
                      <p className="text-[13px] font-semibold text-[color:var(--ink)]">{r.teamName}</p>
                      {r.message && <p className="text-[12px] text-[color:var(--mute-2)] mt-0.5 italic">"{r.message}"</p>}
                    </div>
                    <span className={`text-[11px] font-semibold px-3 py-1.5 rounded-full flex-shrink-0 ${
                      r.status==='pending'?'bg-[#fffbeb] text-[#b45309]'
                      :r.status==='accepted'?'bg-[#f0fdf4] text-[#15803d]'
                      :'bg-[#fef2f2] text-[#dc2626]'}`}>
                      {r.status==='pending'?'⏳ Pending':r.status==='accepted'?'✓ Accepted':'✗ Declined'}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {user && reqCount === 0 && (
            <div className="p-10 text-center">
              <p className="text-[32px] mb-2">📭</p>
              <p className="text-[14px] font-semibold text-[color:var(--ink)]">No requests yet</p>
              <p className="text-[12px] text-[color:var(--mute-3)] mt-1">Head to "Find a Partner" to send your first request.</p>
            </div>
          )}
        </div>
      )}

      {/* ── TAB 4: IDEA BOARD ── */}
      {tab==='ideas' && (
        <div className="flex flex-col md:flex-row gap-8 fade-up mt-4">
          
          {/* Left Sidebar */}
          <div className="md:w-[260px] flex-shrink-0 space-y-6">
            <div>
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Browse Controls</p>
              <p className="text-[12px] text-[color:var(--mute-2)] mt-2 leading-relaxed">{approvedIdeas.length} approved ideas. Filter by theme to scan faster.</p>
            </div>
            
            {/* Search */}
            <div className="space-y-1.5 pt-2">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Search Ideas</p>
              <AnimatedSearchInput 
                value={searchQ} 
                onChange={e=>{setSearchQ(e.target.value);setMktPage(1);}} 
                onClear={()=>setSearchQ('')}
                type="ideas"
              />
            </div>
            
            {/* Filters */}
            <div className="space-y-1.5 pt-4">
              <p className="text-[10px] font-[800] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-3 ml-2">Theme Filter</p>
              <button onClick={()=>setFilter('all')}
                className={`block w-full text-left px-3.5 py-2.5 text-[12px] font-semibold rounded-[8px] transition-colors ${filter==='all'?'bg-[color:var(--ink)] text-white':'text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)] hover:text-[color:var(--ink)]'}`}>
                All Themes
              </button>
              {THEMES.map(t => (
                <button key={t} onClick={()=>setFilter(t)}
                  className={`block w-full text-left px-3.5 py-2.5 text-[12px] font-semibold rounded-[8px] transition-colors ${filter===t?'bg-[color:var(--ink)] text-white':'text-[color:var(--mute-2)] hover:bg-[color:var(--paper-2)] hover:text-[color:var(--ink)]'}`}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          {/* Right Content */}
          <div className="flex-1 space-y-6">
            
            {/* Submit Form Overlay/Inline */}
            {showIdeaForm && user && (
              <div className="p-5 bg-white border border-[color:var(--line-2)] rounded-[16px] shadow-sm mb-6 fade-up">
                <div className="space-y-3">
                  <div className="flex items-center justify-between mb-1">
                    <p className="text-[14px] font-[800] text-[color:var(--ink)]">Submit an Idea</p>
                    <button onClick={()=>setShowIdeaForm(false)} className="text-[color:var(--mute-3)] hover:text-[color:var(--ink)] font-bold text-[18px] leading-none">×</button>
                  </div>
                  <input placeholder="Idea title *" value={ideaForm.title} onChange={e=>setIdeaForm(f=>({...f,title:e.target.value}))}
                    className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[8px] px-3.5 py-2.5 text-[13px] outline-none transition-colors" />
                  <textarea placeholder="Describe the idea — what problem does it solve? *" rows={3} value={ideaForm.desc} onChange={e=>setIdeaForm(f=>({...f,desc:e.target.value}))}
                    className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[8px] px-3.5 py-2.5 text-[13px] outline-none transition-colors resize-none" />
                  <select value={ideaForm.theme} onChange={e=>setIdeaForm(f=>({...f,theme:e.target.value}))}
                    className="w-full border border-[color:var(--line-2)] rounded-[8px] px-3.5 py-2.5 text-[13px] outline-none bg-white">
                    <option value="">Select theme *</option>
                    {THEMES.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                  <div className="flex gap-2 justify-end pt-2">
                    <Btn variant="ghost" className="text-[12px] py-2" onClick={()=>{setShowIdeaForm(false);setIdeaForm({title:'',desc:'',theme:''});}}>Cancel</Btn>
                    <Btn variant="primary" className="text-[12px] py-2 px-5" onClick={submitIdea}>Submit for review</Btn>
                  </div>
                </div>
              </div>
            )}

            {/* My pending ideas */}
            {myPendingIdeas.length > 0 && (
              <div className="space-y-2">
                <p className="text-[11px] font-semibold text-[color:var(--mute-3)] uppercase tracking-[0.1em] px-1">Your pending submissions</p>
                {myPendingIdeas.map(idea=>(
                  <div key={idea.id} className="bg-[color:var(--paper)] border border-dashed border-[color:var(--line-2)] rounded-[16px] p-4 flex items-start gap-3">
                    <span className="text-[18px] mt-0.5">💡</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <p className="text-[13px] font-[700] text-[color:var(--ink)]">{idea.title}</p>
                        <span className="text-[10px] font-[700] uppercase tracking-[0.1em] bg-[#fef9c3] text-[#a16207] border border-[#fde68a] px-2 py-0.5 rounded-[8px]">Pending Review</span>
                      </div>
                      <p className="text-[12px] text-[color:var(--mute-2)] mt-0.5 line-clamp-2">{idea.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Approved Ideas Grid */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {approvedIdeas.filter(i=> filter==='all' || i.theme===filter).map(idea => {
                const hasUpvoted = idea.upvotes.includes(user?.id||'');
                const headerColors = getHeaderColors(idea.theme);
                const cardDate = getCardDate(idea.id, idea.submittedAt);
                return (
                  <div key={idea.id} className="rounded-[16px] flex flex-col overflow-hidden transition-all duration-300 hover:-translate-y-1.5 bg-[color:var(--paper-2)] hover:shadow-[0_12px_28px_rgba(0,0,0,0.08)] border border-[color:var(--line-2)]">
                    
                    {/* Header bar from mockup */}
                    <div 
                      style={{ backgroundColor: headerColors.bg, color: headerColors.text }} 
                      className="px-5 py-3.5 flex justify-between items-center font-mono font-bold text-[12px] uppercase tracking-wider rounded-t-[16px]"
                    >
                      <span>{idea.id}</span>
                      <span>{cardDate}</span>
                    </div>

                    {/* Body from mockup */}
                    <div className="p-6 flex flex-col gap-4 flex-1 rounded-b-[16px]">
                      {/* Creator / Organization subtitle */}
                      <div>
                        <p className="text-[11px] text-[color:var(--mute-3)] font-semibold uppercase tracking-wider mb-1">
                          by {idea.authorName} ({idea.authorDept})
                        </p>
                        
                        {/* Title & Tag row */}
                        <div className="flex items-start justify-between gap-2.5">
                          <h3 className="text-[16px] font-[800] text-[color:var(--ink)] leading-snug flex-1">
                            {idea.title}
                          </h3>
                          <span className="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-[#f0fdf4] text-[#16a34a] border border-[#bbf7d0]/50 flex-shrink-0">
                            Approved
                          </span>
                        </div>
                      </div>

                      {/* Description */}
                      <p className="text-[12.5px] text-[color:var(--mute-1)] leading-relaxed flex-1 mt-2"
                        style={{display:'-webkit-box', WebkitLineClamp:4, WebkitBoxOrient:'vertical', overflow:'hidden'}}>
                        {idea.desc}
                      </p>

                      {/* Dashed divider */}
                      <div className="border-t border-dashed border-[color:var(--line-2)]/60 pt-4 mt-2 flex items-center justify-between">
                        {/* Left: Upvote count */}
                        <div className="flex flex-col">
                          <span className="text-[20px] font-[900] text-[color:var(--ink)] leading-none">
                            ▲ {idea.upvotes.length}
                          </span>
                          <span className="text-[9px] text-[color:var(--mute-3)] uppercase font-bold tracking-wider mt-1">
                            Upvotes
                          </span>
                        </div>

                        {/* Right: Upvote CTA button */}
                        <button 
                          onClick={() => toggleUpvote(idea.id)}
                          className={`rounded-full px-5 py-2 text-[11px] font-[800] tracking-wide transition-all ${
                            hasUpvoted 
                              ? 'bg-[color:var(--accent)] text-white hover:opacity-90' 
                              : 'bg-[color:var(--ink)] text-white hover:bg-[color:var(--ink-3)]'
                          }`}
                        >
                          {hasUpvoted ? 'Upvoted' : 'Upvote'}
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
              {approvedIdeas.filter(i=> filter==='all' || i.theme===filter).length === 0 && (
                <div className="col-span-full py-16 text-center">
                  <p className="text-[32px] mb-2">🌱</p>
                  <p className="text-[13px] text-[color:var(--mute-3)]">No ideas found for this theme. Be the first to submit one!</p>
                </div>
              )}
            </div>

          </div>
        </div>
      )}

      <Modal open={!!detailT} onClose={()=>setDetailT(null)} title={detailT?.name||''} size="sm">
        {detailT && (
          <div className="space-y-4">
            <div className="flex flex-wrap gap-2">
              <Tag label={detailT.theme} variant="orange" />
              <Tag label={isOpen(detailT)?'Open':'Closed'} variant={isOpen(detailT)?'green':'default'} />
            </div>
            <Tag label={detailT.subTheme} />
            <div className="flex gap-3">
              <div className="flex-1 bg-gray-50 rounded-none border border-gray-100 p-3 text-center">
                <p className="text-xl font-bold text-gray-800">{detailT.members.length}/{detailT.maxSize}</p>
                <p className="text-[11px] text-gray-400 mt-0.5">Members</p>
              </div>
              <div className="flex-1 bg-orange-50 rounded-none border border-orange-100 p-3 text-center">
                <p className="text-xl font-bold text-orange-500">{detailT.missing.length}</p>
                <p className="text-[11px] text-gray-400 mt-0.5">Slots open</p>
              </div>
            </div>
            {detailT.missing.length>0 && (
              <div>
                <p className="text-[11px] text-gray-400 mb-2">Seeking</p>
                <div className="flex flex-wrap gap-1.5">{detailT.missing.map(s=><Tag key={s} label={s} variant="amber" small />)}</div>
              </div>
            )}
            
            <div>
              <p className="text-[11px] font-[800] text-[color:var(--mute-3)] uppercase tracking-[0.14em] mb-2.5">Current Members</p>
              <div className="space-y-2">
                {detailT.members.map((mId,i)=>{
                  const m = USERS.find(u=>u.id===mId) || {name:'User '+mId, dept:'Unknown', role:'-'};
                  return (
                    <div key={i} className="flex items-center gap-3 px-4 py-3 bg-white border border-[#efefef] rounded-[3px]">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-[800] flex-shrink-0 ${i===0?'bg-[color:var(--accent)] text-white':'bg-[color:var(--paper-2)] text-[color:var(--mute-2)]'}`}>
                        {initials(m.name||'?')}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-[13px] text-[color:var(--ink)] font-[800] truncate">{m.name} {i===0 && <span className="ml-1 text-[10px] font-[800] text-[color:var(--accent)]">(Lead)</span>}</p>
                        <p className="text-[11px] font-medium text-[color:var(--mute-3)] capitalize">{m.dept} · {m.role}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {isOpen(detailT) && <Btn variant="primary" className="w-full py-2.5 font-[800]" onClick={()=>{setDetailT(null);setJoinT(detailT);}}>Request to join</Btn>}
          </div>
        )}
      </Modal>

      <Modal open={!!joinT} onClose={()=>{setJoinT(null);setInviteMsg('');}} title="Request to join" size="sm">
        {joinT && (
          <div className="space-y-4">
            {/* Team info */}
            <div className="bg-[color:var(--paper)] border border-[#efefef] rounded-none p-4">
              <p className="text-[14px] font-[700] text-[color:var(--ink)]">{joinT.name}</p>
              <p className="text-[12px] text-[color:var(--accent)] font-medium mt-0.5">{joinT.subTheme}</p>
              {joinT.leadName && <p className="text-[11px] text-[color:var(--mute-3)] mt-1.5">Led by {joinT.leadName} · {joinT.leadDept}</p>}
              {joinT.skillsNeeded?.length > 0 && (
                <div className="flex flex-wrap gap-1.5 mt-2.5">
                  <span className="text-[10px] text-[color:var(--mute-3)]">Needs:</span>
                  {joinT.skillsNeeded.map(s=><span key={s} className="px-2 py-0.5 bg-white border border-[color:var(--line-2)] text-[color:var(--mute-1)] text-[10px] rounded-full">{s}</span>)}
                </div>
              )}
            </div>

            {/* My profile auto-filled */}
            {user && (
              <div className="bg-[#eeeeff] border border-[#c4b5fd] rounded-none p-4">
                <p className="text-[10px] text-[color:var(--accent)] uppercase tracking-wide font-semibold mb-2">Your profile</p>
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full bg-[color:var(--accent)] flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">
                    {initials(user.name)}
                  </div>
                  <div>
                    <p className="text-[13px] font-semibold text-[color:var(--ink)]">{user.name}</p>
                    <p className="text-[11px] text-[color:var(--mute-3)]">{user.dept} · {user.email}</p>
                  </div>
                </div>
              </div>
            )}

            {/* Personal message */}
            <div>
              <label className="block text-[12px] font-semibold text-[color:var(--mute-1)] mb-1.5">
                Introduce yourself <span className="text-[color:var(--mute-3)] font-normal">(optional but recommended)</span>
              </label>
              <textarea
                value={inviteMsg}
                onChange={e=>setInviteMsg(e.target.value)}
                rows={3}
                placeholder="Tell them what you bring to the table — skills, past projects, what excites you about their idea..."
                className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3.5 py-2.5 text-[13px] text-[color:var(--ink)] placeholder-[color:var(--mute-4)] outline-none resize-none transition-colors"
              />
            </div>

            <div className="flex gap-2">
              <Btn variant="ghost" className="flex-1 py-2.5" onClick={()=>{setJoinT(null);setInviteMsg('');}}>Cancel</Btn>
              <Btn variant="primary" className="flex-1 py-2.5" onClick={sendJoin}>Send request →</Btn>
            </div>
          </div>
        )}
      </Modal>

    </div>
  );
}

function FunZoneView({ quizzes, user, onQuizSubmit, setQuizzes }) {
  const [showAddQuiz, setShowAddQuiz] = React.useState(false);
  const [newQuiz, setNewQuiz] = React.useState({ q: '', opts: ['', '', '', ''], correct: 0, explain: '' });

  const handleAddQuiz = () => {
    if(!newQuiz.q || !newQuiz.opts.every(o=>o)) {
      alert("Please fill all fields for the new quiz.");
      return;
    }
    setQuizzes([...quizzes, newQuiz]);
    setShowAddQuiz(false);
    setNewQuiz({ q: '', opts: ['', '', '', ''], correct: 0, explain: '' });
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <h2 className="text-[14px] text-[color:var(--ink)]" style={{lineHeight:1.4}}>Fun Zone</h2>
          <span className="text-[22px]">🎉</span>
        </div>
        {user?.role === 'admin' && (
          <button onClick={()=>setShowAddQuiz(true)} className="bg-[color:var(--ink)] text-white text-[11px] font-[800] uppercase tracking-wide px-3 py-1.5 rounded-[3px] hover:bg-[color:var(--ink-3)]">+ Add Quiz</button>
        )}
      </div>
      <p className="text-[13px] text-[color:var(--mute-2)] -mt-2">Take a break — react to memes, test your Tech Week knowledge.</p>

      {showAddQuiz && (
        <div className="p-5 border border-[color:var(--line-2)] bg-white fade-up mb-4 shadow-sm rounded-[3px]">
          <p className="text-[14px] font-[800] mb-3">Add New Quiz</p>
          <div className="space-y-3">
            <input placeholder="Question" value={newQuiz.q} onChange={e=>setNewQuiz(f=>({...f,q:e.target.value}))} className="w-full border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] outline-none" />
            <div className="grid grid-cols-2 gap-2">
              {newQuiz.opts.map((o,i)=>(
                <div key={i} className="flex items-center gap-2">
                  <input type="radio" name="correctOpt" checked={newQuiz.correct===i} onChange={()=>setNewQuiz(f=>({...f,correct:i}))} className="accent-[color:var(--accent)]" />
                  <input placeholder={`Option ${i+1}`} value={o} onChange={e=>{
                    const newOpts=[...newQuiz.opts]; newOpts[i]=e.target.value;
                    setNewQuiz(f=>({...f,opts:newOpts}));
                  }} className="flex-1 border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-2 py-1.5 text-[12px] outline-none" />
                </div>
              ))}
            </div>

function RichQuizGame({ quizzes, user, onFinish }) {
  const [activeQuizIdx, setActiveQuizIdx] = React.useState(0);
  const [unlockedQuizzes, setUnlockedQuizzes] = React.useState(() => {
    try {
      const saved = localStorage.getItem('unlockedQuizzes');
      return saved ? JSON.parse(saved) : [0];
    } catch (e) {
      return [0];
    }
  });

  const [idx, setIdx] = React.useState(0);
  const [ans, setAns] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [complete, setComplete] = React.useState(false);

  React.useEffect(() => {
    setIdx(0);
    setAns(null);
    setScore(0);
    setComplete(false);
  }, [quizzes.length, activeQuizIdx]);

  if (!quizzes || quizzes.length === 0) {
    return (
      <div className="border border-dashed border-[color:var(--mute-4)] rounded-[8px] p-8 text-center">
        <p className="text-[13px] font-[800] text-[color:var(--ink)]">No quiz questions yet.</p>
        <p className="text-[12px] text-[color:var(--mute-3)] mt-1">Ask an admin to add the first challenge.</p>
      </div>
    );
  }

  const currentQuiz = quizzes[activeQuizIdx];
  const currentQuestions = currentQuiz?.questions || [];
  const q = currentQuestions[idx];

  const reset = () => {
    setIdx(0);
    setAns(null);
    setScore(0);
    setComplete(false);
  };

  const pick = (i) => {
    if (ans !== null) return;
    const nextScore = score + (i === q.correct ? 1 : 0);
    setAns(i);
    setScore(nextScore);
    if (idx === currentQuestions.length - 1) {
      onFinish?.({ score: nextScore, total: currentQuestions.length });
    }
  };

  const advance = () => {
    if (idx === currentQuestions.length - 1) {
      setComplete(true);
    } else {
      setIdx(i => i + 1);
      setAns(null);
    }
  };

  const unlockNext = () => {
    const nextIdx = activeQuizIdx + 1;
    if (nextIdx < quizzes.length) {
      const newUnlocked = [...unlockedQuizzes];
      if (!newUnlocked.includes(nextIdx)) {
        newUnlocked.push(nextIdx);
        setUnlockedQuizzes(newUnlocked);
        localStorage.setItem('unlockedQuizzes', JSON.stringify(newUnlocked));
      }
      setActiveQuizIdx(nextIdx);
      setIdx(0);
      setAns(null);
      setScore(0);
      setComplete(false);
    }
  };

  if (complete) {
    const pct = Math.round((score / currentQuestions.length) * 100);
    return (
      <div className="border border-[color:var(--line-2)] bg-[color:var(--paper)] rounded-[16px] p-6 text-center">
        <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Quiz complete</p>
        <p className="text-[42px] font-[900] text-[color:var(--ink)] leading-none mt-3">{pct}%</p>
        <p className="text-[14px] font-[800] text-[color:var(--accent)] mt-2">{score} of {currentQuestions.length} correct</p>
        <p className="text-[12px] text-[color:var(--mute-2)] mt-2">
          {score === currentQuestions.length ? 'Perfect run. Bragging rights unlocked.' : 'Warm up complete. Run it back and climb the board.'}
        </p>
        <div className="mt-5 flex flex-wrap justify-center gap-3">
          <button onClick={reset} className="px-5 py-2 bg-[color:var(--ink)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[color:var(--ink-3)] transition-all">
            Retry Quiz
          </button>
          {activeQuizIdx < quizzes.length - 1 && (
            <button onClick={unlockNext} className="px-5 py-2 bg-[color:var(--accent)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all">
              Unlock: {quizzes[activeQuizIdx + 1].title}
            </button>
          )}
        </div>
      </div>
    );
  }

  const getTransitionLabel = () => {
    if (idx === currentQuestions.length - 1) {
      return "Finish Quiz & See Score";
    }
    if (idx === 0) {
      return "OK now, second question is this:";
    }
    if (idx === 1) {
      return "OK now, third question is this:";
    }
    return `OK now, question ${idx + 2} is this:`;
  };

  return (
    <div className="border border-[color:var(--line-2)] bg-white rounded-[16px] p-5 space-y-4">
      {/* Quiz selector tabs */}
      <div className="flex flex-wrap gap-2 pb-3 border-b border-[color:var(--line-2)]">
        {quizzes.map((quiz, i) => {
          const isUnlocked = unlockedQuizzes.includes(i);
          const isActive = activeQuizIdx === i;
          return (
            <button
              key={quiz.id || i}
              disabled={!isUnlocked}
              onClick={() => {
                setActiveQuizIdx(i);
              }}
              className={`px-3 py-1.5 text-[11px] font-[800] rounded-[8px] border transition-all duration-200 flex items-center gap-1.5 ${
                isActive
                  ? 'bg-[color:var(--accent)] text-white border-[color:var(--accent)] shadow-sm'
                  : isUnlocked
                  ? 'bg-white text-[color:var(--ink)] border-[color:var(--line-2)] hover:bg-[color:var(--paper)]'
                  : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed opacity-60'
              }`}
            >
              {!isUnlocked && <span className="text-[10px]">🔒</span>}
              <span>{quiz.title}</span>
            </button>
          );
        })}
      </div>

      {!q ? (
        <div className="text-center py-6 text-[13px] text-[color:var(--mute-2)]">
          No questions in this quiz topic.
        </div>
      ) : (
        <>
          <div className="flex items-center justify-between gap-3 mb-1">
            <p className="text-[11px] text-[color:var(--mute-3)] font-[900] uppercase tracking-[0.14em]">Question {idx+1} / {currentQuestions.length}</p>
            <p className="text-[11px] font-[800] text-[color:var(--accent)]">{user ? user.name.split(' ')[0] : 'Guest'} run</p>
          </div>

          <div className="grid gap-1 mb-2" style={{ gridTemplateColumns: `repeat(${currentQuestions.length}, minmax(0, 1fr))` }}>
            {currentQuestions.map((_, i)=>(
              <span key={i} className={`h-1.5 rounded-full ${i<idx?'bg-[color:var(--accent)]':i===idx?'bg-[#f97316]':'bg-[color:var(--line-2)]'}`} />
            ))}
          </div>

          <p className="text-[15px] font-[800] text-[color:var(--ink)] leading-snug">{q.q}</p>
          <div className="space-y-2">
            {q.opts.map((o, i)=>{
              let cls = 'border-[color:var(--line-2)] bg-[color:var(--paper)] text-[color:var(--mute-1)] hover:border-[color:var(--accent)] hover:bg-[#eeeeff]';
              if (ans !== null) {
                if (i === q.correct) cls = 'border-[#22c55e] bg-[#f0fdf4] text-[#15803d]';
                else if (i === ans) cls = 'border-[#ef4444] bg-[#fef2f2] text-[#dc2626]';
                else cls = 'border-[color:var(--line)] bg-white text-[#c4c4c8]';
              }
              return (
                <button key={i} onClick={()=>pick(i)} className={`w-full text-left px-4 py-3 rounded-[8px] border text-[13px] font-[700] btn ${cls}`}>
                  <span className="inline-flex items-center justify-center w-6 h-6 mr-2 rounded-full bg-white border border-current text-[11px]">{String.fromCharCode(65+i)}</span>
                  {o}
                </button>
              );
            })}
          </div>

          {ans !== null && (
            <div className="mt-4 space-y-3">
              <div className={`rounded-[8px] px-4 py-3 text-[12px] font-[700] ${ans===q.correct?'bg-[#f0fdf4] text-[#15803d]':'bg-[#fffbeb] text-[#b45309]'}`}>
                {ans===q.correct ? 'Correct. ' : 'Not quite. '}{q.explain}
              </div>
              <button onClick={advance} className="w-full py-2.5 bg-[color:var(--ink)] text-white text-[13px] font-[900] rounded-[8px] btn hover:bg-[color:var(--ink-3)] transition-all">
                {getTransitionLabel()}
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      setCustomImage(reader.result);
    };
    reader.readAsDataURL(file);
  };

  const handleSubmitMeme = () => {
    const finalTitle = memeTitle.trim();
    const finalCaption = memeCaption.trim();
    const finalTag = selectedTag === 'Other' ? customTag.trim() : selectedTag.trim();
    const finalHandle = authorHandle.trim() || '@anonymous';

    if (!finalTitle) {
      toast?.('Please add a meme title.', 'error');
      return;
    }
    if (!finalCaption) {
      toast?.('Please add a meme caption.', 'error');
      return;
    }
    if (selectedTag === 'Other' && !finalTag) {
      toast?.('Please specify a custom tag name.', 'error');
      return;
    }

    const id = Date.now();
    const image = customImage || MEME_TEMPLATES[selectedTemplateIdx].image;
    const bg = MEME_TEMPLATES[selectedTemplateIdx].bg;

    const newMeme = {
      id,
      emoji: selectedEmoji,
      image,
      bg,
      tag: finalTag,
      title: finalTitle,
      text: finalCaption,
      author: finalHandle,
      reactions: { fire: 0, cry: 0, skull: 0, clap: 0 }
    };

    setMemes(prev => [newMeme, ...prev]);

    // Reset form
    setMemeTitle('');
    setMemeCaption('');
    setSelectedTag('Model Checkpoint');
    setCustomTag('');
    setSelectedEmoji('😂');
    setSelectedTemplateIdx(0);
    setCustomImage('');
    setMemeModalOpen(false);

    toast?.('Your imagination shared on Meme Wall!', 'success');
  };

  const totalQuestions = quizzes.reduce((sum, q) => sum + (q.questions?.length || 0), 0);

  return (
    <div className="space-y-6 fade-up">
      <div className="bg-white text-[color:var(--ink)] rounded-[16px] overflow-hidden">
        <PageIntro
          eyebrow="Fun Zone"
          title="Memes, trivia, and tiny chaos breaks."
          description="A live corner for quick laughs, leaderboard runs, and bite-sized challenges between build sessions."
          actions={['Meme Wall','Trivia Run','Daily Sparks','Leaderboard'].map(item=>(
            <span key={item} className="px-3 py-1.5 rounded-full bg-[color:var(--paper-2)] text-[color:var(--ink)] border border-[color:var(--line-2)] text-[11px] font-[800]">{item}</span>
          ))}
        />
        <div className="hidden md:grid grid-cols-2 lg:grid-cols-4 border-t border-[color:var(--line-2)]">
            <div className="p-5 border-r border-b lg:border-b-0 border-[color:var(--line-2)]">
              <p className="text-[32px] font-[900] leading-none">{totalQuestions}</p>
              <p className="text-[11px] text-[color:var(--mute-2)] font-[800] mt-2 uppercase tracking-[0.12em]">Questions</p>
            </div>
            <div className="p-5 border-b lg:border-b-0 lg:border-r border-[color:var(--line-2)]">
              <p className="text-[32px] font-[900] leading-none">{memes.length}</p>
              <p className="text-[11px] text-[color:var(--mute-2)] font-[800] mt-2 uppercase tracking-[0.12em]">Memes</p>
            </div>
            <div className="p-5 border-r border-[color:var(--line-2)]">
              <p className="text-[32px] font-[900] leading-none">{bestScore}</p>
              <p className="text-[11px] text-[color:var(--mute-2)] font-[800] mt-2 uppercase tracking-[0.12em]">Top Score</p>
            </div>
            <div className="p-5">
              <p className="text-[32px] font-[900] leading-none">{totalReactions}</p>
              <p className="text-[11px] text-[color:var(--mute-2)] font-[800] mt-2 uppercase tracking-[0.12em]">Reactions</p>
            </div>
        </div>
      </div>

      {isAdmin && <AddContentComposer quizzes={quizzes} setQuizzes={setQuizzes} memes={memes} setMemes={setMemes} toast={toast} />}

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <FunZoneStat label="Today's vibe" value="High" caption="Prototype energy" tone="pink" />
        <FunZoneStat label="Trivia bank" value={totalQuestions} caption="Live questions" tone="blue" />
        <FunZoneStat label="Meme heat" value={totalReactions} caption="Live reactions" tone="amber" />
        <FunZoneStat label="Runs logged" value={(quizResults || []).length} caption="Leaderboard entries" tone="green" />
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-[1.15fr_0.85fr] gap-6">
        <section className="bg-white rounded-[16px] shadow-sm p-5 md:p-6">
          <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-3 mb-5">
            <div>
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Meme Wall</p>
              <h3 className="text-[20px] font-[900] text-[color:var(--ink)] tracking-tight mt-1">Hackathon moments worth reacting to</h3>
            </div>
            <div className="flex flex-wrap gap-2 items-center">
              <span className="text-[11px] font-[800] text-[color:var(--accent)] bg-[#eeeeff] border border-[#c7d2fe] px-3 py-1.5 rounded-full">#techweek-vibes</span>
              <button onClick={() => setMemeModalOpen(true)} className="px-3.5 py-1.5 bg-[color:var(--accent)] text-white text-[12px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all">
                + Share Imagination
              </button>
            </div>
          </div>
          <MemeWall memes={memes} />
        </section>

        <div className="space-y-6">
          <section className="bg-white rounded-[16px] shadow-sm p-5 md:p-6">
            <div className="mb-5">
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Trivia Run</p>
              <h3 className="text-[20px] font-[900] text-[color:var(--ink)] tracking-tight mt-1">Beat the current board</h3>
            </div>
            <RichQuizGame quizzes={quizzes} user={user} onFinish={onQuizSubmit} />
          </section>

          <section className="bg-white rounded-[16px] shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-[color:var(--line)] flex items-center justify-between">
              <div>
                <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Leaderboard</p>
                <p className="text-[13px] font-[800] text-[color:var(--ink)] mt-1">Latest quiz scores</p>
              </div>
              <span className="text-[11px] font-[900] text-[color:var(--accent)]">{topResults.length} shown</span>
            </div>
            <div className="divide-y divide-[color:var(--line)]">
              {topResults.map((r, i)=>(
                <div key={`${r.name}-${i}`} className="px-5 py-3 flex items-center justify-between gap-3">
                  <div className="min-w-0">
                    <p className="text-[13px] font-[800] text-[color:var(--ink)] truncate">{i+1}. {r.name}</p>
                    <p className="text-[11px] text-[color:var(--mute-3)]">{r.dept}</p>

                  <span className="text-[13px] font-[900] text-[color:var(--accent)]">{r.score}/{r.total}</span>

                <div className="px-5 py-8 text-center text-[12px] text-[color:var(--mute-3)]">No quiz runs yet.</div>
              )}
            </div>
          </section>
        </div>
      </div>

      <section className="bg-[color:var(--paper)] rounded-[16px] shadow-sm p-5 md:p-6">
        <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-3 mb-4">
          <div>
            <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)]">Daily Sparks</p>
            <h3 className="text-[20px] font-[900] text-[color:var(--ink)] tracking-tight mt-1">Small challenges for the floor</h3>
          </div>
          <span className="text-[11px] font-[800] text-[color:var(--mute-2)]">Refresh these manually for now</span>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">

              <p className="text-[12px] text-[color:var(--mute-2)] leading-relaxed mt-1">{spark.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* Meme Creator Modal */}
      {memeModalOpen && (
        <Modal open={true} onClose={() => setMemeModalOpen(false)} title="Share Your Imagination" size="lg">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[70vh] overflow-y-auto pr-2">
            {/* Left: Form Editor */}
            <div className="space-y-4">
              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Meme Title</label>
                <input
                  value={memeTitle}
                  onChange={e => setMemeTitle(e.target.value)}
                  placeholder="Enter meme title..."
                  className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]"
                />
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Caption / Description</label>

                  value={memeCaption}
                  onChange={e => setMemeCaption(e.target.value)}
                  placeholder="What's the caption?"
                  rows={3}
                  className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)] resize-none"
                />
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Tag topic</label>
                <select
                  value={selectedTag}
                  onChange={e => setSelectedTag(e.target.value)}

                >
                  <option value="Model Checkpoint">Model Checkpoint</option>
                  <option value="Deploy Drama">Deploy Drama</option>
                  <option value="War Room">War Room</option>
                  <option value="Jury Pitch">Jury Pitch</option>
                  <option value="Other">Other (Custom)</option>
                </select>
                {selectedTag === 'Other' && (
                  <input
                    value={customTag}
                    onChange={e => setCustomTag(e.target.value)}
                    placeholder="Enter custom tag..."
                    className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]"
                  />
                )}
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Select Emoji</label>

                  {['😂', '😭', '💀', '☕', '🔥', '🚀', '💻', '🧠', '⚡', '🤯'].map(emoji => (
                    <button
                      key={emoji}
                      type="button"
                      onClick={() => setSelectedEmoji(emoji)}
                      className={`py-2 text-[18px] border rounded-[8px] transition-all flex items-center justify-center ${
                        selectedEmoji === emoji ? 'bg-[color:var(--accent-tint)] border-[color:var(--accent)] shadow-sm font-bold' : 'bg-white border-[color:var(--line-2)] hover:border-[color:var(--mute-3)]'

                    >
                      {emoji}
                    </button>
                  ))}

              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Choose Template Frame</label>
                <div className="grid grid-cols-5 gap-2">
                  {MEME_TEMPLATES.map((tpl, i) => (
                    <button
                      key={i}
                      type="button"
                      onClick={() => {
                        setSelectedTemplateIdx(i);
                        setCustomImage('');
                      }}
                      className={`relative aspect-square border rounded-[8px] overflow-hidden transition-all ${
                        selectedTemplateIdx === i && !customImage
                          ? 'ring-2 ring-[color:var(--accent)] ring-offset-1 scale-[0.95]'
                          : 'hover:scale-[1.02] border-[color:var(--line-2)]'
                      }`}
                    >
                      <img src={tpl.image} alt={tpl.label} className="w-full h-full object-cover" />
                      <div className="absolute inset-0 bg-black/10 hover:bg-transparent transition-colors" />
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Or Upload Custom Image</label>
                <div className="flex items-center gap-3">
                  <label className="flex-1 flex flex-col items-center justify-center border border-dashed border-[color:var(--line-3)] hover:border-[color:var(--accent)] rounded-[8px] p-4 cursor-pointer bg-[color:var(--paper)] transition-all">
                    <span className="text-[20px]">📷</span>
                    <span className="text-[12px] font-semibold mt-1">Select image file</span>
                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                  </label>
                  {customImage && (
                    <button
                      type="button"
                      onClick={() => setCustomImage('')}
                      className="px-3 py-2 border border-red-200 text-red-600 bg-red-50 text-[11px] font-[800] rounded-[8px] hover:bg-red-100 transition-colors"
                    >
                      Clear
                    </button>
                  )}
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-[800] text-[color:var(--mute-2)] uppercase">Author Handle</label>
                <input
                  value={authorHandle}
                  onChange={e => setAuthorHandle(e.target.value)}
                  placeholder="@handle"
                  className="w-full bg-white border border-[color:var(--line-2)] rounded-[8px] px-3 py-2 text-[13px] focus:outline-none focus:border-[color:var(--accent)]"
                />
              </div>

              <button
                type="button"
                onClick={handleSubmitMeme}
                className="w-full py-2.5 bg-[color:var(--accent)] text-white text-[13px] font-[900] rounded-[8px] btn hover:bg-[#2222dd] transition-all"
              >
                Share Meme
              </button>
            </div>

            {/* Right: Live Preview */}
            <div className="flex flex-col items-center justify-center bg-[color:var(--paper)] p-4 border border-[color:var(--line-2)] rounded-[12px]">
              <p className="text-[11px] font-[900] uppercase tracking-[0.14em] text-[color:var(--mute-3)] mb-4">Live Preview</p>
              
              <div className="bg-white rounded-[16px] border border-[color:var(--line-2)] overflow-hidden shadow-lg flex flex-col w-full max-w-[320px]">
                {/* Header */}
                <div
                  style={{ background: MEME_TEMPLATES[selectedTemplateIdx].bg }}
                  className="px-5 py-3 flex justify-between items-center text-white text-[12px] font-bold rounded-t-[16px]"
                >
                  <span className="inline-flex items-center gap-1.5 bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm border border-white/10">
                    <span className="w-3.5 h-3.5 flex items-center justify-center">{selectedEmoji}</span>
                    <span>{selectedTag === 'Other' ? customTag || 'Custom' : selectedTag}</span>
                  </span>
                  <span className="font-mono text-[11px] uppercase tracking-wider text-white/90">{authorHandle || '@anonymous'}</span>
                </div>

                {/* Aspect-ratio Image */}
                <div
                  className="relative aspect-[16/10] bg-[color:var(--paper-2)] overflow-hidden"
                  style={{ background: MEME_TEMPLATES[selectedTemplateIdx].bg }}
                >
                  {customImage ? (
                    <img src={customImage} alt="" className="w-full h-full object-cover" />
                  ) : (
                    <img src={MEME_TEMPLATES[selectedTemplateIdx].image} alt="" className="w-full h-full object-cover" />
                  )}
                  <div className="absolute inset-0 bg-[radial-gradient(circle_at_25%_20%,rgba(255,255,255,0.15),transparent_35%),linear-gradient(to bottom,rgba(0,0,0,0),rgba(0,0,0,0.25))]" />
                </div>

                {/* Card Body */}
                <div className="p-5 flex-1 flex flex-col gap-2">
                  <h4 className="text-[16px] font-[900] text-[color:var(--ink)] leading-snug">{memeTitle || 'Title Placeholder'}</h4>
                  <p className="text-[13px] text-[color:var(--mute-1)] leading-relaxed">{memeCaption || 'Caption placeholder...'}</p>
                </div>

                {/* Footer Reactions */}
                <div className="flex flex-wrap gap-2 px-5 pb-5 pt-1">
                  {['🔥', '😭', '💀', '👏'].map((e, idx) => (
                    <div key={idx} className="flex items-center gap-1.5 px-3 py-1.5 bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-full text-[12px]">
                      <span className="w-4 h-4 flex items-center justify-center">{e}</span>
                      <span className="text-[color:var(--mute-2)] font-[800]">0</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

                <div className="flex flex-col items-start sm:items-end flex-shrink-0 gap-2.5">
                  <span className={`px-2.5 py-1 border text-[9px] font-mono font-[900] uppercase tracking-wider rounded-[6px] ${style.badge}`}>{item.type}</span>

                  </span>

            </div>
          );
        })}
      </div>
    </div>
  );
}

  const setResTeamAward = (round, teamId, award) => {
    setPubResults(p => {
      const cur = p[round].teams;
      const exists = cur.find(t=>t.id===teamId);
      const next = exists
        ? (award ? cur.map(t=>t.id===teamId?{...t,award}:t) : cur.filter(t=>t.id!==teamId))
        : [...cur, { id:teamId, name:teams.find(t=>t.id===teamId)?.name||'', award }];
      return {...p, [round]:{...p[round], teams:next}};

                          <div className="flex gap-1.5">
                            <Btn variant="ghost" className="text-[12px] py-1.5" onClick={()=>setProblems(pr=>pr.map(x=>x.id===p.id?{...x,published:!x.published}:x))}>{p.published?'Unpublish':'Publish'}</Btn>
                            <Btn variant="danger" className="text-[12px] py-1.5" onClick={()=>{setProblems(pr=>pr.filter(x=>x.id!==p.id));toast('Deleted.','error');}}>Delete</Btn>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Team Progress */}
          {mTab==='progress' && (
            <div className="fade-up space-y-4">
              {/* Search + filter chips */}
              <div className="flex flex-wrap gap-3 items-center">
                <div className="flex-1 min-w-[200px]">
                  <AnimatedSearchInput value={progQ} onChange={e=>{setProgQ(e.target.value); setProgPage(1);}} onClear={()=>{setProgQ(''); setProgPage(1);}} type="progress" />
                </div>
                <div className="flex gap-1.5 flex-wrap">
                  {[['All','All'],['100','Complete ✓'],['incomplete','Incomplete'],['git','Missing Git'],['sandbox','Missing Sandbox'],['api','Missing API'],['infosec','Missing InfoSec']].map(([val,label])=>(
                    <button key={val} onClick={()=>{setProgFilter(val); setProgPage(1);}}
                      className={`px-3 py-1.5 text-[11px] font-[700] border btn transition-all ${progFilter===val?'bg-[color:var(--ink)] text-white border-[color:var(--ink)]':'bg-white text-[color:var(--mute-2)] border-[color:var(--line-2)] hover:border-[color:var(--mute-3)] hover:text-[color:var(--ink)]'}`}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div className="overflow-x-auto border border-[color:var(--line)]">
                <table className="w-full min-w-[540px]">
                  <thead>
                    <tr className="border-b border-[color:var(--line)] bg-[color:var(--paper)]">
                      {['Team','Git Repo','Sandbox','API Keys','InfoSec','Done'].map((h,i)=>(
                        <th key={i} className={`py-3 px-4 text-[10px] text-[color:var(--mute-3)] uppercase tracking-[0.1em] font-semibold ${i===0?'text-left':'text-center'}`}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {(() => {
                      const q = progQ.toLowerCase();
                      const filtered = prog.filter(t => {
                        if (q && !t.name.toLowerCase().includes(q)) return false;
                        const checks = [t.git, t.sandbox, t.api, t.infosec];
                        const pct = Math.round(checks.filter(Boolean).length / 4 * 100);
                        if (progFilter==='100') return pct===100;
                        if (progFilter==='incomplete') return pct<100;
                        if (progFilter==='git') return !t.git;
                        if (progFilter==='sandbox') return !t.sandbox;
                        if (progFilter==='api') return !t.api;
                        if (progFilter==='infosec') return !t.infosec;
                        return true;
                      });
                      const totalPages = Math.max(1, Math.ceil(filtered.length/JUDGE_PAGE_SIZE));
                      const page = Math.min(progPage, totalPages);
                      const slice = filtered.slice((page-1)*JUDGE_PAGE_SIZE, page*JUDGE_PAGE_SIZE);
                      return slice.map(t=>{
                        const checks=[t.git,t.sandbox,t.api,t.infosec];
                        const pct=Math.round(checks.filter(Boolean).length/4*100);
                        return (
                          <tr key={t.id} className="border-b border-[#f7f7f8] hover:bg-[color:var(--paper)]">
                            <td className="py-3.5 px-4"><p className="text-[14px] font-medium text-[color:var(--ink)]">{t.name}</p><p className="text-[11px] text-[color:var(--mute-3)]">{t.members.length} members</p></td>
                            {checks.map((c,i)=>(
                              <td key={i} className="py-3.5 px-4 text-center">
                                <span className={`text-[13px] font-semibold ${c?'text-[#22c55e]':'text-[color:var(--line-2)]'}`}>{c?'✓':'○'}</span>
                              </td>
                            ))}
                            <td className="py-3.5 px-4">
                              <div className="flex items-center gap-2">
                                <div className="flex-1 prog"><div className="prog-fill" style={{width:`${pct}%`,background:pct===100?'#22c55e':pct>=50?'#f97316':'#fbbf24'}} /></div>
                                <span className="text-[11px] text-[color:var(--mute-3)] w-7">{pct}%</span>
                              </div>
                            </td>
                          </tr>
                        );
                      });
                    })()}
                  </tbody>
                </table>
              </div>
              {/* Pagination */}
              {(() => {
                const q = progQ.toLowerCase();
                const filtered = prog.filter(t => {
                  if (q && !t.name.toLowerCase().includes(q)) return false;
                  const checks = [t.git, t.sandbox, t.api, t.infosec];
                  const pct = Math.round(checks.filter(Boolean).length / 4 * 100);
                  if (progFilter==='100') return pct===100;
                  if (progFilter==='incomplete') return pct<100;
                  if (progFilter==='git') return !t.git;
                  if (progFilter==='sandbox') return !t.sandbox;
                  if (progFilter==='api') return !t.api;
                  if (progFilter==='infosec') return !t.infosec;
                  return true;
                });
                const totalPages = Math.max(1, Math.ceil(filtered.length/JUDGE_PAGE_SIZE));
                if(totalPages <= 1) return null;
                const page = Math.min(progPage, totalPages);
                return (
                  <div className="flex items-center justify-between pt-2">
                    <p className="text-[12px] text-[color:var(--mute-3)]">Page {page} of {totalPages} · {filtered.length} teams</p>
                    <div className="flex gap-1">
                      <Btn variant="ghost" className="text-[12px] py-1.5 px-3" onClick={()=>setProgPage(1)} disabled={page===1}>«</Btn>
                      <Btn variant="ghost" className="text-[12px] py-1.5 px-3" onClick={()=>setProgPage(p=>Math.max(1,p-1))} disabled={page===1}>‹ Prev</Btn>
                      {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
                        const start = Math.max(1, Math.min(page-2, totalPages-4));
                        const p = start+i;
                        return p<=totalPages && (
                          <button key={p} onClick={()=>setProgPage(p)}
                            className={`w-8 h-8 text-[12px] font-semibold btn ${p===page?'bg-[color:var(--ink)] text-white':'bg-white border border-[color:var(--line-2)] text-[color:var(--mute-2)] hover:bg-[color:var(--paper)]'}`}>{p}</button>
                        );
                      })}
                      <Btn variant="ghost" className="text-[12px] py-1.5 px-3" onClick={()=>setProgPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}>Next ›</Btn>
                      <Btn variant="ghost" className="text-[12px] py-1.5 px-3" onClick={()=>setProgPage(totalPages)} disabled={page===totalPages}>»</Btn>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}
          {mTab==='funzone' && (
            <div className="fade-up space-y-4">
              <p className="text-[12px] text-[color:var(--mute-2)]">Fun Zone Results</p>
              <table className="w-full">
                <thead>
                  <tr className="border-b border-[color:var(--line)]">
                    {['User', 'Dept', 'Score', 'Time'].map((h,i)=>(
                      <th key={i} className={`py-3 px-4 text-[10px] text-[color:var(--mute-3)] uppercase tracking-[0.1em] font-semibold text-left`}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {(quizResults||[]).map((r, i)=>(
                    <tr key={i} className="border-b border-[#f7f7f8] hover:bg-[color:var(--paper)]">
                      <td className="py-3.5 px-4"><p className="text-[14px] font-medium text-[color:var(--ink)]">{r.name}</p></td>
                      <td className="py-3.5 px-4"><p className="text-[12px] text-[color:var(--mute-1)]">{r.dept}</p></td>
                      <td className="py-3.5 px-4"><p className="text-[14px] font-[800] text-[color:var(--ink)]">{r.score}/{r.total}</p></td>
                      <td className="py-3.5 px-4"><p className="text-[11px] text-[color:var(--mute-3)]">{r.time}</p></td>
                    </tr>
                  ))}
                  {(!quizResults || quizResults.length === 0) && (
                    <tr>
                      <td colSpan={4} className="py-8 text-center text-[12px] text-[color:var(--mute-3)]">No quiz results yet.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}


          
          
    
          {/* Detailed Scoring Modal */}
          {scoreModal && (
            <Modal open={true} onClose={() => setScoreModal(null)} title={`Score ${scoreModal.teamName} — ${scoreModal.round}`} size="md">
              <div className="space-y-6 fade-up max-h-[70vh] overflow-y-auto pr-2">
                <p className="text-[13px] text-[color:var(--mute-2)] leading-relaxed">
                  Evaluate this team across the 6 core criteria. Each criterion is scored out of 5 points.
                </p>
                <div className="space-y-4">
                  {[
                    { id: 'prob', label: 'Problem & Idea', desc: 'Is the problem real and the idea innovative?' },
                    { id: 'prod', label: 'Production Path', desc: 'Feasibility to scale and deploy.' },
                    { id: 'cust', label: 'Customer Impact', desc: 'Value delivered to end users.' },
                    { id: 'bus', label: 'Business Impact / P&L', desc: 'Economic viability and return.' },
                    { id: 'strat', label: 'Strategy, Bet & Moat', desc: 'Long term strategic advantage.' },
                    { id: 'pitch', label: 'Pitch & Defense', desc: 'Team presentation and Q&A.' }
                  ].map(crit => (
                    <div key={crit.id} className="bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-[3px] p-4">
                      <div className="mb-3 flex items-center justify-between">
                        <div>
                          <p className="text-[13px] font-[800] text-[color:var(--ink)]">{crit.label}</p>
                          <p className="text-[11px] text-[color:var(--mute-3)] mt-0.5">{crit.desc}</p>
                        </div>
                        <span className="text-[14px] font-[800] text-[color:var(--accent)]">{scoreForm[crit.id] || 0} / 5</span>
                      </div>
                      <div className="flex gap-2">
                        {[1, 2, 3, 4, 5].map(val => (
                          <button key={val} onClick={() => setScoreForm(s => ({...s, [crit.id]: val}))}
                            className={`flex-1 py-2 text-[13px] font-[800] border rounded-[3px] transition-all ${scoreForm[crit.id] === val ? 'bg-[color:var(--accent)] text-white border-[color:var(--accent)]' : 'bg-white text-[color:var(--mute-2)] border-[color:var(--line-2)] hover:border-[color:var(--mute-3)] hover:text-[color:var(--ink)]'}`}>
                            {val}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-[color:var(--paper)] border border-[color:var(--line-2)] rounded-[3px] p-4 mt-4">
                  <p className="text-[13px] font-[800] text-[color:var(--ink)] mb-1">Judge Comments</p>
                  <p className="text-[11px] text-[color:var(--mute-3)] mb-3">Optional comment (required for extremes like 1s or 5s)</p>
                  <textarea 
                    value={scoreForm.comment || ''}
                    onChange={(e) => setScoreForm(s => ({...s, comment: e.target.value}))}
                    placeholder="Leave your notes about the team's performance..."
                    rows={3}
                    className="w-full bg-white border border-[color:var(--line-2)] focus:border-[color:var(--accent)] rounded-[3px] px-3 py-2 text-[13px] text-[color:var(--ink)] placeholder-[color:var(--mute-4)] outline-none resize-none transition-colors"
                  />
                </div>
                <div className="pt-2 flex gap-3">
                  <Btn variant="outline" className="flex-1 py-3 text-[12px] font-[800] uppercase tracking-wider"
                    onClick={() => {
                      const total = (scoreForm.prob||0) + (scoreForm.prod||0) + (scoreForm.cust||0) + (scoreForm.bus||0) + (scoreForm.strat||0) + (scoreForm.pitch||0);
                      setScoreDetails(p => ({ ...p, [scoreModal.teamId]: { ...p[scoreModal.teamId], [scoreModal.round]: { ...scoreForm, isDraft: true } } }));
                      sc(scoreModal.teamId, scoreModal.round, total);
                      setScoreModal(null);
                      toast('Draft saved.', 'success');
                    }}>
                    Save Draft
                  </Btn>
                  <Btn variant="primary" className="flex-1 py-3 text-[12px] font-[800] uppercase tracking-wider bg-[#16a34a] hover:bg-[#15803d] border-[#16a34a]"
                    onClick={() => {
                      const total = (scoreForm.prob||0) + (scoreForm.prod||0) + (scoreForm.cust||0) + (scoreForm.bus||0) + (scoreForm.strat||0) + (scoreForm.pitch||0);
                      setScoreDetails(p => ({ ...p, [scoreModal.teamId]: { ...p[scoreModal.teamId], [scoreModal.round]: { ...scoreForm, isDraft: false } } }));
                      sc(scoreModal.teamId, scoreModal.round, total);
                      setScoreModal(null);
                      toast('Score submitted successfully.', 'success');
                    }}>
                    Submit Score
                  </Btn>
                </div>
              </div>
            </Modal>
          )}
    </div>
  );
}
